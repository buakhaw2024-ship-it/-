<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全谱系博弈实战演练系统</title>
<style>
:root{
  --bg1:#0a0e1a;
  --bg2:#111827;
  --bg3:#1a2235;
  --border:#1e3a5f;
  --cyan:#00d4ff;
  --yellow:#f6c453;
  --purple:#c084fc;
  --green:#4ade80;
  --red:#ff4f6a;
  --white:#e8f0fe;
  --text:#94a3b8;
  --dim:#4a5568;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg1);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1200px 600px at 50% -10%,rgba(0,212,255,.06),transparent 60%),var(--bg1)}
.wrap{max-width:960px;margin:0 auto;padding:18px 16px 64px}
.screen{display:none;animation:fade .35s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
@keyframes slidein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}

/* ===== Header ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:40px;height:40px;border:1px solid var(--cyan);border-radius:10px;display:grid;place-items:center;color:var(--cyan);font-size:20px;box-shadow:0 0 22px rgba(0,212,255,.25) inset,0 0 12px rgba(0,212,255,.2)}
.brand h1{font-size:18px;color:var(--white);letter-spacing:1px;font-weight:700}
.brand .sub{color:var(--dim);font-size:11px;letter-spacing:2px;margin-top:2px}
.rankchip{text-align:right}
.rankchip .r{color:var(--yellow);font-size:13px;font-weight:700}
.rankchip .p{color:var(--dim);font-size:11px}

/* ===== Generic ===== */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px}
.panel-t{color:var(--cyan);font-size:13px;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700}
.panel-t::before{content:"";width:4px;height:14px;background:var(--cyan);border-radius:2px;box-shadow:0 0 10px var(--cyan)}
.muted{color:var(--dim)}
.center{text-align:center}
.row{display:flex;gap:10px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.hide{display:none!important}

/* ===== Buttons ===== */
.btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:10px 22px;cursor:pointer;font-family:inherit;font-size:14px;border-radius:8px;transition:all .18s;letter-spacing:.5px;font-weight:600}
.btn:hover{background:rgba(0,212,255,.12);box-shadow:0 0 16px rgba(0,212,255,.25)}
.btn:active{transform:translateY(1px)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(74,222,128,.12);box-shadow:0 0 16px rgba(74,222,128,.22)}
.btn-yellow{border-color:var(--yellow);color:var(--yellow)}
.btn-yellow:hover{background:rgba(246,196,83,.12)}
.btn-purple{border-color:var(--purple);color:var(--purple)}
.btn-purple:hover{background:rgba(192,132,252,.12)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(255,79,106,.12)}
.btn-ghost{border-color:var(--border);color:var(--text)}
.btn-ghost:hover{background:rgba(255,255,255,.04);border-color:var(--dim)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-block{width:100%;text-align:center}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}

/* ===== HUB tracks ===== */
.tracks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.track{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.track::after{content:"";position:absolute;inset:0;background:radial-gradient(140px 80px at 80% 0,var(--gc,rgba(0,212,255,.18)),transparent 70%);opacity:.5;pointer-events:none}
.track:hover{transform:translateY(-3px);border-color:var(--ac,var(--cyan));box-shadow:0 8px 28px rgba(0,0,0,.4)}
.track .tk-icon{font-size:26px;margin-bottom:10px}
.track h3{color:var(--white);font-size:15px;margin-bottom:4px}
.track .tk-sub{color:var(--dim);font-size:11px;margin-bottom:12px;min-height:28px}
.track .tk-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text);border-top:1px solid var(--border);padding-top:10px}
.track .tk-meta b{color:var(--ac,var(--cyan))}

/* progress ring */
.ringwrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.ringtxt h2{color:var(--white);font-size:17px;margin-bottom:4px}
.ringtxt p{font-size:12px;color:var(--dim);max-width:420px;line-height:1.6}

/* ===== Module cards ===== */
.modgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modcard{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0;overflow:hidden;cursor:pointer;transition:all .18s;position:relative}
.modcard:hover{transform:translateY(-2px);border-color:var(--cyan)}
.modcard .barcolor{height:4px;width:100%}
.modcard .mc-body{padding:14px}
.modcard h4{color:var(--white);font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.modcard .mc-tag{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.modcard .mc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.bestbadge{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--dim)}
.bestbadge.has{border-color:var(--yellow);color:var(--yellow);background:rgba(246,196,83,.08)}
.modcard.locked{opacity:.55;cursor:not-allowed}
.lockicon{position:absolute;top:10px;right:12px;color:var(--dim);font-size:14px}

/* completion mini bar */
.minibar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex:1;margin-right:10px}
.minibar > i{display:block;height:100%;border-radius:3px;transition:width .8s ease}

/* ===== Drill ===== */
.scenebox{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:8px;padding:16px;margin-bottom:14px;line-height:1.7}
.scenebox .lbl{font-size:11px;color:var(--cyan);letter-spacing:1.5px;margin-bottom:8px;font-weight:700}
.objbox{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.25);border-radius:8px;padding:14px;margin-bottom:12px}
.objbox .lbl{color:var(--green)}
.tipbox{background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.22);border-radius:8px;padding:14px;font-style:italic;color:var(--purple);line-height:1.7}
.tipbox .who{font-style:normal;font-size:11px;color:var(--dim);margin-top:6px;display:block}

.roundhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.roundhdr .rd{color:var(--cyan);font-size:13px;letter-spacing:1px;font-weight:700}
.dots{display:flex;gap:6px}
.dots i{width:9px;height:9px;border-radius:50%;background:var(--border);transition:all .3s}
.dots i.done{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.6)}
.dots i.cur{background:var(--cyan);box-shadow:0 0 8px rgba(0,212,255,.7);transform:scale(1.2)}

.choices{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.choice{display:flex;gap:12px;align-items:flex-start;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .18s;animation:slidein .35s ease both}
.choice:hover{transform:translateY(-2px);border-color:var(--cyan);background:rgba(0,212,255,.05);box-shadow:0 6px 18px rgba(0,0,0,.3)}
.choice .badge{flex:none;width:28px;height:28px;border-radius:8px;border:1px solid var(--cyan);color:var(--cyan);display:grid;place-items:center;font-weight:700;font-size:15px}
.choice .ctext{flex:1;color:var(--white);font-size:14px;line-height:1.5}
.choice.disabled{pointer-events:none;opacity:.5}
.choice.picked{border-color:var(--yellow);background:rgba(246,196,83,.06)}
.choice.picked .badge{border-color:var(--yellow);color:var(--yellow)}
.choice .sret{margin-left:auto;font-weight:700;font-size:13px;flex:none}

/* feedback */
.fb-score{text-align:center;padding:18px;margin-bottom:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3)}
.fb-score .delta{font-size:42px;font-weight:800;line-height:1}
.fb-score .deltalbl{font-size:12px;color:var(--dim);margin-top:6px;letter-spacing:1px}
.fb-verdict{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:12px}
.v-great{background:rgba(74,222,128,.15);color:var(--green);border:1px solid var(--green)}
.v-ok{background:rgba(246,196,83,.15);color:var(--yellow);border:1px solid var(--yellow)}
.v-bad{background:rgba(255,79,106,.15);color:var(--red);border:1px solid var(--red)}
.fb-exp{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;line-height:1.7;margin-bottom:12px}
.fb-exp .lbl{font-size:11px;letter-spacing:1px;font-weight:700;margin-bottom:6px;color:var(--cyan)}
.fb-ideal{background:rgba(74,222,128,.05);border:1px dashed rgba(74,222,128,.4);border-radius:8px;padding:12px;font-size:13px;color:var(--green);line-height:1.6;margin-bottom:12px}

/* opponent adaptation */
.oppbox{background:rgba(255,79,106,.05);border:1px solid rgba(255,79,106,.25);border-radius:8px;padding:14px;line-height:1.7;margin-bottom:12px}
.oppbox .lbl{font-size:11px;letter-spacing:1px;font-weight:700;margin-bottom:6px;color:var(--red)}

/* result */
.result-hero{text-align:center;padding:24px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(160deg,var(--bg3),var(--bg2));margin-bottom:16px}
.bigscore{font-size:64px;font-weight:800;color:var(--cyan);line-height:1;text-shadow:0 0 30px rgba(0,212,255,.4)}
.stars{font-size:40px;letter-spacing:8px;margin:14px 0 8px}
.star{color:var(--dim)}
.star.on{color:var(--yellow);text-shadow:0 0 16px rgba(246,196,83,.6)}
.gainlist{display:flex;flex-direction:column;gap:8px}
.gainrow{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px}
.gainrow .gp{color:var(--green);font-weight:700}

/* ===== skill bars (stats) ===== */
.skillbar{margin-bottom:12px}
.skillbar .sb-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.skillbar .sb-top .nm{color:var(--white)}
.skillbar .sb-top .vl{color:var(--cyan);font-weight:700}
.sb-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.sb-fill{height:100%;border-radius:4px;transition:width 1s ease;background:linear-gradient(90deg,#0066aa,var(--cyan))}

/* radar */
.radarwrap{display:flex;justify-content:center;padding:8px 0}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.statgrid{grid-template-columns:1fr}}

/* full sim cards */
.simcard{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;margin-bottom:12px;position:relative;overflow:hidden}
.simcard:hover{transform:translateY(-2px);border-color:var(--purple);box-shadow:0 8px 26px rgba(0,0,0,.4)}
.simcard h3{color:var(--white);font-size:16px;margin-bottom:6px}
.simcard .sc-meta{font-size:11px;color:var(--purple);letter-spacing:1px;margin-bottom:8px}
.simcard p{font-size:12px;color:var(--dim);line-height:1.6}

.kvgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:600px){.kvgrid{grid-template-columns:1fr}}
.kvbox{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kvbox .v{font-size:24px;font-weight:800;color:var(--cyan)}
.kvbox .k{font-size:11px;color:var(--dim);margin-top:3px}

/* breadcrumb / back */
.crumb{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:12px;color:var(--dim);flex-wrap:wrap}
.crumb a{color:var(--cyan);cursor:pointer;text-decoration:none}
.crumb a:hover{text-decoration:underline}
.crumb span.sep{color:var(--dim)}

/* tag pills */
.pill{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;border:1px solid var(--border);color:var(--text);margin:2px}
.pill.c{border-color:var(--cyan);color:var(--cyan)}
.pill.g{border-color:var(--green);color:var(--green)}
.pill.p{border-color:var(--purple);color:var(--purple)}
.pill.y{border-color:var(--yellow);color:var(--yellow)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--cyan);color:var(--white);padding:12px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:50;box-shadow:0 8px 30px rgba(0,0,0,.5);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:760px){
  .tracks{grid-template-columns:1fr}
  .modgrid{grid-template-columns:1fr}
  .brand h1{font-size:15px}
  .bigscore{font-size:52px}
  .wrap{padding:14px 12px 56px}
}
/* ===== Extra classes for JS rendering ===== */
.btn-primary{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.05));border:1px solid var(--cyan);color:var(--cyan);padding:12px 28px;cursor:pointer;font-family:inherit;font-size:14px;border-radius:10px;transition:all .2s;letter-spacing:.5px;font-weight:700}
.btn-primary:hover{background:rgba(0,212,255,.2);box-shadow:0 0 20px rgba(0,212,255,.3);transform:translateY(-1px)}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--dim);padding:8px 16px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:8px;transition:all .18s}
.btn-back:hover{border-color:var(--cyan);color:var(--cyan)}
.mb12{margin-bottom:12px}
.mc-bar{height:4px;width:100%;border-radius:2px 2px 0 0}
.mc-name{color:var(--white);font-size:14px;font-weight:700}
.mc-scenarios{display:flex;flex-direction:column;gap:6px}
.mc-sc{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;font-size:12px}
.mc-sc:hover{border-color:var(--cyan);background:rgba(0,212,255,.04)}
.mc-sc-idx{width:20px;height:20px;border-radius:50%;border:1px solid var(--cyan);color:var(--cyan);display:grid;place-items:center;font-size:11px;font-weight:700;flex:none}
.mc-sc-label{flex:1;color:var(--text)}
.mc-sc-go{color:var(--cyan);font-size:13px}
.footer{text-align:center;color:var(--dim);font-size:11px;margin-top:30px;padding-top:16px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <div class="logo">◈</div>
      <div>
        <h1>全谱系博弈实战演练系统</h1>
        <div class="sub">FULL-SPECTRUM GAME PRACTICE TRAINING</div>
      </div>
    </div>
    <div class="rankchip" id="rankchip">
      <div class="r" id="rankName">见习谈判员</div>
      <div class="p" id="rankPts">0 训练分</div>
    </div>
  </div>

  <div id="app"></div>

  <div class="footer">数据仅保存在本机浏览器 · 与主系统 index.html 互补 · 演练用模拟内容</div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   全谱系博弈实战演练系统  —  single-file training app
   ========================================================================= */

/* ---------------- Skill metadata ---------------- */
const SKILLS = {
  info:       {name:"信息获取", color:"#3aa7ff"},
  agenda:     {name:"议程控制", color:"#7dd3fc"},
  pressure:   {name:"施压博弈", color:"#ff6b6b"},
  trust:      {name:"信任构建", color:"#4ade80"},
  endgame:    {name:"终局收尾", color:"#f6c453"},
  batna:      {name:"BATNA分析", color:"#c084fc"},
  standard:   {name:"客观标准", color:"#60a5fa"},
  emotion:    {name:"情绪管理", color:"#fb7185"},
  concession: {name:"让步策略", color:"#fbbf24"},
  retreat:    {name:"撤退判断", color:"#94a3b8"}
};
const SKILL_ORDER = ["info","agenda","pressure","trust","endgame","batna","standard","emotion","concession","retreat"];

const RANKS = [
  {min:0,   name:"见习谈判员"},
  {min:200, name:"初级谈判员"},
  {min:400, name:"资深谈判员"},
  {min:600, name:"首席谈判官"},
  {min:800, name:"传奇谈判宗师"}
];

/* =========================================================================
   TRACK A — 技能系演练 (10 modules, 2 scenarios each, 4 rounds each)
   round.choices: {text, score(20-90), tag, feedback, ideal}
   ========================================================================= */
const TRACK_A = {
  id:"A", name:"技能系演练", icon:"⚙",
  sub:"逐项打磨十大核心谈判技能", color:"#00d4ff",
  modules:[
  /* ===== 1. 信息获取 ===== */
  {id:"info",name:"信息获取演练",color:"#3aa7ff",skill:"info",scenarios:[
    {context:"你是采购经理，供应商报价远高于市场预期。你怀疑其中有大量可压缩空间，但对方对成本结构守口如瓶。",
     objective:"用开放式提问与倾听，逐层挖出对方的真实约束与底牌。",
     tip:"\"最有力的不是你说了什么，而是你让对方说了什么。\"——谈判导师 林楷",
     rounds:[
      {situation:"对方一上来就抛出总价，强调\"这是最优惠的整包价\"。你还不清楚价格里包含哪些项目。",
       choices:[
        {text:"能帮我拆解一下这个总价的构成吗",score:85,tag:"info",feedback:"开放式提问把笼统总价拆成可讨论的细项，为逐项议价创造抓手。这是信息获取的标准起手式。",ideal:true},
        {text:"太贵了，直接砍三成再谈",score:32,tag:"info",feedback:"在零信息下乱砍价容易报出离谱数字暴露你的无知。你既没拿到事实，也让对方掌握了主动。",ideal:false},
        {text:"我理解，那就先按这个价走流程",score:22,tag:"info",feedback:"过早接受等于放弃全部信息探查。所有筹码都被你拱手让出。",ideal:false}
       ]},
      {situation:"对方拆出了三大块：硬件、人工、服务。其中\"服务\"占了四成且语焉不详。",
       choices:[
        {text:"服务这块具体覆盖哪些内容、按什么计费",score:88,tag:"info",feedback:"对占比最高且最模糊的科目深挖，是性价比最高的信息动作。模糊处往往藏着水分。",ideal:true},
        {text:"硬件还能再便宜点吗",score:48,tag:"info",feedback:"硬件透明度高、压缩空间小，你把精力放错了地方。不过至少在试探。",ideal:false},
        {text:"服务听起来很专业，那没问题",score:25,tag:"info",feedback:"被\"专业\"二字带过，恰恰漏掉了最大的成本黑箱。",ideal:false}
       ]},
      {situation:"对方坦言服务里含了一支随时待命的驻场团队，但你们其实用不到那么高的响应级别。",
       choices:[
        {text:"我们的实际响应需求其实低很多，能否按需配置",score:86,tag:"info",feedback:"用挖到的信息反推出真实需求，把不必要的服务剥离，这是信息转化为价值的关键一步。",ideal:true},
        {text:"那把服务整块去掉吧",score:50,tag:"info",feedback:"一刀切掉可能误伤你真正需要的部分。信息已到位，决策却太粗。",ideal:false},
        {text:"既然都含了，那就留着以防万一",score:28,tag:"info",feedback:"为用不上的能力付全款，等于让信息白白浪费。",ideal:false}

const ALL_TRACKS = [TRACK_A, TRACK_B, TRACK_C];

/* =========================================================================
   State & Persistence
   ========================================================================= */
const LS_KEY = 'tss_progress';

function loadProgress() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { const p = JSON.parse(raw); p.skillMastery = p.skillMastery || {}; return p; }
  } catch(e) {}
  return { moduleScores:{}, skillMastery:{}, totalPoints:0, lastPlayed:null };
}
function saveProgress(p) { try { localStorage.setItem(LS_KEY, JSON.stringify(p)); } catch(e){} }

let progress = loadProgress();

function addScore(moduleId, scenarioIdx, score, skillTags) {
  const key = moduleId + '_' + scenarioIdx;
  const prev = progress.moduleScores[key] || 0;
  progress.moduleScores[key] = Math.max(prev, score);
  const delta = Math.max(0, score - prev);
  progress.totalPoints += delta;
  if (skillTags) {
    skillTags.forEach(t => { progress.skillMastery[t] = (progress.skillMastery[t] || 0) + Math.round(delta * 0.6); });
  }
  progress.lastPlayed = Date.now();
  saveProgress(progress);
}

function getRank() {
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (progress.totalPoints >= RANKS[i].min) return RANKS[i];
  }
  return RANKS[0];
}

function getModuleBest(moduleId) {
  let best = 0;
  for (let i = 0; i < 10; i++) {
    const s = progress.moduleScores[moduleId + '_' + i] || 0;
    if (s > best) best = s;
  }
  return best;
}

function getStars(score) {
  if (score >= 90) return 3;
  if (score >= 70) return 2;
  if (score >= 50) return 1;
  return 0;
}

function starsHtml(n, size) {
  size = size || 18;
  let h = '';
  for (let i = 0; i < 3; i++) h += '<span class="star ' + (i < n ? 'on' : '') + '" style="font-size:' + size + 'px">★</span>';
  return h;
}

/* =========================================================================
   Router
   ========================================================================= */
const $app = () => document.getElementById('app');

let currentScreen = null;
let screenParams = {};

function goto(screen, params) {
  currentScreen = screen;
  screenParams = params || {};
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function render() {
  const r = getRank();
  document.getElementById('rankName').textContent = r.name;
  document.getElementById('rankPts').textContent = progress.totalPoints + ' 训练分';
  const el = $app();
  switch(currentScreen) {
    case 'HUB':          el.innerHTML = renderHub(); break;
    case 'TRACK_MAP':    el.innerHTML = renderTrackMap(); break;
    case 'DRILL_INTRO':  el.innerHTML = renderDrillIntro(); break;
    case 'DRILL_ROUND':  el.innerHTML = renderDrillRound(); break;
    case 'DRILL_FEEDBACK': el.innerHTML = renderDrillFeedback(); break;
    case 'DRILL_RESULT': el.innerHTML = renderDrillResult(); break;
    case 'STATS':        el.innerHTML = renderStats(); break;
    default:             el.innerHTML = renderHub(); break;
  }
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('[data-goto]').forEach(el => {
    el.onclick = function() {
      const target = this.getAttribute('data-goto');
      const p = {};
      for (const attr of this.attributes) {
        if (attr.name.startsWith('data-p-')) p[attr.name.slice(7)] = attr.value;
      }
      goto(target, p);
    };
  });
  document.querySelectorAll('[data-choice]').forEach(el => {
    el.onclick = function() { handleChoice(parseInt(this.getAttribute('data-choice'))); };
  });
}

/* =========================================================================
   Toast
   ========================================================================= */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

/* =========================================================================
   Screen: HUB
   ========================================================================= */
function renderHub() {
  const total = countAll();
  const done = countDone();
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const r = 70, stroke = 8;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct / 100;

  let h = '<div class="panel"><div class="panel-t">训练总览</div>';
  h += '<div class="center">';
  h += '<svg width="180" height="180" viewBox="0 0 180 180">';
  h += '<circle cx="90" cy="90" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="' + stroke + '"/>';
  h += '<circle cx="90" cy="90" r="' + r + '" fill="none" stroke="var(--cyan)" stroke-width="' + stroke + '" stroke-linecap="round" stroke-dasharray="' + dash + ' ' + circ + '" transform="rotate(-90 90 90)" style="transition:stroke-dasharray 1.2s ease"/>';
  h += '<text x="90" y="85" text-anchor="middle" fill="var(--white)" font-size="28" font-weight="800">' + pct + '%</text>';
  h += '<text x="90" y="105" text-anchor="middle" fill="var(--dim)" font-size="11">完成进度</text>';
  h += '</svg>';
  h += '<div class="muted mt8">' + done + ' / ' + total + ' 场景已完成</div>';
  h += '</div></div>';

  ALL_TRACKS.forEach(track => {
    const tDone = countTrackDone(track);
    const tTotal = countTrackTotal(track);
    const tPct = tTotal > 0 ? Math.round(tDone / tTotal * 100) : 0;
    h += '<div class="panel" style="cursor:pointer;border-left:3px solid ' + track.color + '" data-goto="TRACK_MAP" data-p-track="' + track.id + '">';
    h += '<div class="spread"><div><div class="panel-t" style="margin-bottom:4px">' + track.icon + ' ' + track.name + '</div><div class="muted" style="font-size:12px">' + track.sub + '</div></div>';
    h += '<div style="text-align:right"><div style="color:var(--white);font-weight:700;font-size:18px">' + tPct + '%</div><div class="muted" style="font-size:11px">' + tDone + '/' + tTotal + '</div></div></div>';
    h += '<div class="minibar mt8"><i style="width:' + tPct + '%;background:' + track.color + '"></i></div>';
    h += '</div>';
  });

  h += '<div class="panel" style="cursor:pointer;border-left:3px solid var(--purple)" data-goto="STATS">';
  h += '<div class="panel-t">📊 能力分析</div><div class="muted" style="font-size:12px">查看十维技能雷达图与成长轨迹</div></div>';
  return h;
}

function countAll() { let n=0; ALL_TRACKS.forEach(t => t.modules.forEach(m => { n += m.scenarios.length; })); return n; }
function countDone() { let n=0; ALL_TRACKS.forEach(t => t.modules.forEach(m => { m.scenarios.forEach((s,i) => { if (progress.moduleScores[m.id+'_'+i] > 0) n++; }); })); return n; }
function countTrackTotal(track) { let n=0; track.modules.forEach(m => { n += m.scenarios.length; }); return n; }
function countTrackDone(track) { let n=0; track.modules.forEach(m => { m.scenarios.forEach((s,i) => { if (progress.moduleScores[m.id+'_'+i] > 0) n++; }); }); return n; }

/* =========================================================================
   Screen: TRACK_MAP
   ========================================================================= */
function renderTrackMap() {
  const track = ALL_TRACKS.find(t => t.id === screenParams.track) || ALL_TRACKS[0];
  let h = '<div class="spread mb12"><div class="panel-t">' + track.icon + ' ' + track.name + '</div>';
  h += '<button class="btn-back" data-goto="HUB">← 返回</button></div>';
  h += '<div class="modgrid">';
  track.modules.forEach(mod => {
    const best = getModuleBest(mod.id);
    const stars = getStars(best);
    const scenarioCount = mod.scenarios.length;
    let doneSc = 0;
    for (let i = 0; i < scenarioCount; i++) { if (progress.moduleScores[mod.id+'_'+i] > 0) doneSc++; }
    h += '<div class="modcard" style="--mc:' + mod.color + '">';
    h += '<div class="mc-bar" style="background:' + mod.color + '"></div>';
    h += '<div class="mc-body">';
    h += '<div class="spread"><div class="mc-name">' + mod.name + '</div>';
    h += '<div>' + starsHtml(stars, 14) + '</div></div>';
    h += '<div class="muted" style="font-size:11px;margin-top:4px">场景 ' + doneSc + '/' + scenarioCount;
    if (best > 0) h += ' · 最高 ' + best + '分';
    h += '</div>';
    h += '<div class="mc-scenarios mt8">';
    mod.scenarios.forEach((sc, si) => {
      const scScore = progress.moduleScores[mod.id + '_' + si] || 0;
      const scStars = getStars(scScore);
      h += '<div class="mc-sc" data-goto="DRILL_INTRO" data-p-track="' + track.id + '" data-p-module="' + mod.id + '" data-p-scenario="' + si + '">';
      h += '<span class="mc-sc-idx">' + (si+1) + '</span>';
      h += '<span class="mc-sc-label">' + (scScore > 0 ? starsHtml(scStars, 11) + ' ' + scScore + '分' : '未完成') + '</span>';
      h += '<span class="mc-sc-go">→</span>';
      h += '</div>';
    });
    h += '</div></div></div>';
  });
  h += '</div>';
  return h;
}

/* =========================================================================
   Drill state
   ========================================================================= */
let drill = { track:null, module:null, scenario:null, scenarioIdx:0, roundIdx:0, totalScore:0, roundScores:[], skillGains:{}, lastChoice:null };

function startDrill(trackId, moduleId, scenarioIdx) {
  const track = ALL_TRACKS.find(t => t.id === trackId);
  const mod = track.modules.find(m => m.id === moduleId);
  const sc = mod.scenarios[scenarioIdx];
  drill = { track, module:mod, scenario:sc, scenarioIdx: parseInt(scenarioIdx), roundIdx:0, totalScore:0, roundScores:[], skillGains:{}, lastChoice:null };
}

/* =========================================================================
   Screen: DRILL_INTRO
   ========================================================================= */
function renderDrillIntro() {
  const trackId = screenParams.track;
  const moduleId = screenParams.module;
  const si = parseInt(screenParams.scenario);
  startDrill(trackId, moduleId, si);
  const sc = drill.scenario;
  let h = '<div class="spread"><div class="panel-t">' + drill.module.name + ' · 场景 ' + (si+1) + '</div>';
  h += '<button class="btn-back" data-goto="TRACK_MAP" data-p-track="' + trackId + '">← 返回</button></div>';
  h += '<div class="scenebox"><div class="lbl">场景背景</div>' + sc.context + '</div>';
  h += '<div class="objbox"><div class="lbl">训练目标</div>' + sc.objective + '</div>';
  h += '<div class="tipbox">' + sc.tip + '</div>';
  h += '<div class="center mt16"><button class="btn-primary" data-goto="DRILL_ROUND">开始演练</button></div>';
  return h;
}

/* =========================================================================
   Screen: DRILL_ROUND
   ========================================================================= */
function renderDrillRound() {
  const rd = drill.scenario.rounds[drill.roundIdx];
  const total = drill.scenario.rounds.length;
  let h = '<div class="roundhdr"><div class="rd">第 ' + (drill.roundIdx+1) + ' / ' + total + ' 回合</div><div class="dots">';
  for (let i = 0; i < total; i++) {
    const cls = i < drill.roundIdx ? 'done' : (i === drill.roundIdx ? 'cur' : '');
    h += '<i class="' + cls + '"></i>';
  }
  h += '</div></div>';
  h += '<div class="scenebox"><div class="lbl">当前情境</div>' + rd.situation + '</div>';
  h += '<div class="choices">';
  const badges = ['①','②','③'];
  rd.choices.forEach((c, ci) => {
    h += '<div class="choice" data-choice="' + ci + '" style="animation-delay:' + (ci*0.1) + 's">';
    h += '<div class="badge">' + badges[ci] + '</div>';
    h += '<div class="ctext">' + c.text + '</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function handleChoice(idx) {
  const rd = drill.scenario.rounds[drill.roundIdx];
  const choice = rd.choices[idx];
  drill.lastChoice = { idx, choice, round: rd };
  drill.roundScores.push(choice.score);
  drill.totalScore += choice.score;
  const tag = choice.tag;
  drill.skillGains[tag] = (drill.skillGains[tag] || 0) + choice.score;
  goto('DRILL_FEEDBACK');
}

/* =========================================================================
   Screen: DRILL_FEEDBACK
   ========================================================================= */
function renderDrillFeedback() {
  const lc = drill.lastChoice;
  const score = lc.choice.score;
  const rd = lc.round;
  const ideal = rd.choices.find(c => c.ideal);
  const vClass = score >= 75 ? 'v-great' : (score >= 45 ? 'v-ok' : 'v-bad');
  const vLabel = score >= 75 ? '出色' : (score >= 45 ? '尚可' : '需改进');
  const scoreColor = score >= 75 ? 'var(--green)' : (score >= 45 ? 'var(--yellow)' : 'var(--red)');

  let h = '<div class="fb-score"><div class="delta" style="color:' + scoreColor + '">+' + score + '</div><div class="deltalbl">本回合得分</div></div>';
  h += '<div class="center"><span class="fb-verdict ' + vClass + '">' + vLabel + '</span></div>';
  h += '<div class="fb-exp"><div class="lbl">你的选择</div>"' + lc.choice.text + '"<br><br>' + lc.choice.feedback + '</div>';
  if (ideal && ideal !== lc.choice) {
    h += '<div class="fb-ideal">💡 最佳选择："' + ideal.text + '"<br>' + ideal.feedback + '</div>';
  }
  if (rd.adaptation) {
    h += '<div class="oppbox"><div class="lbl">对手适应</div>' + rd.adaptation + '</div>';
  }

  const isLast = drill.roundIdx >= drill.scenario.rounds.length - 1;
  if (isLast) {
    h += '<div class="center mt16"><button class="btn-primary" onclick="finishDrill()">查看结果</button></div>';
  } else {
    h += '<div class="center mt16"><button class="btn-primary" onclick="nextRound()">下一回合 →</button></div>';
  }
  return h;
}

function nextRound() {
  drill.roundIdx++;
  goto('DRILL_ROUND');
}

function finishDrill() {
  const total = drill.scenario.rounds.length;
  const maxPossible = total * 90;
  const pct = Math.round(drill.totalScore / maxPossible * 100);
  const tags = [drill.module.skill];
  Object.keys(drill.skillGains).forEach(t => { if (!tags.includes(t)) tags.push(t); });
  addScore(drill.module.id, drill.scenarioIdx, pct, tags);
  goto('DRILL_RESULT');
}

/* =========================================================================
   Screen: DRILL_RESULT
   ========================================================================= */
function renderDrillResult() {
  const total = drill.scenario.rounds.length;
  const maxPossible = total * 90;
  const pct = Math.round(drill.totalScore / maxPossible * 100);
  const stars = getStars(pct);

  let h = '<div class="result-hero">';
  h += '<div class="bigscore">' + pct + '</div>';
  h += '<div class="muted mt8">综合得分</div>';
  h += '<div class="stars">' + starsHtml(stars, 40) + '</div>';
  h += '<div class="muted">' + (stars === 3 ? '完美通关！' : stars === 2 ? '表现不错！' : stars === 1 ? '继续加油！' : '需要更多练习') + '</div>';
  h += '</div>';

  h += '<div class="panel"><div class="panel-t">回合明细</div>';
  drill.roundScores.forEach((s, i) => {
    const sc = s >= 75 ? 'var(--green)' : (s >= 45 ? 'var(--yellow)' : 'var(--red)');
    h += '<div class="gainrow"><span>第 ' + (i+1) + ' 回合</span><span class="gp" style="color:' + sc + '">+' + s + '</span></div>';
  });
  h += '</div>';

  if (Object.keys(drill.skillGains).length > 0) {
    h += '<div class="panel"><div class="panel-t">技能成长</div><div class="gainlist">';
    Object.keys(drill.skillGains).forEach(tag => {
      const sk = SKILLS[tag] || {name:tag, color:'var(--cyan)'};
      h += '<div class="gainrow"><span style="color:' + sk.color + '">' + sk.name + '</span><span class="gp">+' + Math.round(drill.skillGains[tag] * 0.6) + '</span></div>';
    });
    h += '</div></div>';
  }

  h += '<div class="center mt16" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
  h += '<button class="btn-primary" data-goto="DRILL_INTRO" data-p-track="' + drill.track.id + '" data-p-module="' + drill.module.id + '" data-p-scenario="' + drill.scenarioIdx + '">重新挑战</button>';
  h += '<button class="btn-back" data-goto="TRACK_MAP" data-p-track="' + drill.track.id + '">返回模块</button>';
  h += '<button class="btn-back" data-goto="HUB">返回首页</button>';
  h += '</div>';
  return h;
}

/* =========================================================================
   Screen: STATS — SVG Radar Chart + Skill Bars
   ========================================================================= */
function renderStats() {
  let h = '<div class="spread"><div class="panel-t">📊 能力分析</div>';
  h += '<button class="btn-back" data-goto="HUB">← 返回</button></div>';

  // Radar chart
  const cx = 225, cy = 225, maxR = 170;
  const n = SKILL_ORDER.length;
  const vals = SKILL_ORDER.map(k => Math.min(100, progress.skillMastery[k] || 0));

  h += '<div class="panel center"><div class="panel-t">十维技能雷达图</div>';
  h += '<svg width="450" height="450" viewBox="0 0 450 450" style="max-width:100%">';

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    const rr = maxR * ring / 4;
    let pts = '';
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      pts += (cx + rr * Math.cos(angle)) + ',' + (cy + rr * Math.sin(angle)) + ' ';
    }
    h += '<polygon points="' + pts + '" fill="none" stroke="var(--border)" stroke-width="1"/>';
  }

  // Axis lines + labels
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const ex = cx + maxR * Math.cos(angle);
    const ey = cy + maxR * Math.sin(angle);
    h += '<line x1="' + cx + '" y1="' + cy + '" x2="' + ex + '" y2="' + ey + '" stroke="var(--border)" stroke-width="0.5"/>';
    const lx = cx + (maxR + 22) * Math.cos(angle);
    const ly = cy + (maxR + 22) * Math.sin(angle);
    const sk = SKILLS[SKILL_ORDER[i]];
    h += '<text x="' + lx + '" y="' + (ly+4) + '" text-anchor="middle" fill="' + sk.color + '" font-size="11" font-weight="600">' + sk.name + '</text>';
  }

  // Data polygon
  let dataPts = '';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const vr = maxR * vals[i] / 100;
    dataPts += (cx + vr * Math.cos(angle)) + ',' + (cy + vr * Math.sin(angle)) + ' ';
  }
  h += '<polygon points="' + dataPts + '" fill="rgba(0,212,255,.15)" stroke="var(--cyan)" stroke-width="2"/>';

  // Data dots
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const vr = maxR * vals[i] / 100;
    const dx = cx + vr * Math.cos(angle);
    const dy = cy + vr * Math.sin(angle);
    h += '<circle cx="' + dx + '" cy="' + dy + '" r="4" fill="var(--cyan)" stroke="var(--bg1)" stroke-width="2"/>';
  }

  h += '</svg></div>';

  // Skill bars
  h += '<div class="panel"><div class="panel-t">各项技能掌握度</div>';
  SKILL_ORDER.forEach(k => {
    const sk = SKILLS[k];
    const val = Math.min(100, progress.skillMastery[k] || 0);
    h += '<div class="skillbar"><div class="sb-top"><span class="nm">' + sk.name + '</span><span class="muted">' + val + ' / 100</span></div>';
    h += '<div class="sb-track"><div class="sb-fill" style="width:' + val + '%;background:' + sk.color + '"></div></div></div>';
  });
  h += '</div>';

  // Rank progress
  h += '<div class="panel"><div class="panel-t">段位进度</div>';
  const r = getRank();
  const nextIdx = RANKS.findIndex(rk => rk.min > progress.totalPoints);
  const nextRank = nextIdx >= 0 ? RANKS[nextIdx] : null;
  h += '<div class="center" style="font-size:24px;font-weight:800;color:var(--yellow)">' + r.name + '</div>';
  h += '<div class="center muted mt8">总训练分：' + progress.totalPoints + '</div>';
  if (nextRank) {
    const needed = nextRank.min - progress.totalPoints;
    h += '<div class="center muted mt8">距离 ' + nextRank.name + ' 还需 ' + needed + ' 分</div>';
  }
  h += '</div>';

  return h;
}

/* =========================================================================
   Bootstrap
   ========================================================================= */
goto('HUB');


</script>
</body>
</html>
