<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全谱系博弈实战演练系统 v3</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --border: #2a3a5a;
  --cyan: #00d4ff;
  --green: #00ff9f;
  --yellow: #ffd700;
  --red: #ff4f6a;
  --purple: #c084fc;
  --dim: #4a6080;
  --text: #c8d8f0;
  --white: #e8f0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;font-size:14px}
.container{max-width:900px;margin:0 auto;padding:16px}
.screen{display:none}
.screen.active{display:block}

/* Header */
.header{text-align:center;padding:20px 0 12px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:22px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px var(--cyan)}
.header .sub{color:var(--dim);font-size:11px;margin-top:4px;letter-spacing:2px}

/* Panels */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:12px}
.panel-title{color:var(--cyan);font-size:12px;letter-spacing:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* Buttons */
.btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;border-radius:2px;transition:all .2s;letter-spacing:1px}
.btn:hover{background:rgba(0,212,255,.1);box-shadow:0 0 10px rgba(0,212,255,.3)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(0,255,159,.1);box-shadow:0 0 10px rgba(0,255,159,.3)}
.btn-yellow{border-color:var(--yellow);color:var(--yellow)}
.btn-yellow:hover{background:rgba(255,215,0,.1)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(255,79,106,.1)}
.btn-purple{border-color:var(--purple);color:var(--purple)}
.btn-purple:hover{background:rgba(192,132,252,.1)}
.btn-full{width:100%;display:block;text-align:left;margin-bottom:6px;padding:10px 14px}
.btn-sm{padding:5px 12px;font-size:12px}

/* Menu */
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:2px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.menu-item:hover{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.menu-num{color:var(--cyan);font-size:16px;width:28px;text-align:center;font-weight:bold}
.menu-text{flex:1}
.menu-text b{color:var(--white);display:block;font-size:14px}
.menu-text span{color:var(--dim);font-size:11px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:12px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--cyan);transform:translateY(-1px)}
.card h3{color:var(--cyan);font-size:13px;margin-bottom:6px}
.card .diff{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.diff-easy{background:rgba(0,255,159,.15);color:var(--green);border:1px solid rgba(0,255,159,.3)}
.diff-med{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid rgba(255,215,0,.3)}
.diff-hard{background:rgba(255,79,106,.15);color:var(--red);border:1px solid rgba(255,79,106,.3)}
.card p{color:var(--dim);font-size:11px;line-height:1.5}

/* Opponent card */
.opp-card{border:1px solid var(--border);border-radius:3px;padding:10px;cursor:pointer;transition:all .2s;background:var(--bg3)}
.opp-card:hover{border-color:var(--cyan)}
.opp-card.selected{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.opp-name{color:var(--white);font-size:13px;font-weight:bold}
.opp-type{color:var(--purple);font-size:11px;margin:2px 0}
.opp-desc{color:var(--dim);font-size:11px}

/* Progress bar */
.bar-wrap{margin:6px 0}
.bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.bar-label span:first-child{color:var(--text)}
.bar-label span:last-child{color:var(--cyan)}
.bar-bg{background:var(--border);border-radius:2px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.bar-cyan{background:linear-gradient(90deg,#0066aa,var(--cyan))}
.bar-green{background:linear-gradient(90deg,#006644,var(--green))}
.bar-yellow{background:linear-gradient(90deg,#886600,var(--yellow))}
.bar-red{background:linear-gradient(90deg,#880022,var(--red))}
.bar-purple{background:linear-gradient(90deg,#440088,var(--purple))}

/* Score display */
.score-box{text-align:center;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.score-num{font-size:32px;font-weight:bold;color:var(--cyan)}
.score-lbl{color:var(--dim);font-size:11px;margin-top:2px}

/* Outcome badge */
.outcome{display:inline-block;padding:4px 14px;border-radius:2px;font-size:12px;font-weight:bold;letter-spacing:1px}
.outcome-win{background:rgba(0,255,159,.15);color:var(--green);border:1px solid var(--green)}
.outcome-lose{background:rgba(255,79,106,.15);color:var(--red);border:1px solid var(--red)}
.outcome-draw{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid var(--yellow)}
.outcome-coop{background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid var(--cyan)}

/* Choice buttons for scenarios */
.choice-btn{width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:3px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s;line-height:1.5}
.choice-btn:hover{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.choice-btn b{color:var(--cyan)}

/* Info rows */
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(42,58,90,.5);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--dim)}
.info-val{color:var(--white)}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;margin:2px;border:1px solid}
.tag-cyan{border-color:var(--cyan);color:var(--cyan)}
.tag-green{border-color:var(--green);color:var(--green)}
.tag-yellow{border-color:var(--yellow);color:var(--yellow)}
.tag-red{border-color:var(--red);color:var(--red)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;cursor:pointer;color:var(--dim);font-size:12px;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover{color:var(--text)}

/* Input */
.input-wrap{margin:12px 0}
.input-wrap label{display:block;color:var(--dim);font-size:11px;margin-bottom:4px;letter-spacing:1px}
.inp{background:var(--bg3);border:1px solid var(--border);color:var(--white);padding:8px 12px;font-family:inherit;font-size:14px;width:100%;border-radius:2px}
.inp:focus{outline:none;border-color:var(--cyan)}

/* Alert/hint */
.hint{padding:10px 14px;border-radius:2px;margin:8px 0;font-size:12px;line-height:1.6}
.hint-cyan{background:rgba(0,212,255,.08);border-left:3px solid var(--cyan);color:var(--text)}
.hint-green{background:rgba(0,255,159,.08);border-left:3px solid var(--green);color:var(--text)}
.hint-yellow{background:rgba(255,215,0,.08);border-left:3px solid var(--yellow);color:var(--text)}
.hint-red{background:rgba(255,79,106,.08);border-left:3px solid var(--red);color:var(--text)}
.hint-purple{background:rgba(192,132,252,.08);border-left:3px solid var(--purple);color:var(--text)}

/* Round log */
.log{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;padding:8px;background:var(--bg)}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(42,58,90,.3);color:var(--dim)}
.log-entry:last-child{border-bottom:none}
.log-entry .lbl{color:var(--text)}

/* Master theory */
.master-card{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;margin-bottom:10px}
.master-name{color:var(--yellow);font-size:14px;font-weight:bold;margin-bottom:4px}
.master-title{color:var(--dim);font-size:11px;margin-bottom:10px}
.tactic{padding:8px 10px;background:var(--bg2);border-left:3px solid var(--cyan);margin-bottom:6px;border-radius:0 2px 2px 0}
.tactic-name{color:var(--cyan);font-size:12px;font-weight:bold}
.tactic-desc{color:var(--dim);font-size:11px;margin-top:2px;line-height:1.5}

/* Responsive */
@media(max-width:600px){
  .grid2,.grid3{grid-template-columns:1fr}
  .header h1{font-size:16px}
}

/* Welcome screen */
.welcome-logo{text-align:center;padding:40px 0 20px}
.logo-art{color:var(--cyan);font-size:13px;line-height:1.4;text-shadow:0 0 15px rgba(0,212,255,.5)}
.stat-mini{display:inline-block;padding:6px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;font-size:12px;margin:4px}
.stat-mini span{color:var(--cyan);font-weight:bold}
.back-btn{color:var(--dim);cursor:pointer;font-size:12px;padding:4px 8px;border:1px solid var(--border);background:transparent;font-family:inherit;border-radius:2px}
.back-btn:hover{color:var(--text);border-color:var(--text)}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{color:var(--cyan);font-size:13px;letter-spacing:1px}
/* Boss card + difficulty UI */
.boss-card{border-color:var(--yellow)!important;background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,79,106,.06));box-shadow:0 0 18px rgba(255,215,0,.12)}
.boss-card.hell-boss{border-color:var(--red)!important;background:linear-gradient(135deg,rgba(255,79,106,.12),rgba(255,0,0,.06));box-shadow:0 0 22px rgba(255,79,106,.25)}
.boss-badge{display:inline-block;padding:2px 8px;border:1px solid var(--yellow);color:var(--yellow);font-size:10px;margin-bottom:6px;letter-spacing:1px}
.boss-badge.hell{border-color:var(--red);color:var(--red)}
.active-diff{background:rgba(0,212,255,.15)!important;border-color:var(--cyan)!important;font-weight:bold}
.active-diff-hell{background:rgba(255,79,106,.15)!important;border-color:var(--red)!important;color:var(--red)!important;font-weight:bold}

/* ── Negotiation table chrome ────────────────────────────────────────── */
.nego-chrome{display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;position:relative;overflow:hidden}
.nego-chrome::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.03),transparent 60%);pointer-events:none}
.nego-avatar-section{text-align:center;min-width:76px}
.nego-avatar-ring{width:58px;height:58px;border-radius:50%;border:2px solid var(--cyan);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,var(--bg3) 60%,rgba(0,212,255,.08));box-shadow:0 0 16px rgba(0,212,255,.4),inset 0 0 10px rgba(0,212,255,.1);margin:0 auto 5px;animation:avatar-glow 3s ease-in-out infinite}
.nego-avatar-ring.boss-ring{border-color:var(--yellow);box-shadow:0 0 20px rgba(255,215,0,.55),inset 0 0 10px rgba(255,215,0,.12);animation:boss-glow 2.5s ease-in-out infinite}
.nego-avatar-emoji{font-size:27px;line-height:1;display:block}
.avatar-svg-host{padding:0!important;overflow:hidden}
.avatar-svg-host svg{width:100%;height:100%;display:block;border-radius:50%}
.nego-avatar-name{color:var(--white);font-size:11px;font-weight:bold;margin-top:2px;letter-spacing:.5px}
.nego-avatar-type{color:var(--purple);font-size:9px;margin-top:1px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:76px}
.nego-temp-section{flex:1;min-width:0}
.nego-temp-label{color:var(--dim);font-size:10px;letter-spacing:1px;margin-bottom:6px;text-transform:uppercase}
.nego-temp-track{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--red) 0%,var(--yellow) 50%,var(--green) 100%);position:relative;border:1px solid rgba(255,255,255,.06);box-shadow:0 0 8px rgba(0,0,0,.5)}
.nego-temp-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:var(--white);border:2px solid var(--bg2);box-shadow:0 0 8px rgba(0,0,0,.7);transition:left .9s cubic-bezier(.25,.46,.45,.94)}
.nego-temp-meta{color:var(--dim);font-size:10px;margin-top:5px;text-align:right}
@keyframes avatar-glow{0%,100%{box-shadow:0 0 16px rgba(0,212,255,.4),inset 0 0 10px rgba(0,212,255,.1)}50%{box-shadow:0 0 26px rgba(0,212,255,.65),inset 0 0 14px rgba(0,212,255,.2)}}
@keyframes boss-glow{0%,100%{box-shadow:0 0 20px rgba(255,215,0,.55),inset 0 0 10px rgba(255,215,0,.12)}50%{box-shadow:0 0 32px rgba(255,215,0,.8),inset 0 0 18px rgba(255,215,0,.22)}}

/* ── Dialogue bubbles ─────────────────────────────────────────────── */
.bubble-log{margin:10px 0}
.bubble-row{display:flex;margin:5px 0}
.bubble-row-ai{justify-content:flex-start;padding-right:18%}
.bubble-row-player{justify-content:flex-end;padding-left:18%}
.bubble{padding:7px 11px;border-radius:8px;font-size:12px;line-height:1.5;max-width:100%}
.bubble-ai{background:var(--bg3);border:1px solid var(--border);border-top-left-radius:2px;color:var(--text)}
.bubble-player{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.22);border-top-right-radius:2px;color:var(--text);text-align:right}
.bubble-system{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.15);border-radius:3px;color:var(--text);font-size:11px;width:100%;padding:6px 10px}
.bubble-label{font-size:9px;letter-spacing:.5px;margin-bottom:3px;font-weight:bold}
.bubble-ai .bubble-label{color:var(--purple)}
.bubble-player .bubble-label{color:var(--cyan);text-align:right}
.bubble-system .bubble-label{color:var(--yellow);margin-bottom:2px}

/* ── Round timeline ───────────────────────────────────────────────── */
.round-timeline{display:flex;align-items:center;gap:10px;padding:6px 0 10px;border-bottom:1px solid rgba(42,58,90,.4);margin-bottom:10px}
.tl-label{color:var(--dim);font-size:10px;letter-spacing:1px;min-width:55px;white-space:nowrap}
.tl-dots{display:flex;gap:7px;align-items:center}
.tl-dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--border);transition:all .3s}
.tl-done{background:var(--dim);border-color:var(--dim)}
.tl-current{background:var(--cyan);border-color:var(--cyan);animation:pulse-dot 1.2s ease-in-out infinite}
.tl-pending{background:transparent;border-color:var(--border)}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.5)}50%{box-shadow:0 0 0 5px rgba(0,212,255,0)}}

/* ── Bubble slide-in (last bubble only, on each re-render) ────────── */
.bubble-log { max-height: 260px; overflow-y: auto; }
.bubble-row:last-child { animation: bubble-in .22s ease-out; }
@keyframes bubble-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ── Opponent avatar in selection cards ───────────────────────────── */
.opp-card-avatar { text-align:center; margin-bottom:6px; }

/* ── Hell difficulty special effects ─────────────────────────────── */

/* Hell boss card: animated red flicker border */
@keyframes hell-flicker {
  0%,100%{box-shadow:0 0 22px rgba(255,79,106,.25),0 0 0 0 rgba(255,79,106,0)}
  25%{box-shadow:0 0 38px rgba(255,79,106,.6),0 0 8px rgba(255,60,60,.35)}
  55%{box-shadow:0 0 18px rgba(255,79,106,.3),0 0 0 0 rgba(255,79,106,0)}
  80%{box-shadow:0 0 45px rgba(255,79,106,.7),0 0 12px rgba(255,40,40,.4)}
}
.boss-card.hell-boss{animation:hell-flicker 1.9s ease-in-out infinite}

/* Hell button shake */
@keyframes btn-shake {
  0%,100%{transform:translateX(0) rotate(0deg)}
  15%{transform:translateX(-4px) rotate(-.5deg)}
  30%{transform:translateX(4px) rotate(.5deg)}
  45%{transform:translateX(-3px) rotate(-.3deg)}
  60%{transform:translateX(3px) rotate(.3deg)}
  75%{transform:translateX(-1px)}
}
.btn-shake{animation:btn-shake .42s ease}

/* Hell modal overlay */
@keyframes modal-fadein{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.hell-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.hell-modal{background:var(--bg2);border:2px solid var(--red);border-radius:4px;padding:28px 24px;max-width:370px;width:90%;text-align:center;box-shadow:0 0 50px rgba(255,79,106,.45);animation:modal-fadein .22s ease}
.hell-modal-icon{font-size:38px;margin-bottom:10px;line-height:1}
.hell-modal-title{color:var(--red);font-size:16px;font-weight:bold;letter-spacing:3px;margin-bottom:12px;text-shadow:0 0 10px rgba(255,79,106,.5)}
.hell-modal-body{color:var(--text);font-size:12px;line-height:1.75;margin-bottom:18px;text-align:left}
.hell-modal-body li{margin:4px 0;padding-left:4px}
.hell-modal-body li::marker{color:var(--red)}
.hell-modal-btns{display:flex;gap:10px;justify-content:center}

/* Hell nego-chrome: red-tinted atmosphere */
.nego-chrome.hell-chrome{border-color:rgba(255,79,106,.45)!important;background:linear-gradient(135deg,rgba(255,79,106,.07),var(--bg2) 55%)}
.nego-chrome.hell-chrome::before{background:linear-gradient(135deg,rgba(255,79,106,.08),transparent 60%)}

/* Hell avatar ring: red glow */
@keyframes hell-avatar-glow {
  0%,100%{box-shadow:0 0 18px rgba(255,79,106,.5),inset 0 0 10px rgba(255,79,106,.12)}
  50%{box-shadow:0 0 34px rgba(255,79,106,.8),inset 0 0 16px rgba(255,79,106,.22)}
}
.nego-avatar-ring.hell-ring{border-color:var(--red)!important;box-shadow:0 0 18px rgba(255,79,106,.5),inset 0 0 10px rgba(255,79,106,.12);animation:hell-avatar-glow 2s ease-in-out infinite}

/* Hell indicator strip above nego-chrome */
@keyframes hell-indicator-pulse{0%,100%{opacity:.75;letter-spacing:3px}50%{opacity:1;letter-spacing:4px}}
.hell-indicator{background:rgba(255,79,106,.1);border:1px solid rgba(255,79,106,.35);border-radius:2px;padding:4px 12px;font-size:10px;color:var(--red);text-align:center;margin-bottom:8px;animation:hell-indicator-pulse 2.2s ease-in-out infinite;text-transform:uppercase;font-weight:bold}

/* ── Global hell-mode cascade (body.hell-mode applied by router) ───── */
@keyframes hell-pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(255,79,106,.6)}50%{box-shadow:0 0 0 6px rgba(255,79,106,0)}}
body.hell-mode .tl-current{background:var(--red);border-color:var(--red);animation:hell-pulse-dot 1.1s ease-in-out infinite}
body.hell-mode .tl-done{background:rgba(255,79,106,.55);border-color:rgba(255,79,106,.55)}
body.hell-mode .bubble-ai{border-color:rgba(255,79,106,.28);background:linear-gradient(135deg,rgba(255,79,106,.05),var(--bg3))}
body.hell-mode .bubble-ai .bubble-label{color:var(--red)}
body.hell-mode .bubble-player{border-color:rgba(255,79,106,.18);background:rgba(255,79,106,.04)}
body.hell-mode .bubble-player .bubble-label{color:#ff9aa8}
body.hell-mode .header h1{color:var(--red);text-shadow:0 0 20px rgba(255,79,106,.6)}

/* Hell stamp on result screen — diagonal pass/fail */
@keyframes hell-stamp-in{from{opacity:0;transform:rotate(-12deg) scale(2)}to{opacity:.92;transform:rotate(-12deg) scale(1)}}
.hell-stamp{display:inline-block;padding:6px 22px;border:3px solid var(--red);color:var(--red);font-size:18px;font-weight:bold;letter-spacing:6px;transform:rotate(-12deg);text-shadow:0 0 8px rgba(255,79,106,.5);box-shadow:0 0 16px rgba(255,79,106,.35),inset 0 0 8px rgba(255,79,106,.15);background:rgba(10,14,26,.8);animation:hell-stamp-in .5s cubic-bezier(.34,1.56,.64,1);font-family:'Courier New',monospace}
.hell-stamp.pass{border-color:var(--green);color:var(--green);text-shadow:0 0 8px rgba(0,255,159,.5);box-shadow:0 0 16px rgba(0,255,159,.35),inset 0 0 8px rgba(0,255,159,.15)}
.hell-stamp-wrap{text-align:center;margin:14px 0}

/* ── 泡泡马特卡池系统 ───────────────────────────────────────────────────── */

/* 开盒模态 */
.box-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.box-modal{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:28px 24px;max-width:420px;width:94%;text-align:center;box-shadow:0 0 60px rgba(0,212,255,.15)}
.box-modal-title{color:var(--cyan);font-size:15px;font-weight:bold;letter-spacing:3px;margin-bottom:4px}

/* ── 礼盒造型（纯 CSS） ────────────────────────────────────────── */
@keyframes box-shake{0%,100%{transform:translateX(0) rotate(0)}18%{transform:translateX(-6px) rotate(-2deg)}36%{transform:translateX(6px) rotate(2deg)}54%{transform:translateX(-4px) rotate(-1deg)}72%{transform:translateX(4px) rotate(1deg)}}
@keyframes box-hint-blink{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes lid-fly{0%{transform:translateY(0) rotate(0);opacity:1}30%{transform:translateY(-30px) rotate(-18deg);opacity:1}100%{transform:translateY(-120px) translateX(40px) rotate(-55deg);opacity:0}}
@keyframes particle-fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(calc(var(--dx)*65px),calc(var(--dy)*65px)) scale(0);opacity:0}}
@keyframes box-body-flash{0%{box-shadow:0 0 0 var(--card-glow,rgba(0,212,255,.3))}40%{box-shadow:0 0 40px var(--card-glow,rgba(0,212,255,.8))}100%{box-shadow:0 0 12px var(--card-glow,rgba(0,212,255,.3))}}
@keyframes card-flip-in{0%{transform:rotateY(180deg) scale(.8);opacity:0}60%{transform:rotateY(-8deg) scale(1.06)}100%{transform:rotateY(0) scale(1);opacity:1}}
@keyframes card-glow-pulse{0%,100%{box-shadow:0 0 12px var(--card-glow,rgba(0,212,255,.3))}50%{box-shadow:0 0 28px var(--card-glow,rgba(0,212,255,.5))}}

.gift-box-wrap{position:relative;display:inline-block;cursor:pointer;margin:8px auto;user-select:none;padding-top:14px}
.gift-box-wrap:hover .gift-box-body{filter:brightness(1.15)}
.gift-box-brand{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--card-color,var(--cyan));color:#0a0e1a;font-size:9px;font-weight:bold;letter-spacing:2px;padding:2px 14px;border-radius:2px;box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:2;white-space:nowrap}
.gift-box-lid{position:relative;width:138px;height:36px;background:linear-gradient(135deg,var(--card-color,var(--cyan)) 0%,rgba(0,0,0,.55) 100%);border-radius:4px 4px 0 0;margin:0 auto;border:2px solid var(--card-color,var(--cyan));box-shadow:0 0 10px var(--card-glow,rgba(0,212,255,.4)),inset 0 -4px 8px rgba(0,0,0,.3)}
.gift-box-lid::after{content:'';position:absolute;top:3px;left:6px;right:6px;height:8px;background:linear-gradient(90deg,rgba(255,255,255,.35),rgba(255,255,255,.05));border-radius:2px;pointer-events:none}
.gift-box-ribbon-h{position:absolute;top:50%;left:0;right:0;height:6px;background:rgba(255,255,255,.25);transform:translateY(-50%)}
.gift-box-ribbon-knot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:rgba(255,255,255,.85);line-height:1;text-shadow:0 0 4px rgba(0,0,0,.5)}
.gift-box-body{position:relative;width:130px;height:130px;background:linear-gradient(160deg,var(--bg3) 0%,var(--bg2) 100%);border:2px solid var(--card-color,var(--cyan));border-top:none;border-radius:0 0 6px 6px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 14px var(--card-glow,rgba(0,212,255,.3)),inset 0 0 24px rgba(0,0,0,.25);overflow:hidden}
.gift-box-body::before{content:'';position:absolute;top:0;left:0;width:60%;height:100%;background:linear-gradient(110deg,transparent 0%,rgba(255,255,255,.08) 45%,rgba(255,255,255,.18) 50%,rgba(255,255,255,.08) 55%,transparent 100%);pointer-events:none}
.gift-box-ribbon-v{position:absolute;left:50%;top:0;bottom:0;width:6px;background:rgba(255,255,255,.15);transform:translateX(-50%);z-index:1}
.gift-box-question{position:absolute;font-size:54px;color:var(--card-color,var(--cyan));opacity:.18;font-weight:bold;letter-spacing:4px;text-shadow:0 0 18px var(--card-glow,rgba(0,212,255,.5));pointer-events:none;line-height:1}
.gift-box-rarity-label{position:relative;font-size:11px;font-weight:bold;letter-spacing:2px;margin-top:auto;margin-bottom:10px;text-shadow:0 0 6px var(--card-glow,rgba(0,212,255,.4));z-index:2}
.gift-box-series{position:relative;font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:6px;z-index:2}
.gift-box-hint{font-size:10px;color:var(--dim);margin-top:8px;animation:box-hint-blink 1.4s ease-in-out infinite;letter-spacing:1px}
.gift-box-particles{position:absolute;top:50%;left:50%;pointer-events:none}
.box-particle{position:absolute;width:8px;height:8px;border-radius:50%;top:-4px;left:-4px;opacity:0}

.gift-box-wrap.box-shaking .gift-box-lid,.gift-box-wrap.box-shaking .gift-box-body{animation:box-shake .38s ease}
.gift-box-wrap.box-exploding #bm-lid{animation:lid-fly .7s cubic-bezier(.25,.46,.45,.94) forwards}
.gift-box-wrap.box-exploding .gift-box-body{animation:box-body-flash .7s ease forwards}
.gift-box-wrap.box-exploding .box-particle{animation:particle-fly .65s ease-out forwards}
.gift-box-wrap.box-exploding .gift-box-hint{display:none}

/* 卡片（结果展示） */
.box-card-front{background:var(--card-bg,rgba(0,212,255,.08));border:2px solid var(--card-color,var(--cyan));border-radius:8px;padding:16px 14px;text-align:center;box-shadow:0 0 14px var(--card-glow,rgba(0,212,255,.3));display:inline-block;min-width:130px;max-width:200px}
.box-card-reveal-anim{animation:card-flip-in .55s cubic-bezier(.34,1.56,.64,1),card-glow-pulse 2s ease-in-out infinite .6s}
.box-card-rarity{font-size:9px;font-weight:bold;color:var(--card-color,var(--cyan));letter-spacing:2px;margin-bottom:8px}
.box-card-avatar{height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.box-card-svg{width:72px;height:72px;border-radius:50%;overflow:hidden;display:inline-block;background:var(--bg3)}
.box-card-svg svg{width:100%;height:100%;display:block;border-radius:50%}
.album-card-avatar .box-card-svg{width:36px;height:36px}
.box-card-name{color:var(--white);font-size:13px;font-weight:bold;margin-bottom:6px;line-height:1.3}
.box-card-flavor{color:var(--dim);font-size:10px;line-height:1.5}

/* 集卡册 */
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px}
.album-card{border:1px solid var(--border);border-radius:4px;padding:8px 6px;text-align:center;cursor:default;background:var(--bg3);transition:all .2s}
.album-card-owned{border-color:var(--card-color,var(--border));box-shadow:0 0 8px var(--card-glow,transparent);background:var(--card-bg,var(--bg3))}
.album-card-owned:hover{transform:translateY(-2px);box-shadow:0 0 16px var(--card-glow,transparent)}
.album-card-locked{opacity:.45}
.album-card-rarity{font-size:8px;font-weight:bold;color:var(--card-color,var(--dim));letter-spacing:1.5px;margin-bottom:4px}
.album-card-avatar{height:36px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.album-card-avatar svg{width:32px;height:32px;border-radius:50%}
.album-card-name{color:var(--text);font-size:9px;line-height:1.3}

/* 主菜单新解锁闪光提示 */
@keyframes menu-badge-pulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.menu-new-badge{display:inline-block;background:rgba(255,215,0,.15);border:1px solid var(--yellow);color:var(--yellow);font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;animation:menu-badge-pulse 1.4s ease-in-out infinite;vertical-align:middle}

/* ── 跨局记忆徽章（opponent-select 卡片） ─────────────────────────────────── */
.rep-badge{font-size:10px;color:var(--dim);text-align:center;margin:4px 0;padding:3px 6px;background:rgba(192,132,252,.06);border:1px solid rgba(192,132,252,.18);border-radius:2px;letter-spacing:.3px}
.rep-alert{display:inline-block;margin-left:6px;padding:0 4px;border-radius:2px;font-weight:bold;font-size:9px}
.rep-alert.hot{color:var(--red);background:rgba(255,79,106,.12);border:1px solid rgba(255,79,106,.4)}
.rep-alert.warm{color:var(--yellow);background:rgba(255,215,0,.10);border:1px solid rgba(255,215,0,.35)}
.rep-alert.cold{color:var(--cyan);background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.25)}

/* ── UI 交互引导系统 ─────────────────────────────────────────────────────── */
/* dim 层：无 selector 时提供全屏遮罩；有 spotlight 时透明（spotlight 自带暗化） */
.guide-dim{position:fixed;inset:0;z-index:8999;pointer-events:none;transition:background .22s}
/* spotlight：box-shadow 大范围扩散制造暗化 + 透明 "聚光孔"；自带 cyan 描边 */
.guide-spotlight{position:fixed;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,.72),0 0 0 2px var(--cyan),0 0 18px rgba(0,212,255,.45);z-index:9001;pointer-events:none;transition:left .28s ease,top .28s ease,width .28s ease,height .28s ease}
/* tooltip 卡片 */
.guide-tooltip{position:fixed;z-index:9002;background:var(--bg2);border:1px solid var(--cyan);border-radius:8px;padding:16px 18px;max-width:340px;min-width:240px;box-shadow:0 6px 32px rgba(0,0,0,.65),0 0 16px rgba(0,212,255,.18);pointer-events:all;font-family:'Courier New',monospace}
.guide-tip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.guide-tip-count{font-size:10px;color:var(--dim);letter-spacing:1px}
.guide-skip-x{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;font-family:inherit;line-height:1;transition:color .15s}
.guide-skip-x:hover{color:var(--text)}
.guide-tip-title{color:var(--cyan);font-size:13px;font-weight:bold;margin-bottom:8px;letter-spacing:.5px;line-height:1.4}
.guide-tip-body{color:var(--text);font-size:11px;line-height:1.75;margin-bottom:14px}
.guide-tip-btns{display:flex;gap:8px;justify-content:flex-end}
.guide-btn{background:transparent;border:1px solid;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:2px;transition:all .18s;letter-spacing:.5px}
.guide-btn-pri{border-color:var(--cyan);color:var(--cyan)}
.guide-btn-pri:hover{background:rgba(0,212,255,.12)}
.guide-btn-sec{border-color:var(--border);color:var(--dim)}
.guide-btn-sec:hover{border-color:var(--text);color:var(--text)}
/* 右下角 ? 浮动按钮 */
@keyframes guide-help-pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.45)}70%{box-shadow:0 0 0 8px rgba(0,212,255,0)}}
.guide-help-btn{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--cyan);color:var(--cyan);font-size:16px;font-weight:bold;cursor:pointer;z-index:8990;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .2s;animation:guide-help-pulse 2.8s ease-in-out infinite;box-shadow:0 0 10px rgba(0,212,255,.2)}

/* ── 内联 ℹ 提示按钮 + 浮窗 ────────────────────────────────────────────────── */
.info-tip-btn{background:none;border:1px solid rgba(0,212,255,.4);color:rgba(0,212,255,.7);font-size:9px;font-weight:bold;cursor:pointer;border-radius:50%;width:14px;height:14px;padding:0;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:4px;transition:all .15s;line-height:1}
.info-tip-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 6px rgba(0,212,255,.3)}
.inline-tip-pop{position:fixed;z-index:9100;background:var(--bg2);border:1px solid var(--cyan);border-radius:6px;padding:12px 14px 10px;max-width:280px;min-width:200px;font-size:11px;line-height:1.7;color:var(--text);box-shadow:0 4px 24px rgba(0,0,0,.7),0 0 12px rgba(0,212,255,.15);font-family:'Courier New',monospace}
.inline-tip-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0;line-height:1;font-family:inherit;transition:color .15s}
.inline-tip-close:hover{color:var(--text)}

/* ── 新手训练路径推荐（主菜单） ──────────────────────────────────────────────── */
.training-path-callout{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.2);border-radius:4px;padding:10px 14px;margin-bottom:10px}
.tp-title{color:var(--cyan);font-size:11px;font-weight:bold;letter-spacing:1px;margin-bottom:7px}
.tp-steps{display:flex;align-items:center;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tp-step{font-size:10px;padding:2px 8px;border-radius:2px;border:1px solid var(--border);color:var(--dim)}
.tp-step.tp-now{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.1);font-weight:bold}
.tp-step.tp-done{border-color:rgba(0,255,159,.35);color:var(--green);background:rgba(0,255,159,.06)}
.tp-step.tp-dim{color:var(--dim);opacity:.5}
.tp-arrow{color:var(--dim);font-size:10px}
.tp-hint{color:var(--dim);font-size:10px;line-height:1.5}

/* ── 军衔下一级提示（成绩看板） ────────────────────────────────────────────── */
.rank-next-hint{font-size:10px;color:var(--dim);text-align:center;padding:5px 8px 10px;letter-spacing:.3px}
.rank-next-icon{color:var(--yellow);margin-right:5px}

/* ── 心理类型对照表（谈判行为画像屏） ───────────────────────────────────────────── */
.type-ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:4px}
.type-ref-card{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:8px 10px;transition:border-color .15s}
.type-ref-card.type-ref-active{border-color:var(--cyan);background:rgba(0,212,255,.06);box-shadow:0 0 8px rgba(0,212,255,.1)}
.type-ref-name{font-size:12px;font-weight:bold;margin-bottom:3px}
.type-ref-trait{font-size:10px;color:var(--text);margin-bottom:3px}
.type-ref-cond{font-size:9px;color:var(--dim);line-height:1.4}

/* ── 识破按钮 ℹ 提示行 ─────────────────────────────────────────────────────── */
.peek-tip-row{display:flex;align-items:center;gap:6px;margin:-4px 0 8px;padding-left:2px}
.peek-tip-label{font-size:10px;color:var(--dim);line-height:1}

/* ── 集卡册解锁条件提示 ─────────────────────────────────────────────────────── */
.album-card-cond{font-size:8px;color:rgba(255,215,0,.6);line-height:1.4;margin-top:3px;text-align:center;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ════════════════════════════════════════════════════════════════════════════
   合成工坊 · 萌系可爱卡牌
   ════════════════════════════════════════════════════════════════════════════ */
@keyframes synth-shimmer{0%,100%{transform:translateX(-100%) skewX(-15deg)}50%{transform:translateX(180%) skewX(-15deg)}}
@keyframes synth-sparkle{0%,100%{opacity:.4;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-3px) scale(1.18)}}
@keyframes synth-ready-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.55),0 0 24px var(--card-glow,rgba(255,215,0,.5))}50%{box-shadow:0 0 0 6px rgba(255,215,0,0),0 0 36px var(--card-glow,rgba(255,215,0,.7))}}
@keyframes synth-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes synth-heart-fly{0%{transform:translate(0,0) scale(0);opacity:0}30%{opacity:1}100%{transform:translate(calc(var(--dx)*120px),calc(var(--dy)*120px)) scale(1.4) rotate(180deg);opacity:0}}
@keyframes synth-card-pop{0%{opacity:0;transform:scale(.3) rotate(-12deg)}55%{opacity:1;transform:scale(1.1) rotate(6deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes synth-title-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes synth-foil-rotate{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}

.synth-workshop{
  background:linear-gradient(135deg,rgba(192,132,252,.06) 0%,rgba(255,215,0,.04) 50%,rgba(0,212,255,.06) 100%);
  border:1px solid rgba(192,132,252,.30);
  border-radius:8px; padding:14px; margin-bottom:18px; position:relative; overflow:hidden;
}
.synth-workshop::before{
  content:""; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),transparent);
  animation:synth-shimmer 4s ease-in-out infinite;
}
.synth-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.synth-title{
  color:#ffd700; font-size:14px; font-weight:bold; letter-spacing:2px;
  text-shadow:0 0 12px rgba(255,215,0,.55);
  animation:synth-title-bounce 2.4s ease-in-out infinite;
}
.synth-shards{
  background:rgba(192,132,252,.15); border:1px solid rgba(192,132,252,.4);
  color:var(--purple); font-size:12px; padding:4px 10px; border-radius:12px; letter-spacing:.5px;
}
.synth-shards b{color:#fff;font-size:13px}
.synth-help{
  font-size:10.5px; color:var(--dim); line-height:1.7;
  padding:8px 10px; background:rgba(0,0,0,.2); border-radius:4px; margin-bottom:12px;
  border-left:2px solid var(--purple);
}

.synth-grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px;
}

.synth-card{
  position:relative; background:linear-gradient(160deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1.5px solid var(--card-color,var(--border)); border-radius:10px;
  padding:10px 8px 8px; text-align:center; transition:all .25s; overflow:hidden;
}
.synth-card::before{
  /* 镭射 / 全息 foil */
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.18; mix-blend-mode:screen;
  background:conic-gradient(from 0deg,rgba(255,107,138,.5),rgba(255,215,0,.5),rgba(136,224,192,.5),rgba(107,184,216,.5),rgba(192,132,252,.5),rgba(255,107,138,.5));
}
.synth-card-ready{
  animation:synth-ready-pulse 1.8s ease-in-out infinite,synth-float 3s ease-in-out infinite;
  border-color:#ffd700; cursor:pointer;
}
.synth-card-ready::after{
  /* 顶角小爱心徽章 */
  content:"✨"; position:absolute; top:-4px; right:-4px;
  width:22px; height:22px; line-height:22px; text-align:center;
  background:#ffd700; color:#fff; border-radius:50%; font-size:11px;
  box-shadow:0 0 12px rgba(255,215,0,.8); animation:synth-sparkle 1.2s ease-in-out infinite;
}
.synth-card-owned{
  opacity:.92; border-style:double; border-width:3px;
  background:linear-gradient(160deg,var(--card-bg,var(--bg3)) 0%,var(--bg2) 100%);
}
.synth-card-owned::before{animation:synth-foil-rotate 8s linear infinite}

.synth-card-rarity{font-size:8.5px;font-weight:bold;color:var(--card-color);letter-spacing:1.5px;margin-bottom:4px}
.synth-card-avatar{height:48px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;position:relative;z-index:1}
.synth-card-avatar svg{width:44px;height:44px;border-radius:50%;filter:drop-shadow(0 2px 6px var(--card-glow,rgba(255,215,0,.4)))}
.synth-card-locked-avatar{font-size:24px;opacity:.4;line-height:48px}
.synth-card-name{color:var(--white);font-size:12px;font-weight:bold;margin-bottom:4px;letter-spacing:.5px;position:relative;z-index:1}
.synth-card-flavor{font-size:9.5px;color:var(--dim);font-style:italic;line-height:1.4;margin-bottom:6px;min-height:24px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;position:relative;z-index:1}
.synth-card-reqs{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-bottom:6px;position:relative;z-index:1}
.synth-req{font-size:8.5px;padding:1px 5px;border-radius:8px;border:1px solid}
.synth-req-ok{color:var(--green);border-color:rgba(0,255,159,.4);background:rgba(0,255,159,.08)}
.synth-req-miss{color:var(--dim);border-color:var(--border);background:rgba(255,255,255,.03)}
.synth-card-cost{font-size:9.5px;color:var(--text);margin-bottom:6px;position:relative;z-index:1}
.synth-card-cost b{font-size:11px}
.synth-card-state{font-size:9px;letter-spacing:.5px;margin-bottom:6px;font-weight:bold;position:relative;z-index:1}
.synth-state-ready{color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,.5)}
.synth-state-done{color:var(--green)}
.synth-state-locked{color:var(--dim)}
.synth-craft-btn{
  width:100%; padding:6px 8px; font-size:11px; font-family:inherit;
  background:linear-gradient(135deg,var(--card-color),var(--purple));
  color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:bold; letter-spacing:1px;

}

.synth-craft-btn:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none}

/* ── 合成成功弹窗 ──────────────────────────────────────────────────────────── */
.synth-success-overlay{

}

}
.synth-success-sub{color:var(--dim);font-size:11px;margin-bottom:18px}
.synth-success-burst{
  position:absolute; top:38%; left:50%; pointer-events:none; width:0; height:0;
}
.synth-heart{
  position:absolute; left:0; top:0; font-size:18px;
  animation:synth-heart-fly 1.4s ease-out forwards;
}
.synth-heart:nth-child(2){animation-delay:.05s}
.synth-heart:nth-child(3){animation-delay:.1s}
.synth-heart:nth-child(4){animation-delay:.15s}
.synth-heart:nth-child(5){animation-delay:.2s}
.synth-heart:nth-child(6){animation-delay:.25s}
.synth-heart:nth-child(7){animation-delay:.3s}
.synth-heart:nth-child(8){animation-delay:.35s}
.synth-success-card{
  max-width:200px; margin:8px auto 14px; background:linear-gradient(160deg,var(--bg2),var(--bg3));
  border:1.5px solid var(--card-color); border-radius:10px; padding:12px 10px; position:relative;
  animation:synth-card-pop .8s cubic-bezier(.34,1.56,.64,1) forwards;
  box-shadow:0 0 24px var(--card-glow);
}
.synth-success-card::before{
  content:""; position:absolute; inset:0; pointer-events:none; opacity:.25; mix-blend-mode:screen; border-radius:10px;
  background:conic-gradient(from 0deg,rgba(255,107,138,.6),rgba(255,215,0,.6),rgba(136,224,192,.6),rgba(107,184,216,.6),rgba(192,132,252,.6),rgba(255,107,138,.6));

}
.synth-success-shards{color:var(--purple);font-size:12px;margin-bottom:14px;letter-spacing:.5px}
.synth-success-shards b{color:#fff;font-size:14px}
.synth-success-close{min-width:140px}

.arc-scope .arc-screen{animation:arc-fadein .25s ease}

/* ════════════════════════════════════════════════════════════════════════════
   技能盲盒系统 · Skill Blindbox
   泡泡马特 Q 版风 + 镭射边框 + 女性参与者友好审美
   ════════════════════════════════════════════════════════════════════════════ */

/* ── 稀有度色板（N/R/SR/SSR/UR）─────────────────────────────────────── */
:root{
  --sk-n:#8ecfff;     --sk-n-glow:rgba(142,207,255,.45);  --sk-n-bg:rgba(142,207,255,.08);
  --sk-r:#3aa7ff;     --sk-r-glow:rgba(58,167,255,.5);    --sk-r-bg:rgba(58,167,255,.08);
  --sk-sr:#ffd166;    --sk-sr-glow:rgba(255,209,102,.55); --sk-sr-bg:rgba(255,209,102,.1);
  --sk-ssr:#c084fc;   --sk-ssr-glow:rgba(192,132,252,.6); --sk-ssr-bg:rgba(192,132,252,.12);
  --sk-ur:#f6c453;    --sk-ur-glow:rgba(246,196,83,.7);   --sk-ur-bg:rgba(246,196,83,.14);
  --sk-soft-pink:#ffb6d1;
  --sk-soft-mint:#a8e6cf;
}

/* ── 主标签条 ──────────────────────────────────────────────────────── */
.sk-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.sk-tab{padding:9px 18px;cursor:pointer;color:var(--dim);font-size:12px;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;font-family:inherit;background:none;border-left:none;border-right:none;border-top:none}
.sk-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.sk-tab:hover{color:var(--text)}
.sk-tab .sk-tab-badge{display:inline-block;background:var(--purple);color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;font-weight:bold;letter-spacing:0}

/* ── 顶部状态条（碎片 + 卡包 + 收集） ───────────────────────────────── */
.sk-status-bar{display:flex;gap:10px;flex-wrap:wrap;padding:10px 14px;background:linear-gradient(135deg,rgba(192,132,252,.05),rgba(255,209,102,.04));border:1px solid var(--border);border-radius:6px;margin-bottom:12px;font-size:12px;align-items:center}
.sk-status-item{display:flex;align-items:center;gap:6px;padding:2px 8px}
.sk-status-item b{color:var(--white);font-size:13px}
.sk-status-shard{color:var(--purple)}
.sk-status-pack{color:var(--sr,#ffd166)}
.sk-status-pity{color:var(--dim);font-size:10px;margin-left:auto}

/* ── 卡片本体（Q 版头像 + 镭射边框 + 三段式） ──────────────────────── */
@keyframes sk-foil-rotate{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes sk-card-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes sk-shine{0%{transform:translateX(-100%) skewX(-15deg)}50%,100%{transform:translateX(200%) skewX(-15deg)}}
@keyframes sk-pulse-ur{0%,100%{box-shadow:0 0 18px var(--card-glow,rgba(246,196,83,.5)),0 0 0 1px var(--card-color,#f6c453)}50%{box-shadow:0 0 32px var(--card-glow,rgba(246,196,83,.8)),0 0 0 2px var(--card-color,#f6c453)}}

.sk-card{
  position:relative;background:linear-gradient(160deg,var(--bg2) 0%,var(--bg3) 100%);
  border:1.5px solid var(--card-color,var(--border));border-radius:10px;
  padding:10px 8px 8px;text-align:center;overflow:hidden;
  transition:all .25s;
  --card-color:var(--sk-n);--card-glow:var(--sk-n-glow);--card-bg:var(--sk-n-bg);
}
.sk-card[data-rarity="N"]  { --card-color:var(--sk-n);--card-glow:var(--sk-n-glow);--card-bg:var(--sk-n-bg); }
.sk-card[data-rarity="R"]  { --card-color:var(--sk-r);--card-glow:var(--sk-r-glow);--card-bg:var(--sk-r-bg); }
.sk-card[data-rarity="SR"] { --card-color:var(--sk-sr);--card-glow:var(--sk-sr-glow);--card-bg:var(--sk-sr-bg); }
.sk-card[data-rarity="SSR"]{ --card-color:var(--sk-ssr);--card-glow:var(--sk-ssr-glow);--card-bg:var(--sk-ssr-bg); }
.sk-card[data-rarity="UR"] { --card-color:var(--sk-ur);--card-glow:var(--sk-ur-glow);--card-bg:var(--sk-ur-bg); }

.sk-card::before{
  /* 镭射 foil 层 */
  content:'';position:absolute;inset:0;pointer-events:none;opacity:.16;mix-blend-mode:screen;
  background:conic-gradient(from 0deg,rgba(255,107,138,.5),rgba(255,215,0,.5),rgba(136,224,192,.5),rgba(107,184,216,.5),rgba(192,132,252,.5),rgba(255,107,138,.5));
}
.sk-card[data-rarity="SSR"]::before, .sk-card[data-rarity="UR"]::before{ animation:sk-foil-rotate 8s linear infinite; opacity:.22 }
.sk-card[data-rarity="UR"]{ animation:sk-pulse-ur 2.6s ease-in-out infinite, sk-card-float 3s ease-in-out infinite }
.sk-card-owned{ box-shadow:0 0 12px var(--card-glow) }
.sk-card-locked{ opacity:.5; filter:grayscale(.55) }

.sk-card-rarity{
  position:relative;z-index:1;display:inline-block;
  padding:1px 8px;border-radius:8px;
  font-size:9px;font-weight:bold;letter-spacing:1.5px;color:#0a0e1a;
  background:var(--card-color);
  margin-bottom:4px;
}
.sk-card-name{position:relative;z-index:1;color:var(--white);font-size:12px;font-weight:bold;margin-bottom:4px;letter-spacing:.5px}
.sk-card-no{position:relative;z-index:1;color:var(--dim);font-size:9px;letter-spacing:1px;margin-bottom:6px}
.sk-card-series{position:relative;z-index:1;color:var(--card-color);font-size:9px;margin-bottom:4px;letter-spacing:.5px}

.sk-card-avatar{
  position:relative;z-index:1;height:64px;display:flex;align-items:center;justify-content:center;margin:4px 0;
}
.sk-card-avatar .sk-chibi{
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff5e6 0%,#ffe0b3 35%,var(--card-color) 100%);
  display:flex;align-items:center;justify-content:center;font-size:30px;
  border:2px solid var(--card-color);
  box-shadow:0 0 14px var(--card-glow), inset 0 -8px 14px rgba(0,0,0,.18);
  position:relative;
}
.sk-card-avatar .sk-chibi::after{
  content:'';position:absolute;top:14%;left:18%;width:28%;height:18%;border-radius:50%;
  background:rgba(255,255,255,.45);transform:rotate(-20deg);
}
.sk-card-locked .sk-card-avatar .sk-chibi{ background:radial-gradient(circle,#2a3a5a 0%,#1a2235 100%);color:var(--dim) }
.sk-card-photo{width:58px;height:58px;border-radius:50%;object-fit:cover;object-position:center top;border:2px solid var(--card-color);box-shadow:0 0 12px var(--card-glow);display:block}
.sk-card-locked .sk-card-photo{filter:grayscale(90%) brightness(.4)}

.sk-card-effect{
  position:relative;z-index:1;color:var(--text);font-size:10.5px;line-height:1.5;
  padding:5px 6px;background:rgba(0,0,0,.18);border-radius:4px;margin:5px 0 4px;min-height:32px;
  text-align:left;
}
.sk-card-adapt{
  position:relative;z-index:1;color:var(--dim);font-size:9.5px;line-height:1.5;
  padding:4px 6px;border-top:1px dashed rgba(255,255,255,.08);margin-top:4px;
  text-align:left;font-style:italic;
}
.sk-card-flavor{position:relative;z-index:1;font-size:9.5px;color:var(--dim);font-style:italic;margin-top:4px;line-height:1.5;min-height:24px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

<script>
"use strict";
(function () {
/* ===== core/event-bus.js ===== */
// core/event-bus.js — 事件总线
// 所有模块通过它通信，模块之间不直接调用彼此的行为函数。
// 开发态：ES Module 导出 EventBus；分发态：build.js 剥离 export 后并入同一作用域。

const EventBus = (() => {
  const listeners = new Map(); // event -> Set<handler>

  function on(event, handler) {
    if (!listeners.has(event)) listeners.set(event, new Set());
    listeners.get(event).add(handler);
    return () => off(event, handler); // 返回取消订阅函数
  }

  function once(event, handler) {
    const wrapper = (payload) => {
      off(event, wrapper);
      handler(payload);
    };
    return on(event, wrapper);
  }

  function off(event, handler) {
    const set = listeners.get(event);
    if (set) set.delete(handler);
  }

  function emit(event, payload) {
    const set = listeners.get(event);
    if (!set) return;
    // 复制一份，避免 handler 内部增删订阅导致迭代异常
    [...set].forEach((handler) => {
      try {
        handler(payload);
      } catch (err) {
        console.error(`[EventBus] handler error on "${event}":`, err);
      }
    });
  }

  return { on, once, off, emit };
})();


/* ===== core/events.js ===== */
// core/events.js — 事件名常量（唯一事实来源）
// 所有 emit/on 都引用这里的常量，避免裸字符串拼写错误。

const EVENTS = {
  // 导航
  NAV_GOTO: 'nav:goto',           // payload: { screen, params }

  // 对局生命周期
  GAME_START: 'game:start',       // payload: { scenarioKey, opponentId }
  GAME_RENDER: 'game:render',     // payload: { html } 或 { viewModel }
  PLAYER_ACTION: 'player:action', // payload: { type, value }
  AI_DECIDED: 'ai:decided',       // payload: { move, mood, reason }
  ROUND_END: 'round:end',         // payload: { roundLog }
  GAME_END: 'game:end',           // payload: { result }

  // 分析
  ANALYTICS_SCORED: 'analytics:scored', // payload: { replay, score }
  PROFILE_UPDATED: 'profile:updated',   // payload: { profile }

  // 全局状态
  STORE_CHANGED: 'store:changed', // payload: { key, value }

  // v2 体验增强
  EXPERIENCE_VARIANT_PICKED:    'experience:variant-picked',
  EXPERIENCE_EVENT_TRIGGERED:   'experience:event-triggered',
  EXPERIENCE_EVENT_RESOLVED:    'experience:event-resolved',
  OPPONENT_QUESTION_TRIGGERED:  'opponent:question-triggered',
  OPPONENT_QUESTION_RESOLVED:   'opponent:question-resolved',
  HIDDEN_OBJECTIVE_PICKED:      'hidden-objective:picked',
  HIDDEN_OBJECTIVE_RESOLVED:    'hidden-objective:resolved',

  // 技能盲盒系统
  CARD_PACK_EARNED:    'card:pack-earned',
  CARD_PACK_OPENED:    'card:pack-opened',
  CARD_UNLOCKED:       'card:unlocked',
  CARD_DUPLICATE:      'card:duplicate',
  CARD_LOADOUT_CHANGED:'card:loadout-changed',
  PLAYER_CARD_USED:    'card:used',
  CARD_EFFECT_APPLIED: 'card:effect-applied',
  OPPONENT_ADAPTED:    'opponent:adapted',
};

// 屏幕标识（router 使用）
const SCREENS = {
  WELCOME: 'welcome',
  MAIN: 'main',
  SCENARIO_SELECT: 'scenario-select',
  OPPONENT_SELECT: 'opponent-select',
  GAME: 'game',
  RESULT: 'result',
  STRATEGY: 'strategy',
  PSYCHOLOGY: 'psychology',
  DASHBOARD: 'dashboard',
  CARD_ALBUM: 'card-album',

const _state = {
  player: null,        // 当前玩家档案（analytics/player-data 填充）
  scenarioKey: null,   // 当前选中的场景
  opponentId: null,    // 当前选中的对手
  currentScreen: null, // 当前屏幕
  profile: null,       // 心理画像向量
  difficulty: 'medium',// 难度：easy/medium/hard/extreme（影响真实博弈机制）
  // v2 体验增强
  activeVariant: null,    // 当前场景变体
  hiddenObjective: null,  // 当前局隐藏目标
  experienceFlags: {},    // 局内体验标记
};

const Store = {
  get(key) {
    return key === undefined ? { ..._state } : _state[key];
  },

  set(key, value) {
    _state[key] = value;
    EventBus.emit(EVENTS.STORE_CHANGED, { key, value });
  },

  // 一次性更新多个字段（仅广播一次每个 key）
  patch(partial) {
    Object.entries(partial).forEach(([key, value]) => {
      _state[key] = value;
      EventBus.emit(EVENTS.STORE_CHANGED, { key, value });
    });
  },
};

// data/ranks.js — 军衔阈值 + 心理类型定义（从 v2.0 平移）

function getRank(total, wins) {
  const wr = total > 0 ? wins / total : 0;
  if (total === 0) return '新兵';
  if (total < 5) return '学员';
  if (total < 10) return wr > 0.6 ? '谈判官' : '学员进阶';
  if (total < 20) return wr > 0.7 ? '策略师' : '谈判官';
  if (total < 30) return wr > 0.75 ? '博弈大师' : '策略师';
  return wr > 0.8 ? '宗师级' : '博弈大师';
}

// Trump Boss 解锁条件：宗师级 + 终局挑战 / 地狱级难度
function isGrandMaster(player) {
  if (!player) return false;
  return getRank(player.total, player.wins) === '宗师级';
}

function canUnlockBoss(player, difficulty) {
  return isGrandMaster(player) && (difficulty === 'extreme' || difficulty === 'hell');
}
