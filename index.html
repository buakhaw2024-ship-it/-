<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>领域知识图谱</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>领域知识图谱</h1>
        <p>交互式实体关系可视化</p>
      </div>

      <!-- Search -->
      <div id="search-box">
        <input id="search-input" type="text" placeholder="搜索节点..." autocomplete="off" />
      </div>

      <!-- Layout controls -->
      <div id="controls">
        <div class="control-group">
          <label>布局控制</label>
          <button class="btn" id="btn-restart">重新布局</button>
          <button class="btn" id="btn-fit">适应窗口</button>
        </div>
      </div>

      <!-- CSV upload -->
      <div id="upload-section">
        <div class="control-group">
          <label>导入 CSV 数据</label>
          <div class="upload-row">
            <div class="upload-area" id="upload-nodes">
              <span>节点 nodes.csv</span>
              <p>id, label, type, description</p>
            </div>
            <div class="upload-area" id="upload-edges">
              <span>关系 edges.csv</span>
              <p>source, target, relation</p>
            </div>
          </div>
          <input type="file" id="file-input-nodes" accept=".csv" />
          <input type="file" id="file-input-edges" accept=".csv" />
        </div>
      </div>

      <!-- Type filter legend -->
      <div id="type-filter">
        <label>加载中...</label>
      </div>

      <!-- Node detail -->
      <div id="node-info">
        <h3>节点详情</h3>
        <p style="font-size:12px;color:#555;margin-top:8px">点击节点查看详情</p>
      </div>
    </div>

    <!-- Graph canvas -->
    <div id="graph-area">
      <!-- Loading overlay -->
      <div id="loading">
        <div class="spinner"></div>
        <p>正在加载知识图谱...</p>
      </div>

      <svg id="graph-svg"></svg>

      <!-- Tooltip -->
      <div id="tooltip"></div>

      <!-- Stats -->
      <div id="stats-bar">
        <div class="stat-chip">
          节点 <strong id="stat-nodes">—</strong>
        </div>
        <div class="stat-chip">
          关系 <strong id="stat-edges">—</strong>
        </div>
      </div>

      <!-- Zoom controls -->
      <div id="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="放大">+</button>
        <button class="zoom-btn" id="zoom-fit" title="适应窗口">⊡</button>
        <button class="zoom-btn" id="zoom-out" title="缩小">−</button>
      </div>
    </div>

  </div>

  <!-- D3 v7 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="js/graph.js"></script>
</body>
</html>
