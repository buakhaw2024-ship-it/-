// ui/router.js — 屏幕路由
// 维护 screenId -> 渲染函数 的注册表；监听 nav:goto 事件切换屏幕。
// router 只负责"把哪个屏幕画到 #app"，不含任何业务逻辑。


const _screens = new Map(); // screenId -> render(params) => htmlString

const Router = {
  // 注册一个屏幕的渲染函数
  register(screenId, renderFn) {
    _screens.set(screenId, renderFn);
  },

  // 初始化：绑定 nav:goto 监听，渲染首屏
  init(rootEl, initialScreen, initialParams = {}) {
    EventBus.on(EVENTS.NAV_GOTO, ({ screen, params }) => {
      this._render(rootEl, screen, params || {});
    });
    this._render(rootEl, initialScreen, initialParams);
  },

  _render(rootEl, screenId, params) {
    const renderFn = _screens.get(screenId);
    if (!renderFn) {
      rootEl.innerHTML = `<div class="hint hint-red">未注册的屏幕：${screenId}</div>`;
      console.error(`[Router] no screen registered for "${screenId}"`);
      return;
    }

    // 清理上一屏的引导 UI（在写入新 HTML 之前）
    if (typeof hideGuide === 'function') hideGuide();

    rootEl.innerHTML = renderFn(params);
    Store.set('currentScreen', screenId);

    // 地狱模式 body class：仅在对局/结果屏且难度为 hell 时附加
    const hellOn = Store.get('difficulty') === 'hell' && (screenId === 'game' || screenId === 'result');
    if (document.body && document.body.classList) {
      document.body.classList.toggle('hell-mode', hellOn);
    }

    // 渲染后回调（用于绑定事件、聚焦输入等）
    if (typeof renderFn.afterRender === 'function') {
      renderFn.afterRender(params);
    }
    window.scrollTo(0, 0);

    // 启动屏幕引导（首次访问自动展示；之后显示 ? 按钮）
    if (typeof showTour === 'function') showTour(screenId);
  },
};


/* ===== scenarios/base-scenario.js ===== */
// scenarios/base-scenario.js — 场景抽象基类
// 子类实现 start() 与 handleAction(action)，通过 emitRender/finish 与外界通信。
// v2 增强：initExperience 接入场景变体 / 局势卡 / 反问 / 隐藏目标 / 开场白。



const CRAM_MAP = { easy: 0, medium: 0, hard: 1, extreme: 2, hell: 3 };

class BaseScenario {
  constructor(opp) {
    this.opp = opp;
    this.log = [];
    this.peeksLeft = 2;
    this._peekSnap = null;
    // 蚕食机制（动态锚定 / 中途加码）
    this._cramAttempts = 0;
    this._maxCramAttempts = CRAM_MAP[Store.get('difficulty')] || 0;
    this._cramCooldown = 0;
    this._pendingCram = null;
    // v2 体验增强
    this.scenarioKey = null;
    this.variant = null;
    this.variantParams = {};
    this.hiddenObjective = null;
    this._situationEvents = [];
    this._pendingSituation = null;
    this._pendingQuestion = null;
    this._questionTriggered = false;
    this._experienceNotes = [];
    this._openingLine = '';
  }

  // 子类在 start() 中调用：抽取场景变体、生成事件序列、隐藏目标、开场白
  initExperience(scenarioKey, params = {}) {
    this.scenarioKey = scenarioKey;
    this.variant = pickScenarioVariantV2(scenarioKey, Store.get('difficulty'));
    this.variantParams = params;
    if (this.variant) applyVariantMoodBias(this.opp.id, this.variant);
    this.hiddenObjective = pickHiddenObjective(scenarioKey, this.variant);
    this._situationEvents = generateSituationEvents(scenarioKey, this.variant, Store.get('difficulty'));
    this._openingLine = getOpponentOpeningLine(this.opp);
  }

  // 渲染变体上下文（替换占位符）
  variantContext() {
    if (!this.variant) return '';
    return renderVariantText(this.variant.context, this.opp, this.variantParams);
  }
  variantHint() { return this.variant ? this.variant.hint : ''; }

  // 顶部开场白 + 场景情境块
  experienceBanner() {
    let html = '';
    if (this._openingLine) {
      html += C.dialogBubble(this._openingLine, 'ai', `${this.opp.name} 开场`);
    }
    if (this.variant) {
      html += C.hint(`<b>${this.variant.name}：</b>${this.variantContext()}　<span style="color:var(--dim);font-size:11px">${this.variantHint()}</span>`, 'cyan');
    }
    if (this.hiddenObjective) {
      html += renderHiddenObjectiveHint(this.hiddenObjective);
    }
    return html;
  }

  // ─── 蚕食 ────────────────────────────────────────────────────────
  tryCram(opts = {}) {
    if (this._pendingCram) return this._pendingCram;
    if (this._cramAttempts >= this._maxCramAttempts) return null;
    if (this._cramCooldown > 0) { this._cramCooldown -= 1; return null; }
    const opp = this.opp;
    const canCram = opp.boss || opp.id === 'aggressive' || opp.id === 'manipulative';
    if (!canCram) return null;
    const round = opts.round != null ? opts.round : 0;
    const totalRounds = opts.totalRounds || 5;
    const midGame = round >= 1 && round <= totalRounds - 2;
    if (!midGame) return null;
    const triggerChance = Math.min(0.6, (this._cramAttempts + 1) / (this._maxCramAttempts + 2));
    if (!chance(triggerChance)) return null;
    this._cramAttempts += 1;
    this._cramCooldown = 2;
    this._pendingCram = { text: opts.text || '', kind: opts.kind || 'generic' };
    return this._pendingCram;
  }

  cramControls() {
    if (!this._pendingCram) return '';
    const cram = this._pendingCram;
    return C.hint(`<b>⚠ ${this.opp.name} 中途加码：</b>${cram.text}`, 'red') +
      `<div class="grid2" style="margin:8px 0">` +
        C.actionBtn('resist-cram', '', '<b>🛡 拒绝额外条件</b>（坚守原框架）', 'btn-red') +
        C.actionBtn('accept-cram', '', '<b>🤝 接受新条件</b>（推进谈判）', 'btn-green') +
      `</div>`;
  }

  consumeCram() {
    const c = this._pendingCram;
    this._pendingCram = null;
    return c;
  }

  // ─── 局势卡 ──────────────────────────────────────────────────────
  checkSituationEvent() {
    if (this._pendingSituation) return this._pendingSituation;
    if (!this._situationEvents || !this._situationEvents.length) return null;
    const total = this.rounds || (this.stages ? this.stages.length : 5);
    const now = this.round != null ? this.round : (this.stage || 0);
    const progress = total > 0 ? now / total : 0;
    const next = this._situationEvents.find((e) => !e.triggered && progress >= e.triggerAt);
    if (!next) return null;
    next.triggered = true;
    this._pendingSituation = next;
    if (EVENTS.EXPERIENCE_EVENT_TRIGGERED) {
      EventBus.emit(EVENTS.EXPERIENCE_EVENT_TRIGGERED, { scenarioKey: this.scenarioKey, event: next });
    }
    return next;
  }

  renderSituationEvent() {
    const ev = this._pendingSituation;
    if (!ev) return '';
    return C.panel(`局势卡｜${ev.title}`,
      C.hint(ev.text, 'yellow') +
      ev.choices.map((ch, idx) =>
        C.actionBtn('situation', String(idx),
          `<b>${ch.text}</b><br><span style="color:var(--dim);font-size:10px">${ch.desc || ''}</span>`)
      ).join('')
    );
  }

  handleSituationChoice(value) {
    const ev = this._pendingSituation;
    if (!ev) return false;
    const choice = ev.choices[parseInt(value, 10)];
    if (!choice) return false;
    applySituationChoice(this, choice);
    ev.resolved = true;
    this._pendingSituation = null;
    this.log.push({
      round: (this.round || this.stage || 0) + 1,
      systemEvent: true,
      eventTitle: ev.title,
      choiceText: choice.text,
      tags: choice.tags || [],
    });
    if (EVENTS.EXPERIENCE_EVENT_RESOLVED) {
      EventBus.emit(EVENTS.EXPERIENCE_EVENT_RESOLVED, { scenarioKey: this.scenarioKey, event: ev, choice });
    }
    this._render();
    return true;
  }

  // ─── 对手反问 ────────────────────────────────────────────────────
  renderCounterQuestion() {
    const q = this._pendingQuestion;
    if (!q) return '';
    return C.panel(`${this.opp.name} 的反问`,
      C.dialogBubble(q.text, 'ai', `${this.opp.name} 追问`) +
      q.choices.map((ch, idx) =>
        C.actionBtn('counter-question', String(idx),
          `<b>${ch.text}</b><br><span style="color:var(--dim);font-size:10px">${ch.desc || ''}</span>`)
      ).join('')
    );
  }

  handleCounterQuestion(value) {
    const q = this._pendingQuestion;
    if (!q) return false;
    const choice = q.choices[parseInt(value, 10)];
    if (!choice) return false;
    applySituationChoice(this, choice);
    this._pendingQuestion = null;
    this.log.push({
      round: (this.round || this.stage || 0) + 1,
      counterQuestion: true,
      questionText: q.text,
      answerText: choice.text,
      tags: choice.tags || [],
    });
    if (EVENTS.OPPONENT_QUESTION_RESOLVED) {
      EventBus.emit(EVENTS.OPPONENT_QUESTION_RESOLVED, { scenarioKey: this.scenarioKey, question: q, choice });
    }
    this._render();
    return true;
  }

  // 子类玩家正常动作后调用：可能触发对手反问
  maybeAskCounterQuestion(type, value) {
    const tags = inferTagsFromAction(type, value);
    const q = shouldTriggerCounterQuestion(this, tags);
    if (q) { this._render(); return true; }
    return false;
  }

  // ─── 通用动作拦截 ────────────────────────────────────────────────
  // 子类 handleAction 在解析自身动作前调用，处理通用 v2 交互
  interceptCommonAction(type, value) {
    if (type === 'peek') { this.handlePeek(); return true; }
    if (type === 'situation') {
      if (this.handleSituationChoice(value)) return true;
    }
    if (type === 'counter-question') {
      if (this.handleCounterQuestion(value)) return true;
    }
    return false;
  }

  // ─── 渲染：通用顶部块 ────────────────────────────────────────────
  emitRender(html) {
    EventBus.emit(EVENTS.GAME_RENDER, { html });
  }

  // ─── 结束 ────────────────────────────────────────────────────────
  finish(result) {
    result.variant = this.variant || null;
    result.experienceNotes = this._experienceNotes || [];
    result.hiddenObjective = resolveHiddenObjective(this, result);
    EventBus.emit(EVENTS.GAME_END, { result });
  }

  // ─── peek ────────────────────────────────────────────────────────
  peekControls() {
    const label = this.peeksLeft > 0 ? `🔍 识破对手（剩 ${this.peeksLeft} 次）` : '🔍 识破次数已用完';
    let html = C.actionBtn('peek', '', label, 'btn-purple');
    if (this._peekSnap) {
      const m = this._peekSnap.mood;
      const pct = (x) => Math.round(x * 100);
      const tells = (PERSONALITY_TELLS[this.opp.id] || []).join(' / ');
      const deceptive = this._peekSnap.deceptive
        ? `<div style="color:var(--red);font-size:10px;margin-top:4px">⚠ 高难度对手可能伪装情绪，数据仅供参考</div>` : '';
      html += C.hint(
        `<b>读心快照：</b>信任 ${pct(m.trust)}% · 愤怒 ${pct(m.anger)}% · 耐心 ${pct(m.patience)}% · 自信 ${pct(m.confidence)}%<br><span style="color:var(--dim)">行为信号：${tells}</span>${deceptive}`,
        'purple');
    }
    return html;
  }

  handlePeek() {
    if (this.peeksLeft > 0 && !this._peekSnap) {
      this.peeksLeft -= 1;
      const deceptive = Mood.isDeceptionActive();
      const realSnap = OpponentAI.snapshot(this.opp.id);
      const mood = deceptive
        ? Mood.getDeceptiveSnapshot(this.opp.id, this.opp)
        : { ...realSnap.mood };
      this._peekSnap = {
        mood,
        realMood: { ...realSnap.mood },
        deceptive,
      };
    }
    this._render();
  }

  start() { throw new Error('start() not implemented'); }
  handleAction(_action) { throw new Error('handleAction() not implemented'); }
}

// scenarios/prisoners.js — 囚徒困境
// Phase 3：AI 决策改由 engine 驱动（TfT/报复/觉醒等由记忆+情绪决定）。


class PrisonersDilemma extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 5;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
  }

  _scores(p, o) {
    if (p === 'coop' && o === 'coop') return [3, 3];
    if (p === 'coop' && o === 'defect') return [0, 5];
    if (p === 'defect' && o === 'coop') return [5, 0];
    return [1, 1];
  }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('prisoners'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) {
        return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      }
      if (l.counterQuestion) {
        return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) +
               C.dialogBubble(l.answerText, 'player', '你的回应');
      }
      const pText = l.player === 'coop' ? '选择合作' : '选择背叛';
      const oText = `${l.line ? `<b>${l.line}</b><br>` : ''}${l.opp === 'coop' ? '合作' : '背叛'} (+${l.pScore} vs +${l.oScore})<br><span style="color:var(--dim);font-size:10px">${l.reason || ''}</span>`;
      return C.dialogBubble(pText, 'player', `第${l.round}轮`) + C.dialogBubble(oText, 'ai', `${opp.name} ${C.moodEmoji(l.mood)}`);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`囚徒困境 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的分数')}
        ${C.scoreBox(this.oppScore, `${opp.name} 分数`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择你的策略',
        C.actionBtn('choice', 'coop', '<b>[C] 合作</b> — 保持沉默，减少双方损失（理性结果 +3）') +
        C.actionBtn('choice', 'defect', '<b>[D] 背叛</b> — 出卖对方，追求个人最大利益（最大 +5）') +
        this.peekControls())}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type !== 'choice') return;
    this._peekSnap = null;
    const prev = this.log.length ? this.log[this.log.length - 1].player : null;
    // 对手基于"此前回合"的记忆/情绪做决策（同时出招，看不到本轮）
    const { move: oppChoice, reason, mood } = OpponentAI.decide(this.opp.id, {
      kind: 'pd', round: this.round, playerLastMove: prev,
    });
    const [ps, os] = this._scores(value, oppChoice);
    this.playerScore += ps;
    this.oppScore += os;
    // 情境化台词
    const line = pickContextualLine(this.opp, {
      action: oppChoice, mood, memory: Memory.get(this.opp.id),
      reputation: loadReputation(this.opp.id), round: this.round,
      exposed: Memory.get(this.opp.id).exposureScore >= 2,
    });
    this.log.push({ round: this.round + 1, player: value, opp: oppChoice, pScore: ps, oScore: os, reason, mood, line });
    // 观察玩家本轮行为，更新记忆与情绪
    OpponentAI.observe(this.opp.id, { coop: value === 'coop' });
    this.round += 1;
    // 可能触发对手反问（中后期更易触发）
    if (this.round < this.rounds && this.round >= 1) {
      if (this.maybeAskCounterQuestion('choice', value)) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const coop = this.log.filter((l) => l.player === 'coop').length;
    const lastReason = this.log.length ? this.log[this.log.length - 1].reason : '';
    // 公平：双方合作率相近（我方合作 ≥3 且双方互信收益最优）
    const fairDeal = coop >= 3 && outcome !== 'lose';
    this.finish({
      kind: 'prisoners', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('总轮数', `${this.rounds} 轮`) +
        C.infoRow('您的合作率', `${Math.round(coop / this.rounds * 100)}%`) +
        C.infoRow('对手', `${this.opp.name} (${this.opp.type})`) +
        C.infoRow('对手末轮心态', lastReason || '—') +
        C.infoRow('分析', coop >= 4 ? '高度合作策略，建立了信任' : coop >= 2 ? '混合策略，较为灵活' : '激进背叛策略，短期收益可能较高但破坏信任'),
    });
  }
}


/* ===== scenarios/ultimatum.js ===== */
// scenarios/ultimatum.js — 最后通牒博弈（从 v2.0 平移）
// 玩家与对手轮流当提议者；接受者拒绝则双方得 0。


const TOTAL = 100;

class UltimatumGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 3;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.pendingOffer = null; // 对手当提议者时的报价（其保留额）
  }

  _isProposer() { return this.round % 2 === 0; }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('ultimatum'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const res = l.accepted ? `<span style="color:var(--green)">✓ 接受</span>` : `<span style="color:var(--red)">✗ 拒绝</span>`;
      return C.dialogBubble(`提案 我方 ${l.myOffer} / 对方 ${l.theirOffer} → ${res}`, 'system', `第${l.round}轮`);
    }).join('');

    const head = `${C.gameHeader(`最后通牒博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的总分')}
        ${C.scoreBox(this.oppScore, `${opp.name} 总分`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}`;

    if (blockNormal) {
      this.emitRender(`${head}${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
      return;
    }
    if (this._isProposer()) {
      this.emitRender(`${head}
        ${C.panel('提出你的分配方案（给自己保留多少？）',
          C.actionBtn('propose', '70', '<b>[激进]</b> 保留 70元，给对方 30元') +
          C.actionBtn('propose', '60', '<b>[偏强]</b> 保留 60元，给对方 40元') +
          C.actionBtn('propose', '50', '<b>[公平]</b> 保留 50元，给对方 50元') +
          C.actionBtn('propose', '40', '<b>[让步]</b> 保留 40元，给对方 60元'))}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
    } else if (this.pendingOffer == null) {
      this.emitRender(`${head}
        ${C.hint(`${opp.name} 正在思考提案...`, 'yellow')}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
      setTimeout(() => {
        const { move } = OpponentAI.decide(this.opp.id, { kind: 'ultimatum-propose', round: this.round });
        this.pendingOffer = move;
        this._render();
      }, 1000);
    } else {
      const keep = this.pendingOffer;
      const give = TOTAL - keep;
      this.emitRender(`${head}
        ${C.hint(`${opp.name} 提议：<b style="color:var(--cyan)">给您 ${give} 元，自己保留 ${keep} 元</b>。`)}
        ${C.panel('您的决定',
          C.actionBtn('respond', 'accept', '<b>[接受]</b> 接受方案，各得所得') +
          C.actionBtn('respond', 'reject', '<b>[拒绝]</b> 拒绝方案，双方得 0'))}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
    }
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type === 'propose') {
      const keep = parseInt(value, 10);
      // 观察玩家提案的强硬度（自留越多越强硬/越像在剥削）
      OpponentAI.observe(this.opp.id, { aggression: clamp((keep - 50) / 50, 0, 1), firm: keep >= 65, coop: keep <= 50, exposes: keep >= 70 });
      const { move: accepted } = OpponentAI.decide(this.opp.id, { kind: 'ultimatum-respond', playerKeep: keep });
      this._settle(keep, accepted, true);
    } else if (type === 'respond') {
      const keep = this.pendingOffer;
      this._settle(keep, value === 'accept', false);
      this.pendingOffer = null;
    }
  }

  _settle(myKeep, accepted, isMyProposal) {
    const theirShare = TOTAL - myKeep;
    let myGain, oppGain;
    if (isMyProposal) {
      myGain = accepted ? myKeep : 0;
      oppGain = accepted ? theirShare : 0;
    } else {
      myGain = accepted ? theirShare : 0;
      oppGain = accepted ? myKeep : 0;
    }
    this.playerScore += myGain;
    this.oppScore += oppGain;
    this.log.push({
      round: this.round + 1,
      myOffer: isMyProposal ? myKeep : theirShare,
      theirOffer: isMyProposal ? theirShare : myKeep,
      accepted,
    });
    this.round += 1;
    // 可能触发反问
    if (this.round < this.rounds && this.round >= 1) {
      const tags = isMyProposal
        ? (myKeep >= 65 ? ['强硬', '锚定效应'] : myKeep <= 45 ? ['合作', '关系维护'] : [])
        : (accepted ? ['合作', '关系维护'] : ['强硬', '反压']);
      if (this.maybeAskCounterQuestion('propose', tags[0])) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const acc = Math.round(this.log.filter((l) => l.accepted).length / this.log.length * 100);
    // 公平成交：有分配回合中我方提案在 40-62 区间且被接受
    const fairDeal = this.log.some((r) => r.accepted && r.myOffer >= 40 && r.myOffer <= 62);
    this.finish({
      kind: 'ultimatum', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('接受率', `${acc}%`) +
        C.infoRow('最优策略', '作为提议者锚定 55-60，接受者接受 >30% 的方案'),
    });
  }
}


/* ===== scenarios/trust.js ===== */
// scenarios/trust.js — 信任博弈
// Phase 3：返还由 engine 决定；操纵型"钓鱼→收割"、对手情绪随你的投入演化。


class TrustGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 3;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
  }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('trust'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const pText = `投入 ${l.invested} 枚`;
      const oText = `${l.line ? `<b>${l.line}</b><br>` : ''}返还 ${l.returned} 枚（净收益 ${l.myNet >= 0 ? '+' : ''}${l.myNet}）<br><span style="color:var(--dim);font-size:10px">${l.reason || ''}</span>`;
      return C.dialogBubble(pText, 'player', `第${l.round}轮`) + C.dialogBubble(oText, 'ai', `${opp.name} ${C.moodEmoji(l.mood)}`);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`信任博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的总分')}
        ${C.scoreBox(this.oppScore, `${opp.name} 总分`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择投入金额（总共 10 枚）',
        C.actionBtn('invest', '10', '<b>[全力信任]</b> 投入 10枚 → 对方收到 30枚') +
        C.actionBtn('invest', '7', '<b>[高度信任]</b> 投入 7枚 → 对方收到 21枚') +
        C.actionBtn('invest', '4', '<b>[适度信任]</b> 投入 4枚 → 对方收到 12枚') +
        C.actionBtn('invest', '0', '<b>[零信任]</b> 投入 0枚 → 保留所有筹码') +
        this.peekControls())}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type !== 'invest') return;
    this._peekSnap = null;
    const amount = parseInt(value, 10);
    const tripled = amount * 3;
    // 先观察玩家的信任姿态（影响情绪/记忆，低投入会触发操纵者"被识破"计分）
    OpponentAI.observe(this.opp.id, { coop: amount >= 5, investFraction: amount / 10, firm: amount <= 2, exposes: amount <= 2 });
    const { move: returned, reason, mood } = OpponentAI.decide(this.opp.id, { kind: 'trust-return', tripled, invest: amount, round: this.round });
    const kept = 10 - amount;
    const myNet = kept + returned - 10;
    this.playerScore += kept + returned;
    this.oppScore += tripled - returned;
    const line = pickContextualLine(this.opp, {
      action: amount >= 5 ? 'coop' : amount <= 2 ? 'firm' : '',
      mood, memory: Memory.get(this.opp.id), reputation: loadReputation(this.opp.id), round: this.round,
      exposed: Memory.get(this.opp.id).exposureScore >= 2,
    });
    this.log.push({ round: this.round + 1, invested: amount, returned, myNet, reason, mood, line });
    this.round += 1;
    if (this.round < this.rounds && this.round >= 1) {
      if (this.maybeAskCounterQuestion('invest', value)) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const avgInvest = Math.round(this.log.reduce((s, l) => s + l.invested, 0) / this.log.length);
    const avgReturn = Math.round(this.log.reduce((s, l) => s + (l.returned / (l.invested * 3 || 1)), 0) / this.log.length * 100);
    // 公平：平均投入 ≥5 且对手平均返还率 ≥50%（相互信任）
    const fairDeal = avgInvest >= 5 && avgReturn >= 50;
    this.finish({
      kind: 'trust', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('平均投入', `${avgInvest} 枚`) +
        C.infoRow('平均返还率', `${avgReturn}%`) +
        C.infoRow('提示', '信任是双向的，适度投入测试对手诚意更为理性'),
    });
  }
}


/* ===== scenarios/bargaining.js ===== */
// scenarios/bargaining.js — 商业谈判博弈
// Phase 3：还价由 engine 决定。你越强硬（出价压得越低）→ 鹰派 confidence 跌→被迫大让步；
// 风险规避型在压力下过度让步；操纵型忽大忽小。


class BargainingGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 5;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.myAnchor = 40;
    this.myOffer = 0;
    this.oppOffer = 100;
    this.trueVal = 60;
    this.lastReason = '';
  }

  start() {
    OpponentAI.reset(this.opp.id);
    this.initExperience('bargaining', { start: this.oppOffer, trueVal: this.trueVal });
    this._render();
  }

  _render() {
    const opp = this.opp;
    const cur = this.myOffer || this.myAnchor;
    this.tryCram({
      round: this.round, totalRounds: this.rounds, kind: 'bargaining',
      text: `「如果您接受延后付款，我可以在价格上做小幅调整——但这需要额外 2% 的风险保证金。」`,
    });
    this.checkSituationEvent();
    const cramHtml = this.cramControls();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingCram || this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const pText = `出价 ${l.my} 元`;
      const oText = `${l.line ? `<b>${l.line}</b><br>` : ''}要价 ${l.opp} 元（差距 ${l.gap} 元）<br><span style="color:var(--dim);font-size:10px">${l.reason || ''}</span>`;
      return C.dialogBubble(pText, 'player', `第${l.round}轮`) + C.dialogBubble(oText, 'ai', `${opp.name} ${C.moodEmoji(l.mood)}`);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`商业谈判 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${C.panel('谈判状态',
        C.infoRow('商品真实价值', '<span style="color:var(--dim)">约 60 元（双方均未知）</span>') +
        C.infoRow('您的当前出价', `<span style="color:var(--green)">${cur} 元</span>`) +
        C.infoRow(`${opp.name} 要价`, `<span style="color:var(--red)">${this.oppOffer} 元</span>`) +
        C.infoRow('差距', `<span style="color:var(--yellow)">${this.oppOffer - cur} 元</span>`))}
      ${this.lastReason ? C.hint(`${opp.name} 心态：${this.lastReason}`, 'purple') : ''}
      ${cramHtml}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel(`您的出价策略（第 ${this.round + 1} 轮）`,
        C.actionBtn('offer', String(cur + 3), `<b>[小幅让步]</b> 提价至 ${cur + 3} 元（+3）`) +
        C.actionBtn('offer', String(cur + 8), `<b>[适度让步]</b> 提价至 ${cur + 8} 元（+8）`) +
        C.actionBtn('offer', String(cur + 15), `<b>[大幅让步]</b> 提价至 ${cur + 15} 元（+15）`) +
        C.actionBtn('accept', String(this.oppOffer), `<b>[接受对方价格]</b> 以 ${this.oppOffer} 元成交`, 'btn-green') +
        this.peekControls())}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type === 'resist-cram') {
      this.consumeCram();
      // 拒绝蚕食 → 对手感到压力但保持高姿态
      OpponentAI.observe(this.opp.id, { aggression: 0.6, firm: true });
      this.lastReason = '你拒绝了加码，谈判气氛紧绷';
      this._render();
      return;
    }
    if (type === 'accept-cram') {
      this.consumeCram();
      // 接受蚕食 → 对手得逞，真实价值上抬，成交更难
      OpponentAI.observe(this.opp.id, { aggression: 0.2, firm: false });
      this.trueVal = Math.min(70, this.trueVal + 3);
      this.lastReason = '你接受了新条件，对方气焰更盛';
      this._render();
      return;
    }
    if (type === 'accept') { this._deal(this.oppOffer); return; }
    if (type !== 'offer') return;
    this._peekSnap = null;
    const offer = parseInt(value, 10);
    this.myOffer = offer;

    // 观察玩家强硬度：出价压得越低越强硬（可压垮鹰派、施压风险规避型）
    const lowness = clamp((this.trueVal - offer) / this.trueVal, 0, 1);
    const firm = offer < this.trueVal * 0.7;
    OpponentAI.observe(this.opp.id, { aggression: firm ? 0.7 : 0.3, firm, concession: offer - (this.log.length ? this.log[this.log.length - 1].my : this.myAnchor) });

    const { move: newOpp, reason, mood } = OpponentAI.decide(this.opp.id, {
      kind: 'bargain-counter', currentOppOffer: this.oppOffer, playerOffer: offer, trueVal: this.trueVal,
    });
    this.lastReason = reason;
    const line = pickContextualLine(this.opp, {
      action: firm ? 'firm' : (lowness > 0.5 ? 'aggressive' : ''),
      mood, memory: Memory.get(this.opp.id), reputation: loadReputation(this.opp.id), round: this.round,
    });

    if (newOpp <= offer || newOpp <= this.trueVal) {
      this.log.push({ round: this.round + 1, my: offer, opp: this.oppOffer, gap: this.oppOffer - offer, reason, mood, line });
      this._deal(Math.round((offer + this.oppOffer) / 2));
      return;
    }
    this.log.push({ round: this.round + 1, my: offer, opp: this.oppOffer, gap: this.oppOffer - offer, reason, mood, line });
    this.oppOffer = newOpp;
    this.round += 1;

    if (this.round >= this.rounds) {
      if (this.oppOffer - offer < 15) this._deal(Math.round((offer + this.oppOffer) / 2));
      else this._deal(this.oppOffer);
    } else {
      if (this.maybeAskCounterQuestion('offer', value)) return;
      this._render();
    }
  }

  _deal(price) {
    this.playerScore = Math.max(0, 100 - price);
    this.oppScore = Math.max(0, price - 40);
    const outcome = price <= 55 ? 'win' : price <= 65 ? 'draw' : 'lose';
    // 公平成交：成交价在真实价值附近（55-70 区间），双方均有收益
    const fairDeal = price >= 55 && price <= 70;
    this.finish({
      kind: 'bargaining', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('成交价格', `${price} 元`) +
        C.infoRow('相比最高价节省', `${100 - price} 元`) +
        C.infoRow('评价', price <= 55 ? '出色！远低于真实价值' : price <= 65 ? '良好，接近真实价值' : '偏高，需要提升议价技巧') +
        C.infoRow('提示', '锚定低价、小幅递减让步、保持耐心是关键'),
    });
  }
}

          { text:'"就是这样"技术：重新表述对方诉求直到获得确认', ps:12, os:-8, feedback:'确认理解减少误解，为方案奠定基础。' },
          { text:'最后期限压力："我们只有30分钟，现在必须做决定。"', ps:-8, os:15, feedback:'人工期限适得其反，破坏了之前建立的信任。' },
        ] },
      { title:'第四阶段：巩固协议',
        context:'双方接近共识，需要巩固并确保协议落实。',
        options:[
          { text:'书面确认："让我们把达成的共识逐条写下来，确保理解一致。"', ps:15, os:-10, feedback:'书面确认防止事后争议，体现专业性。' },
          { text:'"不"的保护：提供可接受的最低条件，让对方主动选择', ps:12, os:-8, feedback:'选择权归还给对方，增加协议持久性。' },
          { text:'条件绑定："如果执行协议，我们将提供额外的保障措施。"', ps:18, os:-15, feedback:'条件让步激励执行，创造正向反馈机制！' },
          { text:'强制结束："时间到，必须立即执行，否则后果自负。"', ps:-10, os:20, feedback:'强制性结束摧毁信任，协议可能不持久。' },
        ] },
    ];
  }

  start() { this.initExperience('crisis'); this._render(); }

  _render() {
    const s = this.stages[this.stage];
    const opp = this.opp;
    this.tryCram({
      round: this.stage, totalRounds: this.stages.length, kind: 'crisis',
      text: `「我还有另一个问题需要一并解决——我的合作伙伴也受到了影响，他们要求单独谈判。」`,
    });
    this.checkSituationEvent();
    const cramHtml = this.cramControls();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingCram || this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', l.round);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const color = l.ps >= 10 ? 'var(--green)' : l.ps >= 0 ? 'var(--yellow)' : 'var(--red)';
      return C.dialogBubble(`${l.feedback} <span style="color:${color}">${l.ps > 0 ? '+' : ''}${l.ps}分</span>`, 'system', l.stage);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`危机谈判 — ${s.title}`)}
      ${C.stageProgress(this.stage, this.stages.length)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '谈判积分')}
        ${C.scoreBox(Math.max(0, this.oppScore), '危机风险值', 'var(--red)')}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${C.hint(s.context, 'yellow')}
      ${cramHtml}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择谈判策略', s.options.map((o, i) => C.actionBtn('stage', String(i), o.text)).join(''))}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type === 'resist-cram') {
      this.consumeCram();
      // 拒绝蚕食 → 危机风险上升，但守住积分底线
      this.oppScore += 5;
      this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: '你拒绝了对方的额外条件，危机风险微升', ps: 0, maxPs: 1 });
      this._render();
      return;
    }
    if (type === 'accept-cram') {
      this.consumeCram();
      // 接受蚕食 → 损失谈判积分但缓解风险
      this.playerScore = Math.max(0, this.playerScore - 8);
      this.oppScore = Math.max(0, this.oppScore - 5);
      this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: '你接受了额外条件，付出了 8 分代价', ps: -8, maxPs: 1 });
      this._render();
      return;
    }
    if (type !== 'stage') return;
    const s = this.stages[this.stage];
    const opt = s.options[parseInt(value, 10)];
    this.playerScore += opt.ps;
    this.oppScore += opt.os;
    const maxPs = Math.max(...s.options.map((o) => o.ps));
    this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: opt.feedback, ps: opt.ps, maxPs });
    this.stage += 1;

    if (this.stage < this.stages.length) {
      this.emitRender(`${C.gameHeader('危机谈判 — 处理中...')}
        ${C.hint(`<b>反馈：</b>${opt.feedback}`, opt.ps > 0 ? 'green' : 'red')}
        ${C.hint('正在进入下一阶段...', 'cyan')}`);
      setTimeout(() => this._render(), 1500);
    } else {
      this._finish();
    }
  }

  _finish() {
    const outcome = this.playerScore >= 50 ? 'win' : this.playerScore >= 20 ? 'draw' : 'lose';
    // 公平：有效化解危机（分数 ≥40），非极端强硬解法
    const fairDeal = this.playerScore >= 40;
    this.finish({
      kind: 'crisis', rounds: this.log,
      playerScore: this.playerScore,
      oppScore: Math.max(0, 100 - this.playerScore),
      outcome, fairDeal,
      summary:
        C.infoRow('最终谈判积分', String(this.playerScore)) +
        C.infoRow('危机化解程度', this.playerScore >= 50 ? '成功化解' : '部分化解') +
        C.infoRow('评级', this.playerScore >= 60 ? '卓越谈判官' : this.playerScore >= 40 ? '称职谈判员' : '需要加强训练'),
    });
  }
}

// scenarios/public-goods.js — 公共品博弈
// Phase 3：对手贡献由 engine 决定（理性型条件合作、操纵型飘忽等）。


class PublicGoodsGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 4;
    this.round = 0;
    this.playerScore = 40;
    this.oppScore = 40;
    this.multiplier = 2.2;
  }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('publicgoods'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const pText = `贡献 ${l.my} 枚`;
      const oText = `${l.line ? `<b>${l.line}</b><br>` : ''}贡献 ${l.opp} 枚（公共池 ${l.pool}，各得 ${l.share}）<br><span style="color:var(--dim);font-size:10px">${l.reason || ''}</span>`;
      return C.dialogBubble(pText, 'player', `第${l.round}轮`) + C.dialogBubble(oText, 'ai', `${opp.name} ${C.moodEmoji(l.mood)}`);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`公共品博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的余额')}
        ${C.scoreBox(this.oppScore, `${opp.name} 余额`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择贡献数量',
        C.actionBtn('contribute', '10', '<b>[全力贡献]</b> 贡献 10枚 — 最大化公共利益') +
        C.actionBtn('contribute', '7', '<b>[高度合作]</b> 贡献 7枚 — 偏向集体') +
        C.actionBtn('contribute', '4', '<b>[适度参与]</b> 贡献 4枚 — 平衡策略') +
        C.actionBtn('contribute', '0', '<b>[搭便车]</b> 贡献 0枚 — 最大化个人利益') +
        this.peekControls())}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type !== 'contribute') return;
    this._peekSnap = null;
    const amount = parseInt(value, 10);
    const prev = this.log.length ? this.log[this.log.length - 1].my : null;
    OpponentAI.observe(this.opp.id, { coop: amount >= 5, aggression: amount <= 1 ? 0.7 : 0.2, firm: amount <= 1 });
    const { move: oppContrib, reason, mood } = OpponentAI.decide(this.opp.id, { kind: 'pg-contribute', round: this.round, playerLastContrib: prev });
    const pool = (amount + oppContrib) * this.multiplier;
    const share = Math.round(pool / 2);
    this.playerScore = this.playerScore - amount + share;
    this.oppScore = this.oppScore - oppContrib + share;
    const line = pickContextualLine(this.opp, {
      action: amount >= 5 ? 'coop' : amount <= 1 ? 'firm' : '',
      mood, memory: Memory.get(this.opp.id), reputation: loadReputation(this.opp.id), round: this.round,
    });
    this.log.push({ round: this.round + 1, my: amount, opp: oppContrib, pool: Math.round(pool), share, reason, mood, line });
    this.round += 1;
    if (this.round < this.rounds && this.round >= 1) {
      if (this.maybeAskCounterQuestion('contribute', value)) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore === this.oppScore ? 'coop' : 'lose';
    const avg = Math.round(this.log.reduce((s, l) => s + l.my, 0) / this.log.length);
    // 公平：平均贡献 ≥4（全员合作接近最优）
    const fairDeal = avg >= 4;
    this.finish({
      kind: 'publicgoods', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('平均贡献量', `${avg} 枚`) +
        C.infoRow('最优策略', '条件合作：模仿对方上轮贡献，避免持续被剥削') +
        C.infoRow('启示', '公共品博弈揭示集体行动困境，信任与声誉是合作的基础'),
    });
  }
}

// scenarios/coalition.js — 联盟谈判（从 v2.0 平移，修正了 v2.0 中 ${opp.name} 未插值的笔误）
// 四阶段多方博弈：信息扫描 → 联盟构建 → 巩固 → 终局转化。


class CoalitionGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.stage = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.allies = 0;
    this.stages = [
      { title:'第一阶段：利益扫描',
        context:'多方谈判开始。您需要了解各方立场，识别潜在盟友和威胁。',
        options:[
          { text:'广泛信息收集：私下约谈每一方，了解各自核心诉求', ps:15, allies:1, feedback:'信息优势确立，识别了两个潜在盟友。' },
          { text:'公开立场宣示：直接阐明你的方案，测试各方反应', ps:8, allies:0, feedback:'立场清晰但暴露了底线，灵活性下降。' },
          { text:'观察等待：保持中立，让各方先交锋', ps:5, allies:0, feedback:'获得了观察机会，但错过了主动建联时机。' },
          { text:'与最强方结盟：立即接近实力最强的参与者', ps:-5, allies:1, feedback:'提前绑定可能失去其他联盟机会。' },
        ] },
      { title:'第二阶段：联盟构建',
        context:`您已掌握部分信息。${opp.name}正在积极游说，与您竞争关键盟友。`,
        options:[
          { text:'利益整合提案：设计满足盟友核心诉求的联合方案', ps:20, allies:1, feedback:'精准的利益对接赢得关键盟友加入！' },
          { text:'价值交换：提供对方高度需要的资源，换取联盟承诺', ps:15, allies:1, feedback:'等价交换达成，联盟基础稳固。' },
          { text:'揭露竞争对手弱点：向潜在盟友展示对手方案的缺陷', ps:8, allies:0, feedback:'有一定效果，但道德风险影响长期声誉。' },
          { text:'激进报价：承诺给盟友超额利益', ps:-10, allies:0, feedback:'过度承诺损害可信度，盟友持观望态度。' },
        ] },
      { title:'第三阶段：巩固联盟',
        context:`联盟初步形成，但内部存在分歧，外部 ${opp.name} 在尝试分化。`,
        options:[
          { text:'建立内部共识机制：定期沟通，透明决策过程', ps:18, allies:1, feedback:'内聚力增强，联盟稳定性大幅提升。' },
          { text:'创造集体认同：塑造"我们"的共同价值和目标', ps:15, allies:0, feedback:'集体认同建立，联盟更具凝聚力。' },
          { text:'设立退出成本：建立联盟离开的代价机制', ps:10, allies:0, feedback:'约束机制有效，但也限制了联盟灵活性。' },
          { text:'孤立对手：切断对手与中立方的联系', ps:5, allies:0, feedback:'孤立策略有风险，可能激化对抗。' },
        ] },
      { title:'第四阶段：最终谈判',
        context:'联盟谈判进入终局，需要将联盟优势转化为最终协议。',
        options:[
          { text:'展示联盟实力：明确但非威胁性地呈现联盟的综合优势', ps:20, allies:0, feedback:'实力展示改变了对手的BATNA评估，协议加速达成。' },
          { text:'提出一揽子方案：将所有议题打包，寻找整体最优解', ps:18, allies:0, feedback:'打包策略创造了额外价值，多方受益。' },
          { text:'设置最后期限：宣布联盟在X时间后单方面行动', ps:8, allies:0, feedback:'期限有效但破坏了部分谈判善意。' },
          { text:'妥协型收尾：主动放弃部分次要利益以确保核心利益', ps:15, allies:0, feedback:'战略性妥协展现了成熟的谈判风范。' },
        ] },
    ];
  }

  start() { this.initExperience('coalition'); this._render(); }

  _render() {
    const s = this.stages[this.stage];
    this.tryCram({
      round: this.stage, totalRounds: this.stages.length, kind: 'coalition',
      text: `「实际上还有第三方利益相关者，他们的要求也必须被考虑。」`,
    });
    this.checkSituationEvent();
    const cramHtml = this.cramControls();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingCram || this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', l.round);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${this.opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const color = l.ps >= 15 ? 'var(--green)' : l.ps >= 5 ? 'var(--yellow)' : 'var(--red)';
      return C.dialogBubble(`${l.feedback}（<span style="color:${color}">+${l.ps}分</span>）`, 'system', l.stage);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`联盟谈判 — ${s.title}`)}
      ${C.stageProgress(this.stage, this.stages.length)}
      <div class="grid3" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '谈判积分')}
        ${C.scoreBox(this.allies, '当前盟友数', 'var(--green)')}
        ${C.scoreBox(`${this.stage + 1}/4`, '阶段进度', 'var(--yellow)')}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(this.opp)}
      ${C.hint(s.context)}
      ${cramHtml}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择谈判策略', s.options.map((o, i) => C.actionBtn('stage', String(i), o.text)).join(''))}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type === 'resist-cram') {
      this.consumeCram();
      // 拒绝纳入第三方 → 失去 1 个盟友机会
      this.allies = Math.max(0, this.allies - 1);
      this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: '你拒绝了第三方加入，失去 1 个潜在盟友', ps: 0, maxPs: 1 });
      this._render();
      return;
    }
    if (type === 'accept-cram') {
      this.consumeCram();
      // 接受第三方 → 积分被稀释 8 分
      this.playerScore = Math.max(0, this.playerScore - 8);
      this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: '你接受了第三方诉求，利益被稀释 8 分', ps: -8, maxPs: 1 });
      this._render();
      return;
    }
    if (type !== 'stage') return;
    const s = this.stages[this.stage];
    const opt = s.options[parseInt(value, 10)];
    this.playerScore += opt.ps;
    this.allies += opt.allies || 0;
    this.oppScore += (5 - Math.floor(opt.ps / 5));
    const maxPs = Math.max(...s.options.map((o) => o.ps));
    this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: opt.feedback, ps: opt.ps, maxPs });
    this.stage += 1;

    if (this.stage < this.stages.length) {
      const kind = opt.ps > 10 ? 'green' : opt.ps > 0 ? 'cyan' : 'red';
      this.emitRender(`${C.gameHeader('联盟谈判 — 推进中...')}
        ${C.hint(`<b>阶段反馈：</b>${opt.feedback}`, kind)}
        ${C.hint('正在进入下一阶段...', 'cyan')}`);
      setTimeout(() => this._render(), 1500);
    } else {
      this._finish();
    }
  }

  _finish() {
    const outcome = this.playerScore > 45 && this.allies >= 2 ? 'win' : this.playerScore > 25 ? 'draw' : 'lose';
    // 公平：建立至少 2 个盟友且总积分超过 35（互利联盟）
    const fairDeal = this.allies >= 2 && this.playerScore >= 35;
    this.finish({
      kind: 'coalition', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('总积分', String(this.playerScore)) +
        C.infoRow('最终盟友数', String(this.allies)) +
        C.infoRow('评级', this.playerScore >= 55 && this.allies >= 2 ? '联盟大师' : this.playerScore >= 35 ? '合格谈判员' : '需要加强多方博弈技巧'),
    });
  }
}

/* ===== scenarios/runner.js ===== */
// scenarios/runner.js — 对局控制器
// 协调场景生命周期：监听 game:start 创建场景、转发 player:action、game:end 后导航到结果屏。
// 只做编排与导航，不渲染（渲染交给 game-view）、不记录（记录交给 analytics/recorder）。


function initRunner() {
  EventBus.on(EVENTS.GAME_START, ({ scenarioKey, opponentId }) => {
    const meta = REGISTRY[scenarioKey];
    if (!meta || !meta.Class) {
      console.error('[runner] 未知场景', scenarioKey);
      return;
    }
    let opp;
    if (opponentId === 'random') {
      opp = randomOpponent(); // quick: never yields Boss
    } else if (opponentId === 'trumpBoss') {
      const player = Store.get('player');
      const difficulty = Store.get('difficulty');
      if (!canUnlockBoss(player, difficulty)) {
        console.warn('[runner] Boss 尚未解锁');
        return;
      }
      opp = TRUMP_BOSS;
    } else {
      opp = getOpponent(opponentId);
    }
    if (!opp) { console.error('[runner] 未知对手', opponentId); return; }
    // 设置情绪伪装等级（hard 及以上对手的 peek 数据会被扰乱）
    Mood.setDeception(Store.get('difficulty') || 'medium');
    const scenario = new meta.Class(opp);
    Store.patch({ scenarioKey, opponent: opp, activeScenario: scenario });

    // 先导航到对局屏（同步渲染 #game-root），再 start() 触发首次 game:render
    EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.GAME, params: {} });
    scenario.start();
  });

  EventBus.on(EVENTS.PLAYER_ACTION, (action) => {
    if (action.type === 'exit') {
      Store.set('activeScenario', null);
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.MAIN, params: {} });
      return;
    }
    const scenario = Store.get('activeScenario');
    if (scenario) scenario.handleAction(action);
  });

  // recorder 已先行处理记录（bootstrap 中先 init），这里仅负责导航到结果屏
  EventBus.on(EVENTS.GAME_END, () => {
    Store.set('activeScenario', null);
    EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.RESULT, params: {} });
  });
}

// ─── 存档 helpers ────────────────────────────────────────────────────────────
function getCollection(player) {
  return player.cardCollection || [];
}

function hasCard(player, cardId) {
  return getCollection(player).includes(cardId);
}

// 扫描当前 behaviorStats，返回新解锁的卡（未持有 + 条件满足）
function checkNewCards(player) {
  const s = player.behaviorStats;
  const owned = getCollection(player);
  return CARD_POOL.filter((c) => !owned.includes(c.id) && c.condition(s));
}

// 把新卡写入存档并持久化
function unlockCards(player, newCards) {
  if (!player.cardCollection) player.cardCollection = [];
  newCards.forEach((c) => {
    if (!player.cardCollection.includes(c.id)) player.cardCollection.push(c.id);
  });
  savePlayer(player);
}

// ─── 稀有度优先抽卡：从已解锁新卡中取最高稀有度之一 ────────────────────────
const RARITY_RANK = { SP: 4, SSR: 3, SR: 2, R: 1 };
const RARITY_NAMES = { R: '普通卡', SR: '稀有卡', SSR: '超稀有卡', SP: '特别版 SP' };
const RARITY_EXCLAIM = { R: '获得 R 普通卡', SR: '◆ SR 稀有卡！', SSR: '⭐ SSR 超稀有！', SP: '🔥 SP 特别版！极为稀有！' };

function pickDrawCard(cards) {
  const best = Math.max(...cards.map((c) => RARITY_RANK[c.rarity] || 1));
  const top = cards.filter((c) => (RARITY_RANK[c.rarity] || 1) === best);
  return top[Math.floor(Math.random() * top.length)];
}

function renderCardAlbum() {
  const player = Store.get('player');
  if (!player) return '<div class="hint hint-yellow">请先创建玩家档案。</div>';
  const owned = getCollection(player);

      const unlocked = owned.includes(c.id);

      const hintText = CARD_HINTS[c.id];

        ? `<div class="album-card-cond">${hintText}</div>` : '';

// analytics/recorder.js — 对局记录器（Phase 4 增强）
// 监听 game:end：累计行为统计 + 写档案 + 构建逐回合复盘 + 组装结果供结果屏读取。
// bootstrap 中须在 runner 之前 init，确保"先记录、后导航"。


function _safe(num, den) {
  if (!den || den <= 0) return 0.5;
  return num / den;
}

function initRecorder() {
  EventBus.on(EVENTS.GAME_END, ({ result }) => {
    const player = Store.get('player');
    const opp = Store.get('opponent');
    const scenarioKey = Store.get('scenarioKey');
    const meta = SCENARIO_META[scenarioKey];
    const scenarioName = meta ? meta.name : scenarioKey;
    const kind = result.kind || scenarioKey;
    const rounds = result.rounds || [];

    if (player) {
      // 注入 difficulty 到 result 供 accumulate 使用
      result.difficulty = Store.get('difficulty') || 'medium';
      // 先累计行为统计（供心理画像），再写入对局记录（addSession 会持久化整份档案）
      accumulate(player, kind, rounds, result, opp);
      addSession(player, {
        time: new Date().toLocaleString('zh-CN'),
        scenarioKey,
        scenario: scenarioName,
        opponentId: opp ? opp.id : 'unknown',
        opponent: opp ? opp.type : '—',
        difficulty: Store.get('difficulty') || 'medium',
        playerScore: result.playerScore,
        oppScore: result.oppScore,
        outcome: result.outcome,
      });
      // 更新跨局记忆（对手记住玩家风格）
      if (opp && opp.id) {
        const ps = player.behaviorStats || {};
        const roundCoop = rounds.filter((r) => r && (r.move === 'coop' || r.playerMove === 'coop')).length;
        const inGameCoopRate = rounds.length > 0 ? roundCoop / rounds.length : _safe(ps.coopMoves, ps.totalMoves);
        updateReputation(opp.id, {
          coopRate: inGameCoopRate,
          aggression: _safe(ps.assertiveMoves, ps.totalMoves),
          avgConcession: ps.avgConcession || 5,
        }, result.outcome);
      }
      // 检查新卡解锁（在 accumulate 之后）
      const newCards = checkNewCards(player);
      if (newCards.length) unlockCards(player, newCards);
      Store.set('player', player); // 广播，刷新主菜单等
      // 新卡开盒动画（仅浏览器环境）
      if (newCards.length && typeof document !== 'undefined') {
        Store.set('pendingNewCards', newCards);
      }
    }

    const replay = buildReplay(kind, rounds, opp, result);

    Store.set('lastResult', {
      result,
      opp,
      scenarioName,
      tips: opp ? getOpponentTips(opp.id) : [],
      tells: opp ? (PERSONALITY_TELLS[opp.id] || []) : [],
      replay,
    });
  });
}

function getTodaySuggestion(player) {
  if (!player || !player.sessions || player.sessions.length < 3) {
    return '建议从「场景实战训练」开始，先完成 3 局基础样本。';
  }
  const recent = player.sessions.slice(-5);
  const loses = recent.filter((s) => s.outcome === 'lose');
  if (loses.length >= 3) {
    return '最近失利偏多，建议先切回中级难度复盘弱项，再挑战高难。';
  }
  const last = recent[recent.length - 1];
  if (last && last.opponent) {
    return `建议继续挑战 ${last.opponent}，观察其跨局记忆变化。`;
  }
  return '建议进入快速训练，积累不同对手样本。';
}

function getReputationAlerts() {
  return OPPONENTS.map((opp) => {
    const rep = loadReputation(opp.id);
    if (!rep || rep.games < 2) return null;
    if (rep.lastOutcome === 'win') return `${opp.name} 正在警惕你：上局你赢过他。`;
    if (rep.coopRate > 0.7) return `${opp.name} 认为你偏合作，可能会测试你的底线。`;
    if (rep.aggressionRate > 0.7) return `${opp.name} 认为你偏强硬，可能开局防御。`;
    return null;
  }).filter(Boolean).slice(0, 3);
}

// 把 reputation 数据转成对玩家可读的徽章 HTML
function repBadge(oppId) {
  const rep = loadReputation(oppId);
  if (rep.games < 2) return '';
  const { openerBias } = applyReputation(oppId, rep);
  const wrText = rep.wins > 0 ? `${Math.round(rep.wins / rep.games * 100)}%` : '0%';
  let alert = '';
  if (openerBias > 0.15) alert = '<span class="rep-alert hot">🔥 已警惕</span>';
  else if (openerBias > 0.05) alert = '<span class="rep-alert warm">⚠ 已建档</span>';
  else if (openerBias < -0.05) alert = '<span class="rep-alert cold">💤 略松懈</span>';
  return `<div class="rep-badge">交手 ${rep.games} 次 · 胜率 ${wrText}${alert}</div>`;
}

function buildOpponentCard(o, difficulty, player) {
  const isBoss = !!o.boss;
  const isEasy = difficulty === 'easy';
  const isMed  = difficulty === 'medium';
  const isHell = difficulty === 'hell';
  const tells  = PERSONALITY_TELLS[o.id] || [];

  let infoLine = '';
  if (isEasy)     infoLine = `弱点：${o.weakness}`;
  else if (isMed) infoLine = `行为信号：${tells.join(' / ')}`;
  else if (isHell && isBoss) infoLine = '⚠ 地狱级：难度修正叠加到 Boss 上，无豁免，无上限';
  else            infoLine = '未知对手 — 请通过行为判断其类型';

  const bossCls = isBoss ? (isHell ? ' boss-card hell-boss' : ' boss-card') : '';
  const badgeCls = isHell ? ' hell' : '';
  const badgeText = isBoss ? (isHell ? '🔥 地狱 BOSS' : '隐藏 BOSS') : '';

  return `
    <div class="opp-card${bossCls}" data-opp="${o.id}">
      <div class="opp-card-avatar">${C.avatarBadge(o, 38)}</div>
      ${isBoss ? `<div class="boss-badge${badgeCls}" style="display:block;text-align:center;margin-bottom:4px">${badgeText}</div>` : ''}
      <div class="opp-name" style="text-align:center">${o.name}</div>
      <div class="opp-type" style="text-align:center">${o.type}</div>
      ${repBadge(o.id)}
      <div class="opp-desc" style="margin:4px 0">${o.desc}</div>
      ${isEasy ? `<div style="font-size:10px;color:var(--yellow)">弱点：${o.weakness}</div>` : ''}
      <div style="margin-top:6px;font-size:10px;color:var(--dim)">${infoLine}</div>
    </div>`;
}

  } else {

function showHellWarning(onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'hell-modal-overlay';
  overlay.innerHTML = `
    <div class="hell-modal">
      <div class="hell-modal-icon">🔥</div>
      <div class="hell-modal-title">地狱级 · 无上限协议</div>
      <div class="hell-modal-body">
        <ul>
          <li>对手让步空间压缩至 <b style="color:var(--red)">45%</b>，强硬度倍增至 <b style="color:var(--red)">1.55×</b></li>
          <li>接受概率下移 <b style="color:var(--red)">−20</b> 点，谈判空间极度压缩</li>
          <li>隐藏 Boss 的豁免被取消——难度修正直接叠加到其极端基础行为上</li>
          <li>没有信息辅助，对手的行为几乎不可预测</li>
        </ul>
      </div>
      <div class="hell-modal-btns">
        <button class="btn btn-red" id="hell-confirm" style="min-width:120px">接受挑战</button>
        <button class="btn" id="hell-cancel" style="min-width:80px">撤回</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector('#hell-confirm').addEventListener('click', () => {
    document.body.removeChild(overlay);
    onConfirm();
  });
  overlay.querySelector('#hell-cancel').addEventListener('click', () => {
    document.body.removeChild(overlay);
    Store.set('difficulty', 'extreme');
    EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.OPPONENT_SELECT, params: {} });
  });
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) {
      document.body.removeChild(overlay);
      Store.set('difficulty', 'extreme');
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.OPPONENT_SELECT, params: {} });
    }
  });
}

renderOpponentSelect.afterRender = function () {
  const key = Store.get('scenarioKey');

  document.querySelectorAll('.diff-btn[data-diff]').forEach((btn) => {

function calcTemp(mood) {
  const raw = 50 + ((mood.trust || 0) - (mood.anger || 0)) * 50;
  return Math.round(Math.min(100, Math.max(0, raw)));
}

function buildChrome(opp) {
  const difficulty = Store.get('difficulty');
  const isHell = difficulty === 'hell';
  let ringCls = opp.boss ? 'nego-avatar-ring boss-ring' : 'nego-avatar-ring';
  if (isHell) ringCls += ' hell-ring';
  const chromeCls = isHell ? 'nego-chrome hell-chrome' : 'nego-chrome';
  const typeLine = (opp.type || '').split('/')[0].trim();
  const indicator = isHell ? `<div class="hell-indicator">🔥 地狱级 · 无上限协议 · Boss 豁免取消</div>` : '';
  return `${indicator}<div class="${chromeCls}">
    <div class="nego-avatar-section">
      <div class="${ringCls} avatar-svg-host">${C.avatarSvg(opp.id)}</div>
      <div class="nego-avatar-name">${opp.name}</div>
      <div class="nego-avatar-type">${typeLine}</div>
    </div>
    <div class="nego-temp-section">
      <div class="nego-temp-label">⟺ 关系温度 <button class="info-tip-btn" data-itip="temp" title="什么是关系温度？">ℹ</button></div>
      <div class="nego-temp-track">
        <div class="nego-temp-marker" id="nego-temp-marker" style="left:50%"></div>
      </div>
      <div class="nego-temp-meta" id="nego-temp-meta">等待首轮出招…</div>
    </div>
  </div>`;
}

function renderGame() {
  return `<div id="game-root"><div id="nego-chrome"></div><div id="game-content"></div></div>`;
}

let _inited = false;
function initGameView() {
  if (_inited) return;
  _inited = true;

  // 场景 HTML 落到 #game-content；首次渲染时同步补全对手头像；对话区自动滚底
  EventBus.on(EVENTS.GAME_RENDER, ({ html }) => {
    const chrome = document.getElementById('nego-chrome');
    if (chrome && !chrome.children.length) {
      const opp = Store.get('opponent');
      if (opp) chrome.innerHTML = buildChrome(opp);
    }
    const content = document.getElementById('game-content');
    if (content) {
      content.innerHTML = html;
      const log = content.querySelector('.bubble-log');
      if (log) log.scrollTop = log.scrollHeight;
    }
  });

  // AI 出招后实时更新温度条（marker 滑动）
  EventBus.on(EVENTS.AI_DECIDED, ({ mood }) => {
    if (!mood) return;
    const temp = calcTemp(mood);
    const marker = document.getElementById('nego-temp-marker');
    const meta = document.getElementById('nego-temp-meta');
    if (marker) marker.style.left = temp + '%';
    if (meta) meta.textContent =
      `${C.moodEmoji(mood)}  信任 ${Math.round((mood.trust || 0) * 100)}% · 愤怒 ${Math.round((mood.anger || 0) * 100)}%`;
  });

  // 事件委托：仅响应 #game-root 内的动作按钮
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-game-action]');
    if (!btn) return;
    const root = document.getElementById('game-root');
    if (!root || !root.contains(btn)) return;
    EventBus.emit(EVENTS.PLAYER_ACTION, {
      type: btn.getAttribute('data-game-action'),
      value: btn.getAttribute('data-value'),
    });
  });
}

    const h = result.hiddenObjective;
    v2Blocks += C.panel('隐藏目标',
      C.hint(`${h.passed ? '✅ 完成' : '❌ 未完成'}｜${h.title}<br><span style="color:var(--dim);font-size:11px">${h.desc}</span><br>${h.rewardHint ? '<span style="font-size:10px;color:var(--yellow)">' + h.rewardHint + '</span>' : ''}`,
        h.passed ? 'green' : 'yellow'));
  }
  if (opp) {
    const finalLine = buildOpponentFinalComment(opp, result.outcome);
    if (finalLine) {
      v2Blocks += C.panel('对手终局评价',
        C.dialogBubble(finalLine, 'ai', `${opp.name} 说`));
    }
    const inner = buildOpponentInnerThought(opp, result);
    if (inner) {
      v2Blocks += C.panel('对手真实想法', C.hint(inner, opp.boss ? 'red' : 'purple'));
    }
  }

  const tipsPanel = opp ? C.panel(`应对 ${opp.type} 的专项技巧`,
    tips.map((t) => C.hint(`• ${t}`)).join('') +
    `<div style="margin-top:8px;font-size:11px;color:var(--dim)">行为识别信号：${tells.join(' | ')}</div>`) : '';

  // Trump Boss 复盘：专项诊断
  let bossReviewPanel = '';
  if (opp && opp.id === 'trumpBoss') {
    const difficulty = Store.get('difficulty') || 'medium';
    const isHell = difficulty === 'hell';
    const rounds = result.rounds || [];
    const tags = rounds.flatMap((r) => r.tags || []);
    const resisted = tags.includes('BATNA') || tags.includes('底线控制');
    const noFreeConcede = !tags.includes('无条件让步');
    const usedConditional = tags.includes('条件让步');
    const passed = resisted && noFreeConcede && usedConditional;
    const diagnosis = passed
      ? '你没有被极端锚定和时间压力完全牵引，能够用底线、条件交换削弱对手压迫。'
      : '你在极端锚定或时间压力下出现了被动，底线表达和条件让步仍需加强。';
    const advices = [
      '① 不要接极端锚定的价格，先质疑其依据和可执行性。',
      '② 所有让步必须换取对方实质承诺，禁止单方面善意释放。',
      '③ 提前亮出BATNA，让对方知道你不是被迫成交的唯一选项。',
      '④ 面对时间压力时主动暂停，把节奏拉回到客观标准。',
      '⑤ 不要进入对方设置的胜负叙事，回到可执行条款本身。',
    ];
    const hellNote = isHell ? C.hint(
      '🔥 <b>地狱级加注</b>：本局 Boss 的豁免被取消，慷慨度再压 45%、强硬度叠加 ×1.55。' +
      (passed ? '在这种条件下仍能坚守原则，证明你的抗压模型已相当成熟。' :
                '在此难度下失手是正常的——先在终局挑战把基础抗压模型跑稳再挑地狱。'),
      passed ? 'green' : 'red') : '';
    bossReviewPanel = `
      <div class="panel" style="border-color:${isHell ? 'var(--red)' : 'var(--yellow)'}">
        <div class="panel-title" style="color:${isHell ? 'var(--red)' : 'var(--yellow)'}">
          ${isHell ? '🔥 地狱级 Boss 复盘' : '终局 Boss 复盘'}｜极限交易型高压锚定模型
        </div>
        ${hellNote}
        ${C.hint(diagnosis, passed ? 'green' : 'yellow')}
        ${advices.map((a) => C.hint(`• ${a}`)).join('')}
      </div>`;
  }

  // Phase 4：逐回合复盘 + 转折点 + 对手情绪曲线 + 改进建议
  let replayPanel = '';
  if (replay && replay.perRound && replay.perRound.length) {
    const rows = replay.perRound.map((pr) => {
      const color = pr.score >= 70 ? 'bar-green' : pr.score >= 50 ? 'bar-yellow' : 'bar-red';
      return `<div class="bar-wrap">
        <div class="bar-label"><span>${pr.label} · <span style="color:var(--dim)">${pr.comment}</span></span><span>${pr.score}</span></div>
        <div class="bar-bg"><div class="bar-fill ${color}" style="width:${pr.score}%"></div></div>
      </div>`;
    }).join('');
    const turning = replay.turning ? C.hint((replay.turning.type === 'bad' ? '⚠ ' : '★ ') + replay.turning.text, replay.turning.type === 'bad' ? 'red' : 'green') : '';
    const spark = replay.moodSeries ? C.moodSparkline(replay.moodSeries) : '';
    replayPanel =
      C.panel(`逐回合复盘　平均 ${replay.avgScore} 分`, turning + rows + spark) +
      C.panel('改进建议', replay.advice.map((a) => C.hint(`• ${a}`)).join(''));
  }

  const avatarHead = opp ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 14px">
      ${C.avatarBadge(opp, 40)}
      <div style="text-align:left">
        <div style="color:var(--white);font-size:13px;font-weight:bold">${opp.name}</div>
        <div style="color:var(--purple);font-size:10px">${opp.type}</div>
      </div>
    </div>` : '';

  // 地狱级专属：在结果上方加一个对角戳（通过/失败）
  const difficultyTop = Store.get('difficulty');
  let hellStamp = '';
  if (difficultyTop === 'hell') {
    const passed = result.outcome === 'win' || result.outcome === 'cooperative';
    hellStamp = `<div class="hell-stamp-wrap"><span class="hell-stamp ${passed ? 'pass' : ''}">${passed ? '★ 地狱已通过 ★' : '✗ 地狱级 失败 ✗'}</span></div>`;
  }

  return `
    <div class="header"><h1>${scenarioName} — 训练结束</h1></div>
    ${hellStamp}
    ${avatarHead}
    <div class="grid2" style="margin-bottom:12px">
      ${C.scoreBox(result.playerScore, '您的得分')}
      ${C.scoreBox(result.oppScore, `${opp ? opp.name : '对手'} 得分`)}
    </div>
    <div style="text-align:center;margin-bottom:16px">${C.outcomeBadge(result.outcome)}</div>
    ${C.panel('复盘分析', result.summary || '')}
    ${v2Blocks}
    ${replayPanel}
    ${tipsPanel}
    ${bossReviewPanel}
    <div style="margin-top:16px;text-align:center">
      <button class="btn" data-nav="${SCREENS.MAIN}" style="margin:4px">← 返回主菜单</button>
      <button class="btn btn-green" data-action="quick" style="margin:4px">再来一局 ⚡</button>
    </div>
  `;
}

renderResult.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  const quick = document.querySelector('[data-action="quick"]');
  if (quick) quick.addEventListener('click', () => {
    const keys = Object.keys(SCENARIO_META);
    const key = keys[Math.floor(Math.random() * keys.length)];
    EventBus.emit(EVENTS.GAME_START, { scenarioKey: key, opponentId: 'random' });
  });

  // 开盒动画：若 recorder 发现有新卡，延迟 600ms 后弹出
  const newCards = Store.get('pendingNewCards');
  if (newCards && newCards.length) {
    Store.set('pendingNewCards', null);
    setTimeout(() => renderBoxOpenModal(newCards, null), 600);
  }
};

// ui/screens/strategy-lib.js — 策略理论库（策略卡 / 沟通技术 / 心理防御 / 六大宗师）
// 屏幕内自管理 Tab 与宗师详情，直接更新 #strategy-content，不经路由。


const TABS = [
  ['cards', '策略卡牌'],
  ['comm', '沟通技术'],
  ['defense', '心理防御'],
  ['masters', '六大宗师'],
];

function renderStrategyLib() {
  const tabs = TABS.map(([id, label], i) =>
    `<div class="tab ${i === 0 ? 'active' : ''}" data-tab="${id}">${label}</div>`).join('');
  return `
    <div class="flex-between">
      <div class="section-title">▶ 策略理论库</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="tabs" id="strategy-tabs">${tabs}</div>
    <div id="strategy-content"></div>
  `;
}

function contentFor(tab) {
  if (tab === 'cards') {
    return STRATEGY_CARDS.map((c) => `
      <div class="master-card">
        <div class="master-name">${c.name}</div>
        <div style="margin:4px 0">${c.tags.map((t) => C.tag(t)).join('')}</div>
        <div style="color:var(--text);font-size:12px;line-height:1.6;margin:6px 0">${c.desc}</div>
        <div style="font-size:11px;color:var(--dim)">适用场景：${c.use}</div>
      </div>`).join('');
  }
  if (tab === 'comm') {
    return COMM_TECHNIQUES.map((c) =>
      `<div class="tactic" style="margin-bottom:8px"><div class="tactic-name">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  if (tab === 'defense') {
    return DEFENSE_TACTICS.map((c) =>
      `<div class="tactic" style="border-left-color:var(--red);margin-bottom:8px"><div class="tactic-name" style="color:var(--red)">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  // masters
  return `<div class="grid2">${Object.entries(MASTERS).map(([k, m]) => `
    <div class="card" data-master="${k}">
      <h3>${m.name}</h3>
      <div style="color:var(--yellow);font-size:11px;margin-bottom:6px">${m.title}</div>
      <p>${m.intro}</p>
      <div style="margin-top:8px;font-size:11px;color:var(--cyan)">共 ${m.tactics.length} 个策略/原则 →</div>
    </div>`).join('')}</div>`;
}

function masterDetail(key) {
  const m = MASTERS[key];
  const stages = [...new Set(m.tactics.map((t) => t.stage))];
  const body = stages.map((stage) => `
    <div style="margin-bottom:12px">
      <div style="color:var(--yellow);font-size:11px;letter-spacing:1px;margin-bottom:6px">【${stage}】</div>
      ${m.tactics.filter((t) => t.stage === stage).map((t) =>
        `<div class="tactic" style="margin-bottom:6px"><div class="tactic-name">${t.name}</div><div class="tactic-desc">${t.desc}</div></div>`).join('')}
    </div>`).join('');
  return `
    <button class="back-btn" id="master-back" style="margin-bottom:12px">← 返回宗师列表</button>
    <div class="master-card">
      <div class="master-name">${m.name}</div>
      <div class="master-title">${m.title}</div>
      ${C.hint(m.intro, 'yellow')}
      ${body}
    </div>`;
}

renderStrategyLib.afterRender = function () {
  const contentEl = document.getElementById('strategy-content');

  function showTab(tab) {
    document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
      t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    contentEl.innerHTML = contentFor(tab);
    if (tab === 'masters') bindMasterCards();
  }

  function bindMasterCards() {
    contentEl.querySelectorAll('[data-master]').forEach((el) => {
      el.addEventListener('click', () => {
        contentEl.innerHTML = masterDetail(el.getAttribute('data-master'));
        const back = document.getElementById('master-back');
        if (back) back.addEventListener('click', () => showTab('masters'));
      });
    });
  }

  document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
    t.addEventListener('click', () => showTab(t.getAttribute('data-tab'))));

  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  showTab('cards');
};

// ui/screens/dashboard.js — 训练成绩看板（场景/对手胜率 + 短板分析）


function nextRankHint(total, wins) {
  const wr = total > 0 ? wins / total : 0;
  const pct = Math.round(wr * 100);
  if (total === 0)  return '完成首局训练晋升 学员';
  if (total < 5)   return `还差 ${5 - total} 场训练 → 谈判官（需胜率≥60%）`;
  if (total < 10)  return `总局数 ${total}/10 + 胜率≥60%（当前 ${pct}%）→ 谈判官`;
  if (total < 20)  return `总局数 ${total}/20 + 胜率≥70%（当前 ${pct}%）→ 策略师`;
  if (total < 30)  return `总局数 ${total}/30 + 胜率≥75%（当前 ${pct}%）→ 博弈大师`;
  if (wr < 0.8)    return `胜率达 80% 晋升 宗师级（当前 ${pct}%，差 ${Math.ceil((0.8 * total - wins))} 胜）`;
  return '🏆 已达顶级军衔 · Boss + 地狱难度全解锁';
}

function winRate(sessions, filterFn) {
  const sub = sessions.filter(filterFn);
  if (!sub.length) return null;
  const wins = sub.filter((s) => s.outcome === 'win' || s.outcome === 'coop').length;
  return { played: sub.length, winRate: Math.round(wins / sub.length * 100) };
}

function renderDashboard() {
  const p = Store.get('player') || { name: '—', sessions: [], total: 0, wins: 0, draws: 0, losses: 0 };
  const rank = getRank(p.total, p.wins);
  const wr = p.total > 0 ? Math.round(p.wins / p.total * 100) : 0;
  const sessions = p.sessions || [];

  // ── 近期记录 ──────────────────────────────────────────────────────────────
  const recent = sessions.slice(-8).reverse();
  const histHtml = recent.length ? recent.map((r) => {
    const oc = r.outcome === 'win' ? 'outcome-win' : r.outcome === 'lose' ? 'outcome-lose' : r.outcome === 'coop' ? 'outcome-coop' : 'outcome-draw';
    const ocLabel = { win:'胜', lose:'负', coop:'合作', draw:'平' }[r.outcome] || '—';
    return `<div class="info-row">
      <span class="info-key" style="font-size:10px">${r.time}</span>
      <span>${r.scenario || '—'}</span>
      <span style="color:var(--dim)">${r.opponent || '—'}</span>
      <span class="outcome ${oc}" style="padding:1px 6px;font-size:10px">${ocLabel}</span>
    </div>`;
  }).join('') : '<div style="color:var(--dim);font-size:12px;padding:8px">暂无训练记录</div>';

  // ── 场景胜率 ──────────────────────────────────────────────────────────────
  const scenarioHtml = Object.entries(SCENARIO_META).map(([key, meta]) => {
    const stat = winRate(sessions, (s) => s.scenarioKey === key);
    if (!stat) return `<div class="info-row"><span class="info-key">${meta.name}</span><span style="color:var(--dim)">未训练</span></div>`;
    const color = stat.winRate >= 60 ? 'var(--green)' : stat.winRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="info-row">
      <span class="info-key">${meta.name}</span>
      <span style="color:${color}">${stat.played} 场 &nbsp; 胜率 ${stat.winRate}%</span>
    </div>`;
  }).join('');

  // ── 对手胜率 ──────────────────────────────────────────────────────────────
  const oppHtml = OPPONENTS.map((o) => {
    const stat = winRate(sessions, (s) => s.opponentId === o.id);
    if (!stat) return `<div class="info-row"><span class="info-key">${o.name} <span style="color:var(--dim);font-size:10px">${o.type}</span></span><span style="color:var(--dim)">未对战</span></div>`;
    const color = stat.winRate >= 60 ? 'var(--green)' : stat.winRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="info-row">
      <span class="info-key">${o.name} <span style="color:var(--dim);font-size:10px">${o.type}</span></span>
      <span style="color:${color}">${stat.played} 场 &nbsp; 胜率 ${stat.winRate}%</span>
    </div>`;
  }).join('');

  // Boss 记录（若有）
  const bossStat = winRate(sessions, (s) => s.opponentId === 'trumpBoss');
  const bossHtml = bossStat ? `<div class="info-row">
    <span class="info-key" style="color:var(--yellow)">极限交易者 <span style="font-size:10px">隐藏 Boss</span></span>
    <span style="color:${bossStat.winRate >= 50 ? 'var(--green)' : 'var(--red)'}">${bossStat.played} 场 &nbsp; 胜率 ${bossStat.winRate}%</span>
  </div>` : '';

  // ── 短板分析 ──────────────────────────────────────────────────────────────
  const profile = p.total >= 2 ? computeProfile(p) : null;
  const weak = profile ? detectWeakPoints(profile) : [];
  const weakHtml = weak.length
    ? weak.map((w) => C.hint(`⚠ ${w}`, 'yellow')).join('')
    : p.total >= 2
      ? C.hint('暂未发现明显短板，继续积累训练样本。', 'green')
      : C.hint('完成至少 2 场训练后将显示短板分析。', 'dim');

  // ── 难度分布 ──────────────────────────────────────────────────────────────
  // 标签从 difficulty 模块的 DIFFICULTIES 派生，新增难度档位自动出现
  const diffCount = sessions.reduce((acc, s) => {
    const d = s.difficulty || 'medium';
    acc[d] = (acc[d] || 0) + 1;
    return acc;
  }, {});
  const diffHtml = DIFFICULTIES
    .filter((d) => diffCount[d.key])
    .map((d) => {
      const cls = d.key === 'hell' ? 'tag-red' : d.key === 'extreme' ? 'tag-yellow' : 'tag-cyan';
      return `<span class="tag ${cls}">${d.label} ×${diffCount[d.key]}</span>`;
    })
    .join('') || '<span style="color:var(--dim);font-size:11px">暂无数据</span>';

  return `
    <div class="flex-between">
      <div class="section-title">▶ 训练成绩看板</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="grid3" style="margin-bottom:8px">
      ${C.scoreBox(p.total, '总训练场次')}
      ${C.scoreBox(`${wr}%`, '综合胜率', 'var(--green)')}
      ${C.scoreBox(rank, '当前军衔', 'var(--yellow)')}
    </div>
    <div class="rank-next-hint">
      <span class="rank-next-icon">↑</span>${nextRankHint(p.total, p.wins)}
    </div>
    ${C.panel('战绩统计', `

let _iPop = null;

function _closeIPop() {
  if (_iPop && _iPop.parentNode) _iPop.parentNode.removeChild(_iPop);
  _iPop = null;
}

function showInlineTip(anchorEl, tipKey) {
  if (typeof document === 'undefined' || typeof document.createElement !== 'function') return;
  if (_iPop && _iPop.getAttribute('data-tip-key') === tipKey) { _closeIPop(); return; }
  _closeIPop();
  const html = _INLINE_TIPS[tipKey];
  if (!html) return;
  _iPop = document.createElement('div');
  _iPop.className = 'inline-tip-pop';
  _iPop.setAttribute('data-tip-key', tipKey);
  _iPop.innerHTML = `<button class="inline-tip-close" aria-label="关闭">✕</button>${html}`;
  document.body.appendChild(_iPop);
  const r = anchorEl.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const PW = 280, PH = 150;
  let left = r.left, top = r.bottom + 8;
  if (left + PW > vw - 8) left = vw - PW - 8;
  if (left < 8) left = 8;
  if (top + PH > vh - 8) top = r.top - PH - 8;
  Object.assign(_iPop.style, { left: left + 'px', top: top + 'px' });
  _iPop.querySelector('.inline-tip-close').onclick = _closeIPop;
}

let _inlineTipsInited = false;
function _initInlineTips() {
  if (_inlineTipsInited || typeof document === 'undefined' || !document.addEventListener) return;
  _inlineTipsInited = true;
  document.addEventListener('click', function (e) {
    const btn = e.target.closest && e.target.closest('.info-tip-btn[data-itip]');
    if (btn) { e.stopPropagation(); showInlineTip(btn, btn.getAttribute('data-itip')); return; }
    if (_iPop && !(e.target.closest && e.target.closest('.inline-tip-pop'))) _closeIPop();
  });
}

  },
