<title>女性传奇谈判者系列 · 预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#e8dfc8;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.page{max-width:1200px;margin:0 auto;padding:28px 16px 48px}

/* ── NAV ── */
.nav{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:20px;
  border-bottom:1px solid rgba(255,180,255,.15);margin-bottom:32px}
.nav-title{font-size:22px;font-weight:700;
  background:linear-gradient(90deg,#ff9fff,#ffd700,#ff9fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:.08em}
.nav-sub{font-size:11px;color:#886688;margin-top:4px}
.vtag{background:rgba(200,100,255,.1);border:1px solid rgba(200,100,255,.3);
  color:#d090ff;font-size:11px;padding:4px 14px;border-radius:20px}

/* ── SERIES HEADER ── */
.series-header{
  text-align:center;margin-bottom:28px;
  padding:16px;
  background:linear-gradient(160deg,rgba(40,10,60,.6),rgba(20,5,30,.8));
  border:1px solid rgba(200,100,255,.2);border-radius:12px;
}
.series-title-cn{font-size:18px;font-weight:700;color:#f0d0ff;letter-spacing:.1em;margin-bottom:4px}
.series-desc{font-size:11px;color:#a080c0;letter-spacing:.04em}

/* ── CARD GRID ── */
.card-grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;margin-bottom:32px}

/* ── UR MENTOR CARD ── */
.mentor-card{
  width:158px;border-radius:14px;overflow:hidden;cursor:pointer;
  transition:transform .25s,box-shadow .25s;
  display:flex;flex-direction:column;position:relative;
  background:linear-gradient(160deg,#14121e,#0d0b18);
}
.mentor-card:hover{transform:translateY(-10px)}
.mentor-card::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(45deg,#ff6b6b,#ffd700,#7fff00,#00cfff,#bf7fff,#ff9fff,#ff6b6b);
  background-size:400% 400%;animation:shimmer 2.5s linear infinite;z-index:0;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:2px;
}
.mentor-card:hover{box-shadow:0 12px 40px rgba(200,100,255,.4),0 0 20px rgba(255,150,255,.2)}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:400% 50%}}

.card-inner{position:relative;z-index:1;display:flex;flex-direction:column;border-radius:13px;overflow:hidden}
.mentor-portrait{width:100%;height:210px;object-fit:cover;object-position:center 12%;display:block;background:#0a0814}
.card-body{padding:10px 10px 9px;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(10,5,20,.92) 100%)}
.card-rarity{font-size:9px;font-weight:900;letter-spacing:.08em;margin-bottom:3px;
  background:linear-gradient(90deg,#ff9fff,#ffd700,#00cfff,#bf7fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-name{font-size:13px;font-weight:700;color:#f5e0ff;margin-bottom:1px}
.card-eng{font-size:9px;color:#886688;margin-bottom:4px}
.card-era{font-size:9px;color:#b090d0;margin-bottom:5px}
.card-style{
  font-size:9px;padding:2px 7px;border-radius:5px;display:inline-block;
  background:rgba(200,100,255,.15);border:1px solid rgba(200,100,255,.3);color:#d0a0ff
}

/* ── SKILL SECTION ── */
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:32px}
.skill-card{
  background:linear-gradient(160deg,#0f0c1a,#080514);
  border:1px solid rgba(200,100,255,.18);border-radius:12px;
  padding:14px 16px;display:flex;gap:14px;align-items:flex-start;

.skill-portrait-mini{
  width:56px;height:74px;border-radius:8px;overflow:hidden;flex-shrink:0;
  border:1px solid rgba(200,100,255,.3)
}
.skill-portrait-mini img{width:100%;height:100%;object-fit:cover;object-position:center 10%}
.skill-info{flex:1}
.skill-name{font-size:13px;font-weight:700;color:#f0d8ff;margin-bottom:2px}
.skill-eng{font-size:10px;color:#886688;margin-bottom:6px}
.skill-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.stag{font-size:9px;padding:1px 6px;border-radius:4px;border:1px solid}
.stag.era{color:#d4af37;border-color:rgba(212,175,55,.35);background:rgba(212,175,55,.08)}
.stag.style{color:#d0a0ff;border-color:rgba(200,100,255,.35);background:rgba(200,100,255,.08)}
.stag.ur{color:#fbbf24;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1);font-weight:700}
.skill-ability{font-size:10px;color:#c0a8d8;line-height:1.5}
.ability-name{color:#e0c8f8;font-weight:600}

/* ── LIGHTBOX ── */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:999;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:12px}
.lb.open{display:flex}
.lb img{max-width:260px;max-height:70vh;border-radius:14px;
  box-shadow:0 0 60px rgba(200,100,255,.5),0 0 100px rgba(255,100,255,.2)}
.lb-close{position:absolute;top:20px;right:28px;font-size:28px;color:#d090ff;cursor:pointer;z-index:2}
.lb-name{font-size:15px;font-weight:700;color:#f0d0ff;letter-spacing:.1em}
.lb-sub{font-size:11px;color:#886688}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(200,100,255,.2),transparent);margin:28px 0}

/* ── SECTION TITLE ── */
.sec{font-size:14px;font-weight:700;color:#d090ff;letter-spacing:.06em;margin-bottom:16px;

.sec::before{content:'◆';font-size:10px;color:#a060d0}

FEMALES.forEach(d => { d.portrait = buildPortrait(d); });

// ─────────────────────────────────────────────────────────
//  RENDER CARDS
// ─────────────────────────────────────────────────────────
const cardGrid = document.getElementById('cardGrid');
const skillsGrid = document.getElementById('skillsGrid');

FEMALES.forEach(d => {
  // card
  const card = document.createElement('div');
  card.className = 'mentor-card';
  card.innerHTML = `<div class="card-inner">
    <img class="mentor-portrait" src="${d.portrait}" alt="${d.name}">
    <div class="card-body">
      <div class="card-rarity">UR · 女性传奇谈判者</div>
      <div class="card-name">${d.name}</div>
      <div class="card-eng">${d.engName}</div>
      <div class="card-era">${d.era}</div>
      <div class="card-style">${d.style}</div>
    </div>
  </div>`;
  card.onclick = () => openLb(d.portrait, d.name, d.subtitle);
  cardGrid.appendChild(card);

  // skill row
  const sk = document.createElement('div');
  sk.className = 'skill-card';
  sk.innerHTML = `
    <div class="skill-portrait-mini"><img src="${d.portrait}" alt="${d.name}"></div>
    <div class="skill-info">
      <div class="skill-name">${d.name}</div>
      <div class="skill-eng">${d.engName} · ${d.era}</div>
      <div class="skill-tags">
        <span class="stag ur">UR</span>
        <span class="stag style">${d.style}</span>
        <span class="stag era">${d.ability}</span>
      </div>
      <div class="skill-ability"><span class="ability-name">专属技能 · ${d.ability}：</span>${d.abilityDesc}</div>
    </div>`;
  skillsGrid.appendChild(sk);
});

// ─────────────────────────────────────────────────────────
//  LIGHTBOX
// ─────────────────────────────────────────────────────────
function openLb(src, name, sub) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbName').textContent = name;
  document.getElementById('lbSub').textContent = sub;
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); }
</script>
