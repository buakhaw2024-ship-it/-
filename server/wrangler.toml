name = "negotiation-ai-proxy"
main = "src/worker.js"
compatibility_date = "2024-09-23"

# `wrangler dev` listens on http://localhost:8787 by default — this is exactly
# the game's DEFAULT_ENDPOINT (http://localhost:8787/api/ai/negotiation-turn),
# so 后端安全模式 connects with zero config during local development.

[vars]
# Default model on OpenRouter (mainstream, Chinese-strong, cheap).
# Alternatives: "qwen/qwen-2.5-72b-instruct", "deepseek/deepseek-chat-v3-0324".
OPENROUTER_MODEL = "deepseek/deepseek-chat"
# Optional: override the OpenAI-compatible base URL (e.g. DeepSeek's own API).
# OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"

# Secret (DO NOT put the key here — set it out of band):
#   wrangler secret put OPENROUTER_API_KEY
# For local `wrangler dev`, put it in server/.dev.vars instead (git-ignored):
#   OPENROUTER_API_KEY = "sk-or-..."
#
# Optional access gate for PUBLIC deploys — without it, anyone who learns the
# workers.dev URL can spend your OpenRouter credits. Set a token, then point the
# game's 后端接口 at  …/api/ai/negotiation-turn?k=<token>
#   wrangler secret put PROXY_ACCESS_TOKEN
