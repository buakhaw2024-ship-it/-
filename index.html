/* ===== engine/util.js ===== */
// engine/util.js — 决策引擎通用工具

const clamp = (x, lo = 0, hi = 1) => Math.max(lo, Math.min(hi, x));

// 指数滑动平均：近期行为权重更高
const ema = (prev, val, a = 0.4) => prev * (1 - a) + val * a;

const rnd = (a = 0, b = 1) => a + Math.random() * (b - a);

const chance = (p) => Math.random() < p;


/* ===== engine/difficulty.js ===== */
// engine/difficulty.js — 难度系统：把难度映射为对手机制修正系数
// 难度真正影响博弈机制（对手慷慨度 / 强硬度 / 接受阈值），而非仅展示。
// Trump Boss 豁免（其行为已校准到极限），由 opponent-ai 调用时判断。


const DIFFICULTIES = [
  { key: 'easy',    label: '初级' },
  { key: 'medium',  label: '中级' },
  { key: 'hard',    label: '高级' },
  { key: 'extreme', label: '终局挑战' },
  { key: 'hell',    label: '地狱级' },
];

function getDifficultyLabel(d) {
  const found = DIFFICULTIES.find((x) => x.key === d);
  return found ? found.label : '中级';
}

// 返回三个修正系数：
//  coopFactor  —— 乘在对手"慷慨度"（返还/贡献/让步）上，>1 对玩家更友好
//  toughFactor —— 乘在对手"强硬度"（锚定/自留）上，>1 更难
//  acceptShift —— 加在最后通牒接受倾向上，正值=更容易接受
function getDifficultyMod(d) {
  const diff = d || (typeof Store !== 'undefined' ? Store.get('difficulty') : 'medium') || 'medium';
  const TABLE = {
    easy:    { coopFactor: 1.30, toughFactor: 0.82, acceptShift: 8 },
    medium:  { coopFactor: 1.00, toughFactor: 1.00, acceptShift: 0 },
    hard:    { coopFactor: 0.78, toughFactor: 1.18, acceptShift: -6 },
    extreme: { coopFactor: 0.62, toughFactor: 1.35, acceptShift: -12 },
    hell:    { coopFactor: 0.45, toughFactor: 1.55, acceptShift: -20 },
  };
  return TABLE[diff] || TABLE.medium;
}

// 把难度修正应用到对手已决策的 move 上。纯函数（pd / ultimatum-respond 含随机微调）。
// kind 决定 move 的语义；ctx 提供所需上下文（tripled / currentOppOffer / trueVal）。
function applyDifficulty(kind, move, ctx, mod) {
  const { coopFactor, toughFactor, acceptShift } = mod;
  switch (kind) {
    case 'pd':
      if (move === 'defect' && coopFactor > 1 && Math.random() < (coopFactor - 1)) return 'coop';
      if (move === 'coop' && coopFactor < 1 && Math.random() < (1 - coopFactor)) return 'defect';
      return move;
    case 'trust-return': {
      const cap = ctx && ctx.tripled != null ? ctx.tripled : move;
      return Math.max(0, Math.min(cap, Math.round(move * coopFactor)));
    }
    case 'pg-contribute':
      return Math.max(0, Math.min(10, Math.round(move * coopFactor)));
    case 'bargain-counter': {
      if (!ctx || ctx.currentOppOffer == null) return move;
      const concession = ctx.currentOppOffer - move;       // 对手本轮让步幅度
      const scaled = concession * coopFactor;               // 难度越高让步越小
      const floor = ctx.trueVal != null ? ctx.trueVal : move;
      return Math.max(floor, Math.round(ctx.currentOppOffer - scaled));
    }
    case 'ultimatum-propose':
      return Math.max(20, Math.min(80, Math.round(50 + (move - 50) * toughFactor)));
    case 'ultimatum-respond': {
      if (typeof move !== 'boolean') return move;
      if (!move && acceptShift > 0 && Math.random() < acceptShift / 40) return true;
      if (move && acceptShift < 0 && Math.random() < -acceptShift / 40) return false;
      return move;
    }
    default:
      return move;
  }
}


/* ===== engine/memory.js ===== */
// engine/memory.js — 跨回合记忆：对手对"当前玩家"的累计认知
// 单局内有效，每局开始 reset。用指数滑动平均使近期行为权重更高。


const _mem = new Map();

function fresh() {
  return {
    rounds: 0,
    coop: 0,            // 玩家合作次数
    defect: 0,          // 玩家背叛次数
    coopRate: 0.5,      // 滑动合作率
    betrayalStreak: 0,  // 当前连续背叛
    aggression: 0.5,    // 玩家激进度（极端施压频率）
    avgConcession: 0,   // 谈判平均让步幅度
    investFraction: 0.5,// 信任博弈投入比例
    firmCount: 0,       // 玩家强硬/防御次数
    exposureScore: 0,   // 操纵者被识破累计分
  };
}

const Memory = {
  reset(id) { _mem.set(id, fresh()); },

  get(id) {
    if (!_mem.has(id)) _mem.set(id, fresh());
    return _mem.get(id);
  },

  // 观察玩家一次行为，更新认知。signal 字段均可选。
  observe(id, sig = {}) {
    const m = this.get(id);
    m.rounds += 1;
    if (sig.coop === true) { m.coop += 1; m.coopRate = ema(m.coopRate, 1); m.betrayalStreak = 0; }
    if (sig.coop === false) { m.defect += 1; m.coopRate = ema(m.coopRate, 0); m.betrayalStreak += 1; }
    if (sig.aggression != null) m.aggression = ema(m.aggression, sig.aggression);
    if (sig.concession != null) m.avgConcession = ema(m.avgConcession, sig.concession);
    if (sig.investFraction != null) m.investFraction = ema(m.investFraction, sig.investFraction);
    if (sig.firm) m.firmCount += 1;
    if (sig.exposes) m.exposureScore += 1;
    return m;
  },
};


/* ===== engine/mood.js ===== */
// engine/mood.js — 情绪/信任状态机：每个对手维护内部情绪，随回合演化
// 情绪反过来调节决策（如 anger 高触发报复，confidence 低触发妥协）。


const _mood = new Map();

// 情绪伪装：hard 及以上难度对手会扰乱 peek 数据
let _deceptionLevel = 0; // 0=透明，1=hard，2=extreme，3=hell

function fresh(persona) {
  return {
    trust: 0.5,
    anger: 0,
    patience: 1,
    confidence: persona ? clamp(0.35 + persona.assert * 0.35) : 0.5,
  };
}

const Mood = {
  reset(id, persona) { _mood.set(id, fresh(persona)); },

  get(id) {
    if (!_mood.has(id)) _mood.set(id, fresh());
    return _mood.get(id);
  },

  // 根据玩家行为演化情绪
  react(id, sig = {}, persona = {}) {
    const d = this.get(id);
    if (sig.coop === true) {
      d.trust = clamp(d.trust + 0.10);
      d.anger = clamp(d.anger - 0.05);
    }
    if (sig.coop === false) {
      d.trust = clamp(d.trust - 0.15);
      const gain = (persona.id === 'aggressive' || persona.id === 'emotional') ? 0.28 : 0.18;
      d.anger = clamp(d.anger + gain);
    }
    if (sig.aggression != null && sig.aggression > 0.6) {
      d.patience = clamp(d.patience - 0.20);
      d.confidence = clamp(d.confidence - (persona.id === 'aggressive' ? 0.15 : 0.08));
    }
    if (sig.firm) {
      d.confidence = clamp(d.confidence - (persona.id === 'aggressive' ? 0.12 : 0.05));
    }
    d.patience = clamp(d.patience - 0.05); // 回合推进，耐心自然损耗
    return d;
  },

  // 设置当前对局的伪装等级（在对局开始时由 runner 调用）
  setDeception(difficulty) {
    _deceptionLevel = difficulty === 'hell' ? 3 : difficulty === 'extreme' ? 2 : difficulty === 'hard' ? 1 : 0;
  },

  isDeceptionActive() { return _deceptionLevel > 0; },
  getDeceptionLevel() { return _deceptionLevel; },

  // 给 peek/读心系统使用：返回伪装后的情绪快照
  getDeceptiveSnapshot(id, persona) {
    const real = this.get(id);
    if (_deceptionLevel <= 0) return { ...real };
    const p = persona || {};
    // 操纵者/Boss 更擅长伪装
    const manipTendency = (p.id === 'manipulative' || p.id === 'trumpBoss') ? 1 : 0.5;
    const intensity = (_deceptionLevel / 3) * manipTendency;
    if (intensity <= 0) return { ...real };

    const faked = { ...real };
    const fakeWeak = chance(0.5);
    if (fakeWeak) {
      // 示弱：诱使你乘胜追击/施压
      faked.trust = clamp(real.trust - intensity * 0.30 + rnd(-0.10, 0.10));
      faked.anger = clamp(real.anger - intensity * 0.25 + rnd(-0.10, 0.10));
      faked.confidence = clamp(real.confidence - intensity * 0.35 + rnd(-0.10, 0.10));
    } else {
      // 示强：诱导你让步
      faked.trust = clamp(real.trust - intensity * 0.20 + rnd(-0.10, 0.10));
      faked.anger = clamp(real.anger + intensity * 0.30 + rnd(-0.10, 0.10));
      faked.confidence = clamp(real.confidence + intensity * 0.40 + rnd(-0.10, 0.10));
    }
    return faked;
  },
};


/* ===== engine/reputation.js ===== */
// engine/reputation.js — 跨局记忆：对手记住你的历史风格，并用它调整开局倾向
// 数据存在 localStorage `gts_reputation_<oppId>` 下，每个对手独立一份记录。


const REP_KEY_PREFIX = 'gts_reputation_';

function freshReputation() {
  return {
    games: 0,                 // 与该对手交手次数
    wins: 0,                  // 你赢的次数
    coopRate: 0.5,            // 你对该对手的平均合作率（EMA）
    aggressionRate: 0.5,      // 你的平均激进率（EMA）
    avgConcession: 5,         // 你的平均让步幅度（EMA）
    lastOutcome: null,        // 上一场结果: 'win'|'lose'|'draw'|'coop'
    latestStrategies: [],     // 最近 5 场的合作率
  };
}

function loadReputation(oppId) {
  if (typeof localStorage === 'undefined') return freshReputation();
  try {
    const saved = localStorage.getItem(REP_KEY_PREFIX + oppId);
    if (saved) return { ...freshReputation(), ...JSON.parse(saved) };
  } catch (e) { /* ignore */ }
  return freshReputation();
}

function saveReputation(oppId, rep) {
  if (typeof localStorage === 'undefined') return;
  try {
    localStorage.setItem(REP_KEY_PREFIX + oppId, JSON.stringify(rep));
  } catch (e) { /* ignore */ }
}

// 一局结束后调用：累计该对手的跨局记忆
function updateReputation(oppId, playerStats, outcome) {
  const rep = loadReputation(oppId);
  rep.games += 1;
  if (outcome === 'win' || outcome === 'coop') rep.wins += 1;
  rep.coopRate = ema(rep.coopRate, playerStats.coopRate != null ? playerStats.coopRate : 0.5, 0.3);
  rep.aggressionRate = ema(rep.aggressionRate, playerStats.aggression != null ? playerStats.aggression : 0.5, 0.3);
  rep.avgConcession = ema(rep.avgConcession, playerStats.avgConcession != null ? playerStats.avgConcession : 5, 0.3);
  rep.lastOutcome = outcome;
  rep.latestStrategies.push(playerStats.coopRate != null ? playerStats.coopRate : 0.5);
  if (rep.latestStrategies.length > 5) rep.latestStrategies.shift();
  saveReputation(oppId, rep);
  return rep;
}

// 对手装载新一局时调用：根据跨局记忆生成开局偏置
// openerBias: −0.3 ~ +0.4，越高代表对手开局越鹰派/越警惕
function applyReputation(oppId, rep) {
  if (rep.games < 2) return { openerBias: 0 };

  let bias = 0;
  // 你上局赢了 → 对手警惕，开局更强硬
  if (rep.lastOutcome === 'win') bias += 0.12;
  // 你上局输了 → 对手觉得你弱，略微松懈
  if (rep.lastOutcome === 'lose') bias -= 0.08;

  // 你历史合作率高 → 对手预判你合作，针对性背叛
  if (rep.coopRate > 0.65) bias += 0.15;
  // 你爱背叛 → 对手反而倾向尝试合作钓鱼
  if (rep.coopRate < 0.35) bias -= 0.10;

  // 连续 3 场以上的稳定模式 → 对手摸清你
  if (rep.latestStrategies.length >= 3) {
    const recent = rep.latestStrategies.slice(-3);
    const allHigh = recent.every((r) => r > 0.6);
    const allLow = recent.every((r) => r < 0.4);
    if (allHigh) bias += 0.10;
    if (allLow) bias += 0.05;
  }

  return { openerBias: clamp(bias, -0.3, 0.4) };
}


/* ===== engine/strategies/rational.js ===== */
// engine/strategies/rational.js — 陈逻辑·理性分析型
// 核心：收益最大化 + 严格以牙还牙；强记忆驱动，弱情绪。破绽：完全可预测。


function rational(ctx, persona, mem, mood) {
  switch (ctx.kind) {
    case 'pd': {
      if (ctx.round === 0) return { move: 'coop', reason: '首轮释放善意，建立可预期的互惠' };
      return ctx.playerLastMove === 'defect'
        ? { move: 'defect', reason: '以牙还牙：你上轮背叛，我镜像回应' }
        : { move: 'coop', reason: '以牙还牙：你上轮合作，我维持互惠' };
    }
    case 'trust-return': {
      const frac = clamp(0.40 + 0.25 * mood.trust);
      return { move: Math.round(ctx.tripled * frac), reason: `按信任度理性返还约 ${Math.round(frac * 100)}%` };
    }
    case 'bargain-counter': {
      const red = 5 * (1 - mem.aggression * 0.5) + (chance(0.5) ? 1 : 0);
      const off = Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red));
      return { move: off, reason: '按期望值小幅让步，你越强硬我让得越少' };
    }
    case 'pg-contribute': {
      const c = ctx.playerLastContrib == null ? 5 : Math.round(ctx.playerLastContrib * 0.9);
      return { move: clamp(c, 0, 10), reason: '条件合作：贡献与你上轮基本对齐' };
    }
    case 'ultimatum-propose':
      return { move: 57, reason: '锚定接近理性均衡的 57' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      return { move: share >= 25, reason: share >= 25 ? '理性接受：有正收益就拿' : '拒绝：收益过低不值得' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/emotional.js ===== */
// engine/strategies/emotional.js — 林敏感·情感驱动型
// 核心：决策被 mood 主导，波动大。破绽：易被同理心安抚，也易被激怒。


function emotional(ctx, persona, mem, mood) {
  switch (ctx.kind) {
    case 'pd': {
      if (mood.anger > 0.5) return { move: 'defect', reason: `情绪主导：怒值 ${mood.anger.toFixed(2)}，报复性背叛` };
      if (mood.trust > 0.6) return { move: 'coop', reason: `关系良好：信任 ${mood.trust.toFixed(2)}，慷慨合作` };
      return ctx.playerLastMove === 'defect'
        ? { move: 'defect', reason: '受上轮伤害，回敬背叛' }
        : { move: 'coop', reason: '情绪平稳，倾向合作' };
    }
    case 'trust-return': {
      const frac = clamp(0.30 + 0.40 * mood.trust - 0.25 * mood.anger);
      return { move: Math.round(ctx.tripled * frac), reason: mood.anger > 0.4 ? '带着情绪，返还偏少' : '感到被信任，慷慨回馈' };
    }
    case 'bargain-counter': {
      const red = mood.trust > 0.55 ? 10 : mood.anger > 0.4 ? 2 : 6;
      return {
        move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)),
        reason: mood.trust > 0.55 ? '关系融洽，主动大让步' : mood.anger > 0.4 ? '情绪抵触，几乎不让' : '按心情小让',
      };
    }
    case 'pg-contribute': {
      const c = mood.trust > 0.55 ? 8 : mood.anger > 0.4 ? 2 : 5;
      return { move: c, reason: '贡献随情绪起伏' };
    }
    case 'ultimatum-propose':
      return { move: mood.anger > 0.4 ? 60 : 50, reason: mood.anger > 0.4 ? '带气提案，多留给自己' : '倾向公平五五分' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      const floor = mood.anger > 0.4 ? 50 : 40;
      return { move: share >= floor, reason: share >= floor ? '情绪可接受，同意' : `觉得不公平${mood.anger > 0.4 ? '又在气头上' : ''}，拒绝` };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/aggressive.js ===== */
// engine/strategies/aggressive.js — 钢铁王·强硬鹰派型
// 核心：高开价、小让步、施压。破绽：合理反压使 confidence 跌破阈值后被迫妥协。


function aggressive(ctx, persona, mem, mood) {
  const cracked = mood.confidence < 0.35; // 被合理反压压垮
  const repBias = mem.reputationBias || 0;  // 跨局记忆：你越爱合作，钢铁王越爱背叛

  switch (ctx.kind) {
    case 'pd': {
      if (cracked && ctx.round > 0) return { move: 'coop', reason: '气势被你压住，转向合作' };
      const defectChance = clamp(0.78 + repBias * 0.7, 0.5, 0.95);
      return chance(defectChance)
        ? { move: 'defect', reason: repBias > 0.1 ? '记得你的套路，提前布防' : '鹰派本能：施压背叛' }
        : { move: 'coop', reason: '偶尔试探性合作' };
    }
    case 'trust-return': {
      const frac = cracked ? 0.35 : 0.15;
      return { move: Math.round(ctx.tripled * frac), reason: cracked ? '底气受挫，略作返还' : '强硬：返还极少' };
    }
    case 'bargain-counter': {
      // 跨局记忆：开局锚定也吃 repBias（+0~+5 元）
      if (ctx.round === 0 && repBias > 0) {
        const anchor = Math.round(clamp(ctx.currentOppOffer + repBias * 10, ctx.currentOppOffer, ctx.currentOppOffer + 8));
        return { move: anchor, reason: '已对你建档，开局再加码' };
      }
      const red = cracked ? 12 : 3 + (chance(0.5) ? 2 : 0); // 破绽：confidence 低 → 大幅让步
      return {
        move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)),
        reason: cracked ? '被合理反压，被迫大幅妥协' : '寸土必争，几乎不让',
      };
    }
    case 'pg-contribute':
      return { move: cracked ? 5 : 2, reason: cracked ? '有所收敛' : '搭便车，贡献极低' };
    case 'ultimatum-propose':
      return { move: cracked ? 58 : 70, reason: cracked ? '气焰收敛' : '狮子大开口，自留七成' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      const need = cracked ? 35 : 45;
      return { move: share >= need, reason: share >= need ? '勉强接受' : '嫌少，拒绝施压' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/cooperative.js ===== */
// engine/strategies/cooperative.js — 和谐李·合作共赢型
// 核心：高合作、主动让步。v3 新增"被骗觉醒"：被连续背叛后转宽容版 TfT，避免成为人形提款机。


function cooperative(ctx, persona, mem, mood) {
  const awakened = mem.betrayalStreak >= 2; // 善意被反复利用后觉醒

  switch (ctx.kind) {
    case 'pd': {
      if (awakened) return { move: 'defect', reason: `善意被连续 ${mem.betrayalStreak} 次背叛消耗，宽容版TfT反击` };
      return chance(0.85)
        ? { move: 'coop', reason: '寻求双赢，主动合作' }
        : { move: 'defect', reason: '偶发防御' };
    }
    case 'trust-return': {
      const frac = awakened ? 0.30 : 0.60;
      return { move: Math.round(ctx.tripled * frac), reason: awakened ? '信任受损，返还转保守' : '高度信任，慷慨回馈六成' };
    }
    case 'bargain-counter': {
      const red = awakened ? 6 : 11 + (chance(0.5) ? 2 : 0);
      return {
        move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)),
        reason: awakened ? '谨慎让步' : '追求成交，大幅让步',
      };
    }
    case 'pg-contribute':
      return { move: awakened ? 4 : 8, reason: awakened ? '减少贡献以自保' : '带头贡献，造福集体' };
    case 'ultimatum-propose':
      return { move: awakened ? 52 : 46, reason: awakened ? '略偏自保' : '偏向对方的公平分配' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      return { move: share >= 30, reason: share >= 30 ? '宽容接受，维系关系' : '实在过低，婉拒' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/manipulative.js ===== */
// engine/strategies/manipulative.js — 影子张·操纵控制型
// 核心：钓鱼、忽大忽小、放长线背刺。破绽：被识破（exposureScore≥2）后操纵收益归零，转常规策略。


function manipulative(ctx, persona, mem, mood) {
  const exposed = mem.exposureScore >= 2;
  const repBias = mem.reputationBias || 0;  // 你爱合作 → 它提前收网

  switch (ctx.kind) {
    case 'pd': {
      if (exposed) {
        return ctx.playerLastMove === 'defect'
          ? { move: 'defect', reason: '已被识破，改打常规以牙还牙' }
          : { move: 'coop', reason: '伪装失效，转常规互惠' };
      }
      // 跨局记忆：你历史高合作率，钓鱼期缩短（从 2 轮提前到 1 轮就收网）
      const trapRound = repBias > 0.15 ? 1 : 2;
      return ctx.round < trapRound
        ? { move: 'coop', reason: repBias > 0.15 ? '你已被建档，缩短钓鱼期' : '放长线：先合作骗取信任' }
        : { move: 'defect', reason: '收网：背刺获利' };
    }
    case 'trust-return': {
      if (exposed) return { move: Math.round(ctx.tripled * 0.4), reason: '被识破，按常规返还' };
      const early = mem.rounds < 2;
      return {
        move: Math.round(ctx.tripled * (early ? 0.5 : 0.1)),
        reason: early ? '钓鱼：高返还诱你加码' : '收割：大幅克扣',
      };
    }
    case 'bargain-counter': {
      if (exposed) return { move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - 6)), reason: '被识破，稳定让步' };
      const red = chance(0.5) ? 9 : 2;
      return { move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)), reason: '忽大忽小，制造认知混乱' };
    }
    case 'pg-contribute':
      return { move: exposed ? 5 : (chance(0.4) ? 8 : 2), reason: exposed ? '转为常规贡献' : '贡献飘忽，迷惑对手' };
    case 'ultimatum-propose':
      return { move: exposed ? 57 : 65, reason: exposed ? '转常规提案' : '高自留，包装话术' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      return { move: share >= 35, reason: share >= 35 ? '接受' : '拒绝以施压' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/risk-averse.js ===== */
// engine/strategies/risk-averse.js — 稳健吴·风险规避型
// 核心：偏好确定性、回避极端、接受"足够好"。破绽：压力下（耐心耗尽/对手强硬）过度让步。


function riskAverse(ctx, persona, mem, mood) {
  const pressured = mood.patience < 0.4 || mem.aggression > 0.6; // 压力下过度让步

  switch (ctx.kind) {
    case 'pd':
      return chance(0.70)
        ? { move: 'coop', reason: '规避双输风险，倾向稳定合作' }
        : { move: 'defect', reason: '谨慎自保' };
    case 'trust-return':
      return { move: Math.round(ctx.tripled * 0.4), reason: '稳健返还，留有余地' };
    case 'bargain-counter': {
      const red = pressured ? 11 : 6 + (chance(0.5) ? 3 : 0);
      return {
        move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)),
        reason: pressured ? '压力之下过度让步（破绽）' : '稳健小步让',
      };
    }
    case 'pg-contribute':
      return { move: 5, reason: '中庸贡献，避免极端' };
    case 'ultimatum-propose':
      return { move: 55, reason: '求稳，留略多但不贪' };
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      return { move: share >= 25, reason: share >= 25 ? '接受以规避零收益风险' : '过低，拒绝' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/strategies/trump-boss.js ===== */
// engine/strategies/trump-boss.js — 极限交易者·高压锚定型（隐藏 Boss）
// 抽象「极端开价 / 公开施压 / 极少让步 / 锚定 / 不可预测」的谈判风格。
// 跨回合自适应：你越无条件合作，它越索取；你亮 BATNA / 强硬，它才略微松动。
// 难度豁免：本策略输出即极限值，opponent-ai 不再叠加难度修正。


function trumpBoss(ctx, persona, mem, mood) {
  const resisted = mem.firmCount > 0 || mem.aggression > 0.6; // 玩家亮 BATNA / 强硬反压
  const overlySoft = mem.coop >= 2 && mem.firmCount === 0;     // 玩家持续无条件合作
  const repBias = mem.reputationBias || 0;                     // 跨局记忆偏置

  switch (ctx.kind) {
    case 'pd': {
      if (ctx.round === 0) {
        const defectChance = clamp(0.9 + repBias, 0.7, 0.99);
        return {
          move: chance(defectChance) ? 'defect' : 'coop',
          reason: repBias > 0.1 ? '你已被我记住，别想故技重施' : '开局极限施压：先背叛立威',
        };
      }
      if (resisted) return { move: chance(0.5) ? 'defect' : 'coop', reason: '遇到可信反压，转为试探' };
      if (overlySoft) return { move: chance(0.95) ? 'defect' : 'coop', reason: '你越软我越索取' };
      return { move: chance(0.85) ? 'defect' : 'coop', reason: '高压交易本能：倾向背叛' };
    }
    case 'trust-return':
      return { move: Math.round(ctx.tripled * 0.08), reason: '极限榨取，几乎不返还' };
    case 'bargain-counter': {
      if (ctx.round === 0) {
        const anchor = Math.round(clamp(95 + repBias * 8, 88, 99));
        return {
          move: anchor,
          reason: repBias > 0.1 ? `已对你建档，再加 ${anchor - 95} 元锚定` : '极端锚定开价 95',
        };
      }
      let red;
      if (resisted) red = 4 + (chance(0.5) ? 2 : 0);          // 被反压才肯多让一点
      else if (overlySoft) red = 1 + (chance(0.5) ? 1 : 0);   // 你软我几乎不动
      else red = 3 + (chance(0.5) ? 2 : 0);
      return {
        move: Math.max(ctx.trueVal, Math.round(ctx.currentOppOffer - red)),
        reason: resisted ? '迫于你的底气略作让步' : '寸土不让的高压让步',
      };
    }
    case 'pg-contribute':
      return { move: chance(0.5) ? 0 : 1, reason: '搭便车到底：让别人买单' };
    case 'ultimatum-propose': {
      const base = resisted ? 78 : 84;
      const move = Math.round(clamp(base + repBias * 6, 70, 92));
      return { move, reason: resisted ? '稍稍收敛但仍极端' : (repBias > 0.1 ? '记得你套路，提价' : '极端报价：自留绝大部分') };
    }
    case 'ultimatum-respond': {
      const share = 100 - ctx.playerKeep;
      const need = resisted ? 42 : 50; // 极高接受门槛
      return { move: share >= need, reason: share >= need ? '勉强收下' : '不够多，拒绝并继续加压' };
    }
    default:
      return { move: null, reason: '' };
  }
}


/* ===== engine/opponent-ai.js ===== */
// engine/opponent-ai.js — AI 决策引擎统一入口
// 装配性格(静态) + 记忆(动态认知) + 情绪(状态机) + 性格专属策略。
// 不操作 DOM；仅通过返回值与 ai:decided 事件对外通信。



const STRATEGIES = { rational, emotional, aggressive, cooperative, manipulative, riskAverse, trumpBoss };

const OpponentAI = {
  // 每局开始重置该对手的记忆与情绪 + 注入跨局记忆偏置
  reset(opponentId) {
    const persona = getOpponent(opponentId);
    Memory.reset(opponentId);
    Mood.reset(opponentId, persona);
    const rep = loadReputation(opponentId);
    const effect = applyReputation(opponentId, rep);
    Memory.get(opponentId).reputationBias = effect.openerBias;
    Memory.get(opponentId).reputationGames = rep.games;
  },

  // 观察玩家一次行为：更新记忆 + 演化情绪（在对手做出反应前调用）
  observe(opponentId, signal) {
    const persona = getOpponent(opponentId);
    Memory.observe(opponentId, signal);
    Mood.react(opponentId, signal, persona);
  },

  // 做出决策：ctx.kind 决定决策类型，返回 { move, reason, mood }
  decide(opponentId, ctx) {
    const persona = getOpponent(opponentId);
    const mem = Memory.get(opponentId);
    const mood = Mood.get(opponentId);
    const fn = STRATEGIES[opponentId] || STRATEGIES.rational;

    let { move, reason } = fn(ctx, persona, mem, mood);
    // 难度修正：缩放对手慷慨度/强硬度/接受倾向。
    // Boss 默认豁免（已校准到极限）；但「地狱级」取消豁免——修正叠加到 Boss 上，构成终极挑战。
    const difficulty = Store.get('difficulty');
    const bossExempt = opponentId === 'trumpBoss' && difficulty !== 'hell';
    if (!bossExempt) {
      move = applyDifficulty(ctx.kind, move, ctx, getDifficultyMod(difficulty));
    }
    // 技能盲盒：对手适应轻量修正（5%–20%，不覆盖原性格）
    if (typeof OpponentAdaptation !== 'undefined') {
      const adapted = OpponentAdaptation.modifyAIMove(ctx.kind, move, ctx);
      if (adapted) {
        move = adapted.move;
        if (adapted.note) reason = reason ? `${reason}；${adapted.note}` : adapted.note;
      }
    }
    const snapshot = { ...mood };

    EventBus.emit(EVENTS.AI_DECIDED, { opponentId, move, reason, mood: snapshot, kind: ctx.kind });
    return { move, reason, mood: snapshot };
  },

  // 供复盘读取
  snapshot(opponentId) {
    return { memory: { ...Memory.get(opponentId) }, mood: { ...Mood.get(opponentId) } };
  },
};


/* ===== analytics/player-data.js ===== */
// analytics/player-data.js — 玩家档案 + LocalStorage 持久化
// 兼容 v2.0 存档：key = gts_player_<name>，字段 {name,sessions,total,wins,draws,losses}

const KEY_PREFIX = 'gts_player_';

// 行为统计累加器（Phase 4：心理画像基于真实决策序列计算）
function freshBehaviorStats() {
  return {
    games: 0,
    coopMoves: 0, totalMoves: 0,
    riskyMoves: 0, assertiveMoves: 0,
    fairActs: 0, fairOpps: 0,
    trustInvested: 0, trustMax: 0,
    impulseAvoid: 0, impulseTotal: 0,
    wins: 0, hardGames: 0, hardWins: 0,
    opponentsSeen: [],
    // 卡池解锁相关统计
    correctReads: 0,    // 正确判断对手类型（使用 peek 后仍获胜）
    tftWins: 0,         // 以 TfT 混合策略赢得囚徒困境
    pureCoopWins: 0,    // 纯合作策略赢得/平局公共品
    hellPureCoop: 0,    // 地狱难度下的纯合作胜利
    fairDeals: 0,       // 公平成交局数
    hellWins: 0,        // 地狱难度胜利数
    bossWins: 0,        // 击败 Boss 次数
  };
}

function loadPlayer(name) {
  try {
    const saved = localStorage.getItem(KEY_PREFIX + name);
    if (saved) {
      const p = JSON.parse(saved);
      // 向后兼容：补齐 v3 / 技能盲盒可能新增的字段
      p.sessions = p.sessions || [];
      p.behaviorStats = { ...freshBehaviorStats(), ...(p.behaviorStats || {}) };
      if (typeof p.cardShards !== 'number') p.cardShards = 0;
      // 技能盲盒系统字段（不污染原有 cardCollection — 用 skill 前缀）
      p.skillCardCollection = p.skillCardCollection || [];
      p.skillCardDuplicates = p.skillCardDuplicates || {};
      p.skillCardPacks = p.skillCardPacks || [];
      p.skillCardLoadout = p.skillCardLoadout || [];
      p.skillCardPity = p.skillCardPity || { total: 0, sinceSR: 0, sinceSSR: 0, sinceUR: 0 };
      // 谈判行为画像（v5新增）
      p.negotiationBehaviorProfile = p.negotiationBehaviorProfile || null;
      // 教学UI模式（v5新增）
      p.ui = p.ui || { teachingMode: 'learner', dataDisclosure: 'collapsed' };
      return p;
    }
  } catch (e) {
    console.warn('[player-data] 读取存档失败，新建档案', e);
  }
  return {
    name, sessions: [], total: 0, wins: 0, draws: 0, losses: 0,
    behaviorStats: freshBehaviorStats(), cardShards: 0,
    skillCardCollection: [], skillCardDuplicates: {}, skillCardPacks: [],
    skillCardLoadout: [], skillCardPity: { total: 0, sinceSR: 0, sinceSSR: 0, sinceUR: 0 }
  };
}

function savePlayer(player) {
  if (!player) return;
  try {
    localStorage.setItem(KEY_PREFIX + player.name, JSON.stringify(player));
  } catch (e) {
    console.warn('[player-data] 保存存档失败', e);
  }
}

// 追加一局记录并持久化；返回更新后的 player
function addSession(player, rec) {
  player.sessions.push(rec);
  player.total += 1;
  if (rec.outcome === 'win') player.wins += 1;
  else if (rec.outcome === 'draw' || rec.outcome === 'coop') player.draws += 1;
  else player.losses += 1;
  savePlayer(player);
  return player;
}


/* ===== analytics/psych-analyzer.js ===== */
// analytics/psych-analyzer.js — 8 维心理画像引擎（Phase 4 重构）
// 不再用固定 +0.08 线性累加，而是从真实决策序列累计行为统计，按比例计算 8 维向量。
// 统计累加在 player.behaviorStats（随存档持久化）。

const HARD_OPPONENTS = ['aggressive', 'manipulative'];
const clamp01 = (x) => Math.max(0, Math.min(1, x));
const safe = (a, b, d = 0.5) => (b > 0 ? clamp01(a / b) : d);

// 从一局的回合日志提取行为信号，累加进 player.behaviorStats
function accumulate(player, kind, rounds, result, opp) {
  const s = player.behaviorStats;
  s.games += 1;
  if (opp && !s.opponentsSeen.includes(opp.id)) s.opponentsSeen.push(opp.id);
  const won = result.outcome === 'win';
  const coop = result.outcome === 'coop';
  const difficulty = (result.difficulty) || 'medium';
  const isHell = difficulty === 'hell';

  if (won) s.wins += 1;
  if (isHell && won) s.hellWins += 1;
  if (opp && opp.boss && won) s.bossWins += 1;
  if (opp && HARD_OPPONENTS.includes(opp.id)) {
    s.hardGames += 1;
    if (won) s.hardWins += 1;
  }
  // 公平成交计数（由各场景在 result.fairDeal 中注入）
  if (result.fairDeal) s.fairDeals += 1;

  if (!rounds || !rounds.length) return player;

  if (kind === 'prisoners') {
    const coopCount = rounds.filter((r) => r.player === 'coop').length;
    const defectCount = rounds.length - coopCount;
    rounds.forEach((r) => {
      s.totalMoves += 1; s.impulseTotal += 1;
      if (r.player === 'coop') { s.coopMoves += 1; s.impulseAvoid += 1; }
      else { s.riskyMoves += 1; s.assertiveMoves += 1; }
    });
    // TfT 赢：混合策略（有合作也有背叛）+ 胜利
    if (won && coopCount > 0 && defectCount > 0) s.tftWins += 1;
    // 正确识别对手：有 peek 记录 + 胜利（tags 携带信号）
    if (won && rounds.some((r) => r.tags && r.tags.includes('peek'))) s.correctReads += 1;

  } else if (kind === 'trust') {
    rounds.forEach((r) => {
      s.totalMoves += 1; s.impulseTotal += 1;
      s.trustInvested += r.invested; s.trustMax += 10;
      if (r.invested >= 5) s.coopMoves += 1;
      if (r.invested >= 10) s.riskyMoves += 1;
      if (r.invested === 0) s.assertiveMoves += 1;
      if (r.myNet >= 0) s.impulseAvoid += 1;
    });

  } else if (kind === 'publicgoods') {
    const allCoop = rounds.every((r) => r.my >= 5);
    rounds.forEach((r) => {
      s.totalMoves += 1; s.impulseTotal += 1;
      s.trustInvested += r.my; s.trustMax += 10;
      if (r.my >= 5) { s.coopMoves += 1; s.impulseAvoid += 1; }
      if (r.my <= 1) s.assertiveMoves += 1;
      if (r.my === 0) s.riskyMoves += 1;
    });
    // 纯合作策略（每轮 ≥5）+ 胜利或平局
    if (allCoop && (won || coop)) {
      s.pureCoopWins += 1;
      if (isHell) s.hellPureCoop += 1;
    }

  } else if (kind === 'bargaining') {
    rounds.forEach((r, i) => {
      s.totalMoves += 1; s.impulseTotal += 1;
      const prev = i > 0 ? rounds[i - 1].my : r.my;
      if (r.my - prev <= 3) s.impulseAvoid += 1;
      if (r.my < 42) s.assertiveMoves += 1;
    });

  } else if (kind === 'ultimatum') {
    rounds.forEach((r) => {
      s.totalMoves += 1; s.fairOpps += 1;
      if (r.accepted && r.myOffer >= 40 && r.myOffer <= 62) s.fairActs += 1;
      else if (r.accepted) s.fairActs += 0.5;
      if (r.myOffer > 62) s.assertiveMoves += 1;
    });

  } else if (kind === 'crisis' || kind === 'coalition') {
    rounds.forEach((r) => {
      s.totalMoves += 1; s.impulseTotal += 1;
      if (r.ps > 0) s.impulseAvoid += 1;
    });
  }
  return player;
}

// 由行为统计计算 8 维心理向量
function computeProfile(player) {
  const s = (player && player.behaviorStats) || {};
  const winRate = safe(s.wins, s.games);
  const hardWinRate = safe(s.hardWins, s.hardGames, 0.4);
  return {
    cooperation_rate: safe(s.coopMoves, s.totalMoves),
    risk: safe(s.riskyMoves, s.totalMoves),
    fairness: safe(s.fairActs, s.fairOpps),
    depth: clamp01(0.3 + 0.3 * winRate + 0.4 * hardWinRate),
    emotion: safe(s.impulseAvoid, s.impulseTotal),
    assert: safe(s.assertiveMoves, s.totalMoves),
    adapt: clamp01(0.6 * Math.min(1, (s.opponentsSeen ? s.opponentsSeen.length : 0) / 6) + 0.4 * Math.min(1, (s.games || 0) / 8)),
    trust: safe(s.trustInvested, s.trustMax),
  };
}

function getProfileType(p) {
  const profiles = [
    { name:'战略家', cond:() => p.depth > 0.6 && p.assert > 0.5, desc:'冷静理智，善于全局规划和长远布局',
      advice:['适当增加情感投入以建立更强的谈判关系','尝试更多合作性策略','注意不要过于机械化'] },
    { name:'调解者', cond:() => p.cooperation_rate > 0.7 && p.fairness > 0.6, desc:'天生的关系维护者，擅长化解冲突',
      advice:['学会在合适时机坚守底线','避免为维持和谐而过度妥协','增强BATNA意识'] },
    { name:'竞争者', cond:() => p.assert > 0.6 && p.risk > 0.5, desc:'目标明确，勇于争取最大利益',
      advice:['关注对方利益，寻找双赢机会','长期关系比单次收益更有价值','练习主动倾听'] },
    { name:'外交家', cond:() => p.adapt > 0.6 && p.emotion > 0.6, desc:'灵活适应，善于在不同情境切换策略',
      advice:['在核心利益上保持一致性','增强策略深度分析能力','建立清晰的底线意识'] },
    { name:'分析师', cond:() => p.depth > 0.5 && p.risk < 0.4, desc:'谨慎周密，偏好有据可查的决策路径',
      advice:['适当增加行动果断性','在信息不完整时学会做出判断','尝试更多创新性解决方案'] },
    { name:'实用主义者', cond:() => true, desc:'务实灵活，根据情境选择最优策略',
      advice:['深化某一领域的专项谈判技能','建立系统性的谈判框架','记录每次谈判的经验教训'] },
  ];
  return profiles.find((pp) => pp.cond()) || profiles[profiles.length - 1];
}

function hasEnoughData(totalSessions) {
  return totalSessions >= 2;
}

// 基于 v3 全比例模型的短板检测（阈值针对真实决策比例校准，非 0.5 基线）
function detectWeakPoints(profile) {
  if (!profile) return [];
  const weak = [];
  if ((profile.assert || 0) < 0.30)                                   weak.push('主张强度不足');
  if ((profile.depth || 0) < 0.45)                                    weak.push('策略深度不足');
  if ((profile.adapt || 0) < 0.40)                                    weak.push('策略适配不足');
  if ((profile.risk || 0) < 0.20)                                     weak.push('风险承受偏低');
  if ((profile.emotion || 0) < 0.35)                                  weak.push('情绪调节不足');
  if ((profile.fairness || 0) > 0.75 && (profile.assert || 0) < 0.30) weak.push('公平敏感偏高，可能过度让步');
  return weak;
}

/* ===== analytics/replay.js ===== */
// analytics/replay.js — 逐回合复盘评分（Phase 4）
// 输入：场景 kind + 回合日志 + 结果 + 对手；输出：逐回合 0-100 评分 + 转折点 + 改进建议 + 对手情绪序列。


const clampScore = (x, lo = 0, hi = 100) => Math.max(lo, Math.min(hi, x));

function scorePrisoners(rounds) {
  return rounds.map((r) => {
    let score, comment;
    if (r.player === 'coop' && r.opp === 'coop') { score = 85; comment = '互利合作，稳健可持续'; }
    else if (r.player === 'defect' && r.opp === 'coop') { score = 66; comment = '占得便宜，但易招致后续报复'; }
    else if (r.player === 'coop' && r.opp === 'defect') { score = 40; comment = '被对方利用，吃亏'; }
    else { score = 32; comment = '双输僵局，零和内耗'; }
    return { label: `第${r.round}轮`, score, comment, mood: r.mood };
  });
}

function scoreTrust(rounds) {
  return rounds.map((r) => {
    const score = clampScore(50 + r.myNet * 4);
    const comment = r.myNet > 3 ? '信任获得正回报' : r.myNet >= 0 ? '基本持平' : '信任被辜负，受损';
    return { label: `第${r.round}轮(投${r.invested})`, score, comment, mood: r.mood };
  });
}

function scorePublicGoods(rounds) {
  return rounds.map((r) => {
    const gain = r.share - r.my;
    const score = clampScore(50 + gain * 6);
    const comment = r.my >= 5 && r.opp >= 5 ? '集体共赢' : r.my === 0 ? '搭便车，短期获利但侵蚀信任' : '谨慎参与';
    return { label: `第${r.round}轮(贡${r.my})`, score, comment, mood: r.mood };
  });
}

function scoreBargaining(rounds, result) {
  const per = rounds.map((r, i) => {
    const prev = i > 0 ? rounds[i - 1].my : r.my;
    const conc = r.my - prev;
    const score = clampScore(88 - conc * 3);
    const comment = conc <= 3 ? '小步施压，纪律良好' : conc >= 12 ? '让步过快，丢失筹码' : '让步适中';
    return { label: `第${r.round}轮(出${r.my})`, score, comment, mood: r.mood };
  });
  // 追加成交评分
  const price = 100 - result.playerScore;
  per.push({
    label: `成交(${price}元)`,
    score: clampScore(price <= 55 ? 92 : price <= 65 ? 70 : 45),
    comment: price <= 55 ? '远低于真实价值，出色' : price <= 65 ? '接近真实价值' : '偏高，议价不足',
  });
  return per;
}

function scoreUltimatum(rounds) {
  return rounds.map((r) => {
    let score, comment;
    if (!r.accepted) { score = 30; comment = '提案被否，双方归零'; }
    else if (r.myOffer >= 40 && r.myOffer <= 62) { score = 85; comment = '分配合理，顺利达成'; }
    else if (r.myOffer > 62) { score = 60; comment = '自留偏多，侥幸通过'; }
    else { score = 70; comment = '偏让利，关系友好'; }
    return { label: `第${r.round}轮`, score, comment };
  });
}

function scoreStaged(rounds) {
  return rounds.map((r, i) => {
    const max = r.maxPs || 20;
    const score = clampScore(Math.round((r.ps / max) * 100));
    const comment = r.ps >= max * 0.8 ? '上佳选择' : r.ps > 0 ? '有效推进' : '适得其反，激化局面';
    return { label: r.stage || `第${i + 1}阶段`, score, comment };
  });
}

const SCORERS = {
  prisoners: scorePrisoners,
  trust: scoreTrust,
  publicgoods: scorePublicGoods,
  bargaining: scoreBargaining,
  ultimatum: scoreUltimatum,
  crisis: scoreStaged,
  coalition: scoreStaged,
};

function buildReplay(kind, rounds, opp, result) {
  const scorer = SCORERS[kind];
  if (!scorer || !rounds || !rounds.length) {
    return { perRound: [], avgScore: null, turning: null, advice: opp ? getOpponentTips(opp.id).slice(0, 2) : [], moodSeries: null };
  }
  const perRound = scorer(rounds, result);
  const avgScore = Math.round(perRound.reduce((s, r) => s + r.score, 0) / perRound.length);

  // 转折点：最低分回合（若整体优秀则取最佳一手）
  let turning = null;
  if (perRound.length) {
    const worst = perRound.reduce((a, b) => (b.score < a.score ? b : a));
    const best = perRound.reduce((a, b) => (b.score > a.score ? b : a));
    turning = worst.score < 55
      ? { type: 'bad', text: `${worst.label}是本局关键失误（${worst.score}分）：${worst.comment}` }
      : { type: 'good', text: `${best.label}是本局最佳一手（${best.score}分）：${best.comment}` };
  }

  // 对手情绪序列（仅决策类场景携带 mood）
  const moods = perRound.filter((r) => r.mood).map((r) => r.mood);
  const moodSeries = moods.length ? moods : null;

  // 改进建议：表现 + 对手专项
  const advice = [];
  if (avgScore >= 75) advice.push('整体决策质量高，可尝试更高难度对手或更激进的目标。');
  else if (avgScore >= 55) advice.push('决策稳健但有提升空间，关注转折点回合的更优解。');
  else advice.push('多个回合失分明显，建议复盘转折点，调整对该类对手的策略。');
  if (opp) advice.push(...getOpponentTips(opp.id).slice(0, 2));

  return { perRound, avgScore, turning, advice, moodSeries };
}

/* ===== ui/components.js ===== */
// ui/components.js — 纯 HTML 片段构造器（无 DOM 操作，仅返回字符串）
// 被 screens 与 scenarios 复用。游戏内交互元素统一带 data-game-action / data-value，
// 由 game-view 的事件委托翻译成 player:action 事件。


const C = {
  // 对手头像 emoji 映射（保留为 fallback / 角色徽章场景）
  avatarEmoji(oppId) {
    const MAP = {
      rational: '🧮', emotional: '🌊', aggressive: '🦅',
      cooperative: '🤝', manipulative: '🎭', riskAverse: '🛡️', trumpBoss: '👑',
    };
    return MAP[oppId] || '🤝';
  },

  // 角色专属风格化 SVG 头像（无外部资源）
  avatarSvg(oppId) {
    return avatarSvg(oppId);
  },

  // 独立头像徽章（结果屏等处复用）—— 使用 SVG 头像
  avatarBadge(opp, size = 44) {
    if (!opp) return '';
    const ringCls = opp.boss ? 'nego-avatar-ring boss-ring' : 'nego-avatar-ring';
    return `<div class="${ringCls} avatar-svg-host" style="width:${size}px;height:${size}px">${this.avatarSvg(opp.id)}</div>`;
  },

  panel(title, body) {
    return `<div class="panel"><div class="panel-title">${title}</div>${body}</div>`;
  },

  hint(text, kind = 'cyan') {
    return `<div class="hint hint-${kind}">${text}</div>`;
  },

  scoreBox(num, label, color) {
    const style = color ? ` style="color:${color}"` : '';
    return `<div class="score-box"><div class="score-num"${style}>${num}</div><div class="score-lbl">${label}</div></div>`;
  },

  bar(label, val, colorClass = 'bar-cyan') {
    const pct = Math.round(Math.min(1, Math.max(0, val)) * 100);
    return `<div class="bar-wrap">
      <div class="bar-label"><span>${label}</span><span>${pct}%</span></div>
      <div class="bar-bg"><div class="bar-fill ${colorClass}" style="width:${pct}%"></div></div>
    </div>`;
  },

  infoRow(key, val) {
    return `<div class="info-row"><span class="info-key">${key}</span><span class="info-val">${val}</span></div>`;
  },

  tag(text, cls = 'tag-cyan') {
    return `<span class="tag ${cls}">${text}</span>`;
  },

  outcomeBadge(outcome) {
    const map = {
      win:  ['outcome-win', '胜利'],
      lose: ['outcome-lose', '败北'],
      draw: ['outcome-draw', '平局'],
      coop: ['outcome-coop', '合作双赢'],
    };
    const [cls, label] = map[outcome] || ['outcome-draw', outcome];
    return `<span class="outcome ${cls}">${label}</span>`;
  },

  // 对局内的页眉（含退出按钮）
  gameHeader(title) {
    return `<div class="flex-between">
      <div class="section-title">${title}</div>
      <button class="back-btn" data-game-action="exit">✕ 退出</button>
    </div>`;
  },

  // 对局内的动作按钮：点击经委托发出 player:action {type:action, value}
  actionBtn(action, value, html, extraClass = '') {
    return `<button class="choice-btn ${extraClass}" data-game-action="${action}" data-value="${value}">${html}</button>`;
  },

  // 回合日志容器
  logBox(title, entriesHtml) {
    if (!entriesHtml) return '';
    return `<div class="panel"><div class="panel-title">${title}</div><div class="log">${entriesHtml}</div></div>`;
  },

  // 将情绪状态映射为直觉表情（用于 AI 气泡标签）
  moodEmoji(mood) {
    if (!mood) return '';
    const { trust = 0, anger = 0, patience = 0, confidence = 0 } = mood;
    if (anger > 0.72) return '😠';
    if (anger > 0.50 && trust < 0.40) return '😤';
    if (trust > 0.72) return '😊';
    if (trust > 0.50 && anger < 0.35) return '🤝';
    if (patience < 0.25) return '⏰';
    if (confidence > 0.75) return '😎';
    return '🤔';
  },

  // 对话气泡：who='ai'|'player'|'system'
  dialogBubble(text, who = 'ai', label = '') {
    if (!text) return '';
    if (who === 'system') {
      return `<div class="bubble-row"><div class="bubble bubble-system">${label ? `<div class="bubble-label">${label}</div>` : ''}<div class="bubble-text">${text}</div></div></div>`;
    }
    return `<div class="bubble-row bubble-row-${who}">
      <div class="bubble bubble-${who}">
        ${label ? `<div class="bubble-label">${label}</div>` : ''}
        <div class="bubble-text">${text}</div>
      </div>
    </div>`;
  },

  // 回合时间线（圆点轨）
  roundTimeline(log, total, current) {
    const done = log ? log.length : 0;
    const dots = Array.from({ length: total }, (_, i) => {
      const cls = i < done ? 'tl-done' : i === current ? 'tl-current' : 'tl-pending';
      return `<div class="tl-dot ${cls}" title="第${i + 1}轮"></div>`;
    }).join('');
    return `<div class="round-timeline"><div class="tl-label">第${current + 1}/${total}轮 <button class="info-tip-btn" data-itip="rounds" title="回合说明">ℹ</button></div><div class="tl-dots">${dots}</div></div>`;
  },

  // 关系温度计：显式展示对手 Mood + 跨局记忆，高难度提示伪装
  relationshipPanel(opp) {
    if (!opp) return '';
    const mood = Mood.get(opp.id);
    const rep = loadReputation(opp.id);
    const diff = Store.get('difficulty') || 'medium';
    const pct = (n) => Math.round(clamp(n || 0, 0, 1) * 100);
    const memText = rep.games >= 2
      ? `已交手 ${rep.games} 次 · 上局：${rep.lastOutcome || '—'} · 历史合作率 ${Math.round((rep.coopRate || 0.5) * 100)}%`
      : '首次或低样本交手 · 对手尚未完全建档';
    const warn = (diff === 'hell' || diff === 'extreme')
      ? '<div style="font-size:10px;color:var(--red);margin-top:4px">⚠ 高难度下，对手可能伪装情绪，状态仅供参考。</div>'
      : (diff === 'hard' ? '<div style="font-size:10px;color:var(--dim);margin-top:4px">状态估计存在误差。</div>' : '');
    return `<div class="panel relationship-panel" style="padding:10px 12px">
      <div class="panel-title">对手状态监测</div>
      ${this.bar('信任', (mood.trust || 0), 'bar-green')}
      ${this.bar('愤怒', (mood.anger || 0), 'bar-red')}
      ${this.bar('耐心', (mood.patience || 0), 'bar-yellow')}
      ${this.bar('自信', (mood.confidence || 0), 'bar-purple')}
      <div style="font-size:10px;color:var(--dim);margin-top:6px">${memText}</div>
      ${warn}
    </div>`;
  },

  // 阶段进度条（用于危机/联盟等多阶段场景）
  stageProgress(current, total) {
    const dots = Array.from({ length: total }, (_, i) => {
      const cls = i < current ? 'tl-done' : i === current ? 'tl-current' : 'tl-pending';
      return `<div class="tl-dot ${cls}" title="第${i + 1}阶段"></div>`;
    }).join('');
    return `<div class="round-timeline"><div class="tl-label">阶段${current + 1}/${total} <button class="info-tip-btn" data-itip="rounds" title="阶段说明">ℹ</button></div><div class="tl-dots">${dots}</div></div>`;
  },

  // 对手情绪曲线（信任/愤怒随回合演化）—— 内联 SVG
  moodSparkline(series) {
    if (!series || !series.length) return '';
    const W = 280, H = 48, n = series.length;
    const x = (i) => (n > 1 ? (i / (n - 1)) * (W - 8) + 4 : W / 2);
    const y = (v) => (H - 4) - v * (H - 8);
    const line = (key, color) => {
      const pts = series.map((m, i) => `${x(i).toFixed(0)},${y(m[key] || 0).toFixed(0)}`).join(' ');
      const dots = series.map((m, i) => `<circle cx="${x(i).toFixed(0)}" cy="${y(m[key] || 0).toFixed(0)}" r="2" fill="${color}"/>`).join('');
      return `<polyline fill="none" stroke="${color}" stroke-width="2" points="${pts}"/>${dots}`;
    };
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="background:var(--bg);border:1px solid var(--border);border-radius:3px">
      ${line('trust', 'var(--cyan)')}${line('anger', 'var(--red)')}
    </svg>
    <div style="font-size:10px;color:var(--dim);margin-top:2px">— 信任(青) ／ — 愤怒(红)　对手情绪随回合演化</div>`;
  },
};

function pickContextualLine(opp, ctx = {}) {
  if (!opp) return '';
  const lib = OPP_LINES_V2[opp.id];
  if (!lib) return '';

  const mood = ctx.mood || {};
  const rep = ctx.reputation || {};
  const action = ctx.action || '';
  const outcome = ctx.outcome || '';

  let bucket = 'greet';
  if (outcome) {
    if (outcome === 'win') bucket = 'lose';
    else if (outcome === 'lose') bucket = 'win';
    else bucket = 'draw';
  } else if (rep.lastOutcome === 'win' && ctx.round === 0) {
    bucket = 'afterPlayerWin';
  } else if (rep.lastOutcome === 'lose' && ctx.round === 0) {
    bucket = 'afterPlayerLose';
  } else if (ctx.exposed && lib.exposed) {
    bucket = 'exposed';
  } else if (action === 'firm' || action === 'batna' || action === 'pressure') {
    bucket = 'underPressure';
  } else if (action === 'defect' || action === 'aggressive') {
    bucket = 'defect';
  } else if (action === 'coop' || action === 'cooperative') {
    bucket = (mood.trust || 0) >= 0.55 ? 'coopHighTrust' : 'coopLowTrust';
  }

  const arr = lib[bucket] || lib.greet || [];
  if (!arr.length) return '';
  return arr[Math.floor(Math.random() * arr.length)];
}

function getOpponentOpeningLine(opp) {
  if (!opp) return '';
  const rep = loadReputation(opp.id);
  const mood = Mood.get(opp.id);
  const memory = Memory.get(opp.id);
  return pickContextualLine(opp, { round: 0, mood, memory, reputation: rep });
}

function buildOpponentFinalComment(opp, outcome) {
  if (!opp) return '';
  const rep = loadReputation(opp.id);
  const mood = Mood.get(opp.id);
  const memory = Memory.get(opp.id);
  return pickContextualLine(opp, { outcome, mood, memory, reputation: rep });
}

const DIFF_ORDER_V2 = ['easy', 'medium', 'hard', 'extreme', 'hell'];

function canUseVariant(v, difficulty) {
  if (!v.unlockDifficulty) return true;
  return DIFF_ORDER_V2.indexOf(difficulty || 'medium') >= DIFF_ORDER_V2.indexOf(v.unlockDifficulty);
}

function pickScenarioVariantV2(scenarioKey, difficulty) {
  const pool = SCENARIO_VARIANTS_V2[scenarioKey] || [];
  const available = pool.filter((v) => canUseVariant(v, difficulty));
  if (!available.length) return null;

  const player = Store.get('player');
  const lastMap = player && player._lastVariants ? player._lastVariants : {};
  const lastId = lastMap[scenarioKey];

  const filtered = available.filter((v) => v.id !== lastId);
  const list = filtered.length ? filtered : available;
  const chosen = list[Math.floor(Math.random() * list.length)];

  if (player) {
    player._lastVariants = player._lastVariants || {};
    player._lastVariants[scenarioKey] = chosen.id;
    savePlayer(player);
    Store.set('player', player);
  }

  Store.set('activeVariant', chosen);
  if (EVENTS.EXPERIENCE_VARIANT_PICKED) {
    EventBus.emit(EVENTS.EXPERIENCE_VARIANT_PICKED, { scenarioKey, variant: chosen });
  }
  return chosen;
}

function previewVariantName(scenarioKey, difficulty) {
  const pool = SCENARIO_VARIANTS_V2[scenarioKey] || [];
  const available = pool.filter((v) => canUseVariant(v, difficulty));
  if (!available.length) return '';
  const v = available[Math.floor(Math.random() * available.length)];
  return v.name;
}

function renderVariantText(template, opp, params = {}) {
  if (!template) return '';
  return template
    .replace(/\$\{opp\}/g, opp ? opp.name : '对手')
    .replace(/\$\{start\}/g, String(params.start || 80))
    .replace(/\$\{trueVal\}/g, String(params.trueVal || 55))
    .replace(/\$\{total\}/g, String(params.total || 100));
}

function applyVariantMoodBias(oppId, variant) {
  if (!oppId || !variant || !variant.moodBias) return;
  const m = Mood.get(oppId);
  Object.entries(variant.moodBias).forEach(([key, delta]) => {
    if (typeof m[key] === 'number') m[key] = clamp(m[key] + delta, 0, 1);
  });
}

// 根据场景 + 变体 + 难度生成本局事件序列
function generateSituationEvents(scenarioKey, variant, difficulty) {
  const countMap = { easy: 0, medium: 1, hard: 1, extreme: 2, hell: 2 };
  const count = countMap[difficulty] || 0;
  if (!count) return [];

  const ids = new Set();
  if (variant && Array.isArray(variant.eventPool)) {
    variant.eventPool.forEach((id) => ids.add(id));
  }
  ['silencePressure', 'coffeeBreak', 'newEvidence', 'deadlineThreat', 'publicPressure'].forEach((id) => ids.add(id));

  const pool = [...ids].map((id) => SITUATION_CARDS[id]).filter(Boolean);
  const shuffled = pool.sort(() => Math.random() - 0.5);

  return shuffled.slice(0, count).map((card, idx) => ({
    ...card,
    triggerAt: 0.30 + idx * 0.25,
    triggered: false,
    resolved: false,
  }));
}

// 应用局势卡选项的状态变化
function applySituationChoice(scenario, choice) {
  const oppId = scenario.opp.id;
  const mood = Mood.get(oppId);

  if (choice.mood) {
    Object.entries(choice.mood).forEach(([key, delta]) => {
      if (typeof mood[key] === 'number') mood[key] = clamp(mood[key] + delta, 0, 1);
    });
  }
  if (choice.memory) {
    OpponentAI.observe(oppId, choice.memory);
  }

  scenario._experienceNotes = scenario._experienceNotes || [];
  scenario._experienceNotes.push({ type: 'situation', title: choice.text, tags: choice.tags || [] });
}

const PROB_BY_DIFF = { easy: 0.05, medium: 0.18, hard: 0.28, extreme: 0.38, hell: 0.48 };

function shouldTriggerCounterQuestion(scenario, lastTags = []) {
  if (scenario._questionTriggered || scenario._pendingQuestion) return null;

  const difficulty = Store.get('difficulty') || 'medium';
  const probBase = PROB_BY_DIFF[difficulty] || 0.18;
  const bossBonus = scenario.opp && scenario.opp.boss ? 0.18 : 0;
  const p = probBase + bossBonus;

  if (Math.random() > p) return null;

  const candidates = Object.values(COUNTER_QUESTIONS).filter((q) =>
    q.triggerTags.some((t) => lastTags.includes(t)));
  if (!candidates.length) return null;

  const q = candidates[Math.floor(Math.random() * candidates.length)];
  scenario._pendingQuestion = q;
  scenario._questionTriggered = true;
  if (EVENTS.OPPONENT_QUESTION_TRIGGERED) {
    EventBus.emit(EVENTS.OPPONENT_QUESTION_TRIGGERED, { scenarioKey: scenario.scenarioKey, question: q });
  }
  return q;
}

// 工具：根据玩家动作粗略推断行为标签
function inferTagsFromAction(type, value) {
  const tags = [];
  if (value === 'defect') tags.push('强硬', '高风险');
  if (value === 'coop') tags.push('合作', '关系维护');
  if (type === 'invest' && Number(value) >= 7) tags.push('合作', '高风险');
  if (type === 'invest' && Number(value) <= 2) tags.push('强硬', '反压');
  if (type === 'offer' && Number(value) < 50) tags.push('强硬', '锚定效应');
  if (type === 'propose' && Number(value) >= 65) tags.push('强硬', '锚定效应');
  if (type === 'resist-cram') tags.push('BATNA', '底线控制', '反压');
  if (type === 'accept-cram') tags.push('合作', '关系维护');
  return tags;
}

function pickHiddenObjective(scenarioKey, variant) {
  const poolIds = variant && variant.hiddenObjectivePool
    ? variant.hiddenObjectivePool : ['restoreTrust', 'avoidMutualDefect'];
  const pool = poolIds.map((id) => HIDDEN_OBJECTIVES[id]).filter(Boolean);
  if (!pool.length) return null;
  const obj = pool[Math.floor(Math.random() * pool.length)];
  Store.set('hiddenObjective', obj);
  if (EVENTS.HIDDEN_OBJECTIVE_PICKED) {
    EventBus.emit(EVENTS.HIDDEN_OBJECTIVE_PICKED, { scenarioKey, objective: obj });
  }
  return obj;
}

function resolveHiddenObjective(scenario, result) {
  const obj = scenario && scenario.hiddenObjective;
  if (!obj || typeof obj.check !== 'function') return null;

  let passed = false;
  try {
    passed = !!obj.check({
      scenario,
      rounds: result.rounds || scenario.log || [],
      result,
      opp: scenario.opp,
    });
  } catch (e) { passed = false; }

  if (EVENTS.HIDDEN_OBJECTIVE_RESOLVED) {
    EventBus.emit(EVENTS.HIDDEN_OBJECTIVE_RESOLVED, { objective: obj, passed });
  }

  return { id: obj.id, title: obj.title, desc: obj.desc, passed, rewardHint: obj.rewardHint };
}

  if (!obj) return '';
  const diff = Store.get('difficulty');

// analytics/opponent-insight-v2.js — 结果页"对手真实想法"
// 基于 Mood / Memory / Reputation / 本局 rounds 推理对手的认知。


function buildOpponentInnerThought(opp, result) {
  if (!opp) return '';

  const mood = Mood.get(opp.id);
  const mem = Memory.get(opp.id);
  const rep = loadReputation(opp.id);
  const rounds = (result && result.rounds) || [];
  const outcome = result && result.outcome;

  const thoughts = [];

  if ((mood.trust || 0) < 0.35) {
    thoughts.push('你让我很难建立信任，所以我更倾向于防御或压迫。');
  } else if ((mood.trust || 0) > 0.65) {
    thoughts.push('你确实让我放松了警惕，我对你的合作意愿做了正向修正。');
  }

  if ((mood.anger || 0) > 0.6) {
    thoughts.push('你的某些动作激起了我的抵触，我不太愿意顺着你的节奏走。');
  }

  if ((mem.firmCount || 0) >= 2) {
    thoughts.push('你几次明确守住底线后，我开始重新评估你的承压能力。');
  }

  if ((mem.exposureScore || 0) >= 2) {
    thoughts.push('你识破了我的部分话术，我对你的判断变得保守。');
  }

  if ((rep.games || 0) >= 2) {
    if (rep.lastOutcome === 'win') {
      thoughts.push('你上次赢过我，所以我这局开局更警惕。');
    } else if (rep.lastOutcome === 'lose') {
      thoughts.push('你上次输过，我会试探你是否还会重复同样的弱点。');
    }
  }

  const hasFastConcession = rounds.some((r) => r.concession && r.concession >= 12);
  if (hasFastConcession) {
    thoughts.push('你有一次让步太快，我判断你的底线可能还可以继续压。');
  }

  if (outcome === 'win') {
    thoughts.push('这局你打穿了我的部分预期，我需要在下次调整策略。');
  } else if (outcome === 'lose') {
    thoughts.push('这局我抓住了你的行为模式，并持续放大你的弱点。');
  } else if (outcome === 'coop') {
    thoughts.push('我们走到了双方都能接受的方案，但这不代表下次还能这样。');
  } else {
    thoughts.push('我们都没有完全暴露底牌，结果保持在可控区间。');
  }

  return thoughts.slice(0, 4).join('<br>');
}

// ─── 碎片经济 ──────────────────────────────────────────────────────────────────
function getShards(player) {
  return (player && player.cardShards) || 0;
}

function addShards(player, amount, reason) {
  if (!player || !amount) return 0;
  player.cardShards = (player.cardShards || 0) + amount;
  if (reason) {
    player._lastShardGain = { amount, reason, at: Date.now() };
  }
  savePlayer(player);
  return player.cardShards;
}

// 按对局结果计算应得碎片
function computeShardsForGame(result, opp, isDailyFirst) {
  let total = 20;
  if (result.outcome === 'win' || result.outcome === 'coop') total += 30;
  if (result.outcome === 'win' && opp && opp.boss) total += 50;
  if (result.outcome === 'win' && result.difficulty === 'hell') total += 50;
  if (result.hiddenObjective && result.hiddenObjective.passed) total += 40;
  if (isDailyFirst) total += 50;
  return total;
}

// ─── 配方查询 ──────────────────────────────────────────────────────────────────
function getRecipeStatus(player, recipe) {
  const owned = (player && player.cardCollection) || [];
  const shards = getShards(player);
  const missingCards = recipe.requires.filter((id) => !owned.includes(id));
  const enoughShards = shards >= recipe.shards;
  const alreadyOwned = owned.includes(recipe.id);
  return {
    alreadyOwned,
    canCraft: !alreadyOwned && missingCards.length === 0 && enoughShards,
    missingCards,
    enoughShards,
    shards,
  };
}

// ─── 执行合成 ──────────────────────────────────────────────────────────────────
function craftFusionCard(player, recipeId) {
  if (!player) return { ok: false, reason: 'no-player' };
  const recipe = FUSION_CARDS.find((c) => c.id === recipeId);
  if (!recipe) return { ok: false, reason: 'no-recipe' };
  const status = getRecipeStatus(player, recipe);
  if (status.alreadyOwned) return { ok: false, reason: 'already-owned' };
  if (status.missingCards.length) return { ok: false, reason: 'missing-cards', missing: status.missingCards };
  if (!status.enoughShards) return { ok: false, reason: 'not-enough-shards', need: recipe.shards, have: status.shards };

  player.cardShards = (player.cardShards || 0) - recipe.shards;
  player.cardCollection = player.cardCollection || [];
  player.cardCollection.push(recipe.id);
  savePlayer(player);
  Store.set('player', player);

  return { ok: true, card: recipe, shardsLeft: player.cardShards };
}

// ui/router.js — 屏幕路由
// 维护 screenId -> 渲染函数 的注册表；监听 nav:goto 事件切换屏幕。
// router 只负责"把哪个屏幕画到 #app"，不含任何业务逻辑。


const _screens = new Map(); // screenId -> render(params) => htmlString

const Router = {
  // 注册一个屏幕的渲染函数
  register(screenId, renderFn) {
    _screens.set(screenId, renderFn);
  },

  // 初始化：绑定 nav:goto 监听，渲染首屏
  init(rootEl, initialScreen, initialParams = {}) {
    EventBus.on(EVENTS.NAV_GOTO, ({ screen, params }) => {
      this._render(rootEl, screen, params || {});
    });
    this._render(rootEl, initialScreen, initialParams);
  },

  _render(rootEl, screenId, params) {
    const renderFn = _screens.get(screenId);
    if (!renderFn) {
      rootEl.innerHTML = `<div class="hint hint-red">未注册的屏幕：${screenId}</div>`;
      console.error(`[Router] no screen registered for "${screenId}"`);
      return;
    }

    // 清理上一屏的引导 UI（在写入新 HTML 之前）
    if (typeof hideGuide === 'function') hideGuide();

    rootEl.innerHTML = renderFn(params);
    Store.set('currentScreen', screenId);

    // 地狱模式 body class：仅在对局/结果屏且难度为 hell 时附加
    const hellOn = Store.get('difficulty') === 'hell' && (screenId === 'game' || screenId === 'result');
    if (document.body && document.body.classList) {
      document.body.classList.toggle('hell-mode', hellOn);
    }

    // 渲染后回调（用于绑定事件、聚焦输入等）
    if (typeof renderFn.afterRender === 'function') {
      renderFn.afterRender(params);
    }
    window.scrollTo(0, 0);

    // 启动屏幕引导（首次访问自动展示；之后显示 ? 按钮）
    if (typeof showTour === 'function') showTour(screenId);
  },
};

// scenarios/base-scenario.js — 场景抽象基类
// 子类实现 start() 与 handleAction(action)，通过 emitRender/finish 与外界通信。
// v2 增强：initExperience 接入场景变体 / 局势卡 / 反问 / 隐藏目标 / 开场白。



const CRAM_MAP = { easy: 0, medium: 0, hard: 1, extreme: 2, hell: 3 };

class BaseScenario {
  constructor(opp) {
    this.opp = opp;
    this.log = [];
    this.peeksLeft = 2;
    this._peekSnap = null;
    // 蚕食机制（动态锚定 / 中途加码）
    this._cramAttempts = 0;
    this._maxCramAttempts = CRAM_MAP[Store.get('difficulty')] || 0;
    this._cramCooldown = 0;
    this._pendingCram = null;
    // v2 体验增强
    this.scenarioKey = null;
    this.variant = null;
    this.variantParams = {};
    this.hiddenObjective = null;
    this._situationEvents = [];
    this._pendingSituation = null;
    this._pendingQuestion = null;
    this._questionTriggered = false;
    this._experienceNotes = [];
    this._openingLine = '';
  }

  // 子类在 start() 中调用：抽取场景变体、生成事件序列、隐藏目标、开场白
  initExperience(scenarioKey, params = {}) {
    this.scenarioKey = scenarioKey;
    this.variant = pickScenarioVariantV2(scenarioKey, Store.get('difficulty'));
    this.variantParams = params;
    if (this.variant) applyVariantMoodBias(this.opp.id, this.variant);
    this.hiddenObjective = pickHiddenObjective(scenarioKey, this.variant);
    this._situationEvents = generateSituationEvents(scenarioKey, this.variant, Store.get('difficulty'));
    this._openingLine = getOpponentOpeningLine(this.opp);
  }

  // 渲染变体上下文（替换占位符）
  variantContext() {
    if (!this.variant) return '';
    return renderVariantText(this.variant.context, this.opp, this.variantParams);
  }
  variantHint() { return this.variant ? this.variant.hint : ''; }

  // 顶部开场白 + 场景情境块
  experienceBanner() {
    let html = '';
    if (this._openingLine) {
      html += C.dialogBubble(this._openingLine, 'ai', `${this.opp.name} 开场`);
    }
    if (this.variant) {
      html += C.hint(`<b>${this.variant.name}：</b>${this.variantContext()}　<span style="color:var(--dim);font-size:11px">${this.variantHint()}</span>`, 'cyan');
    }
    if (this.hiddenObjective) {
      html += renderHiddenObjectiveHint(this.hiddenObjective);
    }
    return html;
  }

  // ─── 蚕食 ────────────────────────────────────────────────────────
  tryCram(opts = {}) {
    if (this._pendingCram) return this._pendingCram;
    if (this._cramAttempts >= this._maxCramAttempts) return null;
    if (this._cramCooldown > 0) { this._cramCooldown -= 1; return null; }
    const opp = this.opp;
    const canCram = opp.boss || opp.id === 'aggressive' || opp.id === 'manipulative';
    if (!canCram) return null;
    const round = opts.round != null ? opts.round : 0;
    const totalRounds = opts.totalRounds || 5;
    const midGame = round >= 1 && round <= totalRounds - 2;
    if (!midGame) return null;
    const triggerChance = Math.min(0.6, (this._cramAttempts + 1) / (this._maxCramAttempts + 2));
    if (!chance(triggerChance)) return null;
    this._cramAttempts += 1;
    this._cramCooldown = 2;
    this._pendingCram = { text: opts.text || '', kind: opts.kind || 'generic' };
    return this._pendingCram;
  }

  cramControls() {
    if (!this._pendingCram) return '';
    const cram = this._pendingCram;
    return C.hint(`<b>⚠ ${this.opp.name} 中途加码：</b>${cram.text}`, 'red') +
      `<div class="grid2" style="margin:8px 0">` +
        C.actionBtn('resist-cram', '', '<b>🛡 拒绝额外条件</b>（坚守原框架）', 'btn-red') +
        C.actionBtn('accept-cram', '', '<b>🤝 接受新条件</b>（推进谈判）', 'btn-green') +
      `</div>`;
  }

  consumeCram() {
    const c = this._pendingCram;
    this._pendingCram = null;
    return c;
  }

  // ─── 局势卡 ──────────────────────────────────────────────────────
  checkSituationEvent() {
    if (this._pendingSituation) return this._pendingSituation;
    if (!this._situationEvents || !this._situationEvents.length) return null;
    const total = this.rounds || (this.stages ? this.stages.length : 5);
    const now = this.round != null ? this.round : (this.stage || 0);
    const progress = total > 0 ? now / total : 0;
    const next = this._situationEvents.find((e) => !e.triggered && progress >= e.triggerAt);
    if (!next) return null;
    next.triggered = true;
    this._pendingSituation = next;
    if (EVENTS.EXPERIENCE_EVENT_TRIGGERED) {
      EventBus.emit(EVENTS.EXPERIENCE_EVENT_TRIGGERED, { scenarioKey: this.scenarioKey, event: next });
    }
    return next;
  }

  renderSituationEvent() {
    const ev = this._pendingSituation;
    if (!ev) return '';
    return C.panel(`局势卡｜${ev.title}`,
      C.hint(ev.text, 'yellow') +
      ev.choices.map((ch, idx) =>
        C.actionBtn('situation', String(idx),
          `<b>${ch.text}</b><br><span style="color:var(--dim);font-size:10px">${ch.desc || ''}</span>`)
      ).join('')
    );
  }

  handleSituationChoice(value) {
    const ev = this._pendingSituation;
    if (!ev) return false;
    const choice = ev.choices[parseInt(value, 10)];
    if (!choice) return false;
    applySituationChoice(this, choice);
    ev.resolved = true;
    this._pendingSituation = null;
    this.log.push({
      round: (this.round || this.stage || 0) + 1,
      systemEvent: true,
      eventTitle: ev.title,
      choiceText: choice.text,
      tags: choice.tags || [],
    });
    if (EVENTS.EXPERIENCE_EVENT_RESOLVED) {
      EventBus.emit(EVENTS.EXPERIENCE_EVENT_RESOLVED, { scenarioKey: this.scenarioKey, event: ev, choice });
    }
    this._render();
    return true;
  }

  // ─── 对手反问 ────────────────────────────────────────────────────
  renderCounterQuestion() {
    const q = this._pendingQuestion;
    if (!q) return '';
    return C.panel(`${this.opp.name} 的反问`,
      C.dialogBubble(q.text, 'ai', `${this.opp.name} 追问`) +
      q.choices.map((ch, idx) =>
        C.actionBtn('counter-question', String(idx),
          `<b>${ch.text}</b><br><span style="color:var(--dim);font-size:10px">${ch.desc || ''}</span>`)
      ).join('')
    );
  }

  handleCounterQuestion(value) {
    const q = this._pendingQuestion;
    if (!q) return false;
    const choice = q.choices[parseInt(value, 10)];
    if (!choice) return false;
    applySituationChoice(this, choice);
    this._pendingQuestion = null;
    this.log.push({
      round: (this.round || this.stage || 0) + 1,
      counterQuestion: true,
      questionText: q.text,
      answerText: choice.text,
      tags: choice.tags || [],
    });
    if (EVENTS.OPPONENT_QUESTION_RESOLVED) {
      EventBus.emit(EVENTS.OPPONENT_QUESTION_RESOLVED, { scenarioKey: this.scenarioKey, question: q, choice });
    }
    this._render();
    return true;
  }

  // 子类玩家正常动作后调用：可能触发对手反问
  maybeAskCounterQuestion(type, value) {
    const tags = inferTagsFromAction(type, value);
    const q = shouldTriggerCounterQuestion(this, tags);
    if (q) { this._render(); return true; }
    return false;
  }

  // ─── 通用动作拦截 ────────────────────────────────────────────────
  // 子类 handleAction 在解析自身动作前调用，处理通用 v2 交互
  interceptCommonAction(type, value) {
    if (type === 'peek') { this.handlePeek(); return true; }
    if (type === 'situation') {
      if (this.handleSituationChoice(value)) return true;
    }
    if (type === 'counter-question') {
      if (this.handleCounterQuestion(value)) return true;
    }
    return false;
  }

  // ─── 渲染：通用顶部块 ────────────────────────────────────────────
  emitRender(html) {
    EventBus.emit(EVENTS.GAME_RENDER, { html });
  }

  // ─── 结束 ────────────────────────────────────────────────────────
  finish(result) {
    result.variant = this.variant || null;
    result.experienceNotes = this._experienceNotes || [];
    result.hiddenObjective = resolveHiddenObjective(this, result);
    EventBus.emit(EVENTS.GAME_END, { result });
  }

  // ─── peek ────────────────────────────────────────────────────────
  peekControls() {
    const label = this.peeksLeft > 0 ? `🔍 识破对手（剩 ${this.peeksLeft} 次）` : '🔍 识破次数已用完';
    let html = C.actionBtn('peek', '', label, 'btn-purple');
    if (this._peekSnap) {
      const m = this._peekSnap.mood;
      const pct = (x) => Math.round(x * 100);
      const tells = (PERSONALITY_TELLS[this.opp.id] || []).join(' / ');
      const deceptive = this._peekSnap.deceptive
        ? `<div style="color:var(--red);font-size:10px;margin-top:4px">⚠ 高难度对手可能伪装情绪，数据仅供参考</div>` : '';
      html += C.hint(
        `<b>读心快照：</b>信任 ${pct(m.trust)}% · 愤怒 ${pct(m.anger)}% · 耐心 ${pct(m.patience)}% · 自信 ${pct(m.confidence)}%<br><span style="color:var(--dim)">行为信号：${tells}</span>${deceptive}`,
        'purple');
    }
    return html;
  }

  handlePeek() {
    if (this.peeksLeft > 0 && !this._peekSnap) {
      this.peeksLeft -= 1;
      const deceptive = Mood.isDeceptionActive();
      const realSnap = OpponentAI.snapshot(this.opp.id);
      const mood = deceptive
        ? Mood.getDeceptiveSnapshot(this.opp.id, this.opp)
        : { ...realSnap.mood };
      this._peekSnap = {
        mood,
        realMood: { ...realSnap.mood },
        deceptive,
      };
    }
    this._render();
  }

  start() { throw new Error('start() not implemented'); }
  handleAction(_action) { throw new Error('handleAction() not implemented'); }
}


/* ===== scenarios/prisoners.js ===== */
// scenarios/prisoners.js — 囚徒困境
// Phase 3：AI 决策改由 engine 驱动（TfT/报复/觉醒等由记忆+情绪决定）。


class PrisonersDilemma extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 5;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
  }

  _scores(p, o) {
    if (p === 'coop' && o === 'coop') return [3, 3];
    if (p === 'coop' && o === 'defect') return [0, 5];
    if (p === 'defect' && o === 'coop') return [5, 0];
    return [1, 1];
  }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('prisoners'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) {
        return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      }
      if (l.counterQuestion) {
        return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) +
               C.dialogBubble(l.answerText, 'player', '你的回应');
      }
      const pText = l.player === 'coop' ? '选择合作' : '选择背叛';
      const oText = `${l.line ? `<b>${l.line}</b><br>` : ''}${l.opp === 'coop' ? '合作' : '背叛'} (+${l.pScore} vs +${l.oScore})<br><span style="color:var(--dim);font-size:10px">${l.reason || ''}</span>`;
      return C.dialogBubble(pText, 'player', `第${l.round}轮`) + C.dialogBubble(oText, 'ai', `${opp.name} ${C.moodEmoji(l.mood)}`);
    }).join('');

    this.emitRender(`
      ${C.gameHeader(`囚徒困境 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的分数')}
        ${C.scoreBox(this.oppScore, `${opp.name} 分数`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}
      ${blockNormal ? '' : C.panel('选择你的策略',
        C.actionBtn('choice', 'coop', '<b>[C] 合作</b> — 保持沉默，减少双方损失（理性结果 +3）') +
        C.actionBtn('choice', 'defect', '<b>[D] 背叛</b> — 出卖对方，追求个人最大利益（最大 +5）') +
        this.peekControls())}
      ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}
    `);
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type !== 'choice') return;
    this._peekSnap = null;
    const prev = this.log.length ? this.log[this.log.length - 1].player : null;
    // 对手基于"此前回合"的记忆/情绪做决策（同时出招，看不到本轮）
    const { move: oppChoice, reason, mood } = OpponentAI.decide(this.opp.id, {
      kind: 'pd', round: this.round, playerLastMove: prev,
    });
    const [ps, os] = this._scores(value, oppChoice);
    this.playerScore += ps;
    this.oppScore += os;
    // 情境化台词
    const line = pickContextualLine(this.opp, {
      action: oppChoice, mood, memory: Memory.get(this.opp.id),
      reputation: loadReputation(this.opp.id), round: this.round,
      exposed: Memory.get(this.opp.id).exposureScore >= 2,
    });
    this.log.push({ round: this.round + 1, player: value, opp: oppChoice, pScore: ps, oScore: os, reason, mood, line });
    // 观察玩家本轮行为，更新记忆与情绪
    OpponentAI.observe(this.opp.id, { coop: value === 'coop' });
    this.round += 1;
    // 可能触发对手反问（中后期更易触发）
    if (this.round < this.rounds && this.round >= 1) {
      if (this.maybeAskCounterQuestion('choice', value)) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const coop = this.log.filter((l) => l.player === 'coop').length;
    const lastReason = this.log.length ? this.log[this.log.length - 1].reason : '';
    // 公平：双方合作率相近（我方合作 ≥3 且双方互信收益最优）
    const fairDeal = coop >= 3 && outcome !== 'lose';
    this.finish({
      kind: 'prisoners', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('总轮数', `${this.rounds} 轮`) +
        C.infoRow('您的合作率', `${Math.round(coop / this.rounds * 100)}%`) +
        C.infoRow('对手', `${this.opp.name} (${this.opp.type})`) +
        C.infoRow('对手末轮心态', lastReason || '—') +
        C.infoRow('分析', coop >= 4 ? '高度合作策略，建立了信任' : coop >= 2 ? '混合策略，较为灵活' : '激进背叛策略，短期收益可能较高但破坏信任'),
    });
  }
}


/* ===== scenarios/ultimatum.js ===== */
// scenarios/ultimatum.js — 最后通牒博弈（从 v2.0 平移）
// 玩家与对手轮流当提议者；接受者拒绝则双方得 0。


const TOTAL = 100;

class UltimatumGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 3;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.pendingOffer = null; // 对手当提议者时的报价（其保留额）
  }

  _isProposer() { return this.round % 2 === 0; }

  start() { OpponentAI.reset(this.opp.id); this.initExperience('ultimatum'); this._render(); }

  _render() {
    const opp = this.opp;
    this.checkSituationEvent();
    const situationHtml = this.renderSituationEvent();
    const questionHtml = this.renderCounterQuestion();
    const blockNormal = !!(this._pendingSituation || this._pendingQuestion);
    const logHtml = this.log.map((l) => {
      if (l.systemEvent) return C.dialogBubble(`【局势卡】${l.eventTitle} → ${l.choiceText}`, 'system', `第${l.round}轮`);
      if (l.counterQuestion) return C.dialogBubble(l.questionText, 'ai', `${opp.name} 追问`) + C.dialogBubble(l.answerText, 'player', '你的回应');
      const res = l.accepted ? `<span style="color:var(--green)">✓ 接受</span>` : `<span style="color:var(--red)">✗ 拒绝</span>`;
      return C.dialogBubble(`提案 我方 ${l.myOffer} / 对方 ${l.theirOffer} → ${res}`, 'system', `第${l.round}轮`);
    }).join('');

    const head = `${C.gameHeader(`最后通牒博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.roundTimeline(this.log, this.rounds, this.round)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的总分')}
        ${C.scoreBox(this.oppScore, `${opp.name} 总分`)}
      </div>
      ${this.experienceBanner()}
      ${C.relationshipPanel(opp)}
      ${situationHtml}
      ${questionHtml}`;

    if (blockNormal) {
      this.emitRender(`${head}${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
      return;
    }
    if (this._isProposer()) {
      this.emitRender(`${head}
        ${C.panel('提出你的分配方案（给自己保留多少？）',
          C.actionBtn('propose', '70', '<b>[激进]</b> 保留 70元，给对方 30元') +
          C.actionBtn('propose', '60', '<b>[偏强]</b> 保留 60元，给对方 40元') +
          C.actionBtn('propose', '50', '<b>[公平]</b> 保留 50元，给对方 50元') +
          C.actionBtn('propose', '40', '<b>[让步]</b> 保留 40元，给对方 60元'))}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
    } else if (this.pendingOffer == null) {
      this.emitRender(`${head}
        ${C.hint(`${opp.name} 正在思考提案...`, 'yellow')}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
      setTimeout(() => {
        const { move } = OpponentAI.decide(this.opp.id, { kind: 'ultimatum-propose', round: this.round });
        this.pendingOffer = move;
        this._render();
      }, 1000);
    } else {
      const keep = this.pendingOffer;
      const give = TOTAL - keep;
      this.emitRender(`${head}
        ${C.hint(`${opp.name} 提议：<b style="color:var(--cyan)">给您 ${give} 元，自己保留 ${keep} 元</b>。`)}
        ${C.panel('您的决定',
          C.actionBtn('respond', 'accept', '<b>[接受]</b> 接受方案，各得所得') +
          C.actionBtn('respond', 'reject', '<b>[拒绝]</b> 拒绝方案，双方得 0'))}
        ${logHtml ? `<div class="bubble-log">${logHtml}</div>` : ''}`);
    }
  }

  handleAction({ type, value }) {
    if (this.interceptCommonAction(type, value)) return;
    if (type === 'propose') {
      const keep = parseInt(value, 10);
      // 观察玩家提案的强硬度（自留越多越强硬/越像在剥削）
      OpponentAI.observe(this.opp.id, { aggression: clamp((keep - 50) / 50, 0, 1), firm: keep >= 65, coop: keep <= 50, exposes: keep >= 70 });
      const { move: accepted } = OpponentAI.decide(this.opp.id, { kind: 'ultimatum-respond', playerKeep: keep });
      this._settle(keep, accepted, true);
    } else if (type === 'respond') {
      const keep = this.pendingOffer;
      this._settle(keep, value === 'accept', false);
      this.pendingOffer = null;
    }
  }

  _settle(myKeep, accepted, isMyProposal) {
    const theirShare = TOTAL - myKeep;
    let myGain, oppGain;
    if (isMyProposal) {
      myGain = accepted ? myKeep : 0;
      oppGain = accepted ? theirShare : 0;
    } else {
      myGain = accepted ? theirShare : 0;
      oppGain = accepted ? myKeep : 0;
    }
    this.playerScore += myGain;
    this.oppScore += oppGain;
    this.log.push({
      round: this.round + 1,
      myOffer: isMyProposal ? myKeep : theirShare,
      theirOffer: isMyProposal ? theirShare : myKeep,
      accepted,
    });
    this.round += 1;
    // 可能触发反问
    if (this.round < this.rounds && this.round >= 1) {
      const tags = isMyProposal
        ? (myKeep >= 65 ? ['强硬', '锚定效应'] : myKeep <= 45 ? ['合作', '关系维护'] : [])
        : (accepted ? ['合作', '关系维护'] : ['强硬', '反压']);
      if (this.maybeAskCounterQuestion('propose', tags[0])) return;
    }
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const acc = Math.round(this.log.filter((l) => l.accepted).length / this.log.length * 100);
    // 公平成交：有分配回合中我方提案在 40-62 区间且被接受
    const fairDeal = this.log.some((r) => r.accepted && r.myOffer >= 40 && r.myOffer <= 62);
    this.finish({
      kind: 'ultimatum', rounds: this.log,
      playerScore: this.playerScore, oppScore: this.oppScore, outcome, fairDeal,
      summary:
        C.infoRow('接受率', `${acc}%`) +
        C.infoRow('最优策略', '作为提议者锚定 55-60，接受者接受 >30% 的方案'),
    });
  }
}
