<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全谱系博弈实战演练系统 v3</title>
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --border: #2a3a5a;
  --cyan: #00d4ff;
  --green: #00ff9f;
  --yellow: #ffd700;
  --red: #ff4f6a;
  --purple: #c084fc;
  --dim: #4a6080;
  --text: #c8d8f0;
  --white: #e8f0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;font-size:14px}
.container{max-width:900px;margin:0 auto;padding:16px}
.screen{display:none}
.screen.active{display:block}

/* Header */
.header{text-align:center;padding:20px 0 12px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:22px;color:var(--cyan);letter-spacing:3px;text-shadow:0 0 20px var(--cyan)}
.header .sub{color:var(--dim);font-size:11px;margin-top:4px;letter-spacing:2px}

/* Panels */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:12px}
.panel-title{color:var(--cyan);font-size:12px;letter-spacing:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px}

/* Buttons */
.btn{background:transparent;border:1px solid var(--cyan);color:var(--cyan);padding:8px 20px;cursor:pointer;font-family:inherit;font-size:13px;border-radius:2px;transition:all .2s;letter-spacing:1px}
.btn:hover{background:rgba(0,212,255,.1);box-shadow:0 0 10px rgba(0,212,255,.3)}
.btn-green{border-color:var(--green);color:var(--green)}
.btn-green:hover{background:rgba(0,255,159,.1);box-shadow:0 0 10px rgba(0,255,159,.3)}
.btn-yellow{border-color:var(--yellow);color:var(--yellow)}
.btn-yellow:hover{background:rgba(255,215,0,.1)}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:rgba(255,79,106,.1)}
.btn-purple{border-color:var(--purple);color:var(--purple)}
.btn-purple:hover{background:rgba(192,132,252,.1)}
.btn-full{width:100%;display:block;text-align:left;margin-bottom:6px;padding:10px 14px}
.btn-sm{padding:5px 12px;font-size:12px}

/* Menu */
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:2px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.menu-item:hover{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.menu-num{color:var(--cyan);font-size:16px;width:28px;text-align:center;font-weight:bold}
.menu-text{flex:1}
.menu-text b{color:var(--white);display:block;font-size:14px}
.menu-text span{color:var(--dim);font-size:11px}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:12px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--cyan);transform:translateY(-1px)}
.card h3{color:var(--cyan);font-size:13px;margin-bottom:6px}
.card .diff{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:6px}
.diff-easy{background:rgba(0,255,159,.15);color:var(--green);border:1px solid rgba(0,255,159,.3)}
.diff-med{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid rgba(255,215,0,.3)}
.diff-hard{background:rgba(255,79,106,.15);color:var(--red);border:1px solid rgba(255,79,106,.3)}
.card p{color:var(--dim);font-size:11px;line-height:1.5}

/* Opponent card */
.opp-card{border:1px solid var(--border);border-radius:3px;padding:10px;cursor:pointer;transition:all .2s;background:var(--bg3)}
.opp-card:hover{border-color:var(--cyan)}
.opp-card.selected{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.opp-name{color:var(--white);font-size:13px;font-weight:bold}
.opp-type{color:var(--purple);font-size:11px;margin:2px 0}
.opp-desc{color:var(--dim);font-size:11px}

/* Progress bar */
.bar-wrap{margin:6px 0}
.bar-label{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
.bar-label span:first-child{color:var(--text)}
.bar-label span:last-child{color:var(--cyan)}
.bar-bg{background:var(--border);border-radius:2px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .8s ease}
.bar-cyan{background:linear-gradient(90deg,#0066aa,var(--cyan))}
.bar-green{background:linear-gradient(90deg,#006644,var(--green))}
.bar-yellow{background:linear-gradient(90deg,#886600,var(--yellow))}
.bar-red{background:linear-gradient(90deg,#880022,var(--red))}
.bar-purple{background:linear-gradient(90deg,#440088,var(--purple))}

/* Score display */
.score-box{text-align:center;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:3px}
.score-num{font-size:32px;font-weight:bold;color:var(--cyan)}
.score-lbl{color:var(--dim);font-size:11px;margin-top:2px}

/* Outcome badge */
.outcome{display:inline-block;padding:4px 14px;border-radius:2px;font-size:12px;font-weight:bold;letter-spacing:1px}
.outcome-win{background:rgba(0,255,159,.15);color:var(--green);border:1px solid var(--green)}
.outcome-lose{background:rgba(255,79,106,.15);color:var(--red);border:1px solid var(--red)}
.outcome-draw{background:rgba(255,215,0,.15);color:var(--yellow);border:1px solid var(--yellow)}
.outcome-coop{background:rgba(0,212,255,.15);color:var(--cyan);border:1px solid var(--cyan)}

/* Choice buttons for scenarios */
.choice-btn{width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:3px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .2s;line-height:1.5}
.choice-btn:hover{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.choice-btn b{color:var(--cyan)}

/* Info rows */
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(42,58,90,.5);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--dim)}
.info-val{color:var(--white)}

/* Tags */
.tag{display:inline-block;padding:2px 8px;border-radius:2px;font-size:10px;margin:2px;border:1px solid}
.tag-cyan{border-color:var(--cyan);color:var(--cyan)}
.tag-green{border-color:var(--green);color:var(--green)}
.tag-yellow{border-color:var(--yellow);color:var(--yellow)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;cursor:pointer;color:var(--dim);font-size:12px;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab:hover{color:var(--text)}

/* Input */
.input-wrap{margin:12px 0}
.input-wrap label{display:block;color:var(--dim);font-size:11px;margin-bottom:4px;letter-spacing:1px}
.inp{background:var(--bg3);border:1px solid var(--border);color:var(--white);padding:8px 12px;font-family:inherit;font-size:14px;width:100%;border-radius:2px}
.inp:focus{outline:none;border-color:var(--cyan)}

/* Alert/hint */
.hint{padding:10px 14px;border-radius:2px;margin:8px 0;font-size:12px;line-height:1.6}
.hint-cyan{background:rgba(0,212,255,.08);border-left:3px solid var(--cyan);color:var(--text)}
.hint-green{background:rgba(0,255,159,.08);border-left:3px solid var(--green);color:var(--text)}
.hint-yellow{background:rgba(255,215,0,.08);border-left:3px solid var(--yellow);color:var(--text)}
.hint-red{background:rgba(255,79,106,.08);border-left:3px solid var(--red);color:var(--text)}
.hint-purple{background:rgba(192,132,252,.08);border-left:3px solid var(--purple);color:var(--text)}

/* Round log */
.log{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;padding:8px;background:var(--bg)}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid rgba(42,58,90,.3);color:var(--dim)}
.log-entry:last-child{border-bottom:none}
.log-entry .lbl{color:var(--text)}

/* Master theory */
.master-card{padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;margin-bottom:10px}
.master-name{color:var(--yellow);font-size:14px;font-weight:bold;margin-bottom:4px}
.master-title{color:var(--dim);font-size:11px;margin-bottom:10px}
.tactic{padding:8px 10px;background:var(--bg2);border-left:3px solid var(--cyan);margin-bottom:6px;border-radius:0 2px 2px 0}
.tactic-name{color:var(--cyan);font-size:12px;font-weight:bold}
.tactic-desc{color:var(--dim);font-size:11px;margin-top:2px;line-height:1.5}

/* Responsive */
@media(max-width:600px){
  .grid2,.grid3{grid-template-columns:1fr}
  .header h1{font-size:16px}
}

/* Welcome screen */
.welcome-logo{text-align:center;padding:40px 0 20px}
.logo-art{color:var(--cyan);font-size:13px;line-height:1.4;text-shadow:0 0 15px rgba(0,212,255,.5)}
.stat-mini{display:inline-block;padding:6px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;font-size:12px;margin:4px}
.stat-mini span{color:var(--cyan);font-weight:bold}
.back-btn{color:var(--dim);cursor:pointer;font-size:12px;padding:4px 8px;border:1px solid var(--border);background:transparent;font-family:inherit;border-radius:2px}
.back-btn:hover{color:var(--text);border-color:var(--text)}
.flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-title{color:var(--cyan);font-size:13px;letter-spacing:1px}

</style>
</head>

<div class="container">
  <div id="app"></div>

<script>
"use strict";
(function () {
/* ===== core/event-bus.js ===== */
// core/event-bus.js — 事件总线
// 所有模块通过它通信，模块之间不直接调用彼此的行为函数。
// 开发态：ES Module 导出 EventBus；分发态：build.js 剥离 export 后并入同一作用域。

const EventBus = (() => {
  const listeners = new Map(); // event -> Set<handler>

  function on(event, handler) {
    if (!listeners.has(event)) listeners.set(event, new Set());
    listeners.get(event).add(handler);
    return () => off(event, handler); // 返回取消订阅函数
  }

  function once(event, handler) {
    const wrapper = (payload) => {
      off(event, wrapper);
      handler(payload);
    };
    return on(event, wrapper);
  }

  function off(event, handler) {
    const set = listeners.get(event);
    if (set) set.delete(handler);
  }

  function emit(event, payload) {
    const set = listeners.get(event);
    if (!set) return;
    // 复制一份，避免 handler 内部增删订阅导致迭代异常
    [...set].forEach((handler) => {
      try {
        handler(payload);
      } catch (err) {
        console.error(`[EventBus] handler error on "${event}":`, err);
      }
    });
  }

  return { on, once, off, emit };
})();


/* ===== core/events.js ===== */
// core/events.js — 事件名常量（唯一事实来源）
// 所有 emit/on 都引用这里的常量，避免裸字符串拼写错误。

const EVENTS = {
  // 导航
  NAV_GOTO: 'nav:goto',           // payload: { screen, params }

  // 对局生命周期
  GAME_START: 'game:start',       // payload: { scenarioKey, opponentId }
  GAME_RENDER: 'game:render',     // payload: { html } 或 { viewModel }
  PLAYER_ACTION: 'player:action', // payload: { type, value }
  AI_DECIDED: 'ai:decided',       // payload: { move, mood, reason }
  ROUND_END: 'round:end',         // payload: { roundLog }
  GAME_END: 'game:end',           // payload: { result }

  // 分析
  ANALYTICS_SCORED: 'analytics:scored', // payload: { replay, score }
  PROFILE_UPDATED: 'profile:updated',   // payload: { profile }

  // 全局状态
  STORE_CHANGED: 'store:changed', // payload: { key, value }
};

// 屏幕标识（router 使用）
const SCREENS = {
  WELCOME: 'welcome',
  MAIN: 'main',
  SCENARIO_SELECT: 'scenario-select',
  OPPONENT_SELECT: 'opponent-select',
  GAME: 'game',
  RESULT: 'result',
  STRATEGY: 'strategy',
  PSYCHOLOGY: 'psychology',
  DASHBOARD: 'dashboard',
};


/* ===== core/store.js ===== */
// core/store.js — 最小全局状态容器
// 单一数据源；set 时通过事件总线广播 store:changed，UI 据此重渲染。


const _state = {
  player: null,        // 当前玩家档案（analytics/player-data 填充）
  scenarioKey: null,   // 当前选中的场景
  opponentId: null,    // 当前选中的对手
  currentScreen: null, // 当前屏幕
  profile: null,       // 心理画像向量
};

const Store = {
  get(key) {
    return key === undefined ? { ..._state } : _state[key];
  },

  set(key, value) {
    _state[key] = value;
    EventBus.emit(EVENTS.STORE_CHANGED, { key, value });
  },

  // 一次性更新多个字段（仅广播一次每个 key）
  patch(partial) {
    Object.entries(partial).forEach(([key, value]) => {
      _state[key] = value;
      EventBus.emit(EVENTS.STORE_CHANGED, { key, value });
    });
  },
};


/* ===== data/opponents.js ===== */
// data/opponents.js — 6 对手定义 + 行为信号 + 应对技巧（从 v2.0 平移）
// 纯数据，可被任何模块 import。Phase 3 的 engine 会读取这里的性格参数。

const OPPONENTS = [
  { id:'rational',     name:'陈逻辑', type:'理性分析型', desc:'数据驱动，精确计算每步得失',   weakness:'对情感诉求反应迟钝',     risk:0.3, coop:0.5, fair:0.5, assert:0.6 },
  { id:'emotional',    name:'林敏感', type:'情感驱动型', desc:'重视关系，情绪波动影响决策',   weakness:'容易被激将或情感操控',   risk:0.5, coop:0.7, fair:0.8, assert:0.4 },
  { id:'aggressive',   name:'钢铁王', type:'强硬鹰派型', desc:'强硬立场，极力压缩对方空间',   weakness:'合理反压时容易妥协',     risk:0.7, coop:0.2, fair:0.3, assert:0.9 },
  { id:'cooperative',  name:'和谐李', type:'合作共赢型', desc:'寻求双赢，注重长期关系维护',   weakness:'过于善意容易被利用',     risk:0.4, coop:0.9, fair:0.8, assert:0.5 },
  { id:'manipulative', name:'影子张', type:'操纵控制型', desc:'善用心理战术，隐藏真实意图',   weakness:'被识破后失去优势',       risk:0.6, coop:0.3, fair:0.2, assert:0.8 },
  { id:'riskAverse',   name:'稳健吴', type:'风险规避型', desc:'保守稳健，避免不确定结果',     weakness:'在压力下倾向过度让步',   risk:0.2, coop:0.6, fair:0.6, assert:0.4 },
];

const PERSONALITY_TELLS = {
  rational:     ['总是要求数据支持','反复确认细节','表情克制中性'],
  emotional:    ['声音起伏明显','频繁提及"感受"','肢体语言丰富'],
  aggressive:   ['打断对方发言','设置最后期限','明确表达不满'],
  cooperative:  ['主动提出让步','寻找共同利益','保持开放态度'],
  manipulative: ['突然改变话题','制造紧迫感','模糊关键条款'],
  riskAverse:   ['多次确认安全性','偏好保守方案','回避极端选项'],
};

const OPPONENT_TIPS = {
  rational:     ['使用数据和逻辑支持你的立场','避免情绪化表达，保持客观','提出具体量化方案，比感性诉求更有效','利用其信息盲点设计信息不对称'],
  emotional:    ['建立情感连接，表达关切和理解','避免纯粹逻辑压制，先处理情绪','用关系和信任作为谈判筹码','注意情绪波动，寻找情绪低谷时推进协议'],
  aggressive:   ['不要被强硬姿态吓倒，保持冷静','用你的BATNA建立真实底气','要求其提供主张的依据','合理反压：明确表示也有替代选项'],
  cooperative:  ['诚实合作，建立长期信任','提出双赢方案，强调共同利益','避免利用其善意过度索取','记录协议细节，防止善意被误解'],
  manipulative: ['保持高度警觉，识别话术变化','要求书面确认所有关键条款','直接说出你识别到的操控手法','减慢节奏，不受人工紧迫感驱使'],
  riskAverse:   ['用数据和案例证明方案的安全性','提供保障条款和退出选项','强调不行动的风险大于行动','循序渐进，不要一次推进太多变化'],
};

function getOpponent(id) {
  return OPPONENTS.find((o) => o.id === id);
}

function randomOpponent() {
  return OPPONENTS[Math.floor(Math.random() * OPPONENTS.length)];
}

function getOpponentTips(id) {
  return OPPONENT_TIPS[id] || ['保持冷静，灵活应对','关注对方真实利益','适时使用沉默策略'];
}


/* ===== data/scenarios.meta.js ===== */
// data/scenarios.meta.js — 7 场景元数据（名称/难度/领域/描述）
// 不含场景逻辑类；类的绑定在 scenarios/registry.js。

const SCENARIO_META = {
  prisoners:   { name:'囚徒困境',     diff:'easy', domain:'经典博弈', desc:'经典非零和博弈，合作还是背叛？' },
  ultimatum:   { name:'最后通牒博弈', diff:'easy', domain:'分配博弈', desc:'分配者提议，接受者决定接受或拒绝' },
  trust:       { name:'信任博弈',     diff:'med',  domain:'信任博弈', desc:'信任与回馈的两阶段测试' },
  bargaining:  { name:'商业谈判博弈', diff:'med',  domain:'谈判博弈', desc:'多轮价格谈判，争取最佳成交' },
  crisis:      { name:'危机谈判',     diff:'hard', domain:'危机处置', desc:'四阶段危机处置，需要高超的沟通策略' },
  publicgoods: { name:'公共品博弈',   diff:'med',  domain:'合作博弈', desc:'公共项目贡献决策，团队与个人利益的博弈' },
  coalition:   { name:'联盟谈判',     diff:'hard', domain:'多方博弈', desc:'多方利益协调，建立稳定联盟' },
};

const DIFF_LABEL = { easy:'入门', med:'进阶', hard:'高阶' };
const DIFF_CLASS = { easy:'diff-easy', med:'diff-med', hard:'diff-hard' };


/* ===== data/masters.js ===== */
// data/masters.js — 六大谈判宗师理论库（从 v2.0 平移，57 条策略/原则）

const MASTERS = {
  dawson: {
    name: '罗杰·道森', title: '《优势谈判》',
    intro: '15大谈判策略，覆盖开局、中局、终局三大阶段，是谈判实战的权威教程。',
    tactics: [
      { stage:'开局', name:'狮子大开口', desc:'要价远高于预期，留出让步空间，设立高锚点。' },
      { stage:'开局', name:'虚假权威', desc:'"我需要请示上级"——保留缓冲空间，让对方对最终拍板人无处施压。' },
      { stage:'开局', name:'不情愿买家/卖家', desc:'表现出勉强姿态，让对方感到他们在争取你的参与。' },
      { stage:'开局', name:'钳子策略', desc:'"你能做得更好"——简单一句话压缩对方空间，且不先出价。' },
      { stage:'中局', name:'请示上级', desc:'声称无权做最终决定，避免单方面让步压力。' },
      { stage:'中局', name:'消解僵局', desc:'换人、换地点、换议题，打破卡壳局面。' },
      { stage:'中局', name:'让步节奏管理', desc:'让步幅度递减（大→中→小），暗示接近极限。' },

// data/ranks.js — 军衔阈值 + 心理类型定义（从 v2.0 平移）

function getRank(total, wins) {
  const wr = total > 0 ? wins / total : 0;
  if (total === 0) return '新兵';
  if (total < 5) return '学员';
  if (total < 10) return wr > 0.6 ? '谈判官' : '学员进阶';
  if (total < 20) return wr > 0.7 ? '策略师' : '谈判官';
  if (total < 30) return wr > 0.75 ? '博弈大师' : '策略师';
  return wr > 0.8 ? '宗师级' : '博弈大师';
}

// analytics/player-data.js — 玩家档案 + LocalStorage 持久化
// 兼容 v2.0 存档：key = gts_player_<name>，字段 {name,sessions,total,wins,draws,losses}

const KEY_PREFIX = 'gts_player_';

function loadPlayer(name) {
  try {
    const saved = localStorage.getItem(KEY_PREFIX + name);
    if (saved) {
      const p = JSON.parse(saved);
      // 向后兼容：补齐 v3 可能新增的字段
      p.sessions = p.sessions || [];
      return p;
    }
  } catch (e) {
    console.warn('[player-data] 读取存档失败，新建档案', e);
  }
  return { name, sessions: [], total: 0, wins: 0, draws: 0, losses: 0 };
}

function savePlayer(player) {
  if (!player) return;
  try {
    localStorage.setItem(KEY_PREFIX + player.name, JSON.stringify(player));
  } catch (e) {
    console.warn('[player-data] 保存存档失败', e);
  }
}

// 追加一局记录并持久化；返回更新后的 player
function addSession(player, rec) {
  player.sessions.push(rec);
  player.total += 1;
  if (rec.outcome === 'win') player.wins += 1;
  else if (rec.outcome === 'draw' || rec.outcome === 'coop') player.draws += 1;
  else player.losses += 1;
  savePlayer(player);
  return player;
}

// analytics/psych-analyzer.js — 8 维心理画像引擎
// Phase 2：沿用 v2.0 算法（基于胜负 outcome 的线性累加）先跑通。
// Phase 4：将重构为基于真实决策序列的计算（见 03-实施路线图.md F-06）。

const _profile = {
  cooperation_rate: 0, risk: 0, fairness: 0, depth: 0,
  emotion: 0, assert: 0, adapt: 0, trust: 0,
};

const PsychAnalyzer = {
  getProfile() {
    return { ..._profile };
  },

  // 每局结束根据结果与对手类型演化画像（v2.0 updateAnalyzer 逻辑）
  update(outcome, opp) {
    const p = _profile;
    const delta = 0.08;
    if (outcome === 'coop' || outcome === 'win') {
      p.cooperation_rate = Math.min(1, (p.cooperation_rate || 0.5) + delta);
      p.depth = Math.min(1, (p.depth || 0.5) + delta * 0.5);
    } else if (outcome === 'lose') {
      p.risk = Math.max(0, (p.risk || 0.5) - delta);
    }
    p.adapt = Math.min(1, (p.adapt || 0.5) + delta * 0.3);
    if (opp) {
      if (opp.id === 'aggressive') p.assert = Math.min(1, (p.assert || 0.5) + delta * 0.5);
      if (opp.id === 'emotional') p.emotion = Math.min(1, (p.emotion || 0.5) + delta * 0.5);
    }
  },

  // 根据画像推断心理类型（v2.0 getProfileType 逻辑）
  getProfileType() {
    const p = _profile;
    const profiles = [
      { name:'战略家', cond:() => p.depth > 0.6 && p.assert > 0.5, desc:'冷静理智，善于全局规划和长远布局',
        advice:['适当增加情感投入以建立更强的谈判关系','尝试更多合作性策略','注意不要过于机械化'] },
      { name:'调解者', cond:() => p.cooperation_rate > 0.7 && p.fairness > 0.6, desc:'天生的关系维护者，擅长化解冲突',
        advice:['学会在合适时机坚守底线','避免为维持和谐而过度妥协','增强BATNA意识'] },
      { name:'竞争者', cond:() => p.assert > 0.7 && p.risk > 0.5, desc:'目标明确，勇于争取最大利益',
        advice:['关注对方利益，寻找双赢机会','长期关系比单次收益更有价值','练习主动倾听'] },
      { name:'外交家', cond:() => p.adapt > 0.6 && p.emotion > 0.6, desc:'灵活适应，善于在不同情境切换策略',
        advice:['在核心利益上保持一致性','增强策略深度分析能力','建立清晰的底线意识'] },
      { name:'分析师', cond:() => p.depth > 0.5 && p.risk < 0.4, desc:'谨慎周密，偏好有据可查的决策路径',
        advice:['适当增加行动果断性','在信息不完整时学会做出判断','尝试更多创新性解决方案'] },
      { name:'实用主义者', cond:() => true, desc:'务实灵活，根据情境选择最优策略',
        advice:['深化某一领域的专项谈判技能','建立系统性的谈判框架','记录每次谈判的经验教训'] },
    ];
    return profiles.find((pp) => pp.cond()) || profiles[profiles.length - 1];
  },

  // 是否已有足够数据出报告（至少 2 局）—— 由调用方传入局数
  hasEnoughData(totalSessions) {
    return totalSessions >= 2;
  },
};


/* ===== ui/router.js ===== */
// ui/router.js — 屏幕路由
// 维护 screenId -> 渲染函数 的注册表；监听 nav:goto 事件切换屏幕。
// router 只负责"把哪个屏幕画到 #app"，不含任何业务逻辑。


const _screens = new Map(); // screenId -> render(params) => htmlString

const Router = {
  // 注册一个屏幕的渲染函数
  register(screenId, renderFn) {
    _screens.set(screenId, renderFn);
  },

  // 初始化：绑定 nav:goto 监听，渲染首屏
  init(rootEl, initialScreen, initialParams = {}) {
    EventBus.on(EVENTS.NAV_GOTO, ({ screen, params }) => {
      this._render(rootEl, screen, params || {});
    });
    this._render(rootEl, initialScreen, initialParams);
  },

  _render(rootEl, screenId, params) {
    const renderFn = _screens.get(screenId);
    if (!renderFn) {
      rootEl.innerHTML = `<div class="hint hint-red">未注册的屏幕：${screenId}</div>`;
      console.error(`[Router] no screen registered for "${screenId}"`);
      return;
    }
    rootEl.innerHTML = renderFn(params);
    Store.set('currentScreen', screenId);
    // 渲染后回调（用于绑定事件、聚焦输入等）
    if (typeof renderFn.afterRender === 'function') {
      renderFn.afterRender(params);
    }
    window.scrollTo(0, 0);
  },
};


/* ===== scenarios/base-scenario.js ===== */
// scenarios/base-scenario.js — 场景抽象基类，定义统一生命周期与事件契约
// 子类实现 start() 与 handleAction(action)，通过 emitRender/finish 与外界通信。
// 约束：场景不操作 DOM、不 import ui 屏幕逻辑（仅可用 components 纯字符串构造器）。


class BaseScenario {
  constructor(opp) {
    this.opp = opp;
    this.log = [];
  }

  // 发起一次渲染：把 HTML 交给 game-view 落地
  emitRender(html) {
    EventBus.emit(EVENTS.GAME_RENDER, { html });
  }

  // 结束对局：result = { playerScore, oppScore, outcome, summary(html) }
  finish(result) {
    EventBus.emit(EVENTS.GAME_END, { result });
  }

  // 子类必须实现
  start() { throw new Error('start() not implemented'); }
  handleAction(_action) { throw new Error('handleAction() not implemented'); }
}


/* ===== scenarios/prisoners.js ===== */
// scenarios/prisoners.js — 囚徒困境（从 v2.0 平移）
// AI 决策为 Phase 2 的伪随机逻辑，Phase 3 将抽取到 engine/。


class PrisonersDilemma extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 5;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
  }

  // Phase 3: 抽取到 engine/strategies/*
  _oppDecision() {
    const opp = this.opp;
    const r = Math.random();
    if (this.round === 0) return r < (opp.coop || 0.5) ? 'coop' : 'defect';
    const last = this.log[this.log.length - 1];
    if (opp.id === 'cooperative') return r < 0.85 ? 'coop' : 'defect';
    if (opp.id === 'aggressive') return r < 0.25 ? 'coop' : 'defect';
    if (opp.id === 'manipulative') return r < 0.35 ? 'coop' : 'defect';
    if (opp.id === 'rational') return last && last.player === 'defect' ? 'defect' : 'coop';
    if (opp.id === 'emotional') return last && last.oppFeel < 0 ? 'defect' : 'coop';
    return r < (opp.coop || 0.5) ? 'coop' : 'defect';
  }

  _scores(p, o) {
    if (p === 'coop' && o === 'coop') return [3, 3];
    if (p === 'coop' && o === 'defect') return [0, 5];
    if (p === 'defect' && o === 'coop') return [5, 0];
    return [1, 1];
  }

  start() { this._render(); }

  _render() {
    const opp = this.opp;
    const logHtml = this.log.map((l) =>
      `<div class="log-entry"><span class="lbl">[第${l.round}轮]</span> 您: ${l.player === 'coop' ? '合作' : '背叛'} | ${opp.name}: ${l.opp === 'coop' ? '合作' : '背叛'} | 得分: +${l.pScore} vs +${l.oScore}</div>`
    ).join('');

    this.emitRender(`
      ${C.gameHeader(`囚徒困境 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的分数')}
        ${C.scoreBox(this.oppScore, `${opp.name} 分数`)}
      </div>
      ${C.hint(`<b>场景：</b>你和 ${opp.name} 同时被捕。双方都沉默（合作）各判3年；你背叛对方沉默则你自由对方5年；双方都背叛各1年。<br><b>对手档案：</b>${opp.type} — ${opp.desc}`)}
      ${C.panel('选择你的策略',
        C.actionBtn('choice', 'coop', '<b>[C] 合作</b> — 保持沉默，减少双方损失（理性结果 +3）') +
        C.actionBtn('choice', 'defect', '<b>[D] 背叛</b> — 出卖对方，追求个人最大利益（最大 +5）'))}
      ${C.logBox('对局记录', logHtml)}
    `);
  }

  handleAction({ type, value }) {
    if (type !== 'choice') return;
    const oppChoice = this._oppDecision();
    const [ps, os] = this._scores(value, oppChoice);
    this.playerScore += ps;
    this.oppScore += os;
    this.log.push({ round: this.round + 1, player: value, opp: oppChoice, pScore: ps, oScore: os, oppFeel: value === 'defect' ? -1 : 1 });
    this.round += 1;
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const coop = this.log.filter((l) => l.player === 'coop').length;
    this.finish({
      playerScore: this.playerScore, oppScore: this.oppScore, outcome,
      summary:
        C.infoRow('总轮数', `${this.rounds} 轮`) +
        C.infoRow('您的合作率', `${Math.round(coop / this.rounds * 100)}%`) +
        C.infoRow('对手', `${this.opp.name} (${this.opp.type})`) +
        C.infoRow('分析', coop >= 4 ? '高度合作策略，建立了信任' : coop >= 2 ? '混合策略，较为灵活' : '激进背叛策略，短期收益可能较高但破坏信任'),
    });
  }
}


/* ===== scenarios/ultimatum.js ===== */
// scenarios/ultimatum.js — 最后通牒博弈（从 v2.0 平移）
// 玩家与对手轮流当提议者；接受者拒绝则双方得 0。


const TOTAL = 100;

class UltimatumGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 3;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.pendingOffer = null; // 对手当提议者时的报价（其保留额）
  }

  _isProposer() { return this.round % 2 === 0; }

  start() { this._render(); }

  _render() {
    const opp = this.opp;
    const logHtml = this.log.map((l) =>
      `<div class="log-entry">[第${l.round}轮] 提案: 我${l.myOffer}/对方${l.theirOffer} → ${l.accepted ? '<span style="color:var(--green)">接受</span>' : '<span style="color:var(--red)">拒绝</span>'}</div>`
    ).join('');

    const head = `${C.gameHeader(`最后通牒博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的总分')}
        ${C.scoreBox(this.oppScore, `${opp.name} 总分`)}
      </div>`;

    if (this._isProposer()) {
      this.emitRender(`${head}
        ${C.hint(`总金额 ${TOTAL} 元待分配。<b>您是提议者</b>，提出分配方案。接受者拒绝则双方均得 0。`)}
        ${C.panel('提出你的分配方案（给自己保留多少？）',
          C.actionBtn('propose', '70', '<b>[激进]</b> 保留 70元，给对方 30元') +
          C.actionBtn('propose', '60', '<b>[偏强]</b> 保留 60元，给对方 40元') +
          C.actionBtn('propose', '50', '<b>[公平]</b> 保留 50元，给对方 50元') +
          C.actionBtn('propose', '40', '<b>[让步]</b> 保留 40元，给对方 60元'))}
        ${C.logBox('历史记录', logHtml)}`);
    } else if (this.pendingOffer == null) {
      // 接受者回合：先展示"对手思考中"，稍后生成报价
      this.emitRender(`${head}
        ${C.hint(`总金额 ${TOTAL} 元待分配。<b>您是接受者</b>，${opp.name} 将提出方案。`)}
        ${C.hint(`${opp.name} 正在思考提案...`, 'yellow')}
        ${C.logBox('历史记录', logHtml)}`);
      setTimeout(() => { this.pendingOffer = this._oppPropose(); this._render(); }, 1000);
    } else {
      const keep = this.pendingOffer;
      const give = TOTAL - keep;
      this.emitRender(`${head}
        ${C.hint(`${opp.name} 提议：<b style="color:var(--cyan)">给您 ${give} 元，自己保留 ${keep} 元</b>。`)}
        ${C.panel('您的决定',
          C.actionBtn('respond', 'accept', '<b>[接受]</b> 接受方案，各得所得') +
          C.actionBtn('respond', 'reject', '<b>[拒绝]</b> 拒绝方案，双方得 0'))}
        ${C.logBox('历史记录', logHtml)}`);
    }
  }

  // Phase 3: 抽取到 engine
  _oppPropose() {
    const opp = this.opp;
    let offer;
    if (opp.id === 'aggressive') offer = 70;
    else if (opp.id === 'cooperative') offer = 45;
    else if (opp.id === 'emotional') offer = 50;
    else if (opp.id === 'manipulative') offer = 65;
    else offer = 55 + Math.floor(Math.random() * 10);
    return Math.min(80, Math.max(20, offer));
  }

  _oppAcceptsMyOffer(keep) {
    const opp = this.opp;
    if (opp.id === 'aggressive') return keep <= 55;
    if (opp.id === 'cooperative') return keep <= 65;
    if (opp.id === 'emotional') return keep <= 50;
    if (opp.id === 'rational') return keep <= 60;
    return keep <= 55 + Math.random() * 10;
  }

  handleAction({ type, value }) {
    if (type === 'propose') {
      const keep = parseInt(value, 10);
      const accepted = this._oppAcceptsMyOffer(keep);
      this._settle(keep, accepted, true);
    } else if (type === 'respond') {
      const keep = this.pendingOffer;
      this._settle(keep, value === 'accept', false);
      this.pendingOffer = null;
    }
  }

  _settle(myKeep, accepted, isMyProposal) {
    const theirShare = TOTAL - myKeep;
    let myGain, oppGain;
    if (isMyProposal) {
      myGain = accepted ? myKeep : 0;
      oppGain = accepted ? theirShare : 0;
    } else {
      myGain = accepted ? theirShare : 0;
      oppGain = accepted ? myKeep : 0;
    }
    this.playerScore += myGain;
    this.oppScore += oppGain;
    this.log.push({
      round: this.round + 1,
      myOffer: isMyProposal ? myKeep : theirShare,
      theirOffer: isMyProposal ? theirShare : myKeep,
      accepted,
    });
    this.round += 1;
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const acc = Math.round(this.log.filter((l) => l.accepted).length / this.log.length * 100);
    this.finish({
      playerScore: this.playerScore, oppScore: this.oppScore, outcome,
      summary:
        C.infoRow('接受率', `${acc}%`) +
        C.infoRow('最优策略', '作为提议者锚定 55-60，接受者接受 >30% 的方案'),
    });
  }
}

// scenarios/trust.js — 信任博弈（从 v2.0 平移）
// 玩家投入 → 3 倍放大 → 对手决定返还多少。


class TrustGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 3;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
  }

  start() { this._render(); }

  _render() {
    const opp = this.opp;
    const logHtml = this.log.map((l) =>
      `<div class="log-entry">[${l.round}] 投入:${l.invested} 返还:${l.returned} 净收益:${l.myNet > 0 ? '+' : ''}${l.myNet}</div>`
    ).join('');

    this.emitRender(`
      ${C.gameHeader(`信任博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的总分')}
        ${C.scoreBox(this.oppScore, `${opp.name} 总分`)}
      </div>
      ${C.hint(`<b>信任博弈：</b>您有 10 枚筹码。选择投入数额，系统 3 倍放大后交给 ${opp.name}，${opp.name} 再决定返还多少。这是一个信任测试！`)}
      ${C.panel('选择投入金额（总共 10 枚）',
        C.actionBtn('invest', '10', '<b>[全力信任]</b> 投入 10枚 → 对方收到 30枚') +
        C.actionBtn('invest', '7', '<b>[高度信任]</b> 投入 7枚 → 对方收到 21枚') +
        C.actionBtn('invest', '4', '<b>[适度信任]</b> 投入 4枚 → 对方收到 12枚') +
        C.actionBtn('invest', '0', '<b>[零信任]</b> 投入 0枚 → 保留所有筹码'))}
      ${C.logBox('信任记录', logHtml)}
    `);
  }

  // Phase 3: 抽取到 engine
  _oppReturn(tripled, amount) {
    const opp = this.opp;
    if (opp.id === 'cooperative') return Math.round(tripled * 0.6);
    if (opp.id === 'aggressive') return Math.round(tripled * 0.15);
    if (opp.id === 'manipulative') return Math.round(tripled * (Math.random() < 0.3 ? 0.5 : 0.1));
    if (opp.id === 'riskAverse') return Math.round(tripled * 0.4);
    if (opp.id === 'emotional') return Math.round(tripled * (amount > 5 ? 0.55 : 0.3));
    return Math.round(tripled * 0.45);
  }

  handleAction({ type, value }) {
    if (type !== 'invest') return;
    const amount = parseInt(value, 10);
    const tripled = amount * 3;
    const returned = this._oppReturn(tripled, amount);
    const kept = 10 - amount;
    const myNet = kept + returned - 10;
    this.playerScore += kept + returned;
    this.oppScore += tripled - returned;
    this.log.push({ round: this.round + 1, invested: amount, returned, myNet });
    this.round += 1;
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore < this.oppScore ? 'lose' : 'draw';
    const avgInvest = Math.round(this.log.reduce((s, l) => s + l.invested, 0) / this.log.length);
    const avgReturn = Math.round(this.log.reduce((s, l) => s + (l.returned / (l.invested * 3 || 1)), 0) / this.log.length * 100);
    this.finish({
      playerScore: this.playerScore, oppScore: this.oppScore, outcome,
      summary:
        C.infoRow('平均投入', `${avgInvest} 枚`) +
        C.infoRow('平均返还率', `${avgReturn}%`) +
        C.infoRow('提示', '信任是双向的，适度投入测试对手诚意更为理性'),
    });
  }
}

// scenarios/bargaining.js — 商业谈判博弈（从 v2.0 平移）
// 玩家为买方（求低价），对手为卖方（求高价）。真实价值约 60。


class BargainingGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 5;
    this.round = 0;
    this.playerScore = 0;
    this.oppScore = 0;
    this.myAnchor = 40;
    this.myOffer = 0;
    this.oppOffer = 100;
    this.trueVal = 60;
  }

  start() { this._render(); }

  // Phase 3: 抽取到 engine
  _oppCounter(playerOffer) {
    const opp = this.opp;
    let reduction;
    if (opp.id === 'aggressive') reduction = 3 + Math.random() * 3;
    else if (opp.id === 'cooperative') reduction = 8 + Math.random() * 6;
    else if (opp.id === 'rational') reduction = 5 + Math.random() * 4;
    else if (opp.id === 'riskAverse') reduction = 6 + Math.random() * 5;
    else reduction = 5 + Math.random() * 5;
    if (playerOffer < this.trueVal * 0.7) reduction *= 0.6;
    return Math.max(this.trueVal, Math.round(this.oppOffer - reduction));
  }

  _render() {
    const opp = this.opp;
    const cur = this.myOffer || this.myAnchor;
    const logHtml = this.log.map((l) =>
      `<div class="log-entry">[${l.round}] 出价:${l.my} | 要价:${l.opp} | 差距:${l.gap}</div>`
    ).join('');

    this.emitRender(`
      ${C.gameHeader(`商业谈判 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      ${C.panel('谈判状态',
        C.infoRow('商品真实价值', '<span style="color:var(--dim)">约 60 元（双方均未知）</span>') +
        C.infoRow('您的当前出价', `<span style="color:var(--green)">${cur} 元</span>`) +
        C.infoRow(`${opp.name} 要价`, `<span style="color:var(--red)">${this.oppOffer} 元</span>`) +
        C.infoRow('差距', `<span style="color:var(--yellow)">${this.oppOffer - cur} 元</span>`))}
      ${C.hint(`您是买方，希望以最低价买入。${opp.name} 是卖方，希望以最高价卖出。`)}
      ${C.panel(`您的出价策略（第 ${this.round + 1} 轮）`,
        C.actionBtn('offer', String(cur + 3), `<b>[小幅让步]</b> 提价至 ${cur + 3} 元（+3）`) +
        C.actionBtn('offer', String(cur + 8), `<b>[适度让步]</b> 提价至 ${cur + 8} 元（+8）`) +
        C.actionBtn('offer', String(cur + 15), `<b>[大幅让步]</b> 提价至 ${cur + 15} 元（+15）`) +
        C.actionBtn('accept', String(this.oppOffer), `<b>[接受对方价格]</b> 以 ${this.oppOffer} 元成交`, 'btn-green'))}
      ${C.logBox('谈判记录', logHtml)}
    `);
  }

  handleAction({ type, value }) {
    if (type === 'accept') { this._deal(this.oppOffer); return; }
    if (type !== 'offer') return;
    const offer = parseInt(value, 10);
    this.myOffer = offer;
    const newOpp = this._oppCounter(offer);

    if (newOpp <= offer || newOpp <= this.trueVal) {
      this._deal(Math.round((offer + this.oppOffer) / 2));
      return;
    }
    this.log.push({ round: this.round + 1, my: offer, opp: this.oppOffer, gap: this.oppOffer - offer });
    this.oppOffer = newOpp;
    this.round += 1;

    if (this.round >= this.rounds) {
      if (this.oppOffer - offer < 15) this._deal(Math.round((offer + this.oppOffer) / 2));
      else this._deal(this.oppOffer);
    } else {
      this._render();
    }
  }

  _deal(price) {
    this.playerScore = Math.max(0, 100 - price);
    this.oppScore = Math.max(0, price - 40);
    const outcome = price <= 55 ? 'win' : price <= 65 ? 'draw' : 'lose';
    this.finish({
      playerScore: this.playerScore, oppScore: this.oppScore, outcome,
      summary:
        C.infoRow('成交价格', `${price} 元`) +
        C.infoRow('相比最高价节省', `${100 - price} 元`) +
        C.infoRow('评价', price <= 55 ? '出色！远低于真实价值' : price <= 65 ? '良好，接近真实价值' : '偏高，需要提升议价技巧') +
        C.infoRow('提示', '锚定低价、小幅递减让步、保持耐心是关键'),
    });
  }
}


/* ===== scenarios/crisis.js ===== */
// scenarios/crisis.js — 危机谈判（从 v2.0 平移）
// 四阶段危机处置；每个选择影响谈判积分与危机风险值。


class CrisisNegotiation extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.stage = 0;
    this.playerScore = 0;
    this.oppScore = 50; // 危机风险值起点

      `<div class="log-entry">[${l.stage}] ${l.feedback} <span style="color:var(--green)">+${l.ps}</span></div>`
    ).join('');

    this.emitRender(`
      ${C.gameHeader(`危机谈判 — ${s.title}`)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '谈判积分')}
        ${C.scoreBox(Math.max(0, this.oppScore), '危机风险值', 'var(--red)')}

      ${C.logBox('阶段记录', logHtml)}
    `);
  }

  handleAction({ type, value }) {
    if (type !== 'stage') return;
    const s = this.stages[this.stage];
    const opt = s.options[parseInt(value, 10)];
    this.playerScore += opt.ps;
    this.oppScore += opt.os;
    this.log.push({ stage: `第${this.stage + 1}阶段`, feedback: opt.feedback, ps: opt.ps });

    if (this.stage < this.stages.length) {
      this.emitRender(`${C.gameHeader('危机谈判 — 处理中...')}

        ${C.hint('正在进入下一阶段...', 'cyan')}`);
      setTimeout(() => this._render(), 1500);
    } else {
      this._finish();
    }
  }

  _finish() {
    const outcome = this.playerScore >= 50 ? 'win' : this.playerScore >= 20 ? 'draw' : 'lose';
    this.finish({
      playerScore: this.playerScore,
      oppScore: Math.max(0, 100 - this.playerScore),
      outcome,
      summary:
        C.infoRow('最终谈判积分', String(this.playerScore)) +
        C.infoRow('危机化解程度', this.playerScore >= 50 ? '成功化解' : '部分化解') +
        C.infoRow('评级', this.playerScore >= 60 ? '卓越谈判官' : this.playerScore >= 40 ? '称职谈判员' : '需要加强训练'),
    });
  }
}

// scenarios/public-goods.js — 公共品博弈（从 v2.0 平移）
// 公共池总额 ×2.2 后平分；个人理性 vs 集体最优的张力。


class PublicGoodsGame extends BaseScenario {
  constructor(opp) {
    super(opp);
    this.rounds = 4;
    this.round = 0;
    this.playerScore = 40;
    this.oppScore = 40;
    this.multiplier = 2.2;
  }

  start() { this._render(); }

  // Phase 3: 抽取到 engine
  _oppContrib(playerContrib) {
    const opp = this.opp;
    if (opp.id === 'cooperative') return 7 + Math.floor(Math.random() * 3);
    if (opp.id === 'aggressive') return 1 + Math.floor(Math.random() * 3);
    if (opp.id === 'rational') return Math.round(playerContrib * 0.9);
    if (opp.id === 'manipulative') return Math.random() < 0.4 ? 8 : 2;
    return 4 + Math.floor(Math.random() * 4);
  }

  _render() {
    const opp = this.opp;
    const logHtml = this.log.map((l) =>
      `<div class="log-entry">[${l.round}] 您贡献:${l.my} 对方贡献:${l.opp} 池总额:${l.pool} 各得:${l.share}</div>`
    ).join('');

    this.emitRender(`
      ${C.gameHeader(`公共品博弈 — 第 ${this.round + 1}/${this.rounds} 轮`)}
      <div class="grid2" style="margin:12px 0">
        ${C.scoreBox(this.playerScore, '您的余额')}
        ${C.scoreBox(this.oppScore, `${opp.name} 余额`)}
      </div>
      ${C.hint(`每轮各有 10 枚筹码，可贡献到公共池。公共池总额 ×${this.multiplier} 后平分给所有人。<br>理性自私：贡献 0（但若人人如此，公共品崩溃）。`)}
      ${C.panel('选择贡献数量',
        C.actionBtn('contribute', '10', '<b>[全力贡献]</b> 贡献 10枚 — 最大化公共利益') +
        C.actionBtn('contribute', '7', '<b>[高度合作]</b> 贡献 7枚 — 偏向集体') +
        C.actionBtn('contribute', '4', '<b>[适度参与]</b> 贡献 4枚 — 平衡策略') +
        C.actionBtn('contribute', '0', '<b>[搭便车]</b> 贡献 0枚 — 最大化个人利益'))}
      ${C.logBox('贡献记录', logHtml)}
    `);
  }

  handleAction({ type, value }) {
    if (type !== 'contribute') return;
    const amount = parseInt(value, 10);
    const oppContrib = this._oppContrib(amount);
    const pool = (amount + oppContrib) * this.multiplier;
    const share = Math.round(pool / 2);
    this.playerScore = this.playerScore - amount + share;
    this.oppScore = this.oppScore - oppContrib + share;
    this.log.push({ round: this.round + 1, my: amount, opp: oppContrib, pool: Math.round(pool), share });
    this.round += 1;
    if (this.round < this.rounds) this._render();
    else this._finish();
  }

  _finish() {
    const outcome = this.playerScore > this.oppScore ? 'win' : this.playerScore === this.oppScore ? 'coop' : 'lose';
    const avg = Math.round(this.log.reduce((s, l) => s + l.my, 0) / this.log.length);
    this.finish({
      playerScore: this.playerScore, oppScore: this.oppScore, outcome,
      summary:
        C.infoRow('平均贡献量', `${avg} 枚`) +
        C.infoRow('最优策略', '条件合作：模仿对方上轮贡献，避免持续被剥削') +
        C.infoRow('启示', '公共品博弈揭示集体行动困境，信任与声誉是合作的基础'),
    });
  }
}

/* ===== scenarios/runner.js ===== */
// scenarios/runner.js — 对局控制器
// 协调场景生命周期：监听 game:start 创建场景、转发 player:action、game:end 后导航到结果屏。
// 只做编排与导航，不渲染（渲染交给 game-view）、不记录（记录交给 analytics/recorder）。


function initRunner() {
  EventBus.on(EVENTS.GAME_START, ({ scenarioKey, opponentId }) => {
    const meta = REGISTRY[scenarioKey];
    if (!meta || !meta.Class) {
      console.error('[runner] 未知场景', scenarioKey);
      return;
    }
    const opp = opponentId === 'random' ? randomOpponent() : getOpponent(opponentId);
    const scenario = new meta.Class(opp);
    Store.patch({ scenarioKey, opponent: opp, activeScenario: scenario });

    // 先导航到对局屏（同步渲染 #game-root），再 start() 触发首次 game:render
    EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.GAME, params: {} });
    scenario.start();
  });

  EventBus.on(EVENTS.PLAYER_ACTION, (action) => {
    if (action.type === 'exit') {
      Store.set('activeScenario', null);
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.MAIN, params: {} });
      return;
    }
    const scenario = Store.get('activeScenario');
    if (scenario) scenario.handleAction(action);
  });

  // recorder 已先行处理记录（bootstrap 中先 init），这里仅负责导航到结果屏
  EventBus.on(EVENTS.GAME_END, () => {
    Store.set('activeScenario', null);
    EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.RESULT, params: {} });
  });
}


/* ===== analytics/recorder.js ===== */
// analytics/recorder.js — 对局记录器
// 监听 game:end，写入玩家档案 + 更新心理画像 + 组装结果供结果屏读取。
// bootstrap 中须在 runner 之前 init，确保"先记录、后导航"。


function initRecorder() {
  EventBus.on(EVENTS.GAME_END, ({ result }) => {
    const player = Store.get('player');
    const opp = Store.get('opponent');
    const scenarioKey = Store.get('scenarioKey');
    const meta = SCENARIO_META[scenarioKey];
    const scenarioName = meta ? meta.name : scenarioKey;

    if (player) {
      addSession(player, {
        time: new Date().toLocaleString('zh-CN'),
        scenario: scenarioName,
        opponent: opp ? opp.type : '—',
        playerScore: result.playerScore,
        oppScore: result.oppScore,
        outcome: result.outcome,
      });
      Store.set('player', player); // 广播，刷新主菜单等
    }

    PsychAnalyzer.update(result.outcome, opp);

    // 组装结果屏所需数据
    Store.set('lastResult', {
      result,
      opp,
      scenarioName,
      tips: opp ? getOpponentTips(opp.id) : [],
      tells: opp ? (PERSONALITY_TELLS[opp.id] || []) : [],
    });
  });
}

const MENU = [
  ['①', '场景实战训练', '选择博弈场景，与AI对手对决', 'nav', SCREENS.SCENARIO_SELECT],
  ['②', '快速训练模式', '随机场景与随机对手，快速提升', 'quick', null],
  ['③', '策略理论库', '策略卡 / 沟通技术 / 心理防御 / 六大宗师理论', 'nav', SCREENS.STRATEGY],
  ['④', '心理档案分析', '查看您的8维博弈心理画像', 'nav', SCREENS.PSYCHOLOGY],
  ['⑤', '训练成绩看板', '历史战绩、胜率统计、成长曲线', 'nav', SCREENS.DASHBOARD],
];

function renderMainMenu() {
  const p = Store.get('player') || { name: '训练员', total: 0, wins: 0 };
  const rank = getRank(p.total, p.wins);
  const wr = p.total > 0 ? Math.round(p.wins / p.total * 100) : 0;

  const items = MENU.map(([num, title, sub, act, target], i) => `
    <div class="menu-item" data-act="${act}" data-target="${target || ''}" data-idx="${i}">
      <div class="menu-num">${num}</div>
      <div class="menu-text"><b>${title}</b><span>${sub}</span></div>
    </div>`).join('');

  return `
    <div class="header">
      <h1>◆ 全谱系博弈演练系统 ◆</h1>
      <div class="sub">训练员: ${p.name}  |  军衔: ${rank}  |  总场次: ${p.total}  |  胜率: ${wr}%</div>
    </div>
    <div id="main-menu-items">${items}</div>
  `;
}

renderMainMenu.afterRender = function () {
  document.querySelectorAll('#main-menu-items .menu-item').forEach((el) => {
    el.addEventListener('click', () => {
      const act = el.getAttribute('data-act');
      if (act === 'quick') {
        const keys = Object.keys(SCENARIO_META);
        const key = keys[Math.floor(Math.random() * keys.length)];
        EventBus.emit(EVENTS.GAME_START, { scenarioKey: key, opponentId: 'random' });
      } else {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: el.getAttribute('data-target'), params: {} });
      }
    });
  });
};


/* ===== ui/screens/scenario-select.js ===== */
// ui/screens/scenario-select.js — 场景选择屏


function renderScenarioSelect() {
  const cards = Object.entries(SCENARIO_META).map(([key, s]) => `
    <div class="card" data-key="${key}">
      <h3>${s.name}</h3>
      <div class="diff ${DIFF_CLASS[s.diff]}">${DIFF_LABEL[s.diff]}</div>
      ${C.tag(s.domain)}
      <p style="margin-top:8px">${s.desc}</p>
    </div>`).join('');

  return `
    <div class="flex-between">
      <div class="section-title">▶ 选择训练场景</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="grid2">${cards}</div>
  `;
}

renderScenarioSelect.afterRender = function () {
  document.querySelectorAll('.card[data-key]').forEach((el) => {
    el.addEventListener('click', () => {
      Store.set('scenarioKey', el.getAttribute('data-key'));
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.OPPONENT_SELECT, params: {} });
    });
  });
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
};


/* ===== ui/screens/opponent-select.js ===== */
// ui/screens/opponent-select.js — 对手选择屏


function renderOpponentSelect() {
  const key = Store.get('scenarioKey');
  const meta = SCENARIO_META[key] || { name: '—', desc: '' };
  const cards = OPPONENTS.map((o) => `
    <div class="opp-card" data-opp="${o.id}">
      <div class="opp-name">${o.name}</div>
      <div class="opp-type">${o.type}</div>
      <div class="opp-desc" style="margin:4px 0">${o.desc}</div>
      <div style="font-size:10px;color:var(--yellow)">弱点：${o.weakness}</div>
      <div style="margin-top:6px;font-size:10px;color:var(--dim)">${(PERSONALITY_TELLS[o.id] || []).join(' | ')}</div>
    </div>`).join('');

  return `
    <div class="flex-between">
      <div class="section-title">▶ 选择对手</div>
      <button class="back-btn" data-nav="${SCREENS.SCENARIO_SELECT}">← 返回</button>
    </div>

    <div style="margin-top:12px">

    </div>

}

renderOpponentSelect.afterRender = function () {
  const key = Store.get('scenarioKey');
  document.querySelectorAll('[data-opp]').forEach((el) => {
    el.addEventListener('click', () => {
      EventBus.emit(EVENTS.GAME_START, { scenarioKey: key, opponentId: el.getAttribute('data-opp') });
    });
  });
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
};


/* ===== ui/screens/game-view.js ===== */
// ui/screens/game-view.js — 对局屏
// 渲染一个稳定容器 #game-root；监听 game:render 落地场景 HTML；
// 用事件委托把 [data-game-action] 点击翻译成 player:action 事件。
// （UI 只渲染与转发，不含任何场景逻辑。）


function renderGame() {
  return `<div id="game-root"></div>`;
}

let _inited = false;
function initGameView() {
  if (_inited) return;
  _inited = true;

  // 场景发出的 HTML 落地到 #game-root
  EventBus.on(EVENTS.GAME_RENDER, ({ html }) => {
    const root = document.getElementById('game-root');
    if (root) root.innerHTML = html;
  });

  // 事件委托：仅响应 #game-root 内的动作按钮
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-game-action]');
    if (!btn) return;
    const root = document.getElementById('game-root');
    if (!root || !root.contains(btn)) return;
    EventBus.emit(EVENTS.PLAYER_ACTION, {
      type: btn.getAttribute('data-game-action'),
      value: btn.getAttribute('data-value'),
    });
  });
}


/* ===== ui/screens/result.js ===== */
// ui/screens/result.js — 结果屏（读取 Store.lastResult）


function renderResult() {
  const data = Store.get('lastResult');
  if (!data) {
    return `${C.hint('暂无结果数据', 'yellow')}
      <div style="text-align:center;margin-top:16px"><button class="btn" data-nav="${SCREENS.MAIN}">← 返回主菜单</button></div>`;
  }
  const { result, opp, scenarioName, tips, tells } = data;

  const tipsPanel = opp ? C.panel(`应对 ${opp.type} 的专项技巧`,
    tips.map((t) => C.hint(`• ${t}`)).join('') +
    `<div style="margin-top:8px;font-size:11px;color:var(--dim)">行为识别信号：${tells.join(' | ')}</div>`) : '';

  return `
    <div class="header"><h1>${scenarioName} — 训练结束</h1></div>
    <div class="grid2" style="margin-bottom:12px">
      ${C.scoreBox(result.playerScore, '您的得分')}
      ${C.scoreBox(result.oppScore, `${opp ? opp.name : '对手'} 得分`)}
    </div>
    <div style="text-align:center;margin-bottom:16px">${C.outcomeBadge(result.outcome)}</div>
    ${C.panel('复盘分析', result.summary || '')}
    ${tipsPanel}
    <div style="margin-top:16px;text-align:center">
      <button class="btn" data-nav="${SCREENS.MAIN}" style="margin:4px">← 返回主菜单</button>
      <button class="btn btn-green" data-action="quick" style="margin:4px">再来一局 ⚡</button>
    </div>
  `;
}

renderResult.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  const quick = document.querySelector('[data-action="quick"]');
  if (quick) quick.addEventListener('click', () => {
    const keys = Object.keys(SCENARIO_META);
    const key = keys[Math.floor(Math.random() * keys.length)];
    EventBus.emit(EVENTS.GAME_START, { scenarioKey: key, opponentId: 'random' });
  });
};


/* ===== ui/screens/strategy-lib.js ===== */
// ui/screens/strategy-lib.js — 策略理论库（策略卡 / 沟通技术 / 心理防御 / 六大宗师）
// 屏幕内自管理 Tab 与宗师详情，直接更新 #strategy-content，不经路由。


const TABS = [
  ['cards', '策略卡牌'],
  ['comm', '沟通技术'],
  ['defense', '心理防御'],
  ['masters', '六大宗师'],
];

function renderStrategyLib() {
  const tabs = TABS.map(([id, label], i) =>
    `<div class="tab ${i === 0 ? 'active' : ''}" data-tab="${id}">${label}</div>`).join('');
  return `
    <div class="flex-between">
      <div class="section-title">▶ 策略理论库</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="tabs" id="strategy-tabs">${tabs}</div>
    <div id="strategy-content"></div>
  `;
}

function contentFor(tab) {
  if (tab === 'cards') {
    return STRATEGY_CARDS.map((c) => `
      <div class="master-card">
        <div class="master-name">${c.name}</div>
        <div style="margin:4px 0">${c.tags.map((t) => C.tag(t)).join('')}</div>
        <div style="color:var(--text);font-size:12px;line-height:1.6;margin:6px 0">${c.desc}</div>
        <div style="font-size:11px;color:var(--dim)">适用场景：${c.use}</div>
      </div>`).join('');
  }
  if (tab === 'comm') {
    return COMM_TECHNIQUES.map((c) =>
      `<div class="tactic" style="margin-bottom:8px"><div class="tactic-name">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  if (tab === 'defense') {
    return DEFENSE_TACTICS.map((c) =>
      `<div class="tactic" style="border-left-color:var(--red);margin-bottom:8px"><div class="tactic-name" style="color:var(--red)">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  // masters
  return `<div class="grid2">${Object.entries(MASTERS).map(([k, m]) => `
    <div class="card" data-master="${k}">
      <h3>${m.name}</h3>
      <div style="color:var(--yellow);font-size:11px;margin-bottom:6px">${m.title}</div>
      <p>${m.intro}</p>
      <div style="margin-top:8px;font-size:11px;color:var(--cyan)">共 ${m.tactics.length} 个策略/原则 →</div>
    </div>`).join('')}</div>`;
}

function masterDetail(key) {
  const m = MASTERS[key];
  const stages = [...new Set(m.tactics.map((t) => t.stage))];
  const body = stages.map((stage) => `
    <div style="margin-bottom:12px">
      <div style="color:var(--yellow);font-size:11px;letter-spacing:1px;margin-bottom:6px">【${stage}】</div>
      ${m.tactics.filter((t) => t.stage === stage).map((t) =>
        `<div class="tactic" style="margin-bottom:6px"><div class="tactic-name">${t.name}</div><div class="tactic-desc">${t.desc}</div></div>`).join('')}
    </div>`).join('');
  return `
    <button class="back-btn" id="master-back" style="margin-bottom:12px">← 返回宗师列表</button>
    <div class="master-card">
      <div class="master-name">${m.name}</div>
      <div class="master-title">${m.title}</div>
      ${C.hint(m.intro, 'yellow')}
      ${body}
    </div>`;
}

renderStrategyLib.afterRender = function () {
  const contentEl = document.getElementById('strategy-content');

  function showTab(tab) {
    document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
      t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    contentEl.innerHTML = contentFor(tab);
    if (tab === 'masters') bindMasterCards();
  }

  function bindMasterCards() {
    contentEl.querySelectorAll('[data-master]').forEach((el) => {
      el.addEventListener('click', () => {
        contentEl.innerHTML = masterDetail(el.getAttribute('data-master'));
        const back = document.getElementById('master-back');
        if (back) back.addEventListener('click', () => showTab('masters'));
      });
    });
  }

  document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
    t.addEventListener('click', () => showTab(t.getAttribute('data-tab'))));

  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  showTab('cards');
};


/* ===== ui/screens/psychology.js ===== */
// ui/screens/psychology.js — 心理档案分析屏（8 维向量 + 类型 + 建议）


function renderPsychology() {
  const player = Store.get('player');
  const total = player ? player.total : 0;

  const head = `
    <div class="flex-between">
      <div class="section-title">▶ 心理档案分析</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>`;

  if (!PsychAnalyzer.hasEnoughData(total)) {
    return `${head}${C.hint('您还没有足够的训练数据。请先完成至少 2 场博弈训练，心理档案将更加准确。', 'yellow')}`;
  }

  const profile = PsychAnalyzer.getProfile();
  const bars = PSYCH_DIMENSIONS.map((d) =>
    C.bar(d.label, profile[d.key] || 0.5, d.color)).join('');
  const pt = PsychAnalyzer.getProfileType();

  return `${head}
    ${C.panel('博弈心理类型', `
      <div style="text-align:center;padding:12px 0">
        <div style="font-size:24px;color:var(--cyan);font-weight:bold">${pt.name}</div>
        <div style="color:var(--dim);font-size:12px;margin-top:6px">${pt.desc}</div>
      </div>`)}
    ${C.panel('8维心理向量分析', bars)}
    ${C.panel('成长建议', pt.advice.map((a) => C.hint(`• ${a}`)).join(''))}
  `;
}

renderPsychology.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
};


/* ===== ui/screens/dashboard.js ===== */
// ui/screens/dashboard.js — 训练成绩看板


function renderDashboard() {
  const p = Store.get('player') || { name: '—', sessions: [], total: 0, wins: 0, draws: 0, losses: 0 };
  const rank = getRank(p.total, p.wins);
  const wr = p.total > 0 ? Math.round(p.wins / p.total * 100) : 0;

  const recent = (p.sessions || []).slice(-8).reverse();
  const histHtml = recent.length ? recent.map((r) => {
    const oc = r.outcome === 'win' ? 'outcome-win' : r.outcome === 'lose' ? 'outcome-lose' : r.outcome === 'coop' ? 'outcome-coop' : 'outcome-draw';
    const ocLabel = r.outcome === 'win' ? '胜' : r.outcome === 'lose' ? '负' : r.outcome === 'coop' ? '合作' : '平';
    return `<div class="info-row">
      <span class="info-key">${r.time}</span>
      <span>${r.scenario}</span>
      <span style="color:var(--dim)">${r.opponent}</span>
      <span class="outcome ${oc}" style="padding:1px 6px;font-size:10px">${ocLabel}</span>
    </div>`;
  }).join('') : '<div style="color:var(--dim);font-size:12px;padding:8px">暂无训练记录</div>';

  return `
    <div class="flex-between">
      <div class="section-title">▶ 训练成绩看板</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="grid3" style="margin-bottom:16px">
      ${C.scoreBox(p.total, '总训练场次')}
      ${C.scoreBox(`${wr}%`, '综合胜率', 'var(--green)')}
      ${C.scoreBox(rank, '当前军衔', 'var(--yellow)')}
    </div>
    ${C.panel('战绩统计', `
      <div class="grid3">
        <div style="text-align:center"><div style="color:var(--green);font-size:20px;font-weight:bold">${p.wins || 0}</div><div style="color:var(--dim);font-size:11px">胜利</div></div>
        <div style="text-align:center"><div style="color:var(--yellow);font-size:20px;font-weight:bold">${p.draws || 0}</div><div style="color:var(--dim);font-size:11px">平局/合作</div></div>
        <div style="text-align:center"><div style="color:var(--red);font-size:20px;font-weight:bold">${p.losses || 0}</div><div style="color:var(--dim);font-size:11px">失利</div></div>
      </div>`)}
    ${C.panel('最近训练记录', histHtml)}
  `;
}

renderDashboard.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
};


/* ===== core/bootstrap.js ===== */
// core/bootstrap.js — 应用启动入口（组合根）
// 职责：注册所有屏幕 → 初始化对局视图/记录器/控制器 → 渲染首屏。
// 作为组合根，允许 import 各模块进行装配；这是依赖图的根，build.js 把它放最后。




function boot() {
  const root = document.getElementById('app');
  if (!root) { console.error('[bootstrap] #app not found'); return; }

  // 注册屏幕
  Router.register(SCREENS.WELCOME, renderWelcome);
  Router.register(SCREENS.MAIN, renderMainMenu);
  Router.register(SCREENS.SCENARIO_SELECT, renderScenarioSelect);
  Router.register(SCREENS.OPPONENT_SELECT, renderOpponentSelect);
  Router.register(SCREENS.GAME, renderGame);
  Router.register(SCREENS.RESULT, renderResult);
  Router.register(SCREENS.STRATEGY, renderStrategyLib);
  Router.register(SCREENS.PSYCHOLOGY, renderPsychology);
  Router.register(SCREENS.DASHBOARD, renderDashboard);

  // 初始化对局视图（game:render 落地 + 动作委托）
  initGameView();
  // 先初始化记录器，再初始化控制器 —— 保证 game:end 时"先记录、后导航"
  initRecorder();
  initRunner();

  // 启动路由，首屏 = 欢迎屏
  Router.init(root, SCREENS.WELCOME);
  console.log('[bootstrap] v3 启动完成 ✓ (Phase 2：全功能迁移)');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
