/* ════════════════════════════════════════════════════════════════════════════
   卡牌 v2 升级：升星 / UR印记 / 重写 drawOne 使用新碎片表
   ════════════════════════════════════════════════════════════════════════════ */
const DUPLICATE_SHARDS_V2 = { N: 5, R: 15, SR: 50, SSR: 150, UR: 500 };

function ensureSkillCardFieldsV2(player) {
  if (!player) return player;
  SkillBlindBox.ensureCardState(player);
  player.skillCardStars       = player.skillCardStars || {};
  player.skillCardMarks       = player.skillCardMarks || { UR: 0 };
  player.skillCardFusionOwned = player.skillCardFusionOwned || [];
  player.skillCardSetRewards  = player.skillCardSetRewards || [];
  player.legendaryMentors     = player.legendaryMentors || {
    owned: [], fragments: {}, equipped: null, duplicates: {},
    stars: {}, duelRecords: {}, titles: [], borders: [],
    pity: { packs: 0, sinceSSRMaster: 0, sinceURLegend: 0, sinceLRSignature: 0 }
  };
  player.skillProfile         = player.skillProfile || {};
  SKILL_TAG_KEYS.forEach((tag) => {
    player.skillProfile[tag] = player.skillProfile[tag] || {
      attempts: 0, avgScore: 0, lastScore: 0,
      streakPass: 0, weaknessCount: 0, mastered: false
    };
  });
  player.masteryTree          = player.masteryTree || {};
  SKILL_TAG_KEYS.forEach((tag) => { if (typeof player.masteryTree[tag] !== 'number') player.masteryTree[tag] = 0; });
  player.packStats            = player.packStats || { totalOpened: 0 };
  player.cardWishlist         = player.cardWishlist || null;
  player.flags                = player.flags || {};
  player.localReplays         = player.localReplays || [];
  player.reviewQuestions      = player.reviewQuestions || [];
  player.storyRuns            = player.storyRuns || {};
  player.duelRecords          = player.duelRecords || {};
  return player;
}

function updateCardStarByDuplicates(player, cardId) {
  const dup = player.skillCardDuplicates[cardId] || 0;
  let star = 1;
  if (dup >= 10) star = 5;
  else if (dup >= 6) star = 4;
  else if (dup >= 3) star = 3;
  else if (dup >= 1) star = 2;
  player.skillCardStars[cardId] = Math.max(player.skillCardStars[cardId] || 1, star);
  return player.skillCardStars[cardId];
}

// 覆盖 SkillBlindBox.drawOne：使用 v2 碎片表 + 升星 + UR印记 + packStats
(function patchDrawOneV2() {
  const _origDraw = SkillBlindBox.drawOne;
  SkillBlindBox.drawOne = function (player, packType) {
    ensureSkillCardFieldsV2(player);
    const out = _origDraw.call(this, player, packType);
    if (!out) return out;
    // 重新计算 shard 用 v2 表（修正 _origDraw 用的旧 BLINDBOX_CONFIG.rarities.shards）
    if (out.duplicate) {
      const v2Shard = DUPLICATE_SHARDS_V2[out.card.rarity] || 5;
      const oldShard = BLINDBOX_CONFIG.rarities[out.card.rarity].shards;
      const delta = v2Shard - oldShard;
      if (delta !== 0) player.cardShards = (player.cardShards || 0) + delta;
      out.shard = v2Shard;
      if (out.card.rarity === 'UR') player.skillCardMarks.UR = (player.skillCardMarks.UR || 0) + 1;
    } else {
      // 新卡 → 1 星
      player.skillCardStars[out.card.id] = 1;
    }
    // 升星（基于 duplicates）
    updateCardStarByDuplicates(player, out.card.id);
    return out;
  };
})();

// 覆盖 SkillBlindBox.openPack：包大小固定 5、且至少 1 张 R+、记录 packStats
(function patchOpenPackV2() {
  const _origOpen = SkillBlindBox.openPack;
  SkillBlindBox.openPack = function (player, packIndex) {
    ensureSkillCardFieldsV2(player);
    const pack = player.skillCardPacks && player.skillCardPacks[packIndex];
    if (!pack) return null;
    const results = [];
    let hasR = false;
    for (let i = 0; i < BLINDBOX_CONFIG.packSize; i++) {
      const r = SkillBlindBox.drawOne(player, pack.type);
      results.push(r);
      if (['R', 'SR', 'SSR', 'UR'].includes(r.card.rarity)) hasR = true;
    }
    // 单包至少 1 张 R+；若最差全 N，则强制升级最后一张到 R
    if (!hasR && results.length) {
      const lastN = results[results.length - 1];
      const rPool = SKILL_CARDS.filter((c) => c.rarity === 'R');
      if (rPool.length) {
        const newCard = rPool[Math.floor(Math.random() * rPool.length)];
        // 撤回旧的统计
        const collIdx = player.skillCardCollection.indexOf(lastN.card.id);
        if (!lastN.duplicate && collIdx >= 0) player.skillCardCollection.splice(collIdx, 1);
        else if (lastN.duplicate) {
          player.skillCardDuplicates[lastN.card.id] = Math.max(0, (player.skillCardDuplicates[lastN.card.id] || 1) - 1);
          player.cardShards = Math.max(0, (player.cardShards || 0) - lastN.shard);
        }
        // 重新发放为 R
        const isDup = player.skillCardCollection.includes(newCard.id);
        if (isDup) {
          const sh = DUPLICATE_SHARDS_V2.R;
          player.skillCardDuplicates[newCard.id] = (player.skillCardDuplicates[newCard.id] || 0) + 1;
          player.cardShards = (player.cardShards || 0) + sh;
          results[results.length - 1] = { card: newCard, duplicate: true, shard: sh };
        } else {
          player.skillCardCollection.push(newCard.id);
          player.skillCardStars[newCard.id] = 1;
          results[results.length - 1] = { card: newCard, duplicate: false, shard: 0 };
        }
        updateCardStarByDuplicates(player, newCard.id);
      }
    }
    player.skillCardPacks.splice(packIndex, 1);
    player.packStats.totalOpened = (player.packStats.totalOpened || 0) + 1;
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_PACK_OPENED, { pack, results });
    return { pack, results };
  };
})();


/* ════════════════════════════════════════════════════════════════════════════
   卡牌使用规则 v2：1 张/回合、SSR/UR 1 张/局、关键回合连携惩罚
   ════════════════════════════════════════════════════════════════════════════ */
const CARD_USAGE_RULES = {
  maxLoadoutPerGame: 3,
  maxActiveCardsPerRound: 1,
  maxCardsUsedPerGame: 3,
  maxSSRorURPerGame: 1,
  eachCardUseLimit: 1,
  allowComboOnlyInCriticalRound: true,
  maxCardsInCriticalRound: 2,
  comboPenalty: { opponentAlertness: 15, opponentStrategy: 10, finalDefense: 10 }
};

function isCriticalRound() {
  const scenario = Store.get('activeScenario');
  if (!scenario) return false;
  const mood = (scenario.opp && typeof Mood !== 'undefined') ? (Mood.get(scenario.opp.id) || {}) : {};
  const totalRounds = scenario.rounds || scenario.stages || 5;
  const round = scenario.round || scenario.stage || 0;
  return Boolean(
    scenario._criticalRound ||
    (mood.anger && mood.anger > 0.75) ||
    (typeof totalRounds === 'number' && typeof round === 'number' && round >= totalRounds - 2) ||
    (scenario.opp && scenario.opp.boss) ||
    Store.get('difficulty') === 'hell'
  );
}

// 覆盖 SkillCardEffects.canUse：增加 v2 规则
(function patchCanUseV2() {
  SkillCardEffects.canUse = function (cardId) {
    const loadout = Store.get('activeCardLoadout') || [];
    if (!loadout.includes(cardId)) return { ok: false, reason: '本局未携带这张卡' };
    const used = Store.get('usedCardsThisGame') || [];
    if (used.includes(cardId)) return { ok: false, reason: '每张卡每局最多使用 1 次' };
    if (used.length >= CARD_USAGE_RULES.maxCardsUsedPerGame) {
      return { ok: false, reason: `每局最多使用 ${CARD_USAGE_RULES.maxCardsUsedPerGame} 张技能卡` };
    }
    const card = SKILL_CARDS.find((c) => c.id === cardId);
    if (!card) return { ok: false, reason: '无效卡牌' };
    // SSR/UR 每局 1 张
    const usedHigh = used.map((id) => SKILL_CARDS.find((c) => c.id === id))
                          .filter((c) => c && (c.rarity === 'SSR' || c.rarity === 'UR')).length;
    if ((card.rarity === 'SSR' || card.rarity === 'UR') && usedHigh >= CARD_USAGE_RULES.maxSSRorURPerGame) {
      return { ok: false, reason: 'SSR/UR 技能卡每局最多使用 1 张' };
    }
    // 1 张/回合（关键回合可 2 张）
    const usedThisRound = Store.get('usedCardsThisRound') || [];
    const critical = isCriticalRound();
    const maxThisRound = critical ? CARD_USAGE_RULES.maxCardsInCriticalRound : CARD_USAGE_RULES.maxActiveCardsPerRound;
    if (usedThisRound.length >= maxThisRound) {
      return { ok: false, reason: critical ? '关键回合最多连携 2 张卡' : '普通回合最多使用 1 张主动技能卡' };
    }
    return { ok: true, critical };
  };
})();

// 覆盖 use：每回合计数 + 关键回合连携惩罚
(function patchUseV2() {
  const _origUse = SkillCardEffects.use;
  SkillCardEffects.use = function (cardId) {
    const gate = SkillCardEffects.canUse(cardId);
    if (!gate.ok) return gate;
    const res = _origUse.call(this, cardId);
    if (!res || !res.ok) return res;
    // 标记本回合
    const usedThisRound = (Store.get('usedCardsThisRound') || []).slice();
    usedThisRound.push(cardId);
    Store.set('usedCardsThisRound', usedThisRound);
    // 关键回合连携惩罚（第二张卡触发）
    if (usedThisRound.length >= 2 && typeof OpponentAdaptation !== 'undefined') {
      const pen = CARD_USAGE_RULES.comboPenalty;
      // 直接调整对手适应（不通过卡牌 adapt 卡，因为这是连携附加项）
      const state = Object.assign({}, OpponentAdaptation.getState());
      state.alertness = Math.min(100, (state.alertness || 0) + pen.opponentAlertness);
      state.strategy  = Math.min(100, (state.strategy || 0) + pen.opponentStrategy);
      state.endgameDefense = Math.min(100, (state.endgameDefense || 0) + pen.finalDefense);
      state.history = (state.history || []).concat({
        cardId: 'combo', attr: 'combo',
        amount: pen.opponentAlertness, ts: Date.now(),
        text: '【连携惩罚】对手识别你的连续打牌，警觉 +' + pen.opponentAlertness + ' / 策略 +' + pen.opponentStrategy + ' / 终局防守 +' + pen.finalDefense
      });
      Store.set('opponentAdaptation', state);
      EventBus.emit(EVENTS.OPPONENT_ADAPTED, {
        opponent: Store.get('opponent'),
        card: { name: '连携惩罚', rarity: 'N' },
        attr: 'combo', amount: pen.opponentAlertness,
        text: '【关键回合连携惩罚】对手识别你的双卡组合，全面提高防御',
        state
      });
    }
    return res;
  };
})();

// 每回合切换时清空 usedCardsThisRound（钩到 AI_DECIDED 或 GAME_RENDER 之间）
(function attachRoundResetV2() {
  // 我们用一个轻量的回合检测：每次 AI_DECIDED 表示一回合结束，下一次 game:render 是新回合
  let lastRoundKey = null;
  EventBus.on(EVENTS.GAME_RENDER, () => {
    const scenario = Store.get('activeScenario');
    if (!scenario) return;
    const round = scenario.round != null ? scenario.round : scenario.stage;
    const key = (scenario.scenarioKey || 'x') + ':' + (round != null ? round : 0);
    if (key !== lastRoundKey) {
      Store.set('usedCardsThisRound', []);
      lastRoundKey = key;
    }
  });
})();

const LegendBlindBox = (() => {
  function pickLegendSlot(pity) {
    // 保底优先
    if ((pity.sinceLRSignature + 1) >= LEGEND_BLINDBOX_CONFIG.pity.lrSignatureEveryPacks) {
      return { kind: 'lrSignatureCard' };
    }
    if ((pity.sinceURLegend + 1) >= LEGEND_BLINDBOX_CONFIG.pity.urLegendEveryPacks) {
      return { kind: 'urLegendCard' };
    }
    if ((pity.sinceSSRMaster + 1) >= LEGEND_BLINDBOX_CONFIG.pity.ssrMasterEveryPacks) {
      return { kind: 'ssrMasterCard' };
    }
    // 概率抽
    const slot = LEGEND_BLINDBOX_CONFIG.legendSlot;
    const r = Math.random();
    let acc = 0;
    for (const k of Object.keys(slot)) {
      acc += slot[k];
      if (r <= acc) return { kind: k };
    }
    return { kind: 'characterFragment10' };
  }

  function drawLegendPack(player) {
    ensureSkillCardFieldsV2(player);
    const pity = player.legendaryMentors.pity;
    pity.packs = (pity.packs || 0) + 1;
    const results = [];
    // 前 3 个：技能卡 / 技能碎片
    for (let i = 0; i < 3; i++) results.push({ kind: 'skill', value: SkillBlindBox.drawOne(player, 'basic') });
    // 第 4 个：人物碎片（30 → 60 之间，随机一个 UR mentor）
    const urPool = LEGEND_DUELISTS.filter((d) => d.rarity === 'UR_LEGEND');
    const fragMentor = urPool[Math.floor(Math.random() * urPool.length)];
    const fragAmt = 30 + Math.floor(Math.random() * 30);
    player.legendaryMentors.fragments[fragMentor.id] = (player.legendaryMentors.fragments[fragMentor.id] || 0) + fragAmt;
    results.push({ kind: 'fragment', mentorId: fragMentor.id, mentor: fragMentor, amount: fragAmt });

    // 第 5 个：传奇位
    const slot = pickLegendSlot(pity);
    let slotResult = null;
    switch (slot.kind) {
      case 'characterFragment10': {
        const m = urPool[Math.floor(Math.random() * urPool.length)];
        player.legendaryMentors.fragments[m.id] = (player.legendaryMentors.fragments[m.id] || 0) + 10;
        slotResult = { kind: 'characterFragment', mentor: m, amount: 10 };
        break;

      case 'masterFragment20': {
        const ssrPool = LEGEND_DUELISTS.filter((d) => d.rarity === 'SSR_MASTER');
        const m = ssrPool[Math.floor(Math.random() * ssrPool.length)];
        player.legendaryMentors.fragments[m.id] = (player.legendaryMentors.fragments[m.id] || 0) + 20;
        slotResult = { kind: 'masterFragment', mentor: m, amount: 20 };
        break;
      }
      case 'ssrMasterCard': {
        const ssrPool = LEGEND_DUELISTS.filter((d) => d.rarity === 'SSR_MASTER');
        const m = ssrPool[Math.floor(Math.random() * ssrPool.length)];
        slotResult = unlockMentor(player, m);
        slotResult.kind = 'ssrMasterCard';
        slotResult.mentor = m;
        pity.sinceSSRMaster = 0;
        break;
      }
      case 'urLegendCard': {
        const m = urPool[Math.floor(Math.random() * urPool.length)];
        slotResult = unlockMentor(player, m);
        slotResult.kind = 'urLegendCard';
        slotResult.mentor = m;
        pity.sinceURLegend = 0;
        pity.sinceSSRMaster = 0;
        break;
      }
      case 'lrSignatureCard': {
        // LR 是 UR 传奇的动态签名版本
        const m = urPool[Math.floor(Math.random() * urPool.length)];
        const lr = Object.assign({}, m, { id: m.id + '_lr', rarity: 'LR_SIGNATURE', name: m.name + ' · 动态签名' });
        slotResult = unlockMentor(player, lr);
        slotResult.kind = 'lrSignatureCard';
        slotResult.mentor = lr;
        pity.sinceLRSignature = 0;
        pity.sinceURLegend = 0;
        pity.sinceSSRMaster = 0;
        break;
      }
    }
    // 推进未命中的保底计数
    if (slot.kind !== 'ssrMasterCard' && slot.kind !== 'urLegendCard' && slot.kind !== 'lrSignatureCard') {
      pity.sinceSSRMaster = (pity.sinceSSRMaster || 0) + 1;
    }
    if (slot.kind !== 'urLegendCard' && slot.kind !== 'lrSignatureCard') {
      pity.sinceURLegend = (pity.sinceURLegend || 0) + 1;
    }
    if (slot.kind !== 'lrSignatureCard') {
      pity.sinceLRSignature = (pity.sinceLRSignature || 0) + 1;
    }
    results.push(slotResult);
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_PACK_OPENED, { pack: { type: 'legend' }, results });
    return results;
  }

  function unlockMentor(player, mentor) {
    const id = mentor.id;
    if (player.legendaryMentors.owned.includes(id)) {
      player.legendaryMentors.duplicates[id] = (player.legendaryMentors.duplicates[id] || 0) + 1;
      const dup = player.legendaryMentors.duplicates[id];
      let star = 1;
      if (dup >= 6) star = 5; else if (dup >= 3) star = 4; else if (dup >= 1) star = 2;
      player.legendaryMentors.stars[id] = Math.max(player.legendaryMentors.stars[id] || 1, star);
      // 重复 → 转碎片
      const refund = (mentor.rarity === 'UR_LEGEND' || mentor.rarity === 'LR_SIGNATURE') ? 60 : 30;
      player.legendaryMentors.fragments[id] = (player.legendaryMentors.fragments[id] || 0) + refund;
      return { kind: 'mentorDup', mentor, refund };
    }
    player.legendaryMentors.owned.push(id);
    player.legendaryMentors.stars[id] = 1;
    return { kind: 'mentorNew', mentor };
  }

  function exchangeByFragments(player, mentorId) {
    ensureSkillCardFieldsV2(player);
    const mentor = getMentor(mentorId);
    if (!mentor) return { ok: false, reason: '未知导师' };
    if (player.legendaryMentors.owned.includes(mentorId)) {
      return { ok: false, reason: '已持有该导师' };
    }
    const need = mentor.rarity === 'UR_LEGEND' ? LEGEND_BLINDBOX_CONFIG.exchange.urLegendFragments :
                 mentor.rarity === 'SSR_MASTER' ? LEGEND_BLINDBOX_CONFIG.exchange.ssrMasterFragments : 200;
    const have = player.legendaryMentors.fragments[mentorId] || 0;
    if (have < need) return { ok: false, reason: `碎片不足（${have}/${need}）` };
    player.legendaryMentors.fragments[mentorId] = have - need;
    unlockMentor(player, mentor);
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_UNLOCKED, { mentor });
    return { ok: true, mentor };
  }

  function equipMentor(player, mentorId) {
    ensureSkillCardFieldsV2(player);
    if (mentorId && !player.legendaryMentors.owned.includes(mentorId)) {
      return { ok: false, reason: '未拥有该导师' };
    }
    player.legendaryMentors.equipped = mentorId || null;
    savePlayer(player);
    return { ok: true, mentorId };
  }

  return { drawLegendPack, unlockMentor, exchangeByFragments, equipMentor };
})();


/* ════════════════════════════════════════════════════════════════════════════
   导师能量系统 + 局前装备
   ════════════════════════════════════════════════════════════════════════════ */
const MENTOR_ENERGY_RULES = {
  styleMatchedAction: 34, adjacentAction: 17, offStyleAction: 0,
  triggerThreshold: 100, teachingMinRound: 2, teachingMaxRound: 5
};

function getEquippedMentor() {
  const player = Store.get('player');
  if (!player || !player.legendaryMentors || !player.legendaryMentors.equipped) return null;
  return getMentor(player.legendaryMentors.equipped);
}

function addMentorEnergy(actionTag) {
  const mentor = getEquippedMentor();
  if (!mentor) return null;
  const state = Store.get('mentorEnergyState') || { energy: 0, triggered: false };
  if (state.triggered) return state;
  const gain = (mentor.styleTags || []).includes(actionTag) ? MENTOR_ENERGY_RULES.styleMatchedAction :
               (mentor.adjacentTags || []).includes(actionTag) ? MENTOR_ENERGY_RULES.adjacentAction : 0;
  state.energy = Math.min(100, (state.energy || 0) + gain);
  Store.set('mentorEnergyState', state);
  return { gain, energy: state.energy };
}

function tryTriggerMentor() {
  const mentor = getEquippedMentor();
  if (!mentor) return null;
  const state = Store.get('mentorEnergyState') || { energy: 0, triggered: false };
  if (state.triggered) return null;
  if (state.energy < MENTOR_ENERGY_RULES.triggerThreshold) return null;
  state.triggered = true;
  Store.set('mentorEnergyState', state);
  // 触发反馈
  const trigger = {
    title: `【${mentor.name}】触发：${mentor.passive.name}`,
    reason: '能量充满，对应风格行动累计达成 100',
    advice: mentor.passive.effect,
    adaptation: '对手识别你的师承风格，对应防守值 +10',
    signature: (mentor.signature || [''])[0]
  };
  Store.set('mentorLastTrigger', trigger);
  // 对手对应适应
  if (typeof OpponentAdaptation !== 'undefined') {
    const adapt = Object.assign({}, OpponentAdaptation.getState());
    adapt.strategy = Math.min(100, (adapt.strategy || 0) + 10);
    adapt.history = (adapt.history || []).concat({
      cardId: 'mentor:' + mentor.id, attr: 'strategy', amount: 10,
      text: `对手识别【${mentor.name}】路线，策略 +10`,
      ts: Date.now()
    });
    Store.set('opponentAdaptation', adapt);
    EventBus.emit(EVENTS.OPPONENT_ADAPTED, {
      opponent: Store.get('opponent'), card: { name: mentor.name, rarity: mentor.rarity },
      attr: 'strategy', amount: 10, text: `导师触发：${mentor.passive.name}（对手策略 +10）`,
      state: adapt
    });
  }
  return trigger;
}


/* ════════════════════════════════════════════════════════════════════════════
   能力标签 & 个人训练画像 · skillProfile / 训练路径推荐
   ════════════════════════════════════════════════════════════════════════════ */
const SkillProfile = (() => {
  function update(player, deltas) {
    ensureSkillCardFieldsV2(player);
    Object.entries(deltas || {}).forEach(([tag, score]) => {
      const p = player.skillProfile[tag];
      if (!p) return;
      p.attempts++;
      p.lastScore = score;
      p.avgScore = Math.round(((p.avgScore * (p.attempts - 1)) + score) / p.attempts);
      p.streakPass = score >= 80 ? p.streakPass + 1 : 0;
      p.weaknessCount = score < 65 ? p.weaknessCount + 1 : Math.max(0, p.weaknessCount - 1);
      p.mastered = p.streakPass >= 3 || p.avgScore >= 85;
    });
    savePlayer(player);
  }

  function recommend(player) {
    ensureSkillCardFieldsV2(player);
    const entries = Object.entries(player.skillProfile).sort((a, b) =>
      (b[1].weaknessCount - a[1].weaknessCount) || (a[1].avgScore - b[1].avgScore)
    );
    const weakest = entries.slice(0, 2).map(([tag]) => tag);
    const strongest = entries.slice(-2).map(([tag]) => tag);
    return { weakest, strongest, message: buildRecommendMessage(weakest, strongest, player) };
  }

  function buildRecommendMessage(weakest, strongest, player) {
    const w = weakest.map((t) => NEGOTIATION_SKILL_TAGS[t].label).join('、');
    const totalAttempts = Object.values(player.skillProfile).reduce((s, p) => s + (p.attempts || 0), 0);
    if (totalAttempts < 3) return '建议先完成 3 场基础场景训练，系统将为你建立能力画像。';
    let msg = `推荐继续训练【${w}】。`;
    // 推荐场景：从 SCENARIO_META 选与 weakest 对应的场景
    const sceneMap = SCENARIO_TAG_MAP || {};
    const candidate = weakest.find((t) => sceneMap[t] && sceneMap[t].length);
    if (candidate && sceneMap[candidate]) {
      const sname = sceneMap[candidate][0];
      msg += `具体可选 ${sname}。`;
    }
    // 推荐导师
    const mentor = LEGEND_DUELISTS.find((m) =>
      (m.styleTags || []).some((t) => weakest.includes(t)) &&
      (player.legendaryMentors && player.legendaryMentors.owned || []).includes(m.id)
    );
    if (mentor) msg += `导师推荐：${mentor.name}（${mentor.style}）。`;
    return msg;
  }

  function masteryProgress(player, tag) {
    ensureSkillCardFieldsV2(player);
    return player.masteryTree[tag] || 0;
  }
  function addMasteryProgress(player, tag, amount) {
    ensureSkillCardFieldsV2(player);
    player.masteryTree[tag] = Math.min(100, (player.masteryTree[tag] || 0) + (amount || 1));
    savePlayer(player);
  }

  return { update, recommend, masteryProgress, addMasteryProgress };
})();

// 现有 SCENARIO_META 的能力标签映射

  info:       ['信任博弈', '联盟谈判'],
  agenda:     ['最后通牒', '砍价谈判'],
  pressure:   ['危机谈判', '砍价谈判'],

  endgame:    ['最后通牒', '砍价谈判'],
  batna:      ['砍价谈判'],
  standard:   ['公共品博弈', '联盟谈判'],
  emotion:    ['危机谈判', '信任博弈'],

};

/* ── 检索式复盘题 + 精通树 ─────────────────────────────────────── */
const RetrievalReview = (() => {
  const TEMPLATES = {
    info:       { question: '本局你最应该先验证哪类信息？', answer: '对方真实目标、替代方案和承诺可信度。' },
    endgame:    { question: '为什么条件好看不一定等于终局胜利？', answer: '因为执行风险、模糊承诺和后续成本可能抵消表面收益。' },
    batna:      { question: '亮出替代方案前，需要先确认什么？', answer: '替代方案是否真实、可信、可执行，并且不会过早暴露底牌。' },
    retreat:    { question: '什么情况下战略撤退可以被视为高级胜利？', answer: '当继续成交会破坏底线、带来长期风险或落入坏交易时。' },
    agenda:     { question: '议题被对方带偏时，最快的回正方式是什么？', answer: '回到双方共同利益清单，把分歧议题重新打包到次要位置。' },
    pressure:   { question: '面对极端锚定，最大的失误是什么？', answer: '在锚定参考系内还价——应先重新定义议题，跳出锚定。' },
    trust:      { question: '为什么口头积极信号不等同于真实让步？', answer: '因为对方还没有明确时间表与书面条件。' },
    standard:   { question: '客观标准在什么时候反而会被对方利用？', answer: '当你引用对方擅长的标准时——必须挑选对己方有利的中立来源。' },
    emotion:    { question: '标注对方情绪后必须紧跟什么？', answer: '一个具体的、可验证的下一步行动建议。' },
    concession: { question: '让步必须绑定什么才不会被对手视为弱势？', answer: '一个明确、可验证的对等条件或时间表承诺。' }
  };

  function generate(player, runResult) {
    ensureSkillCardFieldsV2(player);
    const weak = runResult && runResult.weakestTag;
    const tag = weak && TEMPLATES[weak] ? weak : (Object.keys(TEMPLATES)[Math.floor(Math.random() * Object.keys(TEMPLATES).length)]);
    const tpl = TEMPLATES[tag];
    const q = {
      id: 'review_' + Date.now(),
      tag, question: tpl.question, answer: tpl.answer,
      createdAt: Date.now(), dueAt: Date.now() + 86400000, answered: false
    };
    player.reviewQuestions = (player.reviewQuestions || []).concat(q).slice(-30);
    savePlayer(player);
    return q;
  }

  function getPending(player) {
    ensureSkillCardFieldsV2(player);
    const now = Date.now();
    return (player.reviewQuestions || []).filter((q) => !q.answered && q.dueAt <= now);
  }

  function answer(player, id) {
    ensureSkillCardFieldsV2(player);
    const q = (player.reviewQuestions || []).find((x) => x.id === id);
    if (!q) return null;
    q.answered = true;
    q.answeredAt = Date.now();
    if (q.tag) SkillProfile.addMasteryProgress(player, q.tag, 5);
    savePlayer(player);
    return q;
  }

  return { generate, getPending, answer, TEMPLATES };
})();


/* ════════════════════════════════════════════════════════════════════════════
   AI 对手记忆 / 意图信号 / 重复策略递减
   ════════════════════════════════════════════════════════════════════════════ */
const AIMemoryV2 = (() => {
  function fresh() {
    return {
      actionTags: {}, repeatedTag: null, concessionPattern: null,
      lastThreeTurns: [], trustDebt: 0, pressureHistory: 0,
      objectiveStandardUsed: 0, batnaShown: false, intentSignals: []
    };
  }
  function ensure() {
    let s = Store.get('aiMemoryV2');
    if (!s) { s = fresh(); Store.set('aiMemoryV2', s); }
    return s;
  }
  function observe(actionTag) {
    const m = ensure();
    if (!actionTag) return m;
    m.actionTags[actionTag] = (m.actionTags[actionTag] || 0) + 1;
    m.lastThreeTurns.push(actionTag);
    m.lastThreeTurns = m.lastThreeTurns.slice(-3);
    if (m.lastThreeTurns.length >= 3 && m.lastThreeTurns.every((t) => t === actionTag)) {
      m.repeatedTag = actionTag;
    } else {
      m.repeatedTag = null;
    }
    if (actionTag === 'standard') m.objectiveStandardUsed++;
    if (actionTag === 'batna') m.batnaShown = true;
    if (actionTag === 'pressure') m.pressureHistory++;
    Store.set('aiMemoryV2', m);
    return m;
  }
  function intentionSignal() {
    const m = ensure();
    if (m.repeatedTag === 'info')     return '对手开始减少细节回应，回答更模糊。';
    if (m.repeatedTag === 'pressure') return '对手开始提高防御姿态，强压效果可能下降。';
    if (m.repeatedTag === 'emotion')  return '对手开始测试你的底线，判断你是否会继续退让。';
    if (m.repeatedTag === 'standard') return '对手准备引用相反的标准，框架对抗即将开始。';
    if (m.repeatedTag === 'concession') return '对手开始抬高让步门槛，要求更明确对等。';
    if (m.batnaShown && m.pressureHistory >= 2) return '对手在 BATNA 与高压之间寻找你的真实底线。';
    return '对手正在观察你的策略节奏。';
  }

  // ActionTag 递减系数
  const DIMINISH = [1.0, 0.75, 0.5, 0.25];
  function applyDiminishing(actionTag, baseDelta) {
    const m = ensure();
    const used = m.actionTags[actionTag] || 0;
    const mult = DIMINISH[Math.min(used, DIMINISH.length - 1)];
    const adjusted = {};
    Object.entries(baseDelta || {}).forEach(([k, v]) => { adjusted[k] = Math.round(v * mult); });
    return { adjusted, multiplier: mult, used };
  }

  return { fresh, ensure, observe, intentionSignal, applyDiminishing };
})();

// 把 skillTags → actionTag 映射（每张卡使用时记录到 AIMemoryV2）
EventBus.on(EVENTS.PLAYER_CARD_USED, ({ card }) => {
  if (!card || !card.skillTags) return;
  // 取 skillTags 第一个作为主 actionTag
  const tag = card.skillTags[0];
  if (tag) AIMemoryV2.observe(tag);
});


/* ════════════════════════════════════════════════════════════════════════════
   传奇试炼场 · Legend Duel（5 metrics × 6 rounds）
   ════════════════════════════════════════════════════════════════════════════ */
const DUEL_METRICS = ['information', 'agenda', 'pressure', 'trust', 'endgame'];
const DUEL_METRIC_LABEL = {
  information: '信息权', agenda: '议题权', pressure: '压力权',
  trust: '信任权', endgame: '终局权'
};
const DUEL_OUTCOME_LABEL = {
  strategicWin: { name: '策略胜利', icon: '🏆', narrative: '你掌握了节奏，对手在你的框架内被动应对。' },
  defensiveWin: { name: '防守胜利', icon: '🛡️', narrative: '你守住了底线，对手未能撼动核心。' },
  cooperativeWin:{ name: '合作胜利', icon: '🤝', narrative: '你与对手找到了双方都能签的方案。' },
  narrowLoss:   { name: '小败',    icon: '⚠️', narrative: '你失了几分，但未崩盘——这次复盘很有价值。' },
  collapse:     { name: '全面失守', icon: '💀', narrative: '对手击穿了你的多条态势——下次提前布防。' }
};

const DUEL_PHASES = [
  { round: 1, title: '准备阶段',  brief: '展示意图，争取信息权。' },
  { round: 2, title: '开局锚定',  brief: '议题权与压力权的第一次交锋。' },
  { round: 3, title: '信息试探',  brief: '深问对手真实诉求。' },
  { round: 4, title: '压力交锋',  brief: '高压回合，注意不被锚定带偏。' },
  { round: 5, title: '交换让步',  brief: '让步必须绑定对等条件。' },
  { round: 6, title: '终局拍板',  brief: '决定本局走向的最后一手。' }
];

const DUEL_CHOICES = [
  { key: 'info',     label: '探询信息', metric: 'information', delta: 12, tag: 'info',
    desc: '深问对手真实诉求，建立信息优势。', sample: '我想先了解你这边真正的优先级是什么。' },
  { key: 'reframe',  label: '重定议题', metric: 'agenda', delta: 12, tag: 'agenda',
    desc: '把对方锚定的议题重新框定到你的方向。', sample: '让我们换个角度——这不是价格问题，是结构问题。' },
  { key: 'pressure', label: '施加压力', metric: 'pressure', delta: 12, tag: 'pressure',
    desc: '建立 BATNA 或时间窗口的压迫感。', sample: '11 点前我必须有答复，11 点之后我们会启动 B 方案。' },
  { key: 'build',    label: '建立信任', metric: 'trust', delta: 12, tag: 'trust',
    desc: '释放善意 + 标注情绪 + 共同利益。', sample: '我听见你担心的是 X，我们可以先把它放进保护条款。' },
  { key: 'lock',     label: '终局拍板', metric: 'endgame', delta: 12, tag: 'endgame',
    desc: '把已达成的共识落到可签字的具体条件。', sample: '我们把目前一致的部分写下来，剩下的逐条解决。' }
];

const LegendDuel = (() => {
  function start(duelistId) {
    const duelist = getMentor(duelistId);
    if (!duelist) return null;
    // 初始 metrics 50，根据 duelist.bias 微调
    const metrics = {};
    DUEL_METRICS.forEach((m) => { metrics[m] = 50; });
    Object.entries(duelist.bias || {}).forEach(([k, v]) => {
      if (typeof metrics[k] === 'number') metrics[k] = Math.max(0, Math.min(100, metrics[k] - v));
    });
    const state = {
      mode: 'legend_duel',
      duelistId,
      duelist,
      round: 0,
      totalRounds: 6,
      metrics,
      log: [],
      adaptation: { alertness: 0, defense: 0, bargaining: 0, pressure: 0, strategy: 0, endgameDefense: 0 },
      mentorEnergy: 0,
      mentorTriggered: false,
      completed: false,
      outcome: null,
      perRoundTags: []
    };
    Store.set('duelState', state);
    return state;
  }

  function step(choiceKey) {
    const state = Store.get('duelState');
    if (!state || state.completed) return null;
    const choice = DUEL_CHOICES.find((c) => c.key === choiceKey);
    if (!choice) return null;

    // 递减系数（玩家重复使用同 tag）
    const dim = AIMemoryV2.applyDiminishing(choice.tag, { [choice.metric]: choice.delta });
    const delta = dim.adjusted[choice.metric] || 0;
    state.metrics[choice.metric] = Math.min(100, state.metrics[choice.metric] + delta);

    // AI 反制：对应 metric 略下降 + 对应 adaptation +
    const adaptMap = { info: 'alertness', agenda: 'strategy', pressure: 'pressure', trust: 'defense', endgame: 'endgameDefense' };
    const aKey = adaptMap[choice.tag] || 'strategy';
    state.adaptation[aKey] = Math.min(100, (state.adaptation[aKey] || 0) + (5 + Math.round(8 * (1 - dim.multiplier))));

    // 对手"反向施压"：在玩家强项的反面降 1-3 分
    const counterMetric = choice.metric === 'information' ? 'pressure' :
                          choice.metric === 'agenda' ? 'trust' :
                          choice.metric === 'pressure' ? 'trust' :
                          choice.metric === 'trust' ? 'pressure' : 'pressure';
    state.metrics[counterMetric] = Math.max(0, state.metrics[counterMetric] - (2 + Math.round(2 * dim.multiplier)));

    // AI 记忆
    AIMemoryV2.observe(choice.tag);

    // 导师能量
    const equipped = getEquippedMentor();
    if (equipped) {
      const matched = (equipped.styleTags || []).includes(choice.tag);
      const adj = (equipped.adjacentTags || []).includes(choice.tag);
      const gain = matched ? MENTOR_ENERGY_RULES.styleMatchedAction : adj ? MENTOR_ENERGY_RULES.adjacentAction : 0;
      state.mentorEnergy = Math.min(100, (state.mentorEnergy || 0) + gain);
    }

    // 记录回合
    state.log.push({
      round: state.round,
      phase: DUEL_PHASES[state.round].title,
      choice: choice.key,
      label: choice.label,
      delta, multiplier: dim.multiplier,
      adaptKey: aKey,
      intentionSignal: AIMemoryV2.intentionSignal(),
      mentorEnergy: state.mentorEnergy
    });
    state.perRoundTags.push(choice.tag);
    state.round += 1;

    // 完结
    if (state.round >= state.totalRounds) {
      state.completed = true;
      state.outcome = computeDuelOutcome(state);
      // 写入玩家
      const player = Store.get('player');
      if (player) {
        ensureSkillCardFieldsV2(player);
        player.duelRecords = player.duelRecords || {};
        const rec = player.duelRecords[state.duelistId] || { plays: 0, wins: 0, bestOutcome: null };
        rec.plays++;
        if (['strategicWin', 'defensiveWin', 'cooperativeWin'].includes(state.outcome)) rec.wins++;
        rec.bestOutcome = bestOutcome(rec.bestOutcome, state.outcome);
        player.duelRecords[state.duelistId] = rec;
        // 给奖励
        const reward = duelReward(state.outcome, state.duelist);
        player.cardShards = (player.cardShards || 0) + reward.shards;
        if (reward.mentorFragments && state.duelistId) {
          player.legendaryMentors.fragments[state.duelistId] =
            (player.legendaryMentors.fragments[state.duelistId] || 0) + reward.mentorFragments;
        }
        // 能力标签得分
        const tagScore = {};
        state.perRoundTags.forEach((t) => { tagScore[t] = (tagScore[t] || 0) + 16; });
        SkillProfile.update(player, tagScore);
        // 精通进度
        Object.keys(tagScore).forEach((t) => SkillProfile.addMasteryProgress(player, t, 2));
        // 检索复盘题
        const weakest = state.perRoundTags.length ? state.perRoundTags[state.perRoundTags.length - 1] : 'endgame';
        const reviewQ = RetrievalReview.generate(player, { weakestTag: weakest });
        // 回放
        LocalReplay.add(player, {
          mode: 'duel', duelistId: state.duelistId, duelistName: state.duelist.name,
          outcome: state.outcome, metrics: state.metrics, log: state.log
        });
        savePlayer(player);
        state.reward = reward;
        state.reviewQuestion = reviewQ;
      }
    }
    Store.set('duelState', state);
    return state;
  }

  function computeDuelOutcome(state) {
    const m = state.metrics;
    const high = (k) => m[k] >= 65;
    const low = (k) => m[k] <= 35;
    const lowCount = DUEL_METRICS.filter(low).length;
    const highCount = DUEL_METRICS.filter(high).length;
    if (lowCount >= 3) return 'collapse';
    if (high('trust') && high('endgame') && !low('information')) return 'cooperativeWin';
    if (high('agenda') && high('endgame')) return 'strategicWin';
    if (high('trust') && (m.information >= 50 || m.pressure >= 50)) return 'defensiveWin';
    if (highCount >= 1 && lowCount <= 1) return 'narrowLoss';
    return 'narrowLoss';
  }

  function duelReward(outcome, duelist) {
    const base = { strategicWin: 80, defensiveWin: 60, cooperativeWin: 60, narrowLoss: 30, collapse: 15 };
    const shards = base[outcome] || 20;
    const mentorFragments = (outcome === 'strategicWin') ? 15 :
                            (outcome === 'defensiveWin' || outcome === 'cooperativeWin') ? 10 :
                            (outcome === 'narrowLoss') ? 5 : 2;
    return { shards, mentorFragments, title: outcome === 'strategicWin' ? `${duelist.name} 见解者` : null };
  }

  function bestOutcome(a, b) {
    const order = ['collapse', 'narrowLoss', 'cooperativeWin', 'defensiveWin', 'strategicWin'];
    return order.indexOf(b) > order.indexOf(a || 'collapse') ? b : (a || b);
  }

  function isUnlocked() {
    // 门槛：完成新手训练 + 3 场基础谈判
    const player = Store.get('player');
    if (!player) return false;
    return (player.total || 0) >= 3;
  }

  return { start, step, computeDuelOutcome, isUnlocked, DUEL_PHASES, DUEL_CHOICES };
})();

const STORY_ENDINGS = {
  perfectWin:      { name: '完美胜利', icon: '🏆' },
  defensiveWin:    { name: '防守胜利', icon: '🛡️' },
  surfaceWin:      { name: '表面胜利', icon: '🎭' },
  strategicRetreat:{ name: '战略撤退', icon: '↩️' },
  collapse:        { name: '全面失守', icon: '💀' }
};

const StoryChain = (() => {
  function start(chainId) {
    const chain = LEGENDARY_STORY_CHAINS.find((c) => c.id === chainId);
    if (!chain) return null;
    const mentor = chain.mentorId ? getMentor(chain.mentorId) : { id: 'big_three', name: '三巨头', chibi: '⚔️', rarity: 'UR_LEGEND', styleTags: [] };
    const state = {
      mode: 'story_chain',
      chainId, chain, mentor,
      actIndex: 0,
      roundInAct: 0,
      metrics: { information: 50, agenda: 50, pressure: 50, trust: 50, endgame: 50 },
      carry: {
        trustCarry: 0, alertCarry: 0, leverageCarry: 0,
        clueCarry: [], debtCarry: 0,
        opponentMemory: {}, hiddenFlags: {}, endingFlags: {}
      },
      actResults: [],
      log: [],
      completed: false,
      endingId: null,
      checkpoints: []
    };
    Store.set('storyState', state);
    // checkpoint: actStart
    saveCheckpoint(state, 'actStart');
    return state;
  }

  function getActiveAct(state) {
    if (!state) return null;
    return state.chain.acts[state.actIndex];
  }

  function step(choiceKey) {
    const state = Store.get('storyState');
    if (!state || state.completed) return null;
    const act = getActiveAct(state);
    if (!act) return null;
    const choice = DUEL_CHOICES.find((c) => c.key === choiceKey);
    if (!choice) return null;
    // 同 duel 计算
    const dim = AIMemoryV2.applyDiminishing(choice.tag, { [choice.metric]: choice.delta });
    state.metrics[choice.metric] = Math.min(100, state.metrics[choice.metric] + (dim.adjusted[choice.metric] || 0));
    AIMemoryV2.observe(choice.tag);
    // 焦点标签 bonus
    if (choice.tag === act.focusTag) state.metrics[choice.metric] = Math.min(100, state.metrics[choice.metric] + 3);
    state.log.push({
      actIndex: state.actIndex, actTitle: act.title,
      round: state.roundInAct, tag: choice.tag, label: choice.label,
      delta: dim.adjusted[choice.metric] || 0, multiplier: dim.multiplier
    });
    state.roundInAct += 1;
    // 一幕固定 4 回合
    const actRounds = 4;
    if (state.roundInAct >= actRounds) {
      // 幕结算
      const actAvg = Math.round(Object.values(state.metrics).reduce((s, v) => s + v, 0) / DUEL_METRICS.length);
      state.actResults.push({ act: act.title, avg: actAvg, focusTag: act.focusTag });
      // carry：trust 大于 60 → trustCarry +5
      if (state.metrics.trust >= 60) state.carry.trustCarry += 5;
      if (state.metrics.pressure >= 65) state.carry.alertCarry += 5;
      state.actIndex += 1;
      state.roundInAct = 0;
      // 全部完成？
      if (state.actIndex >= state.chain.acts.length) {
        state.completed = true;
        state.endingId = computeStoryEnding(state);
        // 写入玩家
        const player = Store.get('player');
        if (player) {
          ensureSkillCardFieldsV2(player);
          player.storyRuns = player.storyRuns || {};
          const rec = player.storyRuns[state.chainId] || { plays: 0, bestEnding: null };
          rec.plays++;
          rec.bestEnding = bestEnding(rec.bestEnding, state.endingId);
          player.storyRuns[state.chainId] = rec;
          // 奖励
          const shards = state.endingId === 'perfectWin' ? 200 :
                         state.endingId === 'defensiveWin' ? 120 :
                         state.endingId === 'surfaceWin' ? 60 :
                         state.endingId === 'strategicRetreat' ? 90 : 30;
          player.cardShards = (player.cardShards || 0) + shards;
          // 给对应 mentor 碎片
          if (state.mentor) {
            player.legendaryMentors.fragments[state.mentor.id] =
              (player.legendaryMentors.fragments[state.mentor.id] || 0) + 30;
          }
          // 能力评分
          const tagScore = {};
          state.chain.acts.forEach((a) => { tagScore[a.focusTag] = state.metrics[mapTagMetric(a.focusTag)] || 70; });
          SkillProfile.update(player, tagScore);
          Object.keys(tagScore).forEach((t) => SkillProfile.addMasteryProgress(player, t, 3));
          // 复盘题 + 本地回放
          const weakest = pickWeakestTag(state);
          RetrievalReview.generate(player, { weakestTag: weakest });
          LocalReplay.add(player, {
            mode: 'chain', chainId: state.chainId, chainTitle: state.chain.title,
            endingId: state.endingId, endingName: STORY_ENDINGS[state.endingId].name,
            metrics: state.metrics, log: state.log, actResults: state.actResults
          });
          savePlayer(player);
          state.shards = shards;
        }
      } else {
        saveCheckpoint(state, 'actStart');
      }
    } else if ((state.roundInAct % 2) === 0) {
      saveCheckpoint(state, 'roundEnd');
    }
    Store.set('storyState', state);
    return state;
  }

  function mapTagMetric(tag) {
    const map = { info: 'information', agenda: 'agenda', pressure: 'pressure', trust: 'trust', endgame: 'endgame', batna: 'information', standard: 'agenda', emotion: 'trust', concession: 'agenda', retreat: 'endgame' };
    return map[tag] || 'endgame';
  }

  function pickWeakestTag(state) {
    let min = 999, tag = 'endgame';
    Object.entries(state.metrics).forEach(([k, v]) => { if (v < min) { min = v; tag = k; } });
    return tag === 'information' ? 'info' : tag;
  }

  function computeStoryEnding(state) {
    const m = state.metrics;
    const high = (k) => m[k] >= 65;
    const low = (k) => m[k] <= 35;
    const lowCount = DUEL_METRICS.filter(low).length;
    const highCount = DUEL_METRICS.filter(high).length;
    if (lowCount >= 3) return 'collapse';
    if (highCount >= 4) return 'perfectWin';
    if (high('trust') && high('endgame')) return 'defensiveWin';
    if (high('endgame') && low('trust')) return 'surfaceWin';
    if (lowCount <= 1 && m.endgame >= 45) return 'strategicRetreat';
    return 'defensiveWin';
  }

  function bestEnding(a, b) {
    const order = ['collapse', 'surfaceWin', 'strategicRetreat', 'defensiveWin', 'perfectWin'];
    return order.indexOf(b) > order.indexOf(a || 'collapse') ? b : (a || b);
  }

  function saveCheckpoint(state, kind) {
    const cp = {
      checkpointId: 'chk_' + Date.now() + '_' + Math.random().toString(16).slice(2),
      chainId: state.chainId, actIndex: state.actIndex, roundIndex: state.roundInAct,
      kind, snapshot: JSON.parse(JSON.stringify(state)), createdAt: Date.now()
    };
    state.checkpoints = (state.checkpoints || []).concat(cp).slice(-10);
  }

  function rollbackToActStart() {
    const state = Store.get('storyState');
    if (!state) return null;
    const actStarts = (state.checkpoints || []).filter((c) => c.kind === 'actStart');
    if (!actStarts.length) return null;
    const last = actStarts[actStarts.length - 1];
    Store.set('storyState', last.snapshot);
    return last.snapshot;
  }

  function rollbackToNearest() {
    const state = Store.get('storyState');
    if (!state) return null;
    const cps = state.checkpoints || [];
    if (!cps.length) return null;
    const last = cps[cps.length - 1];
    Store.set('storyState', last.snapshot);
    return last.snapshot;
  }

  function isUnlocked(chainId) {
    const player = Store.get('player');
    if (!player) return false;
    const chain = LEGENDARY_STORY_CHAINS.find((c) => c.id === chainId);
    if (!chain) return false;
    const mentors = player.legendaryMentors || { owned: [], fragments: {}, duelRecords: {} };
    // 三巨头高阶剧情链：需要拥有三人或各完成1次试炼且至少1次胜利
    if (chain.prerequisites) {
      const records = player.duelRecords || {};
      return ['mentor_churchill', 'mentor_roosevelt', 'mentor_stalin'].every((id) => {
        // 拥有该导师卡直接计入
        if (mentors.owned.includes(id)) return true;
        // 或该导师至少打过1次且有胜利记录
        const rec = records[id] || {};
        return rec.plays > 0 && rec.wins > 0;
      });
    }
    // 普通剧情链：对应人物碎片 ≥30 或拥有该人物卡
    return mentors.owned.includes(chain.mentorId) ||
           (mentors.fragments[chain.mentorId] || 0) >= 30;
  }

  return { start, step, isUnlocked, computeStoryEnding, rollbackToActStart, rollbackToNearest, getActiveAct };
})();


/* ════════════════════════════════════════════════════════════════════════════
   本地回放档案馆 · Local Replay Archive
   ════════════════════════════════════════════════════════════════════════════ */
const LocalReplay = (() => {
  function add(player, entry) {
    ensureSkillCardFieldsV2(player);
    const r = {
      replayId: 'replay_' + Date.now() + '_' + Math.random().toString(16).slice(2),
      ...entry,
      createdAt: Date.now()
    };
    player.localReplays = (player.localReplays || []).concat(r).slice(-30);
    return r;
  }
  function list(player) {
    ensureSkillCardFieldsV2(player);
    return (player.localReplays || []).slice().reverse();
  }
  function get(player, id) {
    ensureSkillCardFieldsV2(player);
    return (player.localReplays || []).find((r) => r.replayId === id);
  }
  function remove(player, id) {
    ensureSkillCardFieldsV2(player);
    player.localReplays = (player.localReplays || []).filter((r) => r.replayId !== id);
    savePlayer(player);
  }
  return { add, list, get, remove };
})();

   起手卡组 / 成长池 / 愿望单
   ════════════════════════════════════════════════════════════════════════════ */
const BEGINNER_DECK_CARD_IDS = [
  'n_open_question', 'n_paraphrase', 'r_objective_standard',
  'r_batna', 'sr_concession_trade', 'sr_emotional_defusing'

const GROWTH_POOL_RULES = {
  enabledUntilPackCount: 20,
  newCardProtection: true,
  beginnerDeckGuarantee: true,
  wishlistEnabled: true

function grantBeginnerDeckIfNeeded(player) {
  if (!player) return false;
  ensureSkillCardFieldsV2(player);
  if (player.flags.beginnerDeckGranted) return false;
  BEGINNER_DECK_CARD_IDS.forEach((id) => {
    if (!player.skillCardCollection.includes(id)) {
      player.skillCardCollection.push(id);
      player.skillCardStars[id] = 1;
    }
  });
  player.flags.beginnerDeckGranted = true;
  savePlayer(player);
  return true;
}

function setWishlist(player, focusTag) {
  ensureSkillCardFieldsV2(player);
  if (focusTag && SKILL_TAG_KEYS.includes(focusTag)) {
    player.cardWishlist = { focusTag, updatedAt: Date.now() };
  } else {
    player.cardWishlist = null;
  }
  savePlayer(player);
}

function inGrowthPool(player) {
  ensureSkillCardFieldsV2(player);
  return (player.packStats.totalOpened || 0) < GROWTH_POOL_RULES.enabledUntilPackCount;
}

// 覆盖 drawOne 加入成长池保护 + 愿望单
(function patchDrawWithGrowthPool() {
  const _origDraw = SkillBlindBox.drawOne;
  SkillBlindBox.drawOne = function (player, packType) {
    ensureSkillCardFieldsV2(player);
    const useGrowth = inGrowthPool(player) && GROWTH_POOL_RULES.newCardProtection;
    const focus = player.cardWishlist && player.cardWishlist.focusTag;
    // 成长池：优先未拥有 + 愿望单 tag 匹配
    if (useGrowth || focus) {
      const ownedSet = new Set(player.skillCardCollection || []);
      const unowned = SKILL_CARDS.filter((c) => !ownedSet.has(c.id));
      const focusCards = focus ? SKILL_CARDS.filter((c) => (c.skillTags || []).includes(focus)) : [];
      // 触发条件：成长池中且未拥有非空 → 60% 概率落在未拥有里
      const candidates = [];
      if (useGrowth && unowned.length) candidates.push(...unowned);
      if (focus && focusCards.length) candidates.push(...focusCards);
      if (candidates.length && Math.random() < 0.6) {
        const card = candidates[Math.floor(Math.random() * candidates.length)];
        // 直接走 _origDraw 但强制此卡 → 拷贝逻辑
        const isDup = player.skillCardCollection.includes(card.id);
        player.skillCardPity.total += 1;
        const rRank = SkillBlindBox.RARITY_RANK[card.rarity];
        player.skillCardPity.sinceSR = rRank >= SkillBlindBox.RARITY_RANK.SR ? 0 : player.skillCardPity.sinceSR + 1;
        player.skillCardPity.sinceSSR = rRank >= SkillBlindBox.RARITY_RANK.SSR ? 0 : player.skillCardPity.sinceSSR + 1;
        player.skillCardPity.sinceUR = card.rarity === 'UR' ? 0 : player.skillCardPity.sinceUR + 1;
        if (isDup) {
          const sh = DUPLICATE_SHARDS_V2[card.rarity] || 5;
          player.skillCardDuplicates[card.id] = (player.skillCardDuplicates[card.id] || 0) + 1;
          player.cardShards = (player.cardShards || 0) + sh;
          if (card.rarity === 'UR') player.skillCardMarks.UR = (player.skillCardMarks.UR || 0) + 1;
          updateCardStarByDuplicates(player, card.id);
          return { card, duplicate: true, shard: sh };
        }
        player.skillCardCollection.push(card.id);
        player.skillCardStars[card.id] = 1;
        EventBus.emit(EVENTS.CARD_UNLOCKED, { card });
        return { card, duplicate: false, shard: 0 };
      }
    }
    return _origDraw.call(this, player, packType);
  };
})();

    AIMemoryV2.ensure();
    Store.set('aiMemoryV2', AIMemoryV2.fresh());
    Store.set('mentorEnergyState', { energy: 0, triggered: false });
    Store.set('mentorLastTrigger', null);
  }
  if (!state) return '<div class="hint hint-red">未知导师</div>';
  const phase = DUEL_PHASES[state.round] || DUEL_PHASES[DUEL_PHASES.length - 1];
  const equipped = getEquippedMentor();
  const signal = AIMemoryV2.intentionSignal();
  const trigger = Store.get('mentorLastTrigger');

  const metricsHtml = DUEL_METRICS.map((m) => {
    const v = state.metrics[m];
    const cls = v >= 60 ? 'good' : v >= 35 ? 'warn' : 'bad';
    return `<div class="duel-metric">
      <div class="duel-metric-label">${DUEL_METRIC_LABEL[m]}</div>
      <div class="duel-metric-track"><div class="duel-metric-fill ${cls}" style="width:${v}%"></div></div>
      <div class="duel-metric-val">${v}</div>
    </div>`;
  }).join('');

  const choicesHtml = DUEL_CHOICES.map((c) => {
    const tag = NEGOTIATION_SKILL_TAGS[c.tag];
    return `<button class="duel-choice-btn" data-duel-choice="${c.key}">
      <div class="duel-choice-head"><b>${c.label}</b> <span class="duel-choice-tag" style="color:${tag.color}">${tag.label}</span></div>
      <div class="duel-choice-desc">${c.desc}</div>
      <div class="duel-choice-sample">"${c.sample}"</div>
    </button>`;
  }).join('');

  const mentorBar = equipped ? `<div class="mentor-bar ${state.mentorEnergy >= 100 ? 'ready' : ''}">
    <div class="mentor-bar-head">
      <span>${equipped.chibi} ${equipped.name} · 导师能量</span>
      <span style="color:var(--yellow);font-weight:bold">${state.mentorEnergy}/100</span>
    </div>
    <div class="mentor-bar-track"><div class="mentor-bar-fill" style="width:${state.mentorEnergy}%"></div></div>
    ${state.mentorEnergy >= 100 && !trigger ? `<button class="btn btn-yellow btn-sm" data-trigger-mentor style="margin-top:6px">触发导师 ${equipped.passive.name}</button>` : ''}
    ${trigger ? `<div class="mentor-trigger-box">
      <div class="mentor-trigger-title">${trigger.title}</div>
      <div class="mentor-trigger-line">原因：${trigger.reason}</div>
      <div class="mentor-trigger-line">建议：${trigger.advice}</div>
      <div class="mentor-trigger-line" style="color:var(--red)">对手反应：${trigger.adaptation}</div>
      ${trigger.signature ? `<div class="mentor-trigger-sig">"${trigger.signature}"</div>` : ''}
    </div>` : ''}
  </div>` : '';

  const player = Store.get('player');
  const uiToggle = player ? renderTeachingModeToggle(player) : '';
  const isLearner = player ? isLearnerMode(player) : true;

  // 传奇出场（第一回合，仅学员模式）
  const entranceHtml = (state.round === 0 && !state.log.length && isLearner)
    ? renderLegendaryEntrance(state.duelist) : '';

  // 回合目标（升级版，基于当前 metrics）
  const roundGoalHtml = isLearner ? renderRoundLearningGoal(state) : '';

  // 上一回合反馈（学员模式 + 有历史）
  const lastLog = state.log.length ? state.log[state.log.length - 1] : null;
  const afterActionHtml = (isLearner && lastLog) ? renderAfterActionFeedbackPanel(buildAfterActionFeedback(lastLog, state)) : '';

  // 对手意图行
  const oppLine = `<div class="opponent-line-panel">
    <div class="opponent-name">${state.duelist.name} 的策略意图：</div>
    <div class="opponent-line">${signal}</div>
  </div>`;

  // 暂停讲解面板（默认折叠，按钮展开）
  const pausePanelHtml = isLearner ? renderPauseExplainPanel(state) : '';

  return `<div class="flex-between">
    <div class="section-title">${state.duelist.name} · ${phase.title}</div>
    <button class="back-btn" data-back>← 退出</button>
  </div>
  ${uiToggle}
  ${entranceHtml}
  ${afterActionHtml}
  ${roundGoalHtml}
  ${isLearner ? oppLine : `<div class="hint hint-purple" style="font-size:11.5px;margin:10px 0">▸ 对手意图：${signal}</div>`}
  <div class="duel-phase-banner">第 ${state.round + 1} / 6 回合 · ${phase.title}</div>
  ${isLearner ? '' : `<div class="duel-metrics">${metricsHtml}</div>`}
  ${mentorBar}
  ${isLearner ? `<div style="text-align:right;margin-bottom:8px">
    <button class="btn btn-sm" id="btn-pause-explain" style="font-size:11px;padding:4px 10px;border-color:rgba(32,215,255,.4);color:var(--cyan)">⏸ 暂停讲解</button>
  </div>
  <div id="pause-explain-wrapper" style="display:none">${pausePanelHtml}</div>` : ''}
  <div class="sk-section-head" style="--card-color:var(--cyan)">▸ 你的选择 · 5 个策略方向</div>
  <div class="duel-choice-list">${choicesHtml}</div>
  ${!isLearner ? `<div class="duel-metrics" style="margin-top:10px">${metricsHtml}</div>` : ''}
  ${state.log.length ? `<div class="duel-log">
    <div class="sk-section-head" style="--card-color:var(--dim)">▸ 回合记录</div>
    ${state.log.slice(-4).map((l) => `<div class="duel-log-item">
      第${l.round+1}回 · ${l.phase} · ${l.label} → +${l.delta}（×${l.multiplier.toFixed(2)}）<br>
      <span style="color:var(--dim);font-size:10px">${l.intentionSignal}</span>
    </div>`).join('')}
  </div>` : ''}`;
}

function renderStoryPlay(params) {
  params = params || {};
  let state = Store.get('storyState');
  if (!state || (params.chainId && state.chainId !== params.chainId) || state.completed) {
    state = StoryChain.start(params.chainId);
    AIMemoryV2.ensure();
    Store.set('aiMemoryV2', AIMemoryV2.fresh());
  }
  if (!state) return '<div class="hint hint-red">未知剧情链</div>';
  const act = StoryChain.getActiveAct(state);
  const equipped = getEquippedMentor();
  const signal = AIMemoryV2.intentionSignal();

  const metricsHtml = DUEL_METRICS.map((m) => {
    const v = state.metrics[m];
    const cls = v >= 60 ? 'good' : v >= 35 ? 'warn' : 'bad';
    return `<div class="duel-metric">
      <div class="duel-metric-label">${DUEL_METRIC_LABEL[m]}</div>
      <div class="duel-metric-track"><div class="duel-metric-fill ${cls}" style="width:${v}%"></div></div>
      <div class="duel-metric-val">${v}</div>
    </div>`;
  }).join('');

  const focusTag = NEGOTIATION_SKILL_TAGS[act.focusTag];
  const choicesHtml = DUEL_CHOICES.map((c) => {
    const tag = NEGOTIATION_SKILL_TAGS[c.tag];
    const isFocus = c.tag === act.focusTag;
    return `<button class="duel-choice-btn ${isFocus ? 'focus' : ''}" data-story-choice="${c.key}">
      <div class="duel-choice-head"><b>${c.label}</b> <span class="duel-choice-tag" style="color:${tag.color}">${tag.label}${isFocus ? ' · 本幕焦点' : ''}</span></div>
      <div class="duel-choice-desc">${c.desc}</div>
    </button>`;
  }).join('');

  return `<div class="flex-between">
    <div class="section-title">${state.chain.title} · ${act.title}</div>
    <button class="back-btn" data-back>← 退出</button>
  </div>
  <div class="duel-phase-banner">
    幕 ${state.actIndex + 1} / ${state.chain.acts.length} · 回合 ${state.roundInAct + 1} / 4<br>
    <span style="color:var(--dim);font-size:11px">${act.briefing}</span><br>
    <span style="font-size:11px;color:${focusTag.color}">本幕焦点：${focusTag.label}</span>
  </div>
  <div class="duel-metrics">${metricsHtml}</div>
  ${equipped ? `<div class="mentor-bar" style="opacity:.65"><div class="mentor-bar-head"><span>${equipped.chibi} ${equipped.name}（局前装备）</span><span style="font-size:10px;color:var(--dim)">${equipped.passive.name}</span></div></div>` : ''}
  <div class="hint hint-purple" style="font-size:11.5px;margin:10px 0">▸ 对手意图：${signal}</div>
  <div class="sk-section-head" style="--card-color:var(--cyan)">▸ 你的选择</div>
  <div class="duel-choice-list">${choicesHtml}</div>
  <div class="story-rollback-bar">
    <button class="btn btn-sm" data-rollback="actStart">↺ 回滚至本幕开始</button>
    <button class="btn btn-sm" data-rollback="nearest">↺ 回滚至最近 checkpoint</button>
  </div>
  ${state.actResults.length ? `<div class="panel" style="margin-top:10px">
    <div class="panel-title">已完成幕次</div>
    ${state.actResults.map((r, i) => `<div class="info-row"><span class="info-key">幕 ${i+1} · ${r.act}</span><span class="info-val">综合 ${r.avg}</span></div>`).join('')}
  </div>` : ''}`;
}
renderStoryPlay.afterRender = function () {
  document.querySelectorAll('[data-back]').forEach((b) =>
    b.addEventListener('click', () => {
      Store.set('storyState', null);
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.LEGEND_HUB, params: {} });
    }));
  document.querySelectorAll('[data-story-choice]').forEach((b) =>
    b.addEventListener('click', () => {
      const choice = b.getAttribute('data-story-choice');
      const state = StoryChain.step(choice);
      if (state && state.completed) {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.STORY_RESULT, params: {} });
      } else {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.STORY_PLAY, params: {} });
      }
    }));
  document.querySelectorAll('[data-rollback]').forEach((b) =>
    b.addEventListener('click', () => {
      const kind = b.getAttribute('data-rollback');
      if (!confirm(kind === 'actStart' ? '回滚到本幕开始？' : '回滚到最近 checkpoint？')) return;
      if (kind === 'actStart') StoryChain.rollbackToActStart();
      else StoryChain.rollbackToNearest();
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.STORY_PLAY, params: {} });
    }));
};

    } else {
      return `<div class="replay-log-row">幕 ${l.actIndex+1} · 第 ${l.round+1} 回 · <b>${l.label}</b>（${NEGOTIATION_SKILL_TAGS[l.tag] ? NEGOTIATION_SKILL_TAGS[l.tag].label : l.tag}）→ +${l.delta}</div>`;

/* ────────────────────────────────────────────────────────────────────
   训练路径
   ────────────────────────────────────────────────────────────────── */
function renderTrainingPath() {
  const player = ensureSkillCardFieldsV2(Store.get('player'));
  const rec = SkillProfile.recommend(player);
  const profileRows = SKILL_TAG_KEYS.map((tag) => {
    const t = NEGOTIATION_SKILL_TAGS[tag];
    const p = player.skillProfile[tag];
    const isWeak = rec.weakest.includes(tag);
    const isStrong = rec.strongest.includes(tag);
    return `<div class="profile-row ${isWeak ? 'weak' : ''} ${isStrong ? 'strong' : ''}">
      <div class="profile-label" style="color:${t.color}">${isWeak ? '⚠ ' : isStrong ? '★ ' : '  '}${t.label}</div>
      <div class="profile-stats">尝试 ${p.attempts} · 平均 ${p.avgScore} · 连胜 ${p.streakPass}${p.mastered ? ' · 已掌握' : ''}</div>
    </div>`;
  }).join('');
  // 卡组覆盖率（基于推荐能力 vs loadout）
  const loadout = (player.skillCardLoadout || []).map((id) => SKILL_CARDS.find((c) => c.id === id)).filter(Boolean);
  const coveredSet = new Set();
  loadout.forEach((c) => (c.skillTags || []).forEach((t) => coveredSet.add(t)));
  const recTags = rec.weakest.concat(rec.strongest);
  const covered = recTags.filter((t) => coveredSet.has(t)).length;
  const coverage = recTags.length ? Math.round(covered / recTags.length * 100) : 0;
  const missing = recTags.filter((t) => !coveredSet.has(t)).map((t) => NEGOTIATION_SKILL_TAGS[t].label).join('、');
  const wishlist = player.cardWishlist && player.cardWishlist.focusTag ? NEGOTIATION_SKILL_TAGS[player.cardWishlist.focusTag] : null;

  return `<div class="flex-between">
    <div class="section-title">训练路径 · 个人推荐</div>
    <button class="back-btn" data-back>← 返回</button>
  </div>
  <div class="training-path-callout">
    <div class="tp-title">▸ 系统建议</div>
    <div class="tp-hint">${rec.message}</div>
  </div>
  <div class="panel">
    <div class="panel-title">能力画像（10 维）</div>
    ${profileRows}
  </div>
  <div class="panel">
    <div class="panel-title">卡组覆盖率</div>
    <div class="info-row"><span class="info-key">推荐能力覆盖</span><span class="info-val" style="color:${coverage >= 70 ? 'var(--green)' : coverage >= 40 ? 'var(--yellow)' : 'var(--red)'}">${coverage}%</span></div>
    ${missing ? `<div class="hint hint-yellow" style="font-size:11px">缺少：${missing} 类技能卡</div>` : '<div class="hint hint-green" style="font-size:11px">推荐能力已被卡组完全覆盖</div>'}
  </div>
  <div class="panel">
    <div class="panel-title">愿望单</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:6px">设置后，开包时倾向获得相关 tag 的卡牌（轻微概率提升）。</div>
    <div class="wishlist-tags">
      ${SKILL_TAG_KEYS.map((t) => {
        const tag = NEGOTIATION_SKILL_TAGS[t];
        const active = wishlist && wishlist.id === t;
        return `<button class="wishlist-tag ${active ? 'active' : ''}" data-wishlist="${t}" style="--card-color:${tag.color}">${tag.label}${active ? ' ✓' : ''}</button>`;
      }).join('')}
    </div>
    ${wishlist ? `<button class="btn btn-red btn-sm" data-wishlist="" style="margin-top:8px">清除愿望单</button>` : ''}
  </div>`;
}
renderTrainingPath.afterRender = function () {
  document.querySelectorAll('[data-back]').forEach((b) =>
    b.addEventListener('click', () => EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.LEGEND_HUB, params: {} })));
  document.querySelectorAll('[data-wishlist]').forEach((b) =>

/* ════════════════════════════════════════════════════════════════════════════
   GAME_END 钩子：从场景结果更新 skillProfile / masteryTree / 生成复盘题
   ════════════════════════════════════════════════════════════════════════════ */
function initSkillProfileWire() {
  EventBus.on(EVENTS.GAME_END, (payload) => {
    try {
      const player = Store.get('player');
      if (!player) return;
      ensureSkillCardFieldsV2(player);
      const result = (payload && payload.result) || {};
      const scenarioKey = Store.get('scenarioKey');
      const scoreRaw = result.playerScore || result.score || 60;
      // 0-100 区间
      const norm = Math.max(0, Math.min(100, scoreRaw));
      // 把场景映射回 skillTags
      const sceneTagMap = {
        'prisoners':   ['trust', 'pressure', 'concession'],
        'ultimatum':   ['endgame', 'pressure', 'agenda'],
        'trust':       ['trust', 'info', 'emotion'],
        'bargaining':  ['agenda', 'concession', 'batna'],
        'crisis':      ['emotion', 'pressure', 'retreat'],
        'publicgoods': ['trust', 'standard', 'concession'],
        'coalition':   ['agenda', 'info', 'standard']
      };
      const tags = sceneTagMap[scenarioKey] || ['agenda'];
      const deltas = {};
      tags.forEach((t) => { deltas[t] = norm; });
      SkillProfile.update(player, deltas);
      // 精通进度（仅胜局/平局加分）
      if (result.outcome === 'win' || result.outcome === 'coop' || result.outcome === 'draw') {
        tags.forEach((t) => SkillProfile.addMasteryProgress(player, t, 2));
      }
      // 生成 1 道复盘题
      const weakest = SkillProfile.recommend(player).weakest[0];
      RetrievalReview.generate(player, { weakestTag: weakest });
      Store.set('player', player);
    } catch (e) { console.warn('[skillProfile-wire]', e); }
  });
}

// 在 GAME_START 时清空 AI 记忆 + mentor 能量 + usedCardsThisRound
function initLegendGameWire() {
  EventBus.on(EVENTS.GAME_START, () => {
    Store.set('aiMemoryV2', AIMemoryV2.fresh());
    Store.set('mentorEnergyState', { energy: 0, triggered: false });
    Store.set('mentorLastTrigger', null);
    Store.set('usedCardsThisRound', []);
    // 给新手发放起手卡组（仅一次）
    const player = Store.get('player');
    if (player) grantBeginnerDeckIfNeeded(player);
  });
}

.duel-metric-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.duel-metric-fill{height:100%;transition:width .4s;background:var(--cyan)}
.duel-metric-fill.good{background:linear-gradient(90deg,#006644,var(--green))}
.duel-metric-fill.warn{background:linear-gradient(90deg,#886600,var(--yellow))}
.duel-metric-fill.bad{background:linear-gradient(90deg,#880022,var(--red))}
.duel-metric-val{flex:0 0 30px;text-align:right;color:var(--white);font-weight:bold;font-size:11px}

/* ── 选择按钮 ──────────────────────────────────────────────── */
.duel-choice-list{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.duel-choice-btn{text-align:left;background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:10px 12px;border-radius:4px;cursor:pointer;font-family:inherit;transition:all .15s}
.duel-choice-btn:hover{background:rgba(0,212,255,.05);border-color:var(--cyan)}
.duel-choice-btn.focus{border-color:var(--yellow);background:rgba(255,215,0,.04)}
.duel-choice-head{font-size:12px;color:var(--white);margin-bottom:3px;display:flex;justify-content:space-between}
.duel-choice-tag{font-size:10px}
.duel-choice-desc{font-size:11px;color:var(--text);line-height:1.5;margin-bottom:3px}
.duel-choice-sample{font-size:10.5px;color:var(--dim);font-style:italic;line-height:1.5}

/* ── 导师能量条 ────────────────────────────────────────────── */
.mentor-bar{background:linear-gradient(135deg,rgba(246,196,83,.06),rgba(192,132,252,.04));border:1px solid rgba(246,196,83,.3);border-radius:4px;padding:8px 12px;margin:10px 0}
.mentor-bar.ready{border-color:var(--yellow);box-shadow:0 0 12px rgba(255,215,0,.4)}
.mentor-bar-head{display:flex;justify-content:space-between;font-size:11px;color:var(--text);margin-bottom:4px}
.mentor-bar-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mentor-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--yellow));transition:width .4s}
.mentor-trigger-box{margin-top:8px;padding:8px 10px;background:rgba(246,196,83,.08);border:1px solid rgba(246,196,83,.4);border-radius:3px}
.mentor-trigger-title{color:var(--yellow);font-size:12px;font-weight:bold;margin-bottom:5px}
.mentor-trigger-line{color:var(--text);font-size:10.5px;line-height:1.7;margin:2px 0}
.mentor-trigger-sig{color:var(--dim);font-size:10.5px;font-style:italic;margin-top:5px;padding-top:5px;border-top:1px dashed var(--border)}

/* ── 试炼场日志 ────────────────────────────────────────────── */
.duel-log{margin-top:14px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px}
.duel-log-item{font-size:11px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.04);color:var(--text)}
.duel-log-item:last-child{border-bottom:none}

/* ── 剧情链卡 ─────────────────────────────────────────────── */
.story-list{display:flex;flex-direction:column;gap:10px}
.story-card{display:flex;gap:12px;align-items:flex-start;background:var(--bg2);border:1.5px solid var(--card-color,var(--border));border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .2s}

.story-card-body{flex:1;min-width:0}

.story-card-subtitle{font-size:11px;color:var(--dim);margin-bottom:4px}
.story-card-desc{font-size:11px;color:var(--text);line-height:1.6;margin-bottom:4px}

/* ── 精通树 ───────────────────────────────────────────────── */
.mastery-tree{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.mastery-row{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 12px}
.mastery-label{flex:0 0 110px;font-size:12px;font-weight:bold}
.mastery-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.mastery-fill{height:100%;transition:width .4s}
.mastery-meta{flex:0 0 90px;text-align:right;font-size:11px;color:var(--white)}

/* ── 本地回放 ──────────────────────────────────────────────── */
.replay-list{display:flex;flex-direction:column;gap:6px}
.replay-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}

.review-question{font-size:12px;color:var(--white);line-height:1.6;margin-bottom:6px}

/* ════════════════════════════════════════════════════════════════════════════
   谈判行为画像系统 · Negotiation Behavior Profile Engine
   ════════════════════════════════════════════════════════════════════════════ */
const NEGOTIATION_PROFILE_DIMENSIONS = {
  pressureResponse: '压力反应',
  boundaryExpression: '边界表达',
  evidenceAwareness: '依据意识',
  concessionHabit: '让步习惯',
  emotionControl: '情绪控制',
  endgameControl: '终局能力',
  batnaAwareness: 'BATNA意识',
  strategySwitch: '策略切换'
};

function ensureNegotiationBehaviorProfile(player) {
  player.negotiationBehaviorProfile = player.negotiationBehaviorProfile || { dimensions: {}, judgments: [], lastUpdatedAt: null };
  Object.keys(NEGOTIATION_PROFILE_DIMENSIONS).forEach((key) => {
    player.negotiationBehaviorProfile.dimensions[key] = player.negotiationBehaviorProfile.dimensions[key] || { score: 50, evidenceCount: 0, trend: 'unknown' };
  });
  return player.negotiationBehaviorProfile;
}

function collectEvidenceChain(replay, relatedTags = []) {
  const rounds = (replay && (replay.rounds || replay.perRound || replay.log)) || [];
  const evidence = [];
  rounds.forEach((r, idx) => {
    const text = `${r.actionTag || ''} ${r.playerLine || ''} ${r.label || ''} ${r.text || ''}`;
    const matched = relatedTags.some((tag) => text.includes(tag));
    if (matched || evidence.length < 3) {
      evidence.push({
        round: r.round || idx + 1,
        playerAction: r.playerLine || r.action || r.label || '未记录具体话术',
        result: r.result || r.score || r.label || '本轮结果未细化',
        whyItMatters: matched ? '与本画像判断直接相关。' : '作为近期行为样本参考。'
      });
    }
  });
  return evidence.slice(0, 5);
}

function renderEvidenceChain(judgment) {
  const items = (judgment.evidenceChain || []).map((e) =>
    `<div class="evidence-item">第${e.round}轮：${e.playerAction} → ${e.result}<br><span style="color:var(--dim);font-size:11px">${e.whyItMatters}</span></div>`).join('');
  return `<div class="evidence-chain">
    <div style="color:var(--dim);font-size:11px;margin-bottom:4px">置信度：${judgment.confidence || 'low'}</div>
    ${items}
    <div style="color:var(--yellow);font-size:11px;margin-top:6px">反证条件：${judgment.counterEvidenceCondition || '—'}</div>
  </div>`;
}

function buildProfileJudgments(profile, replay) {
  const judgments = [];
  const dims = profile.dimensions;
  if ((dims.evidenceAwareness?.score || 50) < 45) {
    judgments.push({
      id: 'low_evidence_awareness', title: '依据意识偏弱',
      judgment: '你在强压场景中较少要求对方说明依据，容易被对方的态度牵着走。',
      confidence: (dims.evidenceAwareness?.evidenceCount || 0) >= 5 ? 'high' : 'medium',
      evidenceChain: collectEvidenceChain(replay, ['standard', 'objective']),
      counterEvidenceCondition: '接下来3场强硬型对手训练中，连续做到先问依据再让步。',
      nextTrainingPrescription: '下一局只练一件事：对方第一次强硬时，先问"这个要求的依据是什么？"',
      recommendedTheories: ['fisherUry', 'cohen'], recommendedCards: ['客观标准', 'BATNA分析'],
      recommendedMentors: ['费希尔 / 尤里', '赫布·科恩', '丘吉尔']
    });
  }
  if ((dims.concessionHabit?.score || 50) < 45) {
    judgments.push({
      id: 'early_concession_risk', title: '过早让步风险',
      judgment: '你不是不能合作，而是合作前缺少边界，容易让对方继续压缩空间。',
      confidence: (dims.concessionHabit?.evidenceCount || 0) >= 5 ? 'high' : 'medium',
      evidenceChain: collectEvidenceChain(replay, ['concession']),
      counterEvidenceCondition: '连续3局做到每次让步都绑定对方承诺。',
      nextTrainingPrescription: '下一局所有让步都必须带一句：这一步对应你方什么承诺？',
      recommendedTheories: ['dawson', 'fisherUry'], recommendedCards: ['条件让步', '终局控制'],
      recommendedMentors: ['罗杰·道森', '芒格', '撒切尔夫人']
    });
  }
  return judgments;
}

function updateNegotiationBehaviorProfile(player, replay) {
  const profile = ensureNegotiationBehaviorProfile(player);
  const actions = (replay && (replay.actions || replay.playerActions)) || [];
  const usedEvidence = actions.some((a) => /依据|标准|objective|standard/.test(a.actionTag || a.text || ''));
  const usedBatna = actions.some((a) => /BATNA|替代/.test(a.actionTag || a.text || ''));
  const earlyConcession = actions.slice(0, 2).some((a) => /让步|concession/.test(a.actionTag || a.text || ''));
  const applyDelta = (key, delta) => {
    const item = profile.dimensions[key];
    if (item) { item.score = Math.max(0, Math.min(100, item.score + delta)); item.evidenceCount += 1; item.trend = delta >= 0 ? 'improving' : 'risk'; }
  };
  if (!usedEvidence) applyDelta('evidenceAwareness', -6); else applyDelta('evidenceAwareness', 4);
  if (!usedBatna) applyDelta('batnaAwareness', -4); else applyDelta('batnaAwareness', 4);
  if (earlyConcession) applyDelta('concessionHabit', -6);
  if ((replay?.avgScore || replay?.score || 0) >= 75) applyDelta('strategySwitch', 3);
  profile.judgments = buildProfileJudgments(profile, replay).slice(0, 8);
  profile.lastUpdatedAt = Date.now();
  return profile;
}

function pickOpponentLine(profileId, stage) {
  const profile = OPPONENT_VOICE_PROFILES[profileId] || OPPONENT_VOICE_PROFILES.steel_king;
  const list = profile.phrases[stage] || profile.phrases.pressure || profile.phrases.opening;
  return list[Math.floor(Math.random() * list.length)];
}

function getDuelistVoiceProfileId(duelist) {
  if (!duelist) return 'steel_king';
  const style = (duelist.style || '').toLowerCase();
  if (/强硬|压力|控制|锚定|高压|钢铁|战时/.test(style)) return 'steel_king';
  if (/理性|数据|分析|模型|信息|反向/.test(style)) return 'logic_chen';
  if (/情绪|感受|共情|利他/.test(style)) return 'sensitive_lin';
  if (/迂回|游说|延迟|垂帘|纵横/.test(style)) return 'shadow_zhang';
  if (/风险|谨慎|底线|周旋|防守/.test(style)) return 'stable_wu';
  if (/信任|共识|合作|联盟|长期/.test(style)) return 'harmony_li';
  return 'steel_king';
}

/* ────────────────────────────────────────────────────────────────────────────
   玩家表达评估引擎
   ────────────────────────────────────────────────────────────────────────── */
function hasBoundary(line) { return /不能|不会|不接受|底线|边界/.test(line); }
function hasEvidence(line) { return /依据|标准|数据|来源|计算|对标/.test(line); }
function hasPath(line) { return /继续谈|先把|再看|下一步|可以/.test(line); }
function hasEmotionalControl(line) { return !/离谱|过分|没法谈|荒唐|你别/.test(line); }
function hasExchange(line) { return /对应|承诺|交换|条件|如果/.test(line); }

function evaluatePlayerExpression(lineItem) {
  const line = lineItem.playerLine || lineItem.sample || '';
  const score = {
    boundary: hasBoundary(line) ? 20 : 0,
    evidence: hasEvidence(line) ? 20 : 0,
    path: hasPath(line) ? 20 : 0,
    emotionControl: hasEmotionalControl(line) ? 20 : 0,
    exchange: hasExchange(line) ? 20 : 0
  };
  const total = Object.values(score).reduce((a, b) => a + b, 0);
  const summary = total >= 80 ? '表达成熟：有边界、有依据，也给了继续谈的路径。' :
                  total >= 60 ? '表达基本可用，但还可以补上依据或交换条件。' :
                  total >= 40 ? '表达有态度，但缺少谈判路径，容易变成对抗。' :
                                '表达偏情绪化，现实中容易被对方抓住节奏。';
  return { total, score, summary };
}

function evaluateOpponentHearing(lineItem, opponentProfile) {
  const line = lineItem.playerLine || lineItem.sample || '';
  const type = opponentProfile.type || 'aggressive';
  const hasBound = hasBoundary(line);
  const hasEvi = hasEvidence(line);
  const hasP = hasPath(line);
  if (type === 'aggressive') {
    if (hasBound && hasEvi) return '对手感受到你有底气，暂时收住了强压态势。';
    if (hasBound) return '对手注意到你有边界，但会继续测试你有没有依据。';
    return '对手把这句话理解成态度表态，会继续施压。';
  }
  if (type === 'rational') {
    if (hasEvi) return '对手认为这句话有信息价值，会继续跟进。';
    return '对手认为缺少依据，暂时不会正面回应。';
  }
  if (type === 'emotional') {
    if (hasP) return '对手感到被认真对待，情绪稍微缓和。';
    return '对手觉得你在解决问题而不是理解感受，可能变得更防御。';
  }
  if (type === 'manipulative') {
    if (hasBound && hasP) return '对手发现你有路径和边界，重新评估推进节奏。';
    return '对手认为你仍在观望，继续制造紧迫感。';
  }
  if (type === 'risk_averse') {
    if (hasEvi && hasP) return '对手感到风险有了边界，愿意继续推进。';
    return '对手仍担心风险不明确，会要求更多保障。';
  }
  if (type === 'cooperative') {
    if (hasP) return '对手感到你在推进，会配合提出下一步建议。';
    return '对手感到推进停滞，会主动寻找折中。';
  }
  return '对手正在评估你的回应。';
}

/* ────────────────────────────────────────────────────────────────────────────
   复盘叙事引擎
   ────────────────────────────────────────────────────────────────────────── */
function buildHeadline(avg, opponentName) {
  if (avg < 50) return `本局不是输在不会谈，而是你被${opponentName}的节奏带走了。`;
  if (avg < 70) return `本局你有反击意识，但策略切换还不够稳。`;
  return `本局整体策略有效，下一步要练的是把优势稳定带到终局。`;
}
function buildReplayStory(replay) {
  const first = replay.perRound && replay.perRound[0];
  const key = replay.turning || {};
  if (!first) return '这局的核心问题在于：你需要把态度、依据和路径连起来，而不是只表达立场。';
  return `开局你尝试推进谈判，但对手没有完全接住你的信号。到第 ${key.round || '关键'} 轮，局势出现转折：你的表达没有把边界、依据和下一步路径同时说清楚，所以对手继续按照自己的节奏推进。`;
}
function buildKeyMistakeChain(turning, opponentName) {
  return {
    playerAction: (turning && turning.playerAction) || '你的表达有态度，但缺少支撑。',
    opponentRead: `${opponentName}更容易把它理解成情绪反应，而不是有底气的谈判边界。`,
    consequence: (turning && turning.label) || '局势进入低收益对抗。',
    betterMove: '先要求依据，再表达边界，最后给出继续谈的路径。'
  };
}
function buildNextPractice() {
  return ['下一局先不要急着让步，第一步先问依据。', '对方强硬时，不直接硬碰硬，先锁住规则。', '让步必须换承诺，不做单方面退让。'];
}
function buildSampleLine() { return '可以继续谈，但我需要先看到依据。没有依据的压力，我不会接。'; }
function buildMemoryCard() { return '不要用情绪反击压力，要用规则接住压力。'; }

function buildReplayNarrative(replay) {
  const turning = replay.turning || replay.keyTurn || {};
  const avg = replay.avgScore || replay.score || 0;
  const opponentName = replay.opponentName || replay.duelistName || '对手';
  return {
    headline: buildHeadline(avg, opponentName),
    story: buildReplayStory(replay),
    keyMistake: buildKeyMistakeChain(turning, opponentName),
    nextPractice: buildNextPractice(),
    sampleLine: buildSampleLine(),
    memoryCard: buildMemoryCard()
  };
}

function renderCoachReplaySummary(replay) {

   回合训练目标（升级版 · 基于 metrics 动态生成）
   ────────────────────────────────────────────────────────────────────────── */
function buildRoundLearningGoal(state) {
  const metrics = state.metrics || {};
  const sorted = Object.entries(metrics).sort((a, b) => a[1] - b[1]);
  const lowest = sorted[0] || ['agenda', 50];
  const opponentType = (state.duelist && getDuelistVoiceProfileId(state.duelist).replace('_king','').replace('_chen','').replace('_lin','').replace('_zhang','').replace('_wu','').replace('_li','')) || 'default';
  const stage = state.round >= 4 ? 'closing' : state.round >= 2 ? 'middle' : 'opening';
  if (lowest[0] === 'pressure') return '本回合只练一件事：不要被强硬姿态压倒，先用依据和边界稳住节奏。';
  if (lowest[0] === 'agenda') return '本回合只练一件事：不要被对方带着走，把话题拉回你要解决的问题。';
  if (lowest[0] === 'trust') return '本回合只练一件事：先承接对方顾虑，再表达你的边界。';
  if (lowest[0] === 'endgame') return '本回合只练一件事：不要只表态，要提出可执行的下一步。';
  if (lowest[0] === 'information') return '本回合只练一件事：先主动问一个高质量问题，再决定怎么回应。';
  if (opponentType === 'steel') return '本回合只练一件事：面对强压，不硬顶，先要求依据。';
  if (opponentType === 'stable') return '本回合只练一件事：把风险和保障条件说清楚。';
  if (stage === 'closing') return '本回合只练一件事：把模糊共识变成明确承诺。';
  return '本回合只练一件事：先听懂对方真实诉求，再选择回应方式。';
}

function renderRoundLearningGoal(state) {
  return `<div class="round-learning-goal">
    <div class="goal-title">本回合训练目标</div>
    <div class="goal-text">${buildRoundLearningGoal(state)}</div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────────────────
   暂停讲解面板
   ────────────────────────────────────────────────────────────────────────── */
function explainDuelOption(choice) {
  const levelMap = {
    info: { level: 'probe', explanation: '问出对方真实诉求，可以重新控制信息节奏。但在强硬对手面前需要先稳住态势。' },
    reframe: { level: 'advanced', explanation: '重新定义问题框架，是成熟谈判中最有力的手段之一。需要时机和铺垫。' },
    pressure: { level: 'direct', explanation: '建立底线和替代方案。有效，但容易激化对抗——需要确实有 BATNA。' },
    build: { level: 'steady', explanation: '先承接对方顾虑再推进——在大多数现实场景下是最稳健的选择。' },
    lock: { level: 'advanced', explanation: '把共识落地为可执行条款。终局时最关键，但过早使用会被认为强迫表态。' }
  };
  const meta = levelMap[choice.key] || { level: 'steady', explanation: '需要结合当前局势判断。' };
  return { id: choice.key, line: choice.sample, level: meta.level, explanation: meta.explanation };
}

function buildPauseExplainPanel(state) {
  const goal = buildRoundLearningGoal(state);
  const explanations = DUEL_CHOICES.map(explainDuelOption);
  return {
    title: '暂停讲解',
    trainingPoint: goal,
    optionExplanations: explanations,
    realWorldFormula: '稳妥表达公式：承接对方 + 表达边界 + 给出下一步路径。',
    exampleLine: '我理解你的压力，但这个条件我不能直接接。我们先把依据和可交换条件说清楚。'
  };
}

function renderPauseExplainPanel(state) {
  const panel = buildPauseExplainPanel(state);
  return `<div class="pause-explain-panel" id="pause-explain-panel">
    <h3>${panel.title}</h3>
    <p style="font-size:12px;color:var(--cyan);margin-bottom:10px">${panel.trainingPoint}</p>
    ${panel.optionExplanations.map((x) => `<div class="explain-option">
      <b>${{ probe:'探询信息', advanced:'高阶技法', direct:'直接表态', steady:'稳健应对' }[x.level] || x.level}</b>：
      "${x.line}"<br><span>${x.explanation}</span>
    </div>`).join('')}
    <div class="formula">${panel.realWorldFormula}</div>
    <div class="example-line">可参考："${panel.exampleLine}"</div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────────────────
   出牌后反馈面板
   ────────────────────────────────────────────────────────────────────────── */
function buildAfterActionFeedback(lastLog, state) {
  if (!lastLog) return null;
  const choice = DUEL_CHOICES.find((c) => c.key === lastLog.choice);
  if (!choice) return null;
  const lineItem = { playerLine: choice.sample };
  const duelist = state.duelist || {};
  const voiceProfileId = getDuelistVoiceProfileId(duelist);
  const voiceProfile = OPPONENT_VOICE_PROFILES[voiceProfileId] || OPPONENT_VOICE_PROFILES.steel_king;
  const opponentProfile = { type: voiceProfile.type };
  const hearing = evaluateOpponentHearing(lineItem, opponentProfile);
  const expression = evaluatePlayerExpression(lineItem);
  const stage = lastLog.delta > 0 ? 'countered' : 'pressure';
  const response = pickOpponentLine(voiceProfileId, stage);
  return {
    playerLine: choice.sample,
    label: choice.label,
    opponentHearing: hearing,
    opponentResponse: response,
    coachNote: expression.summary,
    betterNextMove: expression.total >= 80
      ? '下一轮可以推进条件交换或阶段承诺。'
      : '下一轮建议补上依据、边界和继续谈的路径。',
    deltaSign: lastLog.delta >= 0 ? `+${lastLog.delta}` : `${lastLog.delta}`
  };
}

function renderAfterActionFeedbackPanel(feedback) {
  if (!feedback) return '';
  return `<div class="after-action-feedback">
    <div class="feedback-title" style="color:var(--cyan);font-weight:bold;margin-bottom:8px">上一回合反馈 · ${feedback.label}</div>
    <div class="feedback-block"><b>你说：</b>"${feedback.playerLine}" <span style="color:var(--dim);font-size:11px">（态势变化 ${feedback.deltaSign}）</span></div>
    <div class="feedback-block"><b>对手听感：</b>${feedback.opponentHearing}</div>
    <div class="feedback-block"><b>对手回应：</b>"${feedback.opponentResponse}"</div>
    <div class="feedback-block coach"><b>教练提示：</b>${feedback.coachNote}</div>
    <div class="feedback-block"><b>下一轮建议：</b>${feedback.betterNextMove}</div>
  </div>`;
}
