      '③ 提前亮出BATNA，让对方知道你不是被迫成交的唯一选项。',
      '④ 面对时间压力时主动暂停，把节奏拉回到客观标准。',
      '⑤ 不要进入对方设置的胜负叙事，回到可执行条款本身。',
    ];
    const hellNote = isHell ? C.hint(
      '🔥 <b>地狱级加注</b>：本局 Boss 的豁免被取消，慷慨度再压 45%、强硬度叠加 ×1.55。' +
      (passed ? '在这种条件下仍能坚守原则，证明你的抗压模型已相当成熟。' :
                '在此难度下失手是正常的——先在终局挑战把基础抗压模型跑稳再挑地狱。'),
      passed ? 'green' : 'red') : '';
    bossReviewPanel = `
      <div class="panel" style="border-color:${isHell ? 'var(--red)' : 'var(--yellow)'}">
        <div class="panel-title" style="color:${isHell ? 'var(--red)' : 'var(--yellow)'}">
          ${isHell ? '🔥 地狱级 Boss 复盘' : '终局 Boss 复盘'}｜极限交易型高压锚定模型
        </div>
        ${hellNote}
        ${C.hint(diagnosis, passed ? 'green' : 'yellow')}
        ${advices.map((a) => C.hint(`• ${a}`)).join('')}
      </div>`;
  }

  // Phase 4：逐回合复盘 + 转折点 + 对手情绪曲线 + 改进建议
  let replayPanel = '';
  if (replay && replay.perRound && replay.perRound.length) {
    const rows = replay.perRound.map((pr) => {
      const color = pr.score >= 70 ? 'bar-green' : pr.score >= 50 ? 'bar-yellow' : 'bar-red';
      return `<div class="bar-wrap">
        <div class="bar-label"><span>${pr.label} · <span style="color:var(--dim)">${pr.comment}</span></span><span>${pr.score}</span></div>
        <div class="bar-bg"><div class="bar-fill ${color}" style="width:${pr.score}%"></div></div>
      </div>`;
    }).join('');
    const turning = replay.turning ? C.hint((replay.turning.type === 'bad' ? '⚠ ' : '★ ') + replay.turning.text, replay.turning.type === 'bad' ? 'red' : 'green') : '';
    const spark = replay.moodSeries ? C.moodSparkline(replay.moodSeries) : '';
    replayPanel =
      C.panel(`逐回合复盘　平均 ${replay.avgScore} 分`, turning + rows + spark) +
      C.panel('改进建议', replay.advice.map((a) => C.hint(`• ${a}`)).join(''));
  }

  const avatarHead = opp ? `
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 14px">
      ${C.avatarBadge(opp, 40)}
      <div style="text-align:left">
        <div style="color:var(--white);font-size:13px;font-weight:bold">${opp.name}</div>
        <div style="color:var(--purple);font-size:10px">${opp.type}</div>
      </div>
    </div>` : '';

  return `
    <div class="header"><h1>${scenarioName} — 训练结束</h1></div>
    ${avatarHead}
    <div class="grid2" style="margin-bottom:12px">
      ${C.scoreBox(result.playerScore, '您的得分')}
      ${C.scoreBox(result.oppScore, `${opp ? opp.name : '对手'} 得分`)}
    </div>
    <div style="text-align:center;margin-bottom:16px">${C.outcomeBadge(result.outcome)}</div>
    ${C.panel('复盘分析', result.summary || '')}
    ${replayPanel}
    ${tipsPanel}
    ${bossReviewPanel}
    <div style="margin-top:16px;text-align:center">
      <button class="btn" data-nav="${SCREENS.MAIN}" style="margin:4px">← 返回主菜单</button>
      <button class="btn btn-green" data-action="quick" style="margin:4px">再来一局 ⚡</button>
    </div>
  `;
}

renderResult.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  const quick = document.querySelector('[data-action="quick"]');
  if (quick) quick.addEventListener('click', () => {
    const keys = Object.keys(SCENARIO_META);
    const key = keys[Math.floor(Math.random() * keys.length)];
    EventBus.emit(EVENTS.GAME_START, { scenarioKey: key, opponentId: 'random' });
  });
};


/* ===== ui/screens/strategy-lib.js ===== */
// ui/screens/strategy-lib.js — 策略理论库（策略卡 / 沟通技术 / 心理防御 / 六大宗师）
// 屏幕内自管理 Tab 与宗师详情，直接更新 #strategy-content，不经路由。


const TABS = [
  ['cards', '策略卡牌'],
  ['comm', '沟通技术'],
  ['defense', '心理防御'],
  ['masters', '六大宗师'],
];

function renderStrategyLib() {
  const tabs = TABS.map(([id, label], i) =>
    `<div class="tab ${i === 0 ? 'active' : ''}" data-tab="${id}">${label}</div>`).join('');
  return `
    <div class="flex-between">
      <div class="section-title">▶ 策略理论库</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="tabs" id="strategy-tabs">${tabs}</div>
    <div id="strategy-content"></div>
  `;
}

function contentFor(tab) {
  if (tab === 'cards') {
    return STRATEGY_CARDS.map((c) => `
      <div class="master-card">
        <div class="master-name">${c.name}</div>
        <div style="margin:4px 0">${c.tags.map((t) => C.tag(t)).join('')}</div>
        <div style="color:var(--text);font-size:12px;line-height:1.6;margin:6px 0">${c.desc}</div>
        <div style="font-size:11px;color:var(--dim)">适用场景：${c.use}</div>
      </div>`).join('');
  }
  if (tab === 'comm') {
    return COMM_TECHNIQUES.map((c) =>
      `<div class="tactic" style="margin-bottom:8px"><div class="tactic-name">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  if (tab === 'defense') {
    return DEFENSE_TACTICS.map((c) =>
      `<div class="tactic" style="border-left-color:var(--red);margin-bottom:8px"><div class="tactic-name" style="color:var(--red)">${c.name}</div><div class="tactic-desc">${c.desc}</div></div>`).join('');
  }
  // masters
  return `<div class="grid2">${Object.entries(MASTERS).map(([k, m]) => `
    <div class="card" data-master="${k}">
      <h3>${m.name}</h3>
      <div style="color:var(--yellow);font-size:11px;margin-bottom:6px">${m.title}</div>
      <p>${m.intro}</p>
      <div style="margin-top:8px;font-size:11px;color:var(--cyan)">共 ${m.tactics.length} 个策略/原则 →</div>
    </div>`).join('')}</div>`;
}

function masterDetail(key) {
  const m = MASTERS[key];
  const stages = [...new Set(m.tactics.map((t) => t.stage))];
  const body = stages.map((stage) => `
    <div style="margin-bottom:12px">
      <div style="color:var(--yellow);font-size:11px;letter-spacing:1px;margin-bottom:6px">【${stage}】</div>
      ${m.tactics.filter((t) => t.stage === stage).map((t) =>
        `<div class="tactic" style="margin-bottom:6px"><div class="tactic-name">${t.name}</div><div class="tactic-desc">${t.desc}</div></div>`).join('')}
    </div>`).join('');
  return `
    <button class="back-btn" id="master-back" style="margin-bottom:12px">← 返回宗师列表</button>
    <div class="master-card">
      <div class="master-name">${m.name}</div>
      <div class="master-title">${m.title}</div>
      ${C.hint(m.intro, 'yellow')}
      ${body}
    </div>`;
}

renderStrategyLib.afterRender = function () {
  const contentEl = document.getElementById('strategy-content');

  function showTab(tab) {
    document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
      t.classList.toggle('active', t.getAttribute('data-tab') === tab));
    contentEl.innerHTML = contentFor(tab);
    if (tab === 'masters') bindMasterCards();
  }

  function bindMasterCards() {
    contentEl.querySelectorAll('[data-master]').forEach((el) => {
      el.addEventListener('click', () => {
        contentEl.innerHTML = masterDetail(el.getAttribute('data-master'));
        const back = document.getElementById('master-back');
        if (back) back.addEventListener('click', () => showTab('masters'));
      });
    });
  }

  document.querySelectorAll('#strategy-tabs .tab').forEach((t) =>
    t.addEventListener('click', () => showTab(t.getAttribute('data-tab'))));

  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));

  showTab('cards');
};


/* ===== ui/screens/psychology.js ===== */
// ui/screens/psychology.js — 心理档案分析屏（Phase 4：基于真实决策序列）


function renderPsychology() {
  const player = Store.get('player');

  const head = `
    <div class="flex-between">
      <div class="section-title">▶ 心理档案分析</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>`;

  if (!hasEnoughData(total)) {
    return `${head}${C.hint('您还没有足够的训练数据。请先完成至少 2 场博弈训练，心理档案将更加准确。', 'yellow')}`;
  }

  const profile = computeProfile(player);
  const bars = PSYCH_DIMENSIONS.map((d) => C.bar(d.label, profile[d.key] || 0, d.color)).join('');

renderPsychology.afterRender = function () {

/* ===== ui/screens/dashboard.js ===== */
// ui/screens/dashboard.js — 训练成绩看板（场景/对手胜率 + 短板分析）


function winRate(sessions, filterFn) {
  const sub = sessions.filter(filterFn);
  if (!sub.length) return null;
  const wins = sub.filter((s) => s.outcome === 'win' || s.outcome === 'coop').length;
  return { played: sub.length, winRate: Math.round(wins / sub.length * 100) };
}

function renderDashboard() {
  const p = Store.get('player') || { name: '—', sessions: [], total: 0, wins: 0, draws: 0, losses: 0 };
  const rank = getRank(p.total, p.wins);
  const wr = p.total > 0 ? Math.round(p.wins / p.total * 100) : 0;
  const sessions = p.sessions || [];

  // ── 近期记录 ──────────────────────────────────────────────────────────────
  const recent = sessions.slice(-8).reverse();
  const histHtml = recent.length ? recent.map((r) => {
    const oc = r.outcome === 'win' ? 'outcome-win' : r.outcome === 'lose' ? 'outcome-lose' : r.outcome === 'coop' ? 'outcome-coop' : 'outcome-draw';
    const ocLabel = { win:'胜', lose:'负', coop:'合作', draw:'平' }[r.outcome] || '—';
    return `<div class="info-row">
      <span class="info-key" style="font-size:10px">${r.time}</span>
      <span>${r.scenario || '—'}</span>
      <span style="color:var(--dim)">${r.opponent || '—'}</span>
      <span class="outcome ${oc}" style="padding:1px 6px;font-size:10px">${ocLabel}</span>
    </div>`;
  }).join('') : '<div style="color:var(--dim);font-size:12px;padding:8px">暂无训练记录</div>';

  // ── 场景胜率 ──────────────────────────────────────────────────────────────
  const scenarioHtml = Object.entries(SCENARIO_META).map(([key, meta]) => {
    const stat = winRate(sessions, (s) => s.scenarioKey === key);
    if (!stat) return `<div class="info-row"><span class="info-key">${meta.name}</span><span style="color:var(--dim)">未训练</span></div>`;
    const color = stat.winRate >= 60 ? 'var(--green)' : stat.winRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="info-row">
      <span class="info-key">${meta.name}</span>
      <span style="color:${color}">${stat.played} 场 &nbsp; 胜率 ${stat.winRate}%</span>
    </div>`;
  }).join('');

  // ── 对手胜率 ──────────────────────────────────────────────────────────────
  const oppHtml = OPPONENTS.map((o) => {
    const stat = winRate(sessions, (s) => s.opponentId === o.id);
    if (!stat) return `<div class="info-row"><span class="info-key">${o.name} <span style="color:var(--dim);font-size:10px">${o.type}</span></span><span style="color:var(--dim)">未对战</span></div>`;
    const color = stat.winRate >= 60 ? 'var(--green)' : stat.winRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="info-row">
      <span class="info-key">${o.name} <span style="color:var(--dim);font-size:10px">${o.type}</span></span>
      <span style="color:${color}">${stat.played} 场 &nbsp; 胜率 ${stat.winRate}%</span>
    </div>`;
  }).join('');

  // Boss 记录（若有）
  const bossStat = winRate(sessions, (s) => s.opponentId === 'trumpBoss');
  const bossHtml = bossStat ? `<div class="info-row">
    <span class="info-key" style="color:var(--yellow)">极限交易者 <span style="font-size:10px">隐藏 Boss</span></span>
    <span style="color:${bossStat.winRate >= 50 ? 'var(--green)' : 'var(--red)'}">${bossStat.played} 场 &nbsp; 胜率 ${bossStat.winRate}%</span>
  </div>` : '';

  // ── 短板分析 ──────────────────────────────────────────────────────────────
  const profile = p.total >= 2 ? computeProfile(p) : null;
  const weak = profile ? detectWeakPoints(profile) : [];
  const weakHtml = weak.length
    ? weak.map((w) => C.hint(`⚠ ${w}`, 'yellow')).join('')
    : p.total >= 2
      ? C.hint('暂未发现明显短板，继续积累训练样本。', 'green')
      : C.hint('完成至少 2 场训练后将显示短板分析。', 'dim');

  // ── 难度分布 ──────────────────────────────────────────────────────────────
  // 标签从 difficulty 模块的 DIFFICULTIES 派生，新增难度档位自动出现
  const diffCount = sessions.reduce((acc, s) => {
    const d = s.difficulty || 'medium';
    acc[d] = (acc[d] || 0) + 1;
    return acc;
  }, {});
  const diffHtml = DIFFICULTIES
    .filter((d) => diffCount[d.key])
    .map((d) => {
      const cls = d.key === 'hell' ? 'tag-red' : d.key === 'extreme' ? 'tag-yellow' : 'tag-cyan';
      return `<span class="tag ${cls}">${d.label} ×${diffCount[d.key]}</span>`;
    })
    .join('') || '<span style="color:var(--dim);font-size:11px">暂无数据</span>';

  return `
    <div class="flex-between">
      <div class="section-title">▶ 训练成绩看板</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    <div class="grid3" style="margin-bottom:16px">
      ${C.scoreBox(p.total, '总训练场次')}
      ${C.scoreBox(`${wr}%`, '综合胜率', 'var(--green)')}
      ${C.scoreBox(rank, '当前军衔', 'var(--yellow)')}
    </div>
    ${C.panel('战绩统计', `
      <div class="grid3">
        <div style="text-align:center"><div style="color:var(--green);font-size:20px;font-weight:bold">${p.wins || 0}</div><div style="color:var(--dim);font-size:11px">胜利</div></div>
        <div style="text-align:center"><div style="color:var(--yellow);font-size:20px;font-weight:bold">${p.draws || 0}</div><div style="color:var(--dim);font-size:11px">平局/合作</div></div>
        <div style="text-align:center"><div style="color:var(--red);font-size:20px;font-weight:bold">${p.losses || 0}</div><div style="color:var(--dim);font-size:11px">失利</div></div>
      </div>`)}
    ${C.panel('场景胜率', scenarioHtml || '<div style="color:var(--dim)">暂无数据</div>')}
    ${C.panel('对手胜率', oppHtml + bossHtml)}
    ${C.panel('当前短板', weakHtml)}
    ${C.panel('难度分布', `<div style="padding:4px 0">${diffHtml}</div>`)}
    ${C.panel('最近训练记录', histHtml)}
  `;
}

renderDashboard.afterRender = function () {
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
};


/* ===== core/bootstrap.js ===== */
// core/bootstrap.js — 应用启动入口（组合根）
// 职责：注册所有屏幕 → 初始化对局视图/记录器/控制器 → 渲染首屏。
// 作为组合根，允许 import 各模块进行装配；这是依赖图的根，build.js 把它放最后。




function boot() {
  const root = document.getElementById('app');
  if (!root) { console.error('[bootstrap] #app not found'); return; }

  // 注册屏幕
  Router.register(SCREENS.WELCOME, renderWelcome);
  Router.register(SCREENS.MAIN, renderMainMenu);
  Router.register(SCREENS.SCENARIO_SELECT, renderScenarioSelect);
  Router.register(SCREENS.OPPONENT_SELECT, renderOpponentSelect);
  Router.register(SCREENS.GAME, renderGame);
  Router.register(SCREENS.RESULT, renderResult);
  Router.register(SCREENS.STRATEGY, renderStrategyLib);
  Router.register(SCREENS.PSYCHOLOGY, renderPsychology);
  Router.register(SCREENS.DASHBOARD, renderDashboard);

  // 初始化对局视图（game:render 落地 + 动作委托）
  initGameView();
  // 先初始化记录器，再初始化控制器 —— 保证 game:end 时"先记录、后导航"
  initRecorder();
  initRunner();

  // 启动路由，首屏 = 欢迎屏
  Router.init(root, SCREENS.WELCOME);
  console.log('[bootstrap] v3 启动完成 ✓ (Phase 2：全功能迁移)');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();
</script>
