# 一键部署 server/ 里的 Cloudflare Worker（后端安全代理）。
#
# 准备：在仓库 Settings → Secrets and variables → Actions 配置三个 secret：
#   CLOUDFLARE_API_TOKEN   —— Cloudflare → My Profile → API Tokens（"Edit Cloudflare Workers" 模板）
#   CLOUDFLARE_ACCOUNT_ID  —— Workers 概览页右侧 Account ID
#   OPENROUTER_API_KEY     —— https://openrouter.ai/keys
#   PROXY_ACCESS_TOKEN     —— （可选）公开部署的访问令牌；设了就自动写入 Worker，游戏后端接口需带 ?k=<令牌>
#
# 触发：① push 到 main 且改动 server/**（自动部署）；② Actions → "Deploy Worker"
#       → Run workflow（手动一键，可选覆盖模型 id）。
# 工作流会先跑契约测试，再 wrangler deploy，并把 OPENROUTER_API_KEY 写入 Worker 密钥。

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:
    inputs:
      model:
        description: "可选：覆盖默认模型（OpenRouter id，留空用 deepseek/deepseek-chat）"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Contract test (no key / no network needed)
        working-directory: server
        run: node test/contract.test.mjs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: server
          command: "deploy ${{ github.event.inputs.model != '' && format('--var OPENROUTER_MODEL:{0}', github.event.inputs.model) || '' }}"
          secrets: |
            OPENROUTER_API_KEY
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # Optional gate: if a PROXY_ACCESS_TOKEN repo secret is set, push it to the
      # Worker so the proxy requires ?k=<token>. Skipped entirely when unset, so
      # the required deploy above is never affected.
      - name: Detect access token
        id: tok
        env:
          T: ${{ secrets.PROXY_ACCESS_TOKEN }}
        run: |
          if [ -n "$T" ]; then echo "set=true" >> "$GITHUB_OUTPUT"; else echo "set=false" >> "$GITHUB_OUTPUT"; fi
      - name: Set PROXY_ACCESS_TOKEN on the Worker
        if: steps.tok.outputs.set == 'true'
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROXY_ACCESS_TOKEN: ${{ secrets.PROXY_ACCESS_TOKEN }}
        run: printf '%s' "$PROXY_ACCESS_TOKEN" | npx --yes wrangler@3 secret put PROXY_ACCESS_TOKEN
