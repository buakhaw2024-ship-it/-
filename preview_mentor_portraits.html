<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>传奇导师卡 · 人物图像预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#e8dfc8;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.page{max-width:1200px;margin:0 auto;padding:28px 16px}

.nav{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid rgba(212,175,55,.2);margin-bottom:32px}
.nav-title{font-size:20px;font-weight:700;color:#d4af37;letter-spacing:.06em}
.nav-sub{font-size:11px;color:#666;margin-top:3px}
.vtag{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);color:#d4af37;font-size:11px;padding:4px 14px;border-radius:20px}

.section-title{font-size:15px;font-weight:700;color:#d4af37;letter-spacing:.05em;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.stag{font-size:10px;padding:2px 8px;border-radius:8px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#d4af37}

.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,.2),transparent);margin:36px 0}

/* ── CARD GRID ── */
.card-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}

/* ── MENTOR CARD (matches game layout) ── */
.mentor-card{
  width:164px;border-radius:14px;overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;position:relative;
}
.mentor-card:hover{transform:translateY(-8px)}

/* SSR gold border */
.mentor-card.ssr{
  background:linear-gradient(160deg,#14121e,#0d0b18);
  box-shadow:0 0 18px rgba(212,175,55,.4);
}
.mentor-card.ssr::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(45deg,#d4af37,#8b6914,#d4af37,#ffd700,#8b6914,#d4af37);
  background-size:300% 300%;animation:shimmer 3s linear infinite;z-index:0;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:2px;
}
/* UR rainbow border */
.mentor-card.ur{
  background:linear-gradient(160deg,#14121e,#0d0b18);
  box-shadow:0 0 24px rgba(200,100,255,.45),0 0 40px rgba(255,100,100,.15);
}
.mentor-card.ur::before{
  content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(45deg,#ff6b6b,#ffd700,#7fff00,#00cfff,#bf7fff,#ff6b6b);
  background-size:400% 400%;animation:shimmer 2s linear infinite;z-index:0;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:2px;
}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:300% 50%}}

.card-inner{position:relative;z-index:1;display:flex;flex-direction:column;border-radius:13px;overflow:hidden}

/* portrait image slot */
.mentor-portrait{
  width:100%;height:200px;object-fit:cover;object-position:center 15%;
  display:block;background:#0a0814;
}

/* card body */
.card-body{
  padding:10px 10px 8px;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(8,6,18,.9) 100%);
}
.card-rarity{font-size:9px;font-weight:900;letter-spacing:.08em;margin-bottom:3px}
.ssr .card-rarity{color:#d4af37}
.ur .card-rarity{background:linear-gradient(90deg,#ff6b6b,#ffd700,#00cfff,#bf7fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card-name{font-size:13px;font-weight:700;color:#f0e8d0;margin-bottom:2px}
.card-style{font-size:10px;color:#a090c0;margin-bottom:6px}
.card-book{
  font-size:9px;color:#888;padding:3px 7px;background:rgba(255,255,255,.05);
  border-radius:4px;border-left:2px solid;display:inline-block;
}
.ssr .card-book{border-color:#d4af37}
.ur .card-book{border-color:#bf7fff}

/* ── PORTRAIT-ONLY ROW ── */
.portrait-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:8px}
.portrait-thumb{
  width:80px;height:107px;border-radius:8px;overflow:hidden;
  border:1px solid rgba(212,175,55,.25);cursor:pointer;transition:transform .15s;
  position:relative;
}
.portrait-thumb:hover{transform:scale(1.1);z-index:2}
.portrait-thumb img{width:100%;height:100%;object-fit:cover;object-position:center 15%}
.portrait-label{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.75);font-size:8px;color:#d4af37;
  text-align:center;padding:2px 0;
}

/* ── LIGHTBOX ── */
.lb{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:999;align-items:center;justify-content:center;cursor:pointer;
}
.lb.open{display:flex}
.lb img{max-width:280px;border-radius:12px;box-shadow:0 0 60px rgba(212,175,55,.4)}
.lb-close{position:absolute;top:20px;right:28px;font-size:28px;color:#d4af37;cursor:pointer}
.lb-name{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);
  font-size:14px;font-weight:700;color:#d4af37;letter-spacing:.1em;white-space:nowrap}

/* ── COMPARE SECTION ── */
.compare-row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;justify-content:center}
.compare-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.compare-label{font-size:11px;color:#888;text-align:center}
.compare-label b{color:#d4af37}

/* chibi fallback mock */
.mentor-chibi-mock{
  width:100%;height:200px;background:linear-gradient(160deg,#1a1428,#0d0820);
  display:flex;align-items:center;justify-content:center;font-size:56px;
}
</style>

// ─────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────
function makeCard(d) {
  const cls = d.rarity.toLowerCase();
  const card = document.createElement('div');
  card.className = `mentor-card ${cls}`;
  card.innerHTML = `<div class="card-inner">
    <img class="mentor-portrait" src="${d.portrait}" alt="${d.name}">
    <div class="card-body">
      <div class="card-rarity">${d.rarityLabel}</div>
      <div class="card-name">${d.name}</div>
      <div class="card-style">${d.style}</div>
      <div class="card-book">${d.book}</div>
    </div>
  </div>`;
  return card;
}

function makeThumb(d) {
  const th = document.createElement('div');
  th.className = 'portrait-thumb';
  th.innerHTML = `<img src="${d.portrait}" alt="${d.name}"><div class="portrait-label">${d.name}</div>`;
  th.onclick = () => openLb(d.portrait, d.name);
  return th;
}

const ssrGrid = document.getElementById('ssrGrid');
const urGrid = document.getElementById('urGrid');
const thumbRow = document.getElementById('thumbRow');

SSR_MASTERS.forEach(d => { ssrGrid.appendChild(makeCard(d)); thumbRow.appendChild(makeThumb(d)); });
UR_LEGENDS.forEach(d => { urGrid.appendChild(makeCard(d)); thumbRow.appendChild(makeThumb(d)); });

// set compare portrait
document.getElementById('dawsonPortrait').src = SSR_MASTERS[0].portrait;

// lightbox
function openLb(src, name) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbName').textContent = name;
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); }
document.getElementById('lb').addEventListener('click', e => { if(e.target===e.currentTarget||e.target.id==='lb-close') closeLb(); });
</script>
