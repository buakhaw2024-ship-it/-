let _gDim = null, _gSpot = null, _gTip = null, _gHelp = null;
let _gScreen = '', _gSteps = [], _gIdx = 0, _gActive = false;

// ── Helpers ──────────────────────────────────────────────────────────────────
function _rmEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function _cleanTour() {
  _gActive = false;
  _rmEl(_gDim); _rmEl(_gSpot); _rmEl(_gTip);
  _gDim = _gSpot = _gTip = null;
}

function _rmHelp() { _rmEl(_gHelp); _gHelp = null; }

function _positionTip(targetEl, pos) {
  if (!targetEl || pos === 'center') {
    Object.assign(_gTip.style, {
      left: '50%', top: '50%', transform: 'translate(-50%,-50%)', right: '', bottom: '',
    });
    return;
  }
  _gTip.style.transform = '';
  const r = targetEl.getBoundingClientRect();
  const vw = window.innerWidth, vh = window.innerHeight;
  const TW = 350, TH = 260, M = 14;
  let left, top;
  if (pos === 'bottom') { top = r.bottom + M; left = r.left + r.width / 2 - TW / 2; }
  else if (pos === 'top') { top = r.top - TH - M; left = r.left + r.width / 2 - TW / 2; }
  else if (pos === 'right') { left = r.right + M; top = r.top + r.height / 2 - TH / 2; }
  else { left = r.left - TW - M; top = r.top + r.height / 2 - TH / 2; }
  left = Math.max(8, Math.min(left, vw - TW - 8));
  top = Math.max(8, Math.min(top, vh - TH - 8));
  Object.assign(_gTip.style, { left: left + 'px', top: top + 'px', right: '', bottom: '' });
}

function _renderStep(i) {
  _gIdx = i;
  const step = _gSteps[i];
  const isLast = i === _gSteps.length - 1;

  let targetEl = null;
  if (step.selector) targetEl = document.querySelector(step.selector);

  // Spotlight: box-shadow trick creates dim with transparent hole at target
  if (targetEl) {
    if (!_gSpot) {
      _gSpot = document.createElement('div');
      _gSpot.className = 'guide-spotlight';
      document.body.appendChild(_gSpot);
    }
    if (_gDim) _gDim.style.background = 'transparent';
    const r = targetEl.getBoundingClientRect();
    const P = 8;
    Object.assign(_gSpot.style, {
      display: 'block',
      left: (r.left - P) + 'px', top: (r.top - P) + 'px',
      width: (r.width + P * 2) + 'px', height: (r.height + P * 2) + 'px',
    });
    targetEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    if (_gSpot) _gSpot.style.display = 'none';
    if (_gDim) _gDim.style.background = 'rgba(0,0,0,0.72)';
  }

  const prevBtn = i > 0 ? `<button class="guide-btn guide-btn-sec" id="g-prev">← 上一步</button>` : '';
  const mainBtn = isLast
    ? `<button class="guide-btn guide-btn-pri" id="g-done">完成引导 ✓</button>`
    : `<button class="guide-btn guide-btn-pri" id="g-next">下一步 →</button>`;

  _gTip.innerHTML = `
    <div class="guide-tip-head">
      <span class="guide-tip-count">${i + 1} / ${_gSteps.length}</span>
      <button class="guide-skip-x" id="g-skip" title="跳过引导">✕</button>
    </div>
    <div class="guide-tip-title">${step.title}</div>
    <div class="guide-tip-body">${step.body}</div>
    <div class="guide-tip-btns">${prevBtn}${mainBtn}</div>
  `;

  _positionTip(targetEl, step.position || 'bottom');

  const nx = document.getElementById('g-next');
  const pv = document.getElementById('g-prev');
  const dn = document.getElementById('g-done');
  const sk = document.getElementById('g-skip');
  if (nx) nx.onclick = () => _renderStep(i + 1);
  if (pv) pv.onclick = () => _renderStep(i - 1);
  if (dn) dn.onclick = _finishTour;
  if (sk) sk.onclick = _finishTour;
}

function _finishTour() {
  _markDone(_gScreen);
  _cleanTour();
  _addHelpBtn();
}

function _addHelpBtn() {
  _rmHelp();
  const tourId = _gScreen;
  if (!_TOURS[tourId]) return;
  _gHelp = document.createElement('button');
  _gHelp.className = 'guide-help-btn';
  _gHelp.textContent = '?';
  _gHelp.title = '操作引导';
  _gHelp.addEventListener('click', function () {
    if (tourId === 'game') {
      // On game screen: read current scenario at click-time and prepend its tip
      const sk = typeof Store !== 'undefined' && Store.get && Store.get('scenarioKey');
      const tip = sk && _SCENARIO_TIPS[sk];
      const steps = tip ? [tip, ..._TOURS['game']] : _TOURS['game'].slice();
      if (_gActive) _cleanTour();
      _gScreen = 'game';
      _gSteps = steps;
      _gActive = true;
      _rmHelp();
      _gDim = document.createElement('div');
      _gDim.className = 'guide-dim';
      document.body.appendChild(_gDim);
      _gTip = document.createElement('div');
      _gTip.className = 'guide-tooltip';
      document.body.appendChild(_gTip);
      _renderStep(0);
    } else {
      _startTour(tourId);
    }
  });
  document.body.appendChild(_gHelp);
}

function _startTour(screenId) {
  if (_gActive) _cleanTour();
  _gScreen = screenId;
  _gSteps = _TOURS[screenId];
  _gActive = true;
  _rmHelp();

  _gDim = document.createElement('div');
  _gDim.className = 'guide-dim';
  document.body.appendChild(_gDim);

  _gTip = document.createElement('div');
  _gTip.className = 'guide-tooltip';
  document.body.appendChild(_gTip);

  _renderStep(0);
}

// Called by router after each screen render.
// Shows tour automatically on first visit for non-game screens.
// Game screen NEVER auto-triggers — gameplay must not be interrupted.
// ? button is always shown on game screen; clicking it shows scenario tip + general guide.
function showTour(screenId) {
  if (typeof document === 'undefined' || typeof document.createElement !== 'function') return;
  _initInlineTips();
  _cleanTour();
  _rmHelp();
  _gScreen = screenId;

  // Game screen: show ? button only, never block gameplay with an overlay
  if (screenId === 'game') {
    _addHelpBtn();
    return;
  }

  if (!_TOURS[screenId]) return;
  if (_isDone(screenId)) {
    _addHelpBtn();
    return;
  }
  // Slight delay to let DOM settle after screen render
  setTimeout(function () { _startTour(screenId); }, 380);
}

// Called by router before each screen render to clear any active guide.
function hideGuide() {
  if (typeof document === 'undefined' || typeof document.createElement !== 'function') return;
  _cleanTour();
  _rmHelp();
}

const ARC_STORAGE_KEYS = {

};

const ARC_DIFFICULTIES = ['easy', 'normal', 'hard', 'extreme', 'hell'];
const ARC_RANK_ORDER = ['新兵', '学员', '学员进阶', '谈判官', '策略师', '博弈大师', '宗师级'];

function arcRankIndex(name) {
  const i = ARC_RANK_ORDER.indexOf(name);
  return i >= 0 ? i : 0;
}
function arcRankAtLeast(cur, req) {
  return arcRankIndex(cur) >= arcRankIndex(req);
}

// 把主系统的难度（easy/medium/hard/extreme/hell）映射到弧线的难度键。
// 注意：主系统 medium == 弧线 normal。

  const d = Store.get('difficulty') || 'medium';
  return d === 'medium' ? 'normal' : d;
}

function arcDevFlag(name) {
  try { return new URL(window.location.href).searchParams.get(name) === '1'; }
  catch (e) { return false; }
}

function arcPick(arr) { return arr && arr.length ? arr[Math.floor(Math.random() * arr.length)] : null; }

function arcEscape(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function arcClamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }


/* ===== arcs/persistence.js ===== */
// 直接持久化到 localStorage（前缀 arc:）
const ArcStore = {
  _read(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw === null ? undefined : JSON.parse(raw);
    } catch (e) { return undefined; }
  },
  _write(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); }
    catch (e) { console.warn('[arc] write failed', key, e); }
  },
  _del(key) { try { localStorage.removeItem(key); } catch (e) {} },

  getActiveId() { return this._read(ARC_STORAGE_KEYS.ACTIVE); },
  setActiveId(id) { this._write(ARC_STORAGE_KEYS.ACTIVE, id); },
  clearActiveId() { this._del(ARC_STORAGE_KEYS.ACTIVE); },

  isModeActive() { return !!this._read(ARC_STORAGE_KEYS.MODE_ACTIVE); },
  setModeActive(v) { this._write(ARC_STORAGE_KEYS.MODE_ACTIVE, !!v); },

  getArcState(arcId) { return this._read(ARC_STORAGE_KEYS.STATE_PREFIX + arcId); },
  setArcState(arcId, s) { this._write(ARC_STORAGE_KEYS.STATE_PREFIX + arcId, s); },
  deleteArcState(arcId) { this._del(ARC_STORAGE_KEYS.STATE_PREFIX + arcId); },

  listArcStates() {
    const out = {};
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(ARC_STORAGE_KEYS.STATE_PREFIX)) {
          out[k.slice(ARC_STORAGE_KEYS.STATE_PREFIX.length)] = this._read(k);
        }
      }
    } catch (e) {}
    return out;
  },

  getProfile() { return this._read(ARC_STORAGE_KEYS.PROFILE); },
  setProfile(p) { this._write(ARC_STORAGE_KEYS.PROFILE, p); },
  delProfile() { this._del(ARC_STORAGE_KEYS.PROFILE); },
};

// 弧线模式独立画像：6 维（cooperation_rate, assert, risk, fairness, emotion, depth）
function arcDefaultProfile() {
  return {
    cooperation_rate: 0.5, assert: 0.5, risk: 0.5,
    fairness: 0.5, emotion: 0.5, depth: 0.5,
    samples: 0
  };
}
function arcGetProfile() {
  return ArcStore.getProfile() || arcDefaultProfile();
}
function arcUpdateProfile(deltas) {
  const cur = arcGetProfile();
  const alpha = 0.15;
  for (const k of ['cooperation_rate', 'assert', 'risk', 'fairness', 'emotion', 'depth']) {
    if (typeof deltas[k] === 'number') {
      cur[k] = arcClamp(cur[k] * (1 - alpha) + deltas[k] * alpha, 0, 1);
    }
  }
  cur.samples = (cur.samples || 0) + 1;
  ArcStore.setProfile(cur);
}

}

// 镜像对手解析（打分制）
function resolveArcOpponentId(id) {
  if (id !== 'mirror') return id;
  const profile = arcGetProfile();
  if (!profile || (profile.samples || 0) === 0) return 'rational';
  const p = profile;
  const scores = {
    aggressive: p.cooperation_rate + (1 - p.assert) * 0.8,
    manipulative: (1 - p.risk) * 0.7 + p.fairness * 0.6 + (1 - p.depth) * 0.5,
    emotional: (1 - p.emotion) + p.assert * 0.3,
    rational: 0.3 + p.depth * 0.4
  };
  let best = 'rational', bestScore = -1;
  for (const k of Object.keys(scores)) {
    if (scores[k] > bestScore) { bestScore = scores[k]; best = k; }
  }
  return best;
}

/* ===== arcs/engine.js ===== */
function getArc(arcId) {
  return NEGOTIATION_ARCS.find((a) => a.id === arcId);
}

function arcGetPlayerSnapshot() {
  const p = Store.get('player') || { total: 0, wins: 0 };
  return { total: p.total || 0, wins: p.wins || 0 };
}

function isArcUnlocked(arc) {
  if (arcDevFlag('devUnlockAll')) return { unlocked: true, reason: '调试模式' };
  if (!arc || !arc.unlock) return { unlocked: true, reason: '' };
  const u = arc.unlock;
  const snap = arcGetPlayerSnapshot();
  const rank = getRank(snap.total, snap.wins);
  const total = snap.total;
  const diff = arcCurrentDifficulty();
  if (u.minRank && !arcRankAtLeast(rank, u.minRank)) {
    return { unlocked: false, reason: `需要 ${u.minRank} 及以上（当前 ${rank}）` };
  }
  if (u.minSessions && total < u.minSessions) {
    return { unlocked: false, reason: `需要总训练局数 ≥ ${u.minSessions}（当前 ${total}）` };
  }
  if (u.difficulty && Array.isArray(u.difficulty) && !u.difficulty.includes(diff)) {
    return { unlocked: false, reason: `需要难度为 ${u.difficulty.join(' / ')}（当前 ${diff}）` };
  }
  return { unlocked: true, reason: '' };
}

function getOrCreateArcState(arcId) {
  let st = ArcStore.getArcState(arcId);
  if (st) return st;
  const arc = getArc(arcId);
  if (!arc) return null;
  st = {
    id: arcId,
    stageIndex: 0,
    vars: JSON.parse(JSON.stringify(arc.initialState)),
    stageResults: [],
    ongoing: true,
    completed: false,
    endingId: null,
    startedAt: Date.now()
  };
  ArcStore.setArcState(arcId, st);
  return st;
}

function getActiveArcState() {
  const id = ArcStore.getActiveId();
  if (!id) return null;
  return ArcStore.getArcState(id);
}

function startArcStage(arcId) {
  const arc = getArc(arcId);
  if (!arc) return false;
  const unlock = isArcUnlocked(arc);
  if (!unlock.unlocked) {
    if (typeof window !== 'undefined' && window.alert) alert(`${arc.title} 尚未解锁：${unlock.reason}`);
    return false;
  }
  const state = getOrCreateArcState(arcId);
  if (!state) return false;
  if (state.completed) {
    ArcStore.setActiveId(arcId);
    return 'completed';
  }
  ArcStore.setActiveId(arcId);
  ArcStore.setModeActive(true);
  resetLineMemoryForNewArc();
  return state;
}

function applyArcStageResult(result) {
  const activeId = ArcStore.getActiveId();
  if (!activeId) return null;
  const state = ArcStore.getArcState(activeId);
  if (!state || !state.ongoing) return null;
  const arc = getArc(activeId);
  if (!arc) return null;
  const stage = arc.stages[state.stageIndex];
  if (!stage) return null;
  const rawDeltas = stage.stateEffects[result.choice] || {};

  // 难度修正
  const diff = arcCurrentDifficulty();
  const mult = ARC_DIFFICULTY_MULTIPLIER[diff] || ARC_DIFFICULTY_MULTIPLIER.normal;
  const deltas = {};
  for (const k of Object.keys(rawDeltas)) {
    const v = rawDeltas[k];
    deltas[k] = Math.round(v >= 0 ? v * mult.reward : v * mult.penalty);
  }

  for (const k of Object.keys(deltas)) {
    state.vars[k] = (state.vars[k] || 0) + deltas[k];
    if (k === 'controlSeats') state.vars[k] = arcClamp(state.vars[k], 0, 9);
    else if (k === 'mediaSentiment') state.vars[k] = arcClamp(state.vars[k], -100, 100);
    else state.vars[k] = arcClamp(state.vars[k], 0, 100);
  }

  state.stageResults.push({
    stageId: stage.id,
    stageTitle: stage.title,
    choice: result.choice,
    deltas: deltas,
    snapshotAfter: JSON.parse(JSON.stringify(state.vars))
  });
  state.stageIndex += 1;

  if (state.stageIndex >= arc.stages.length) {
    state.ongoing = false;
    state.completed = true;
    state.endingId = computeEnding(arc, state.vars).id;
    state.completedAt = Date.now();
    // 不强行写主玩家档案；只在主菜单徽章里读 ArcStore.listArcStates() 统计完成数
    ArcStore.setModeActive(false);
  }

  ArcStore.setArcState(activeId, state);

  // 更新对手 mood / memory
  const oppId = resolveArcOpponentId(stage.opponent);
  if (oppId && result.choice) {
    updateOpponentStateFromArcChoice(oppId, result.choice);
  }
  return state;
}

function computeEnding(arc, vars) {
  for (const ending of arc.endings) {
    try { if (ending.condition(vars)) return ending; }
    catch (e) { console.error('[arc ending]', ending.id, e); }
  }
  return arc.endings[arc.endings.length - 1];
}

function resetArc(arcId) {
  ArcStore.deleteArcState(arcId);
  if (ArcStore.getActiveId() === arcId) {
    ArcStore.clearActiveId();
    ArcStore.setModeActive(false);
  }
}

function exitArcMode() {
  ArcStore.setModeActive(false);
  ArcStore.clearActiveId();
}

  }

  if (advices.length === 0) {
    push('稳定表现', '关键变量都在健康区间。下次可以挑战更高难度或不熟悉的对手类型。');
  }
  return advices;
}

function buildSystemJudgment(arc, state) {
  const v = state.vars;
  const turns = state.stageResults || [];
  const choiceCount = { cooperate: 0, firm: 0, probe: 0, anchor: 0 };
  turns.forEach((t) => { if (choiceCount[t.choice] !== undefined) choiceCount[t.choice]++; });
  const total = turns.length;
  const dominant = Object.entries(choiceCount).sort((a, b) => b[1] - a[1])[0];
  const styleMap = { cooperate: '合作主导', firm: '坚持主导', probe: '探询主导', anchor: '锚定主导' };
  const style = styleMap[dominant[0]] || '混合策略';
  const facts = [`本次共完成 ${total} 个阶段，主导策略为"${style}"（${dominant[1]}/${total}）。`];
  const keyVars = Object.keys(arc.initialState).slice(0, 3);
  keyVars.forEach((k) => {
    const init = arc.initialState[k];
    const now = v[k];
    const delta = now - init;
    if (Math.abs(delta) >= 15) {
      facts.push(`${k}: ${init} → ${now}（${delta >= 0 ? '+' : ''}${delta}）`);
    }
  });
  return facts.join(' ');
}

        });
      } else {
        openLine = getOpponentOpeningLineV3(opp, { difficulty: arcCurrentDifficulty(), scenarioKey: arcId });
      }
    }
    if (!openLine || !openLine.length) {
      openLine = arcPick(ARC_OPENINGS[oppId] || ARC_OPENINGS.rational);
    }
  }

  const choices = ['cooperate', 'firm', 'probe', 'anchor'].map((key) => {
    const t = ARC_CHOICE_TEMPLATES[key];
    // 优先使用 stage 场景化话术
    const sample = (stageDialogue && stageDialogue.choices && stageDialogue.choices[key])
      || arcPick(t.samples);
    return { key, label: t.label, desc: t.desc, sample };
  });

  return {
    opponent: opp,
    opening: openLine,
    choices,
    stage,
    arc,
    mirrorResolved: stage.opponent === 'mirror' ? oppId : null
  };
}

function arcProfileDeltaFromChoice(choiceKey) {
  switch (choiceKey) {
    case 'cooperate': return { cooperation_rate: 0.9, assert: 0.25, risk: 0.3, fairness: 0.75, emotion: 0.5, depth: 0.5 };
    case 'firm':      return { cooperation_rate: 0.25, assert: 0.85, risk: 0.6, fairness: 0.5, emotion: 0.4, depth: 0.6 };
    case 'probe':     return { cooperation_rate: 0.55, assert: 0.4, risk: 0.35, fairness: 0.6, emotion: 0.55, depth: 0.9 };
    case 'anchor':    return { cooperation_rate: 0.15, assert: 0.95, risk: 0.8, fairness: 0.25, emotion: 0.35, depth: 0.55 };
    default: return null;
  }
}


/* ===== arcs/lines-v3.js =====
   V3 对手台词系统：评分引擎 + ArcMood/ArcMemory/ArcReputation
   修复 5 处结构性 bug：
   Bug 1: wasRecentlyUsed 跨 session 持久化 → in-memory + 弧线 reset
   Bug 2: 防重复失效 → 允许负分，只在全负时回退
   Bug 3: weight 字段语义不清 → 乘数
   Bug 4: 第二层 fallback 用相邻 intent
   Bug 5: top.slice(0, 5) magic number → 参数化
*/
const ARC_DEFAULT_MOOD = { trust: 0.5, anger: 0.2, patience: 0.7, confidence: 0.5 };

const ArcMood = (() => {
  const m = {};
  return {
    get(oppId) { return m[oppId] ? Object.assign({}, m[oppId]) : Object.assign({}, ARC_DEFAULT_MOOD); },
    update(oppId, deltas) {
      const cur = this.get(oppId);
      for (const k of ['trust', 'anger', 'patience', 'confidence']) {
        if (typeof deltas[k] === 'number') {
          cur[k] = arcClamp((cur[k] || ARC_DEFAULT_MOOD[k]) + deltas[k], 0, 1);
        }
      }
      m[oppId] = cur;
      return cur;
    },
    reset(oppId) {
      if (oppId) delete m[oppId];
      else for (const k of Object.keys(m)) delete m[k];
    }
  };
})();

const ArcMemory = (() => {
  const m = {};
  const empty = () => ({
    coopCount: 0, firmCount: 0, probeCount: 0, anchorCount: 0,
    concessionCount: 0, batnaUses: 0, infoUses: 0,
    defectCount: 0, repairCount: 0, totalRounds: 0
  });
  return {
    get(oppId) { return m[oppId] ? Object.assign({}, m[oppId]) : empty(); },
    bump(oppId, key, delta = 1) {
      const mem = m[oppId] || empty();
      mem[key] = (mem[key] || 0) + delta;
      m[oppId] = mem;
      return mem;
    },
    reset(oppId) {
      if (oppId) delete m[oppId];
      else for (const k of Object.keys(m)) delete m[k];
    }
  };
})();

function loadArcReputation(oppId) {
  const profile = arcGetProfile();
  return {
    perceivedTrust: profile.cooperation_rate,
    perceivedToughness: profile.assert,
    perceivedDepth: profile.depth,
    samples: profile.samples || 0
  };
}

const _arcLineMemory = {};
function rememberLine(oppId, text) {
  if (!_arcLineMemory[oppId]) _arcLineMemory[oppId] = [];
  _arcLineMemory[oppId].push(text);
  _arcLineMemory[oppId] = _arcLineMemory[oppId].slice(-5);
}
function wasRecentlyUsed(oppId, text) {
  return _arcLineMemory[oppId] && _arcLineMemory[oppId].includes(text);
}
function resetLineMemoryForNewArc() {
  for (const k of Object.keys(_arcLineMemory)) delete _arcLineMemory[k];
  ArcMood.reset(); ArcMemory.reset();
}

const ARC_OPP_ID_ALIAS = { coalition: 'cooperative' };
function resolveLineLibKey(oppId) { return ARC_OPP_ID_ALIAS[oppId] || oppId; }

function lineConditionPass(line, ctx) {
  const mood = ctx.mood || ARC_DEFAULT_MOOD;
  const difficulty = ctx.difficulty;
  const scenarioKey = ctx.scenarioKey;
  const tags = ctx.playerActionTags || [];
  const val = (k, d = 0.5) => typeof mood[k] === 'number' ? mood[k] : d;
  if (line.minTrust != null && val('trust') < line.minTrust) return false;
  if (line.maxTrust != null && val('trust') > line.maxTrust) return false;
  if (line.minAnger != null && val('anger', 0) < line.minAnger) return false;
  if (line.maxAnger != null && val('anger', 0) > line.maxAnger) return false;
  if (line.minPatience != null && val('patience') < line.minPatience) return false;
  if (line.maxPatience != null && val('patience') > line.maxPatience) return false;
  if (line.minConfidence != null && val('confidence') < line.minConfidence) return false;
  if (line.maxConfidence != null && val('confidence') > line.maxConfidence) return false;
  if (line.scenarios && line.scenarios.length && scenarioKey && !line.scenarios.includes(scenarioKey)) return false;
  if (line.difficulties && line.difficulties.length && difficulty && !line.difficulties.includes(difficulty)) return false;
  if (line.tags && line.tags.length) {
    const matched = line.tags.some((t) => tags.includes(t));
    if (!matched) return false;
  }
  return true;
}

function inferLineIntent(ctx) {
  const tags = ctx.playerActionTags || [];
  const outcome = ctx.outcome;
  if (ctx.innerThought) return 'innerThought';
  if (outcome) {
    if (outcome === 'win') return 'finalLose';
    if (outcome === 'lose') return 'finalWin';
    return 'finalDraw';
  }
  if (ctx.round === 0) return 'greet';
  if (ctx.exposed) return 'expose';
  if (tags.includes('BATNA') || tags.includes('底线控制')) return 'reactBATNA';
  if (tags.includes('条件让步') || tags.includes('让步') || tags.includes('无条件让步')) return 'reactConcession';
  if (tags.includes('信息收集') || tags.includes('客观标准') || tags.includes('校准问题')) return 'reactInfo';
  if (tags.includes('合作') || tags.includes('关系维护')) return 'reactCoop';
  if (tags.includes('强硬') || tags.includes('背叛') || tags.includes('高风险')) return 'reactDefect';
  if (tags.includes('时间压力') || tags.includes('公开施压')) return 'pressure';
  const mood = ctx.mood || ARC_DEFAULT_MOOD;
  const memory = ctx.memory || {};
  if ((mood.anger || 0) > 0.65) return 'pressure';
  if ((mood.trust || 0) > 0.65) return 'reactCoop';
  if ((memory.concessionCount || 0) >= 2) return 'punish';
  if ((memory.firmCount || 0) >= 2) return 'probe';
  return 'observe';
}

const INTENT_NEIGHBORS = {
  greet: ['observe'], observe: ['probe', 'reactInfo'], probe: ['reactInfo', 'observe'],
  reactCoop: ['observe', 'reactConcession'], reactDefect: ['punish', 'probe', 'pressure'],
  reactBATNA: ['reactInfo', 'observe', 'reactDefect'], reactConcession: ['reactCoop', 'observe'],
  reactInfo: ['observe', 'probe'], pressure: ['punish', 'reactDefect'],
  punish: ['pressure', 'reactDefect'], expose: ['probe', 'reactInfo', 'observe'],
  concede: ['reactConcession', 'observe'], repair: ['reactCoop', 'observe'],
  innerThought: ['observe'], finalWin: ['finalDraw'], finalLose: ['finalDraw'], finalDraw: ['observe']
};

function scoreLine(line, ctx) {
  let s = 0;
  const tags = ctx.playerActionTags || [];
  if (line.intent === ctx.intent) s += 5;
  if (line.tags && line.tags.length) {
    s += line.tags.filter((t) => tags.includes(t)).length * 2;
  }
  if (ctx.round === 0 && line.intent === 'greet') s += 5;
  if (ctx.outcome && line.intent === ctx.intent) s += 6;
  if (ctx.exposed && line.intent === 'expose') s += 5;
  if (ctx.difficulty === 'hell' && line.tone === 'boss') s += 3;
  if (ctx.difficulty === 'extreme' && line.tone === 'boss') s += 2;
  if (wasRecentlyUsed(ctx.oppId, line.text)) s -= 8;
  const w = (typeof line.weight === 'number') ? line.weight : 1;
  return s * w;
}

function weightedPick(lines, ctx) {
  if (!lines || !lines.length) return null;
  const scored = lines.map((line) => ({ line, score: scoreLine(line, ctx) }));
  const positive = scored.filter((x) => x.score > 0);
  const pool = positive.length > 0 ? positive : scored.sort((a, b) => b.score - a.score).slice(0, 1);
  pool.sort((a, b) => b.score - a.score);
  const topN = Math.max(5, Math.ceil(pool.length * 0.4));
  const top = pool.slice(0, topN);
  const minScore = Math.min.apply(null, top.map((x) => x.score));
  const offset = minScore < 0 ? -minScore + 0.1 : 0;
  const total = top.reduce((sum, x) => sum + (x.score + offset), 0);
  let r = Math.random() * total;
  for (const x of top) {
    r -= (x.score + offset);
    if (r <= 0) return x.line;
  }
  return top[0].line;
}

function inferPlayerActionTagsFromMove(opts) {
  const tags = [];
  const choice = opts.choice;
  if (choice && choice.key) {
    switch (choice.key) {
      case 'cooperate': tags.push('合作', '关系维护'); break;
      case 'firm':      tags.push('强硬', '反压'); break;
      case 'probe':     tags.push('信息收集', '校准问题', '客观标准'); break;
      case 'anchor':    tags.push('锚定效应', 'BATNA', '强硬'); break;
    }
  }
  if (choice && Array.isArray(choice.tags)) choice.tags.forEach((t) => tags.push(t));
  return Array.from(new Set(tags));
}

function pickContextualLineV3(opp, ctx) {
  ctx = ctx || {};
  if (!opp) return '';
  const oppId = opp.id;
  const libKey = resolveLineLibKey(oppId);
  const lib = (typeof OPP_LINES_V3 !== 'undefined' && OPP_LINES_V3[libKey]) ? OPP_LINES_V3[libKey] : null;
  const mood = ctx.mood || ArcMood.get(oppId);
  const memory = ctx.memory || ArcMemory.get(oppId);
  const reputation = ctx.reputation || loadArcReputation(oppId);
  const difficulty = ctx.difficulty || arcCurrentDifficulty();
  const fullCtx = Object.assign({}, ctx, {
    oppId, mood, memory, reputation, difficulty,
    scenarioKey: ctx.scenarioKey,
    playerActionTags: ctx.playerActionTags || []
  });
  if (!lib || !lib.length) return v2Fallback(opp, fullCtx);
  const intent = ctx.intent || inferLineIntent(fullCtx);
  fullCtx.intent = intent;
  let candidates = lib.filter((line) => line.intent === intent && lineConditionPass(line, fullCtx));
  if (!candidates.length) {
    const neighbors = INTENT_NEIGHBORS[intent] || [];
    for (const ni of neighbors) {
      candidates = lib.filter((line) => line.intent === ni && lineConditionPass(line, fullCtx));
      if (candidates.length) break;
    }
  }
  if (!candidates.length) return v2Fallback(opp, fullCtx);
  const picked = weightedPick(candidates, fullCtx);
  if (!picked) return v2Fallback(opp, fullCtx);
  rememberLine(oppId, picked.text);
  return picked.text;
}

function v2Fallback(opp, ctx) {
  const oppId = opp.id;
  const intent = ctx.intent;
  if (intent === 'finalWin') return '你输了。这种结果在我的预期之内。';
  if (intent === 'finalLose') return '这局你赢了。我承认这个结果。';
  if (intent === 'finalDraw') return '没有赢家也没有输家。我们都付了代价。';
  if (intent === 'innerThought') return '（对手没有进一步表态。）';
  if (typeof ARC_OPENINGS !== 'undefined' && ARC_OPENINGS[oppId]) return arcPick(ARC_OPENINGS[oppId]);
  return '...';
}

function getOpponentOpeningLineV3(opp, extraCtx) {
  if (!opp) return '';
  return pickContextualLineV3(opp, Object.assign({ round: 0, intent: 'greet' }, extraCtx || {}));
}
function buildOpponentReactLineV3(opp, playerChoice, extraCtx) {
  if (!opp) return '';
  const tags = inferPlayerActionTagsFromMove({ choice: playerChoice });
  return pickContextualLineV3(opp, Object.assign({
    round: (extraCtx && extraCtx.round) || 1,
    playerActionTags: tags
  }, extraCtx || {}));
}
function buildOpponentFinalCommentV3(opp, outcome, extraCtx) {
  if (!opp) return '';
  return pickContextualLineV3(opp, Object.assign({ outcome }, extraCtx || {}));
}
function buildOpponentInnerThoughtV3(opp, result, extraCtx) {
  if (!opp) return '';
  const tags = [];
  if (result && result.outcome === 'win') tags.push('玩家胜利');
  if (result && result.outcome === 'lose') tags.push('玩家失败');
  return pickContextualLineV3(opp, Object.assign({ innerThought: true, playerActionTags: tags }, extraCtx || {}));
}

function updateOpponentStateFromArcChoice(oppId, choiceKey) {
  ArcMemory.bump(oppId, 'totalRounds', 1);
  switch (choiceKey) {
    case 'cooperate':
      ArcMemory.bump(oppId, 'coopCount', 1);
      ArcMemory.bump(oppId, 'concessionCount', 1);
      ArcMood.update(oppId, { trust: +0.08, anger: -0.05, patience: +0.03 });
      break;
    case 'firm':
      ArcMemory.bump(oppId, 'firmCount', 1);
      ArcMemory.bump(oppId, 'defectCount', 1);
      ArcMood.update(oppId, { trust: -0.02, anger: +0.06, patience: -0.04, confidence: -0.03 });
      break;
    case 'probe':
      ArcMemory.bump(oppId, 'probeCount', 1);
      ArcMemory.bump(oppId, 'infoUses', 1);
      ArcMood.update(oppId, { confidence: -0.05, patience: -0.02 });
      break;
    case 'anchor':
      ArcMemory.bump(oppId, 'anchorCount', 1);
      ArcMemory.bump(oppId, 'batnaUses', 1);
      ArcMemory.bump(oppId, 'defectCount', 1);
      ArcMood.update(oppId, { trust: -0.05, anger: +0.1, patience: -0.06 });
      break;
  }
}

const ARC_VAR_LABELS = {
  trustCapital: '信任资本', leverage: '杠杆', relationshipDamage: '关系损伤',
  valueClarity: '估值清晰度', dealMomentum: '交易动能',
  publicPressure: '公开压力', exposure: '暴露度',
  mediaSentiment: '媒体倾向', factClarity: '事实清晰度',
  coalitionStability: '联盟稳定性', influence: '影响力', controlSeats: '控制席位',
  manipulatorThreat: '操纵者威胁',
  conflictHeat: '冲突热度', casualtyRisk: '人员损失风险', agreementBreadth: '协议广度',
  capitalRemaining: '剩余资本', infoAsymmetry: '信息劣势',
  selfAwareness: '自我觉察', mirrorAdaptation: '镜像适应度',
  finalPriceGap: '终价距离', momentumControl: '节奏控制权'
};
const ARC_INVERTED_VARS = new Set(['relationshipDamage', 'exposure', 'manipulatorThreat',
  'conflictHeat', 'casualtyRisk', 'infoAsymmetry', 'mirrorAdaptation',
  'finalPriceGap', 'publicPressure']);

function renderArcStateGrid(arc, vars) {
  const keys = Object.keys(arc.initialState);
  return `<div class="arc-state-grid">${keys.map((k) => {
    const val = vars[k];
    let displayVal = val, pct = val, cls = '';
    if (k === 'controlSeats') { pct = (val / 9) * 100; displayVal = `${val} / 9`; }
    else if (k === 'mediaSentiment') {
      pct = ((val + 100) / 200) * 100;
      displayVal = val > 0 ? `+${val}` : String(val);
      cls = val >= 0 ? 'good' : 'bad';
    } else {
      if (ARC_INVERTED_VARS.has(k)) cls = val >= 60 ? 'bad' : (val >= 35 ? 'warn' : 'good');
      else cls = val >= 60 ? 'good' : (val >= 35 ? 'warn' : 'bad');
    }
    return `
      <div class="arc-state-item">
        <div class="arc-state-label">${ARC_VAR_LABELS[k] || k}</div>
        <div class="arc-state-value">${displayVal}</div>
        <div class="arc-state-bar"><div class="arc-state-bar-fill ${cls}" style="width:${pct}%"></div></div>
      </div>`;
  }).join('')}</div>`;
}

function arcTopbar(title, opts) {
  opts = opts || {};
  const back = opts.backTo ? `<button class="btn btn-sm back-btn" data-arc-act="back">← 返回</button>` : '';
  const home = opts.showHome ? `<button class="btn btn-sm back-btn" data-arc-act="home">主菜单</button>` : '';
  return `<div class="arc-topbar">
    <div class="arc-topbar-title">${arcEscape(title)}</div>
    <div class="arc-topbar-actions">${back}${home}</div>
  </div>`;
}

function arcTopbarBind(container, opts) {
  opts = opts || {};
  container.querySelectorAll('[data-arc-act]').forEach((b) => {
    b.addEventListener('click', () => {
      const act = b.getAttribute('data-arc-act');
      if (act === 'back') {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: opts.backTo, params: opts.backParams || {} });
      } else if (act === 'home') {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.MAIN, params: {} });
      }
    });
  });
}

    });

function handleArcNegotiationChoice(arcId, choiceKey) {
  const arc = getArc(arcId);
  const state = ArcStore.getArcState(arcId);
  if (!arc || !state) return;
  const stage = arc.stages[state.stageIndex];
  const choice = { key: choiceKey, label: ARC_CHOICE_TEMPLATES[choiceKey].label };

  // 更新弧线画像
  const pd = arcProfileDeltaFromChoice(choiceKey);
  if (pd) arcUpdateProfile(pd);

  // 应用到弧线状态
  applyArcStageResult({ choice: choiceKey });

  // 同步主玩家档案的局数（让弧线进展也算训练）
  const player = Store.get('player');
  if (player && typeof savePlayer === 'function') {
    player.total = (player.total || 0) + 1;
    const updated = ArcStore.getArcState(arcId);
    const won = isArcStageWin(updated);
    if (won) player.wins = (player.wins || 0) + 1;
    Store.set('player', player);
    savePlayer(player);
  }

  EventBus.emit(EVENTS.NAV_GOTO, {
    screen: SCREENS.ARC_ROUND_RESULT,
    params: { arcId, choiceKey, choiceLabel: choice.label }
  });
}

function isArcStageWin(state) {
  if (!state || !state.stageResults || !state.stageResults.length) return false;
  const last = state.stageResults[state.stageResults.length - 1];
  const deltas = last.deltas;
  let good = 0, bad = 0;
  const goodIfPos = (k) => !ARC_INVERTED_VARS.has(k);
  for (const k of Object.keys(deltas)) {
    const v = deltas[k];
    if (v === 0) continue;
    const positive = goodIfPos(k);
    const beneficial = (positive && v > 0) || (!positive && v < 0);
    if (beneficial) good++; else bad++;
  }
  return good > bad;
}


/* ===== arcs/screens/arc-round-result.js ===== */
function renderArcRoundResult(params) {
  params = params || {};
  const arcId = params.arcId;
  const arc = getArc(arcId);
  const state = ArcStore.getArcState(arcId);
  if (!arc || !state) {
    setTimeout(() => EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.MAIN, params: {} }), 0);
    return `<div class="arc-scope"></div>`;
  }
  const lastResult = state.stageResults[state.stageResults.length - 1];
  if (!lastResult) {
    setTimeout(() => EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.ARC_BRIEFING, params: { arcId } }), 0);
    return `<div class="arc-scope"></div>`;
  }

  // 对手回应
  const justEndedIdx = state.stageIndex - 1;
  let reactHtml = '';
  if (justEndedIdx >= 0) {
    const stage = arc.stages[justEndedIdx];
    const oppId = resolveArcOpponentId(stage.opponent);
    const opp = arcGetOpponent(oppId);
    // ── 关键修复：优先使用 stage 场景化反应台词 ──
    const stageDialogue = getArcStageDialogue(arc.id, stage.id);
    const scriptedReact = stageDialogue && stageDialogue.reactions && stageDialogue.reactions[lastResult.choice];
    const reactLine = scriptedReact || buildOpponentReactLineV3(opp, { key: lastResult.choice }, {
      round: justEndedIdx + 1,
      difficulty: arcCurrentDifficulty(),
      scenarioKey: arc.id
    });
    if (reactLine) {
      const diff = arcCurrentDifficulty();
      const showReason = diff === 'easy' || diff === 'normal';
      const labelMap = { cooperate: '合作姿态', firm: '坚定立场', probe: '探询观察', anchor: '锚定/施压' };
      reactHtml = `<div class="arc-react-card">
        <h4 class="arc-section-title">${arcEscape(opp.name)} 的回应</h4>
        <div class="arc-react-line">${arcEscape(reactLine)}</div>
        ${showReason
          ? `<div class="arc-react-reason">对手内部判断：基于你"${labelMap[lastResult.choice] || lastResult.choice}"的选择，更新了 trust/anger/patience。</div>`
          : `<div class="arc-react-hidden">高难度下，对手动机不完全可见。</div>`}
      </div>`;
    }
  }

  // 变量变化
  const deltas = lastResult.deltas;
  const deltaHtml = Object.keys(deltas).map((k) => {
    const v = deltas[k];
    const sign = v >= 0 ? '+' : '';
    const color = v >= 0 ? 'var(--green)' : 'var(--red)';
    return `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--dim)">${ARC_VAR_LABELS[k] || k}</span>
      <span style="color:${color};font-weight:600">${sign}${v}</span>
    </div>`;
  }).join('');

  // 下一步
  let navHtml = '';
  if (state.completed) {
    navHtml = `<div class="arc-card-base">
      <h4 class="arc-section-title">🏁 弧线已完成</h4>
      <p style="font-size:12px;color:var(--text);margin-top:6px">5 个阶段全部完成，生成最终战报。</p>
      <div class="arc-btn-row">
        <button class="btn btn-green" data-arc-act="report" data-arc-id="${arcId}">查看弧线战报 →</button>
      </div>
    </div>`;
  } else {
    const next = arc.stages[state.stageIndex];
    navHtml = `<div class="arc-card-base">
      <h4 class="arc-section-title">下一阶段：${arcEscape(next.title)}</h4>
      <p style="font-size:12px;color:var(--text);margin-top:6px;line-height:1.6">${arcEscape(next.scenario)}</p>
      <div class="arc-btn-row">
        <button class="btn btn-green" data-arc-act="next" data-arc-id="${arcId}">继续下一阶段 →</button>
        <button class="btn back-btn" data-arc-act="home">返回主菜单</button>
      </div>
    </div>`;
  }

  return `<div class="arc-scope">${arcTopbar('阶段结果', { showHome: true })}
    <div class="arc-screen">
      <h2 class="arc-h">${arcEscape(lastResult.stageTitle)}</h2>
      <p class="arc-sub">你选择了：${arcEscape(params.choiceLabel || lastResult.choice)}</p>
      ${reactHtml}
      <div class="arc-card-base">
        <h4 class="arc-section-title">本轮变量变化</h4>
        ${deltaHtml}
        <h4 class="arc-section-title" style="margin-top:12px">当前状态</h4>
        ${renderArcStateGrid(arc, state.vars)}
      </div>
      ${navHtml}
    </div></div>`;
}

/* ===== arcs/screens/arc-result.js ===== */
function renderArcResultScreen(params) {
  params = params || {};
  const arcId = params.arcId;
  const arc = getArc(arcId);
  const state = ArcStore.getArcState(arcId);
  if (!arc || !state) {
    setTimeout(() => EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.MAIN, params: {} }), 0);
    return `<div class="arc-scope"></div>`;
  }
  const ending = arc.endings.find((e) => e.id === state.endingId) || arc.endings[arc.endings.length - 1];

  // 对手收尾段
  const lastStage = arc.stages[arc.stages.length - 1];
  const finalOpp = arcGetOpponent(resolveArcOpponentId(lastStage.opponent));
  let outcome = 'draw';
  const endingId = state.endingId || '';
  if (/winner|integration|treaty|control|breakthrough|victory|transcend|recovered/i.test(endingId)) outcome = 'win';
  else if (/collapse|burn|purged|trumpBoss_lose|destruction|reset|fusion|legal|scammed/i.test(endingId)) outcome = 'lose';
  const finalLine = buildOpponentFinalCommentV3(finalOpp, outcome, {
    difficulty: arcCurrentDifficulty(), scenarioKey: arc.id
  });
  const innerThought = buildOpponentInnerThoughtV3(finalOpp, { outcome }, {
    difficulty: arcCurrentDifficulty(), scenarioKey: arc.id
  });
  const finalSection = (finalLine || innerThought) ? `
    <div class="arc-final-section">
      <h4>对手的最后一句话</h4>
      <div class="arc-final-line"><strong style="color:var(--red)">${arcEscape(finalOpp.name)}：</strong>${arcEscape(finalLine || '')}</div>
      <h4 style="margin-top:10px">对手的真实想法</h4>
      <div class="arc-final-inner">${arcEscape(innerThought || '')}</div>
    </div>` : '';

  // 阶段轨迹
  const labelMap = { cooperate: '合作姿态', firm: '坚定立场', probe: '探询观察', anchor: '锚定/施压' };
  const trailHtml = state.stageResults.map((tr, i) => `
    <div class="arc-trail-item">
      <div class="arc-trail-num">${i + 1}</div>
      <div class="arc-trail-content">
        <div class="arc-trail-title">${arcEscape(tr.stageTitle)}</div>
        <div class="arc-trail-outcome">选择：${arcEscape(labelMap[tr.choice] || tr.choice)}</div>
      </div>
    </div>`).join('');

  const advice = buildArcAdvice(arc, state);
  const adviceHtml = advice.map((a) => `
    <div class="arc-advice-box">
      <div class="arc-advice-title">${arcEscape(a.title)}</div>
      <div class="arc-advice-text">${arcEscape(a.text)}</div>
    </div>`).join('');

  const endingsListHtml = arc.endings.map((e) => `
    <div class="arc-ending-item${e.id === ending.id ? ' current' : ''}">
      <div class="arc-ending-icon">${e.icon}</div>
      <div>
        <div class="arc-ending-name">${arcEscape(e.name)}${e.id === ending.id ? ' <span class="arc-tag arc-tag-progress">本次</span>' : ''}</div>
      </div>
    </div>`).join('');

  return `<div class="arc-scope">${arcTopbar(`${arc.title} · 战报`, { backTo: SCREENS.ARC_SELECTION, showHome: true })}
    <div class="arc-screen">
      <div class="arc-result-hero">
        <div class="arc-result-icon">${ending.icon}</div>
        <div class="arc-result-title">${arcEscape(ending.name)}</div>
        <div class="arc-result-subtitle">${arcEscape(arc.title)} · 弧线完成</div>
        <p class="arc-result-narrative">${arcEscape(ending.narrative)}</p>
      </div>
      <div class="arc-card-base">
        <h4 class="arc-section-title">系统判断</h4>
        <p style="font-size:12px;color:var(--text);line-height:1.7;margin-top:6px">${arcEscape(buildSystemJudgment(arc, state))}</p>
      </div>
      <div class="arc-card-base">
        <h4 class="arc-section-title">最终状态变量</h4>
        ${renderArcStateGrid(arc, state.vars)}
      </div>
      <div class="arc-card-base">
        <h4 class="arc-section-title">阶段轨迹</h4>
        <div class="arc-trail">${trailHtml}</div>
      </div>
      ${finalSection}
      <div class="arc-card-base">
        <h4 class="arc-section-title">下一步建议</h4>
        ${adviceHtml}
      </div>
      <div class="arc-card-base">
        <h4 class="arc-section-title">这条弧线的全部结局</h4>
        <p style="font-size:11px;color:var(--dim);margin:4px 0 8px">你看到的结局基于本次行为路径计算 · 不同选择会触发不同分支。</p>
        <div class="arc-endings-list">${endingsListHtml}</div>
      </div>
      <div class="arc-card-base">
        <div class="arc-btn-row">
          <button class="btn btn-green" data-arc-act="replay" data-arc-id="${arcId}">再玩一次这条弧线</button>
          <button class="btn" data-arc-act="other">浏览其他弧线</button>
          <button class="btn back-btn" data-arc-act="home">返回主菜单</button>
        </div>
      </div>
    </div></div>`;
}

renderArcResultScreen.afterRender = function () {
  arcTopbarBind(document, { backTo: SCREENS.ARC_SELECTION });
  document.querySelectorAll('[data-arc-act="replay"]').forEach((el) => {
    el.addEventListener('click', () => {
      const arcId = el.getAttribute('data-arc-id');
      if (confirm('重置这条弧线的全部进度，重新开始？')) {
        resetArc(arcId);
        EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.ARC_BRIEFING, params: { arcId } });
      }
    });
  });
  document.querySelectorAll('[data-arc-act="other"]').forEach((el) => {
    el.addEventListener('click', () => {
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.ARC_SELECTION, params: {} });
    });
  });
};


/* ===== arcs/api.js ===== */
// 暴露 Arc 命名空间（供主菜单徽章和外部调用）
const Arc = {
  listAllStates: () => ArcStore.listArcStates(),
  getActive: () => getActiveArcState(),
  getProfile: () => arcGetProfile(),
  resetAll: () => {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('arc:')) keys.push(k);
      }
      keys.forEach((k) => localStorage.removeItem(k));
    } catch (e) {}
  }
};

    SSR: { label: '隐藏', probability: 0.04, shards: 150, color: '#c084fc' },
    UR:  { label: '神话', probability: 0.01, shards: 500, color: '#f6c453' }
  },
  packSize: 5,
  pity: { srPlusEvery: 10, ssrPlusEvery: 50, urEvery: 100 },
  loadoutLimit: 3,
  cardUseLimitPerGame: 1,
  packs: {
    basic:    { name: '基础技能卡包', weightBoost: {} },
    advanced: { name: '高阶技能卡包', weightBoost: { SR: 1.8, SSR: 1.2 } },
    hidden:   { name: '隐藏探索包',   weightBoost: { SSR: 2.2, UR: 1.3 } },
    mythic:   { name: '神话传说包',   weightBoost: { UR: 3.0, SSR: 1.5 } },
    daily:    { name: '每日训练包',   weightBoost: { R: 1.2 } }
  }
};

/* ════════════════════════════════════════════════════════════════════════════
   engine/blindbox-system.js — 卡包奖励 / 抽卡 / 保底 / 开包
   ════════════════════════════════════════════════════════════════════════════ */
const SkillBlindBox = (() => {
  const RARITY_ORDER = ['N', 'R', 'SR', 'SSR', 'UR'];
  const RARITY_RANK  = { N: 1, R: 2, SR: 3, SSR: 4, UR: 5 };

  function ensureCardState(player) {
    if (!player) return null;
    player.skillCardCollection = player.skillCardCollection || [];
    player.skillCardDuplicates = player.skillCardDuplicates || {};
    player.skillCardPacks      = player.skillCardPacks || [];
    player.skillCardLoadout    = player.skillCardLoadout || [];
    player.skillCardPity       = player.skillCardPity || { total: 0, sinceSR: 0, sinceSSR: 0, sinceUR: 0 };
    return player;
  }

  // 基于本局结果计算奖励卡包
  function calculateRewardPacks(result, player) {
    const packs = [{ type: 'basic', reason: '完成训练' }];
    if (result && result.outcome === 'win') packs.push({ type: 'basic', reason: '胜利奖励' });
    const score = result && (result.score || result.playerScore || 0);
    if (score >= 85) packs.push({ type: 'advanced', reason: '高分奖励 (≥85)' });
    if (result && result.difficulty === 'hell' && result.outcome === 'win') {
      packs.push({ type: 'hidden', reason: '地狱级胜利' });
    }
    if (result && result.bossWin) packs.push({ type: 'mythic', reason: '击败 Boss' });
    // 每日首局加发"每日训练包"（与碎片每日加成同源标记）
    if (player && result && result._isDailyFirst) {
      packs.push({ type: 'daily', reason: '每日首局' });
    }
    return packs;
  }

  function addPacks(player, packs) {
    ensureCardState(player);
    if (!packs || !packs.length) return [];
    packs.forEach((p) => player.skillCardPacks.push({ ...p, ts: Date.now() }));
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_PACK_EARNED, { packs });
    return packs;
  }

  function weightedPickRarity(packType, pity) {
    const rarities = BLINDBOX_CONFIG.rarities;
    const boost = (BLINDBOX_CONFIG.packs[packType] && BLINDBOX_CONFIG.packs[packType].weightBoost) || {};
    let weights = Object.entries(rarities).map(([r, cfg]) => ({ rarity: r, w: cfg.probability * (boost[r] || 1) }));

    // 保底覆盖：先处理最高保底
    if ((pity.sinceUR + 1) >= BLINDBOX_CONFIG.pity.urEvery) return 'UR';
    if ((pity.sinceSSR + 1) >= BLINDBOX_CONFIG.pity.ssrPlusEvery) {
      weights = weights.filter((x) => RARITY_RANK[x.rarity] >= RARITY_RANK.SSR);
    } else if ((pity.sinceSR + 1) >= BLINDBOX_CONFIG.pity.srPlusEvery) {
      weights = weights.filter((x) => RARITY_RANK[x.rarity] >= RARITY_RANK.SR);
    }

    const sum = weights.reduce((s, x) => s + x.w, 0);
    let roll = Math.random() * sum;
    for (const x of weights) {
      roll -= x.w;
      if (roll <= 0) return x.rarity;
    }
    return weights[weights.length - 1].rarity;
  }

  function drawOne(player, packType) {
    ensureCardState(player);
    const rarity = weightedPickRarity(packType, player.skillCardPity);
    const pool = SKILL_CARDS.filter((c) => c.rarity === rarity);
    const card = pool[Math.floor(Math.random() * pool.length)]
      || SKILL_CARDS[Math.floor(Math.random() * SKILL_CARDS.length)];

    player.skillCardPity.total += 1;
    player.skillCardPity.sinceSR  = RARITY_RANK[rarity] >= RARITY_RANK.SR  ? 0 : player.skillCardPity.sinceSR + 1;
    player.skillCardPity.sinceSSR = RARITY_RANK[rarity] >= RARITY_RANK.SSR ? 0 : player.skillCardPity.sinceSSR + 1;
    player.skillCardPity.sinceUR  = rarity === 'UR' ? 0 : player.skillCardPity.sinceUR + 1;

    const isDup = player.skillCardCollection.includes(card.id);
    if (isDup) {
      const shard = BLINDBOX_CONFIG.rarities[card.rarity].shards;
      player.skillCardDuplicates[card.id] = (player.skillCardDuplicates[card.id] || 0) + 1;
      player.cardShards = (player.cardShards || 0) + shard;
      EventBus.emit(EVENTS.CARD_DUPLICATE, { card, shard });
      return { card, duplicate: true, shard };
    }

    player.skillCardCollection.push(card.id);
    EventBus.emit(EVENTS.CARD_UNLOCKED, { card });
    return { card, duplicate: false, shard: 0 };
  }

  function openPack(player, packIndex) {
    ensureCardState(player);
    const pack = player.skillCardPacks[packIndex];
    if (!pack) return null;
    const results = [];
    for (let i = 0; i < BLINDBOX_CONFIG.packSize; i++) results.push(drawOne(player, pack.type));
    player.skillCardPacks.splice(packIndex, 1);
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_PACK_OPENED, { pack, results });
    return { pack, results };
  }

  function pickRevealCard(results) {
    const newCards = results.filter((r) => !r.duplicate).map((r) => r.card);
    const candidates = newCards.length ? newCards : results.map((r) => r.card);
    const best = Math.max.apply(null, candidates.map((c) => RARITY_RANK[c.rarity] || 1));
    const top = candidates.filter((c) => (RARITY_RANK[c.rarity] || 1) === best);
    return top[Math.floor(Math.random() * top.length)];
  }

  function getCard(id) { return SKILL_CARDS.find((c) => c.id === id); }
  function hasCard(player, id) { ensureCardState(player); return player.skillCardCollection.includes(id); }

  function setLoadout(player, ids) {
    ensureCardState(player);
    const owned = new Set(player.skillCardCollection);
    const filtered = (ids || []).filter((id) => owned.has(id)).slice(0, BLINDBOX_CONFIG.loadoutLimit);
    player.skillCardLoadout = filtered;
    savePlayer(player);
    EventBus.emit(EVENTS.CARD_LOADOUT_CHANGED, { loadout: filtered });
    return filtered;
  }

  return {
    RARITY_ORDER, RARITY_RANK,
    ensureCardState, calculateRewardPacks, addPacks,
    drawOne, openPack, pickRevealCard,
    getCard, hasCard, setLoadout,
  };
})();


/* ════════════════════════════════════════════════════════════════════════════
   engine/opponent-adaptation.js — 对手适应系统
   公式：稀有度基准 × 难度系数 × 重复使用修正(+20% per repeat)
   ════════════════════════════════════════════════════════════════════════════ */
const OpponentAdaptation = (() => {
  const BASE = { N: 3, R: 6, SR: 10, SSR: 15, UR: 20 };
  const DIFF = { easy: 0.5, medium: 1.0, hard: 1.3, extreme: 1.5, hell: 2.0 };
  const ATTR_LABELS = {
    alertness: '警觉值', defense: '防御值', bargaining: '议价值',
    pressure: '压力值', strategy: '策略值',
    cognitiveResistance: '认知抵抗', endgameDefense: '终局防守'
  };
  const TEXT_FALLBACK = {
    alertness: '对手开始警觉你的信息搜集意图。',
    defense: '对手开始提高防御，信任推进变慢。',
    bargaining: '对手开始提高交换条件。',
    pressure: '对手转入反向施压。',
    strategy: '对手开始使用更复杂的策略。',
    cognitiveResistance: '对手开始抵抗你的框架重构。',
    endgameDefense: '对手在终局阶段收紧防守。'
  };

  function fresh() {
    return {
      alertness: 0, defense: 0, bargaining: 0,
      pressure: 0, strategy: 0, cognitiveResistance: 0, endgameDefense: 0,
      history: []
    };
  }

  function apply(card, opponent, difficulty) {
    difficulty = difficulty || Store.get('difficulty') || 'medium';
    const cur = Store.get('opponentAdaptation') || fresh();
    const state = { ...fresh(), ...cur, history: (cur.history || []).slice() };

    const attr = card.adaptation.attr;
    const repeated = state.history.filter((h) => h.attr === attr).length;
    const base = card.adaptation.amount || BASE[card.rarity] || 3;
    const multiplier = (DIFF[difficulty] || 1) * (1 + repeated * 0.2);
    const amount = Math.round(base * multiplier);

    state[attr] = Math.min(100, (state[attr] || 0) + amount);
    state.history.push({ cardId: card.id, attr, amount, ts: Date.now() });
    Store.set('opponentAdaptation', state);

    const text = card.adaptation.text || TEXT_FALLBACK[attr] || '对手开始适应你的策略。';
    EventBus.emit(EVENTS.OPPONENT_ADAPTED, { opponent, card, attr, amount, text, state });
    return { attr, amount, text, state, label: ATTR_LABELS[attr] || attr };
  }

  // 在 OpponentAI.decide 返回 move 之后做轻量修正（5%–20%）
  function modifyAIMove(kind, move, ctx) {
    const state = Store.get('opponentAdaptation');
    if (!state) return { move, note: '' };
    let note = '';

    switch (kind) {
      case 'bargain-counter': {
        if (typeof move !== 'number') break;
        // 议价值越高 → 对手让步越小（每 25 点减让 1）
        const harder = Math.round((state.bargaining || 0) / 25);
        if (harder > 0 && ctx && typeof ctx.currentOppOffer === 'number') {
          move = Math.min(ctx.currentOppOffer, move + harder);
          note = '对手因你前几张卡的议价施压而提高让步成本';
        }
        break;
      }
      case 'ultimatum-respond': {
        // 终局防守：让"接受"率轻微下降
        if (typeof move !== 'boolean') break;
        if ((state.endgameDefense || 0) > 30 && move === true && Math.random() < 0.18) {
          move = false;
          note = '对手在终局收紧条件，最后通牒接受度下降';
        }
        break;
      }
      case 'pd': {
        // 防御值高 → 偏好背叛
        if ((state.defense || 0) > 35 && move === 'coop' && Math.random() < 0.15) {
          move = 'defect';
          note = '对手防御上升，本轮转向背叛';
        }
        break;
      }
      case 'trust-return': {
        if (typeof move !== 'number') break;
        // 防御值高 → 返还压低
        if ((state.defense || 0) > 30) {
          const reduce = Math.round(((state.defense || 0) - 30) / 18);
          move = Math.max(0, move - reduce);
          if (reduce > 0) note = '对手防御提高，返还更保守';
        }
        break;
      }
      case 'ultimatum-propose': {
        if (typeof move !== 'number') break;
        // 压力值高 → 提案更极端
        if ((state.pressure || 0) > 30) {
          move = Math.max(20, Math.min(80, move + Math.round((state.pressure || 0) / 30)));
          note = '对手反向施压，提案更激进';
        }
        break;
      }
      case 'pg-contribute': {
        if (typeof move !== 'number') break;
        if ((state.defense || 0) > 30) {
          move = Math.max(0, move - 1);
          note = '对手防御提高，贡献更保守';
        }
        break;
      }
    }
    return { move, note };
  }

  function getState() { return Store.get('opponentAdaptation') || fresh(); }
  function isEmpty() {
    const s = getState();
    const keys = ['alertness', 'defense', 'bargaining', 'pressure', 'strategy', 'cognitiveResistance', 'endgameDefense'];
    return keys.every((k) => !s[k]);
  }
  function ATTR_LABEL(k) { return ATTR_LABELS[k] || k; }

  return { fresh, apply, modifyAIMove, getState, isEmpty, ATTR_LABELS, ATTR_LABEL };
})();


/* ════════════════════════════════════════════════════════════════════════════
   engine/card-effects.js — 卡牌使用 & 效果应用
   设计原则：卡牌提供谈判优势；不直接覆盖胜负；触发对手适应。
   ════════════════════════════════════════════════════════════════════════════ */
const SkillCardEffects = (() => {
  function canUse(cardId) {
    const loadout = Store.get('activeCardLoadout') || [];
    if (!loadout.includes(cardId)) return { ok: false, reason: '本局未携带这张卡' };
    const used = Store.get('usedCardsThisGame') || [];
    if (used.includes(cardId)) return { ok: false, reason: '本局已使用' };
    return { ok: true };
  }

  function use(cardId) {
    const player = Store.get('player');
    const scenario = Store.get('activeScenario');
    const card = SKILL_CARDS.find((c) => c.id === cardId);
    if (!player || !card) return { ok: false, reason: '无效卡牌' };
    const gate = canUse(cardId);
    if (!gate.ok) return gate;
    if (!scenario) return { ok: false, reason: '当前不在对局中' };

    const effectResult = applyEffect(card, scenario);
    const adaptResult = OpponentAdaptation.apply(card, scenario.opp, Store.get('difficulty'));

    const used = (Store.get('usedCardsThisGame') || []).slice();
    used.push(cardId);
    Store.set('usedCardsThisGame', used);

    // 记录到当局复盘
    const log = (Store.get('cardPlayLog') || []).slice();
    log.push({ cardId, card, effectResult, adaptResult, ts: Date.now() });
    Store.set('cardPlayLog', log);

    EventBus.emit(EVENTS.CARD_EFFECT_APPLIED, { card, effectResult });
    EventBus.emit(EVENTS.PLAYER_CARD_USED, { card, effectResult, adaptResult });

    // 让场景重新渲染以反映新增的提示 / 状态
    if (scenario && typeof scenario._render === 'function') {
      try { scenario._render(); } catch (e) { /* 渲染失败也不影响卡牌效果 */ }
    }
    return { ok: true, effectResult, adaptResult };
  }

  function applyEffect(card, scenario) {
    const e = card.effect;
    scenario._cardHints = scenario._cardHints || [];
    scenario._cardFlags = scenario._cardFlags || {};
    switch (e.type) {
      case 'reveal_hint': {
        const hint = describeHint(e, scenario);
        scenario._cardHints.push(hint);
        return { text: hint, type: e.type };
      }
      case 'reveal_batna': {
        const hint = '【BATNA 透视】对方替代方案强弱：' + estimateBatna(scenario.opp);
        scenario._cardHints.push(hint);
        return { text: hint, type: e.type };
      }
      case 'mood': {
        if (scenario.opp && typeof Mood !== 'undefined') {
          const id = scenario.opp.id;
          const m = Mood.get(id) || {};
          const delta = e.amount / 100;
          if (e.target === 'anger')      m.anger      = clamp((m.anger || 0) + delta, 0, 1);
          else if (e.target === 'trust') m.trust      = clamp((m.trust || 0) + delta, 0, 1);
          else if (e.target === 'confidence') m.confidence = clamp((m.confidence || 0.5) + delta, 0, 1);
          // Mood 没有直接 set，但 react 会写入；这里直接把 mood map 写入内部对象
          // v4Pro 的 Mood.get 返回内部引用，所以直接修改即可生效。
        }
        return { text: e.text, type: e.type };
      }
      case 'concession_guard':
        scenario._cardFlags.concessionGuard = true;
        scenario._cardFlags.concessionGuardPct = e.amount || 20;
        return { text: e.text, type: e.type };
      case 'anchor_first':
        scenario._cardFlags.anchorFirst = true;
        return { text: e.text, type: e.type };
      case 'reframe':
        scenario._cardFlags.reframeAvailable = true;
        return { text: e.text, type: e.type };
      case 'hide_intent':
        scenario._cardFlags.intentHidden = true;
        return { text: e.text, type: e.type };
      case 'rollback_choice':
        scenario._cardFlags.rollbackAvailable = true;
        scenario._cardFlags.rollbackPhase = e.phase || 'any';
        return { text: e.text, type: e.type };
      case 'master_hint':
        scenario._cardHints.push('【大师提示】' + buildMasterHint(scenario));
        return { text: e.text, type: e.type };
      default:
        return { text: e.text || '卡牌效果已应用', type: e.type };
    }
  }

  function describeHint(e, scenario) {
    const opp = scenario.opp || {};
    if (e.target === 'hidden_need') {
      const map = {
        rational: '对方真正在意的是可执行性与数据自洽，价格弹性比表面大 8-12%。',
        emotional: '对方真正在意的是被尊重与被听见，让步换情绪承认比换条款更划算。',
        aggressive: '对方真正在意的是不被看低，强姿态背后愿意接受"对等"而非"妥协"。',
        cooperative: '对方真正在意的是长期关系，可以用未来合作承诺替代当下让步。',
        manipulative: '对方真正在意的是控制感，让其"以为是自己的主意"会显著推进。',
        riskAverse: '对方真正在意的是退出机制，可控的风险共担比更高回报更打动它。',
        trumpBoss: '对方真正在意的是叙事胜利，给一个公开台阶比私下让 10% 价格更有效。',
      };
      return '【需求线索】' + (map[opp.id] || '对方真实诉求与表面价格无关，先问"如果今天不签会怎样"。');
    }
    if (e.target === 'true_need') {
      return '【需求挖掘】对方深层需求 ≠ 嘴上要求。本轮可深问两次：①真正成功的样子；②最不愿意妥协的一项。';
    }
    if (e.target === 'progress') {
      return '【共识锁定】本轮起，已达成共识不可被对方"再考虑"轻易推翻。';
    }
    if (e.target === 'fair_range') {
      return '【公允区间】基于第三方可比交易，公允价格区间已锁定。';
    }
    return '【线索】' + (e.text || '获得一条新的信息线索。');
  }

  function estimateBatna(opp) {
    if (!opp) return '未知';
    if (opp.assert > 0.75) return '强（不让步空间大）';
    if (opp.risk < 0.35)   return '弱（避险型，BATNA 更虚）';
    if (opp.boss)          return '极强（且会用 BATNA 制造叙事）';
    return '中等（可以谈，但别让对方看见你急）';
  }

  function buildMasterHint(scenario) {
    const opp = scenario.opp || {};
    if (opp.id === 'trumpBoss') return '先质疑锚定依据，再亮 BATNA，最后用"客观标准 + 公开台阶"收尾。';
    if (opp.id === 'aggressive') return '不要回应强硬本身，回应他强硬下的"真正怕失去什么"。';
    if (opp.id === 'manipulative') return '把决定权交给对方："这两条你选一条，我都能接受。"';
    if (opp.id === 'emotional') return '先标注情绪、再讨论事实："听起来你担心的是 X，对吗？"';
    if (opp.id === 'cooperative') return '别只接对方的善意，必须把"承诺时间表"写到桌面上。';
    if (opp.id === 'rational') return '用同一份数据反向解读：相同事实，你的故事 vs 他的故事。';
    if (opp.id === 'riskAverse') return '把风险拆成"可控+可退出"两段，再用兜底机制换核心条款。';
    return '先确认对方的优先级，再决定让什么、守什么。';
  }

  return { canUse, use, applyEffect };
})();


/* ════════════════════════════════════════════════════════════════════════════
   ui/skill-cards-screen.js — 技能卡册 / 盲盒开包 / 卡组配置（三 Tab 单屏）
   ════════════════════════════════════════════════════════════════════════════ */

const SKILL_TAB_KEYS = ['album', 'packs', 'loadout'];
const SKILL_RARITY_DISPLAY = ['UR', 'SSR', 'SR', 'R', 'N'];

function renderSkillCards(params) {
  params = params || {};
  const player = SkillBlindBox.ensureCardState(Store.get('player') || { name: '训练员' });
  const tab = SKILL_TAB_KEYS.includes(params.tab) ? params.tab : 'album';
  const packCount = (player.skillCardPacks || []).length;
  const owned = (player.skillCardCollection || []).length;
  const shards = player.cardShards || 0;
  const pity = player.skillCardPity || {};

  const tabsHtml = `
    <div class="sk-tabs">
      <button class="sk-tab ${tab === 'album' ? 'active' : ''}" data-sk-tab="album">
        集卡册 <span style="color:var(--dim);font-size:10px">${owned}/${SKILL_CARDS.length}</span>
      </button>
      <button class="sk-tab ${tab === 'packs' ? 'active' : ''}" data-sk-tab="packs">
        盲盒开包 ${packCount ? `<span class="sk-tab-badge">${packCount}</span>` : ''}
      </button>
      <button class="sk-tab ${tab === 'loadout' ? 'active' : ''}" data-sk-tab="loadout">
        卡组配置 <span style="color:var(--dim);font-size:10px">${(player.skillCardLoadout || []).length}/3</span>
      </button>
    </div>`;

  const statusBar = `
    <div class="sk-status-bar">
      <div class="sk-status-item sk-status-pack">📦 待开卡包 <b>${packCount}</b></div>
      <div class="sk-status-item">🎴 已收集 <b>${owned}/${SKILL_CARDS.length}</b></div>
      <div class="sk-status-item sk-status-shard">💎 碎片 <b>${shards}</b></div>
      <div class="sk-status-item sk-status-pity">SR 保底 ${pity.sinceSR || 0}/10 · SSR ${pity.sinceSSR || 0}/50 · UR ${pity.sinceUR || 0}/100</div>
    </div>`;

  let body = '';
  if (tab === 'album') body = renderSkillAlbumTab(player);
  else if (tab === 'packs') body = renderSkillPacksTab(player);
  else body = renderSkillLoadoutTab(player);

  return `
    <div class="flex-between">
      <div class="section-title">⑧ 技能盲盒 · 卡组</div>
      <button class="back-btn" data-nav="${SCREENS.MAIN}">← 返回</button>
    </div>
    ${tabsHtml}
    ${statusBar}
    <div id="sk-body">${body}</div>
  `;
}

renderSkillCards.afterRender = function (params) {
  params = params || {};
  const back = document.querySelector('[data-nav]');
  if (back) back.addEventListener('click', () =>
    EventBus.emit(EVENTS.NAV_GOTO, { screen: back.getAttribute('data-nav'), params: {} }));
  document.querySelectorAll('[data-sk-tab]').forEach((b) => {
    b.addEventListener('click', () => {
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.SKILL_CARDS, params: { tab: b.getAttribute('data-sk-tab') } });
    });
  });
  bindSkillCardsTabEvents(params);
};

function bindSkillCardsTabEvents(params) {
  // 开包
  document.querySelectorAll('[data-sk-open-pack]').forEach((el) => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.getAttribute('data-sk-open-pack'), 10);
      const player = Store.get('player');
      const result = SkillBlindBox.openPack(player, idx);
      if (!result) return;
      Store.set('player', player);
      renderSkillPackOpenModal(result, () => {
        EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.SKILL_CARDS, params: { tab: 'packs' } });
      });
    });
  });
  // 卡组选择
  document.querySelectorAll('[data-sk-loadout-toggle]').forEach((el) => {
    el.addEventListener('click', () => {
      const id = el.getAttribute('data-sk-loadout-toggle');
      const player = Store.get('player');
      const cur = (player.skillCardLoadout || []).slice();
      const idx = cur.indexOf(id);
      if (idx >= 0) cur.splice(idx, 1);
      else if (cur.length < BLINDBOX_CONFIG.loadoutLimit) cur.push(id);
      else {
        // 已满 → 替换最早一张
        cur.shift();
        cur.push(id);
      }
      SkillBlindBox.setLoadout(player, cur);
      Store.set('player', player);
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.SKILL_CARDS, params: { tab: 'loadout' } });
    });
  });
  document.querySelectorAll('[data-sk-loadout-clear]').forEach((el) => {
    el.addEventListener('click', () => {
      const player = Store.get('player');
      SkillBlindBox.setLoadout(player, []);
      Store.set('player', player);
      EventBus.emit(EVENTS.NAV_GOTO, { screen: SCREENS.SKILL_CARDS, params: { tab: 'loadout' } });
    });
  });
}

/* ── 集卡册 Tab ──────────────────────────────────────────────────── */
function renderSkillAlbumTab(player) {
  const owned = new Set(player.skillCardCollection || []);
  const dups = player.skillCardDuplicates || {};
  const sections = SKILL_RARITY_DISPLAY.map((rarity) => {
    const group = SKILL_CARDS.filter((c) => c.rarity === rarity);
    if (!group.length) return '';
    const cfg = BLINDBOX_CONFIG.rarities[rarity];
    const ownedCount = group.filter((c) => owned.has(c.id)).length;
    const cards = group.map((c) => renderSkillCardTile(c, owned.has(c.id), dups[c.id] || 0)).join('');
    return `
      <div class="sk-section-head" style="--card-color:${cfg.color}">
        ◆ ${rarity} · ${cfg.label}
        <span class="sk-section-prog">${ownedCount} / ${group.length}</span>
      </div>
      <div class="sk-grid">${cards}</div>`;
  }).join('');
  return sections;
}

function renderSkillCardTile(card, isOwned, dupCount) {
  const cfg = BLINDBOX_CONFIG.rarities[card.rarity];
  const dupBadge = dupCount > 0 ? `<div class="sk-card-dupcount">×${dupCount + 1}</div>` : '';
  if (!isOwned) {
    return `<div class="sk-card sk-card-locked" data-rarity="${card.rarity}">
      <div class="sk-card-rarity">${card.rarity}</div>
      <div class="sk-card-no">${card.no}</div>
      <div class="sk-card-avatar"><div class="sk-chibi">?</div></div>
      <div class="sk-card-name">？？？</div>
      <div class="sk-card-effect" style="color:var(--dim);font-style:italic;text-align:center">${cfg.label} 系列 · 继续训练解锁</div>
    </div>`;
  }
  return `<div class="sk-card sk-card-owned" data-rarity="${card.rarity}" title="${card.flavor}">
    ${dupBadge}
    <div class="sk-card-rarity">${card.rarity}</div>
    <div class="sk-card-no">${card.no}</div>
    <div class="sk-card-series">${card.series}</div>
    <div class="sk-card-avatar"><div class="sk-chibi">${renderSkillCardArt(card) || card.emoji || '✦'}</div></div>
    <div class="sk-card-name">${card.name}</div>
    <div class="sk-card-effect">${card.effect.text}</div>
    <div class="sk-card-adapt">↳ ${card.adaptation.text}</div>
    <div class="sk-card-flavor">${card.flavor}</div>
  </div>`;
}

/* ── 盲盒开包 Tab ────────────────────────────────────────────────── */
function renderSkillPacksTab(player) {
  const packs = player.skillCardPacks || [];
  if (!packs.length) {
    return `<div class="hint hint-yellow" style="margin-top:8px">
      暂无卡包。<b>完成任意一局训练</b>即可获得「基础技能卡包」；胜利 / 高分 / 击败 Boss / 地狱级胜利会发放进阶卡包。
    </div>`;
  }
  const tips = `<div class="hint hint-cyan" style="margin-bottom:10px;font-size:11px">
    每包 5 张卡 · 重复卡自动转碎片（N=1/R=3/SR=10/SSR=30/UR=100） · 保底：10 包必出 SR+ / 50 包必出 SSR+ / 100 包必出 UR
  </div>`;
  const items = packs.map((p, i) => renderSkillPackTile(p, i)).join('');
  return tips + `<div class="sk-packs-row">${items}</div>`;
}

function renderSkillPackTile(pack, index) {
  const meta = BLINDBOX_CONFIG.packs[pack.type] || BLINDBOX_CONFIG.packs.basic;
  return `<div class="sk-pack" data-pack="${pack.type}" data-sk-open-pack="${index}">
    <div class="sk-pack-icon"><div class="sk-pack-shine"></div></div>
    <div class="sk-pack-name">${meta.name}</div>
    <div class="sk-pack-reason">${pack.reason || ''}</div>
    <div class="sk-pack-action">▸ 点击开启</div>
  </div>`;
}

/* ── 卡组配置 Tab ────────────────────────────────────────────────── */
function renderSkillLoadoutTab(player) {
  const owned = (player.skillCardCollection || []);
  const loadout = (player.skillCardLoadout || []);
  const slots = [0, 1, 2].map((i) => {
    const id = loadout[i];
    if (!id) return `<div class="sk-loadout-slot empty">+<br>空位</div>`;
    const card = SkillBlindBox.getCard(id);
    if (!card) return `<div class="sk-loadout-slot empty">（卡牌已失效）</div>`;
    return `<div class="sk-loadout-slot filled" data-sk-loadout-toggle="${id}">${renderSkillCardMini(card)}</div>`;
  }).join('');

  const tip = `<div class="sk-loadout-tip">
    每局最多携带 <b>3 张</b> 技能卡 · 每张每局最多使用 <b>1 次</b>。<br>
    在对局界面点击卡牌即可触发效果，但对手会同步获得对应适应属性。
  </div>`;
  const slotsHtml = `<div class="sk-loadout-slots">${slots}</div>`;
  const clearBtn = loadout.length ? `<div style="text-align:center;margin-bottom:14px"><button class="btn btn-red btn-sm" data-sk-loadout-clear>清空卡组</button></div>` : '';

  if (!owned.length) {
    return tip + slotsHtml + `<div class="hint hint-yellow">尚未拥有任何技能卡。先去「盲盒开包」开包获取吧。</div>`;
  }

  const ownedCards = SKILL_CARDS.filter((c) => owned.includes(c.id));
  // 按稀有度排序
  const ranked = ownedCards.slice().sort((a, b) =>
    SkillBlindBox.RARITY_RANK[b.rarity] - SkillBlindBox.RARITY_RANK[a.rarity]);
  const grid = ranked.map((c) => {
    const isPicked = loadout.indexOf(c.id) >= 0;
    return `<div data-sk-loadout-toggle="${c.id}" style="cursor:pointer">${renderSkillCardTile(c, true, (player.skillCardDuplicates || {})[c.id] || 0).replace('class="sk-card sk-card-owned"', `class="sk-card sk-card-owned" data-loadout-pick="${isPicked ? 1 : 0}"`)}</div>`;
  }).join('');

  return tip + slotsHtml + clearBtn + `<div class="sk-section-head">▸ 你拥有的技能卡<span class="sk-section-prog">点击加入/移除卡组</span></div><div class="sk-grid">${grid}</div>`;
}

function renderSkillCardMini(card) {
  return `<div class="sk-mini-card" data-rarity="${card.rarity}" style="cursor:pointer;width:100%">
    <div class="sk-mini-rarity">${card.rarity}</div>
    <div class="sk-mini-name">${card.emoji || ''} ${card.name}</div>
    <div class="sk-mini-effect">${card.effect.text}</div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════════════
   ui/skill-pack-open-modal.js — 开包动画（震动 → 爆盖 → 粒子 → 翻卡）
   ════════════════════════════════════════════════════════════════════════════ */
function renderSkillPackOpenModal(openResult, onClose) {
  if (typeof document === 'undefined') return;
  const overlay = document.createElement('div');
  overlay.className = 'box-modal-overlay';
  const reveal = SkillBlindBox.pickRevealCard(openResult.results);

  const totalShards = openResult.results.reduce((s, r) => s + (r.shard || 0), 0);
  const newCount = openResult.results.filter((r) => !r.duplicate).length;
  const dupCount = openResult.results.length - newCount;

  overlay.innerHTML = `
    <div class="box-modal sk-open-modal">
      <div class="sk-open-title">✦ 开启 · ${BLINDBOX_CONFIG.packs[openResult.pack.type].name} ✦</div>
      <div class="sk-open-sub">本次获得 ${openResult.results.length} 张卡 · 新卡 ${newCount} 张 / 重复 ${dupCount} 张</div>
      <div class="sk-open-revealed">
        ${openResult.results.map((r) => renderRevealCard(r, reveal && r.card.id === reveal.id)).join('')}
      </div>
      ${totalShards > 0 ? `<div class="sk-open-shard-bonus">💎 重复卡转化为 <b>${totalShards}</b> 碎片</div>` : ''}
      <div style="text-align:center;margin-top:6px">
        <button class="btn btn-green" data-close>收下 ✓</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('[data-close]').addEventListener('click', () => {
    overlay.remove();
    if (typeof onClose === 'function') onClose();
  });
}

function renderRevealCard(result, isReveal) {
  const c = result.card;
  const tag = result.duplicate
    ? `<span class="sk-open-tag-dup">+${result.shard} 碎片</span>`
    : `<span class="sk-open-tag-new">NEW</span>`;
  return `<div class="sk-card sk-card-owned" data-rarity="${c.rarity}" style="${isReveal ? 'transform:scale(1.04)' : ''}">
    <div class="sk-card-rarity">${c.rarity} ${tag}</div>
    <div class="sk-card-no">${c.no}</div>
    <div class="sk-card-avatar"><div class="sk-chibi">${renderSkillCardArt(c) || c.emoji || '✦'}</div></div>
    <div class="sk-card-name">${c.name}</div>
    <div class="sk-card-effect">${c.effect.text}</div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════════════
   ui/in-game-card-panel.js — 局内携带卡牌面板 + 对手适应条
   挂在对局屏的 #game-content 之后，由 game:render 事件触发渲染
   ════════════════════════════════════════════════════════════════════════════ */
function renderInGameCardPanelInto(rootEl) {
  if (!rootEl) return;
  // 找到/创建容器（位于 #game-content 之后）
  let panelHost = document.getElementById('sk-ingame-host');
  if (!panelHost) {
    panelHost = document.createElement('div');
    panelHost.id = 'sk-ingame-host';
    const after = document.getElementById('game-content');
    if (after && after.parentNode) after.parentNode.insertBefore(panelHost, after.nextSibling);
    else rootEl.appendChild(panelHost);
  }
  const loadout = Store.get('activeCardLoadout') || [];
  const used = Store.get('usedCardsThisGame') || [];
  let html = '';

  // 卡牌面板
  if (!loadout.length) {
    html += `<div class="sk-ingame-panel">
      <div class="sk-ingame-head">
        <div class="sk-ingame-title">▾ 技能卡组</div>
        <span style="font-size:10px;color:var(--dim)">未配置（主菜单 ⑧ → 卡组配置）</span>
      </div>
      <div class="sk-ingame-empty">本局未携带技能卡。</div>
    </div>`;
  } else {
    const cards = loadout.map((id) => {
      const c = SkillBlindBox.getCard(id);
      if (!c) return '';
      const isUsed = used.includes(id);
      return `<div class="sk-mini-card ${isUsed ? 'used' : ''}" data-rarity="${c.rarity}" data-sk-use="${c.id}" title="${c.effect.text}">
        ${isUsed ? '<div class="sk-mini-used-badge">已用</div>' : ''}
        <div class="sk-mini-rarity">${c.rarity}</div>
        <div class="sk-mini-name">${c.emoji || '✦'} ${c.name}</div>
        <div class="sk-mini-effect">${c.effect.text}</div>
      </div>`;
    }).join('');
    html += `<div class="sk-ingame-panel">
      <div class="sk-ingame-head">
        <div class="sk-ingame-title">▾ 技能卡组 · 本局 ${loadout.length - used.length}/${loadout.length} 可用</div>
        <span style="font-size:10px;color:var(--dim)">点击使用 · 每张每局 1 次</span>
      </div>
      <div class="sk-ingame-cards">${cards}</div>
    </div>`;
  }

  // 对手适应条
  if (!OpponentAdaptation.isEmpty()) {
    const state = OpponentAdaptation.getState();
    const attrs = ['alertness', 'defense', 'bargaining', 'pressure', 'strategy', 'cognitiveResistance', 'endgameDefense'];
    const rows = attrs.filter((a) => (state[a] || 0) > 0).map((a) => `
      <div class="sk-adapt-row">
        <span class="sk-adapt-label">${OpponentAdaptation.ATTR_LABEL(a)}</span>
        <span class="sk-adapt-track"><span class="sk-adapt-fill" style="width:${state[a]}%"></span></span>
        <span class="sk-adapt-val">${state[a]}</span>
      </div>`).join('');
    const last = (state.history || [])[state.history.length - 1];
    const msg = last ? `<div class="sk-adapt-msg">${(last && last.text) || '对手开始适应你的策略。'}</div>` : '';
    html += `<div class="sk-adapt-bar ${getOrPersistAdaptOpen() ? 'open' : ''}" id="sk-adapt-bar">
      <div class="sk-adapt-head" data-sk-adapt-toggle>
        <span><b>对手适应度</b>　·　对方正在识别你的策略并调整防守</span>
        <span class="sk-adapt-toggle">▾</span>
      </div>
      <div class="sk-adapt-body">${rows}${msg}</div>
    </div>`;
  }

  panelHost.innerHTML = html;

  // 卡牌点击
  panelHost.querySelectorAll('[data-sk-use]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-sk-use');
      EventBus.emit(EVENTS.PLAYER_ACTION, { type: 'use-card', value: id });
    });
  });
  // 适应条折叠
  const adaptHead = panelHost.querySelector('[data-sk-adapt-toggle]');
  if (adaptHead) {
    adaptHead.addEventListener('click', () => {
      const bar = panelHost.querySelector('#sk-adapt-bar');
      if (bar) {
        bar.classList.toggle('open');
        setAdaptOpen(bar.classList.contains('open'));
      }
    });
  }

  // 卡牌效果提示（hint 区域）—— 如果场景给了 _cardHints，渲染到 game-content 顶部小标签
  injectCardHintsToGameContent();
}

function injectCardHintsToGameContent() {
  const scenario = Store.get('activeScenario');
  if (!scenario || !scenario._cardHints || !scenario._cardHints.length) return;
  const content = document.getElementById('game-content');
  if (!content) return;
  // 避免重复插入
  if (content.querySelector('.sk-cardhint-strip')) return;
  const strip = document.createElement('div');
  strip.className = 'sk-cardhint-strip';
  strip.style.cssText = 'margin:6px 0 10px;display:flex;flex-direction:column;gap:4px';
  strip.innerHTML = scenario._cardHints.map((h) =>
    `<div class="hint hint-purple" style="font-size:11px;padding:6px 10px">${h}</div>`).join('');
  content.insertBefore(strip, content.firstChild);
}

let _adaptOpen = false;
function getOrPersistAdaptOpen() { return _adaptOpen; }
function setAdaptOpen(v) { _adaptOpen = !!v; }

/* ── 卡牌效果飞行提示 toast ──────────────────────────────────────── */
function showSkillCardToast(card, effectResult, adaptResult) {
  if (typeof document === 'undefined') return;
  const cfg = BLINDBOX_CONFIG.rarities[card.rarity];
  const toast = document.createElement('div');
  toast.className = 'sk-toast';
  toast.style.setProperty('--card-color', cfg.color);
  toast.style.setProperty('--card-glow', `${cfg.color}80`);
  toast.innerHTML = `
    <div class="sk-toast-card">${card.rarity} · ${card.emoji || ''} ${card.name}</div>
    <div class="sk-toast-effect">✦ ${(effectResult && effectResult.text) || card.effect.text}</div>
    <div class="sk-toast-adapt">↳ ${(adaptResult && adaptResult.text) || card.adaptation.text}</div>

  document.body.appendChild(toast);

/* ════════════════════════════════════════════════════════════════════════════
   engine/blindbox-wire.js — 独立 GAME_END 监听器（与 recorder 互不影响）
   即使 recorder 的 accumulate/addSession 链路抛错，卡包奖励仍能正常发放。
   ════════════════════════════════════════════════════════════════════════════ */
function initSkillBlindboxWire() {
  EventBus.on(EVENTS.GAME_END, (payload) => {
    try {
      const player = Store.get('player');
      if (!player || typeof SkillBlindBox === 'undefined') return;
      SkillBlindBox.ensureCardState(player);
      const result = (payload && payload.result) || {};
      const opp = Store.get('opponent');
      if (typeof result.difficulty === 'undefined') {
        result.difficulty = Store.get('difficulty') || 'medium';
      }
      if (opp && opp.boss && result.outcome === 'win') result.bossWin = true;
      // 每日首局：复用 recorder 写过的 _lastShardDay 标记（recorder 总是先写它）
      // 但如果 recorder 在它之前抛错，这里降级判定一次
      const today = new Date().toLocaleDateString('zh-CN');
      if (typeof result._isDailyFirst === 'undefined') {
        result._isDailyFirst = (player._lastShardDay !== today);
      }
      const packs = SkillBlindBox.calculateRewardPacks(result, player);
      SkillBlindBox.addPacks(player, packs);
      Store.set('pendingSkillPacks', packs);
      Store.set('player', player);
    } catch (e) {
      console.warn('[blindbox-wire] GAME_END handler error', e);
    }
  });
}

// 注入到 SKILL_CARDS（仅一次）
(function injectV2() {
  if (typeof SKILL_CARDS === 'undefined') return;
  SKILL_CARDS.forEach((c) => {
    const m = SKILL_CARD_META_V2[c.id];
    if (m) {
      if (!c.skillTags) c.skillTags = m.skillTags;
      if (!c.artKey) c.artKey = m.artKey;
    }
    if (!c.skillTags) c.skillTags = [];
  });
})();

function fallbackSkillCardArt(card) {
  const cfg = BLINDBOX_CONFIG.rarities[card.rarity] || BLINDBOX_CONFIG.rarities.N;

  return `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="26" r="14" fill="#ffd9b3"/>
    <circle cx="25" cy="24" r="1.5" fill="#1a2235"/>

}

function renderSkillCardArt(card) {
  if (!card) return '';
  if (typeof SKILL_CARD_PHOTOS !== 'undefined' && SKILL_CARD_PHOTOS[card.id]) {
    return '<img class="sk-card-photo" src="' + SKILL_CARD_PHOTOS[card.id] + '" alt="' + (card.name || '') + '">';
  }
  if (card.artKey && SKILL_CARD_ART[card.artKey]) return SKILL_CARD_ART[card.artKey];
  return fallbackSkillCardArt(card);
